body:
  text: 古史卷五十一宋蘇轍撰廉頗藺相如列傳第二十八廉頗者趙之良將也趙惠文王十六年廉頗為趙將伐齊大破之取晉陽拜為上卿以勇氣聞於諸侯藺相如者趙人也為趙宦者令繆賢舍人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與廉頗諸大臣謀欲豫秦秦城恐不可得徒見欺欲勿豫即患秦兵之來計未定求人可使報秦者未得繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王㑹境上燕王私握臣手曰願結友以此知之故欲往相如謂臣曰夫趙强而燕弱而君幸於趙王故燕王欲結於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧質請罪則幸脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召見問相如曰秦王以十五城請易寡人之璧可豫否相如曰秦强而趙弱不可不許王曰取吾璧不豫我城奈何相如曰秦以城求璧而趙不許曲在趙趙豫璧而秦不豫趙城曲在秦均之二策寧許以負秦曲王曰誰可使者相如曰王必無人臣願奉璧往使城入趙而璧留秦城不入臣請完璧歸趙趙王於是遂遣相如奉璧西入秦秦王坐章華臺見相如相如奉璧奏秦王秦王大喜傳以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髮上衝冠謂秦王曰大王欲得璧使人發書至趙趙王悉召羣臣議不欲豫秦璧臣以為布衣之交尚不相欺况大國乎且以一璧之故逆強秦之歡不可於是趙王乃齊戒五日使臣奉璧拜送書於庭何者嚴大國之威以修敬也今臣至大王見臣列觀禮節甚倨得璧傳之美人以戲弄臣臣觀大王無意償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐破璧乃辭謝固請召有司案圖指從此以往十五郡豫趙相如度秦王特以詐佯為豫趙城實不可得乃謂秦王曰和氏璧天下所共傳寶也趙王恐不敢不獻趙王送璧時齊戒五日今大王亦宜齊戒五日設九賔於庭臣乃敢上璧秦王度之終不可强奪遂許齊五日舍相如廣成傳舍相如度秦王雖齊决負約不償城乃使其從者衣褐懷其璧從徑道亡歸璧於趙秦王齊五日後乃設九賔禮於庭引趙使者相如至謂秦王曰自繆公以來二十餘君未嘗有堅明約束者也臣誠恐見欺於王而負趙故令人持璧間歸至趙矣且秦强而趙弱大王遣一介之使至趙趙立奉璧來今以秦之强而先割十五都豫趙趙豈敢留璧而得罪於大王乎臣知欺大王之罪當誅臣請就湯鑊唯大王與羣臣熟計議之秦王與羣臣相視而嘻左右或欲引相如去秦王因曰今殺相如終不能得璧也而絶秦趙之歡不如因而厚遇之使歸趙趙王豈以一璧之故欺秦邪卒廷見相如畢禮而歸之相如既歸趙王以為賢大夫使不辱於諸侯拜相如為上大夫秦亦不以城豫趙趙亦終不豫秦璧其後秦伐趙拔石城明年復攻趙殺二萬人秦王使使者告趙王欲與王為好㑹於西河外黽池趙王畏秦欲毋行廉頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從廉頗送至境與王訣曰王行度道里㑹遇之禮畢還不過三十日三十日不還請立太子為王以絶秦望王許之遂與秦王㑹黽池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年月日秦王與趙王㑹飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奉盆缶秦王以相娛樂秦王怒不許於是相如前進缶因跪請秦王秦王不肯擊缶相如曰五步之內相如請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡於是秦王不懌為一擊缶相如顧召趙御史書曰某年月日秦王為趙王擊缶秦之羣臣曰請以趙十五城為秦王夀相如亦曰請以秦之咸陽為趙王夀秦王竟酒終不能加勝於趙趙亦盛設兵以待秦不敢動既歸國以相如功大拜為上卿位在廉頗之右廉頗曰我為趙將有攻城野戰之大功藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與㑹每朝時嘗稱病不欲與廉頗爭列已而相如出望見廉頗引車避匿於是舍人相與諫曰臣所以去親戚而事君者徒慕君之高義也今君與廉頗同列廉君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之况於將相乎臣等不肖請辭去相如固止之曰公之視廉將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏廉將軍哉顧吾念之强秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者以先國家之急而後私讐也廉頗聞之肉袒負荆因賔客至門謝罪曰鄙賤之人不知將軍寬之至此也卒相與歡為刎頸之交是嵗廉頗東攻齊破其一軍居二年廉頗復伐齊幾拔之後三年廉頗攻魏之防陵安陽拔之後四年相如將而攻齊至平邑而罷其明年趙奢破秦軍閼與下趙奢者趙之田部吏也收租稅而平原君家不肯出奢以法治之殺平原君用事者九人平原君怒將殺奢奢因說曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國强國强則趙固而君為貴戚豈輕於天下邪平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實秦伐韓軍於閼與王召廉頗而問曰可救不對曰道逺險狹難救又召樂乘而問焉對如廉頗言又召問奢對曰其道逺險狹譬之猶兩鼠鬭於穴中將勇者勝王乃令奢將救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓譟勒兵武安屋瓦盡振軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益增壘秦間來奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也奢既已遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許歷請以軍事諫奢曰內之許歷曰秦人不意趙師至此其來氣盛將軍必厚積其陳以待之不然必敗奢曰請受令許歷曰請就鈇質之誅奢曰胥後令戰許歷復請諫史記本戰作邯鄲字素隱曰當作戰字故從之曰先據北山上者勝後至者敗奢許諾即發萬人趨之秦兵後至爭山不得上奢縱兵擊之大破秦軍秦軍解而走遂解閼與之圍而歸趙惠文王賜奢號為馬服君以許歷為國尉奢於是與廉頗藺相如同位後四年趙惠文王卒子孝成王立七年秦與趙兵相拒長平時奢已死而藺相如病篤趙使廉頗將攻秦秦敗趙軍趙軍固壁不戰秦數挑戰廉頗不肯趙王信秦之間秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代廉頗藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王不聽遂將之括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括即己若必將之破趙軍者必括也及括將其母上書言於王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以豫軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金帛歸藏於家而日視便利田宅可買者買之王以為如其父父子異心願王勿遣王曰母置之吾已决矣括母因曰王終遣之即有如不稱妾得無隨坐乎王許諾括既代廉頗悉更約束易置軍吏秦將白起聞之縱奇兵佯敗走絶其糧道分斷其軍為二士卒離心四十餘日軍餓括出鋭卒自摶戰秦軍射殺括括軍敗四十萬之衆遂降秦秦悉坑之趙前後所亡四十五萬明年秦兵遂圍邯鄲歲餘幾不得脫賴楚魏諸侯來救乃得解趙王以括母先言竟不誅也自邯鄲圍解五年而燕用栗腹之謀曰趙壯者盡於長平其孤未壯舉兵擊趙趙使廉頗將擊大破燕軍於鄗殺栗腹遂圍燕燕割五城請和乃聽之趙以尉文封頗為信平君為假相國頗之免長平歸也方失勢故客盡去及復用為將客復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎居六年趙使頗伐魏之繁陽拔之趙孝成王卒子悼襄王立使樂乘代頗頗怒攻樂乘乘走頗遂奔魏之大梁其明年趙乃以李牧為將而攻燕拔武遂方城頗居梁久之魏不能信用趙以數困於秦兵趙王思復得廉頗頗亦思復用於趙趙王使使者視頗尚可用否頗之仇郭開多與使者金令毁之使者既見頗頗為之一飯㪷米肉十斤被甲上馬以示尚可用趙使還報王曰廉將軍雖老尚善飯然與臣坐頃之三遺矢矣趙王以為老遂不召楚聞頗在魏陰使人迎之頗一為楚將無功曰我思用趙人頗卒死于壽春李牧者趙之北邊良將也常居代鴈門備胸奴以便宜置吏市租皆輸入莫府為士卒費日擊數牛饗士習射騎謹烽火多間諜厚遇戰士為約曰胸奴即入盜急入收保有敢捕虜者斬胸奴每入烽火謹輒入收保不敢戰如是數歲亦不亡失然胸奴以牧為怯雖趙邊兵亦以為吾將怯趙王讓牧牧如故趙王怒召之使他人代將歲餘胸奴每來出戰數不利失亡多邊不得田畜復請牧牧杜門不出固稱疾趙王乃復强起使將兵牧曰王必用臣臣如前乃奉令王許之牧至如故約胸奴數歲無所得終以為怯邊士日得賞賜而不用皆願一戰於是乃具選車得千三百乘選騎得萬三千匹百金之士五萬人彀者十萬人悉勒習戰大縱畜牧人民滿野胸奴小入佯北不勝以數千人委之單于聞之大率衆來入牧多為奇陳張左右翼擊之大破殺胸奴十餘萬騎滅襜襤破東胡降林胡單于奔走其後十餘歲胸奴不敢近趙邊城趙悼襄王元年廉頗既亡入魏趙使牧攻燕拔武遂方城居二年龐暖破燕軍殺劇辛後七年秦破趙殺將扈輒於武遂城斬首十萬趙乃以牧為大將軍擊秦軍於宜安大破秦軍走秦將桓齮封牧為武安君居三年秦攻畨吾牧擊破秦軍南拒韓魏趙王遷七年秦使王翦攻趙趙使牧司馬尚禦之秦多與趙王寵臣郭開金為反間言牧尚欲反趙王乃使趙葱及齊將顔聚代牧牧不受命趙使人微捕得牧斬之廢司馬尚後三月王翦因急擊趙大破殺趙葱虜趙王遷及其將顔聚遂滅趙蘇子曰藺相如非戰國之士也以死行義不屈於强秦以禮為國不校於廉頗其處剛柔進退之際類學道者使居平世可以為大臣矣非戰國之士也廉頗李牧皆以將亡之趙抗方興之秦其為力艱矣卒以其用捨為趙之存亡趙能用之而不能終悲夫古史卷五十一
