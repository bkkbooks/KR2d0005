body:
  text: 古史卷十五宋蘇轍撰宋微子世家第八微子啓者殷帝乙之元子而紂之庶兄也其父師曰箕子少師曰比干皆殷宗室賢者也箕子知微子之賢言於帝乙欲立以為世子帝乙不從及紂為天子以滛虐錯天命三人知殷將亡而微子箕子以嫌故不敢諌微子欲逃於野以避紂謀於二師曰我其發出狂吾家耄遜于荒箕子以為不可曰啇今其有災我興受其敗商今其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛躋自靖人自獻于先王我不顧行遯於是微子以祭器奔周箕子佯狂為奴紂遂囚之比干於紂無宿怨乃獨極諌紂怒剖其心觀之史記箕子曰為人臣不諌而去是彰君之惡也乃被髪佯狂而為奴比干曰君有過不以死爭則百姓何罪乃直言諌紂而死微子曰父子有骨肉而臣主以義屬三諌不聽可以去矣遂行然則三人者各以其意行而未見義之所以當異也且孔子稱微子去之箕子為之奴比干諌而死其先後之次如此今乃錯其先後非舊説也蓋三人之不同由其所處者異故也微子以兄之嫌箕子以立微子之怨其勢不可復諌雖諌必不用微子欲全其先祀故去之歸周箕子去無益於殷而不忍棄其宗國故囚比干宗室大臣而無嫌者也若不以死諌則是苟免矣此三子之志而孔子所以皆稱其仁也故武王伐殷數紂之罪曰剥喪元良賊虐諌輔囚奴正士為此三人發也及武王克殷微子面縳銜璧衰絰輿襯以見武王親釋其縳受其璧而祓之焚其襯禮而命之使復其所釋箕子之囚封比干之墓與箕子歸周而訪洪範箕子為武王陳彛倫之叙武王封之朝鮮其後箕子朝周過故殷墟感宗廟宫室盡為禾黍作麥秀之詩殷民聞之為之涕泣武王崩武庚及三監叛周周公以王命伐而誅之患殷之遺民懐舊思亂乃分殷之故國封邶鄘衛而更封微子於宋宋亦殷之先君相土之舊封也於是微子以上公奉殷祀行其正朔禮樂以客事周周人敬之為作有客之頌微子卒世子蚤死乃立世子之弟微仲衍微者微子在殷所食采也微子之子稱微仲猶康叔之子稱康伯蔡叔之子稱蔡伯爾古者謂殷人立弟周人立子所謂立弟者太子死則立太子之弟所謂立子者太子死則立太子之子皆非時君之子弟也近世儒者誤以立弟立子為時君之子弟因謂微仲為微子之弟失之矣子服伯子曰文王舍伯邑考而立武王微子舍其孫腯而立衍以衍況武王則衍亦㣲子之次子也以其稱仲明其為太子之弟也㣲仲卒子宋公稽立宋公稽卒子丁公申立丁公卒子涽公共立涽公卒弟煬公熈立涽公長子弗父何次子鮒祀鮒祀弑煬公欲立兄弗父何弗父何不受乃自立為厲公孟僖子言孔子之先曰其祖弗父何以有宋而授厲公厲公卒子釐公舉立釐公十七年周厲王奔彘二十八年釐公卒子惠公覸立惠公四年周宣王即位三十年惠公卒子哀公立哀公元年卒子戴公立自微子至戴公十一世禮樂廢缺其大夫正考父求啇頌於周太師得十二篇歸以祀其先王戴公二十九年周幽王為犬戎所殺三十四年戴公卒子武公司空立十八年武公卒子宣公力立十九年宣公卒宣公之子曰與夷公弟曰和公将死以國譲和和立是為穆公九年穆公疾召大司馬孔父使立與夷以稱先君之意孔父願奉子馮公不可使馮出居于鄭以辟與夷與夷立是為殤公元年以馮故與陳蔡衛伐鄭公立十年而十一戰民不堪命孔父為司馬華督為太宰孔父之妻羙督見而説之将為亂先宣言於國以亟戰歸罪於司馬遂殺孔父而取其妻公怒督懼遂弑公逆公子馮于鄭而立之是為荘公魯侯齊侯陳侯鄭伯㑹于稷以謀我以賂免九年鄭荘公卒其子突宋雍氏出也雍氏有寵于公公為之執突及祭仲以求賂與之盟而納之突入而賂不至怨焉十年魯桓公将平我於鄭不許故魯師鄭師伐我十一年魯侯紀侯鄭伯復伐我以齊衛燕之師禦之敗績十二年以齊蔡衛陳之師入鄭以大宫之椽歸為盧門之椽十三年鄭伯突出奔蔡公㑹諸侯伐鄭将納突不克十八年荘公卒史記荘公凡十九年蓋以殤公卒之年為元年也然史記亦以執鄭祭仲為九年則進退皆非當以十八年為正也子涽公捷立七年齊桓公初立八年六月及齊師侵魯魯敗我師于乗邱獲南宫萬九年秋大水魯來弔對曰孤實不敬天降之災又以為君憂拜命之辱魯臧文仲聞之曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也既而問之公子御說之詞也臧孫曰是宜為君有恤民之心魯人歸南宫萬公戲之曰始吾敬子今子魯囚也弗敬子矣萬病之十年秋遂弑涽公于蒙澤殺仇牧華督立子游羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳十月蕭叔大心及戴武宣穆荘之族以曹師伐之殺南宫牛于師殺子㳺于宋立公子御説是為桓公猛獲奔衛南宫萬奔陳宋人請之二國歸之至皆醢之桓公元年齊桓公㑹諸侯于北杏以平宋亂既盟而背齊二年齊人陳人曹人來伐冬公㑹諸侯于鄄復與齊平二十年齊侯為鄭謀楚求㑹于諸侯公請先見及齊侯遇于梁邱二十九年公疾病太子兹父請曰目夷長且仁君其立之目夷曰能以國譲仁孰大焉臣不及也且又不順走而退三十年桓公卒兹父立是為㐮公未𦵏而㑹諸侯於葵邱使目夷為左師以聽政是以宋治七年正月戊申朔隕石于宋五是月六鶂退飛過我周内史叔興來聘公問焉曰明年齊有亂君将得諸侯而不終八年齊桓公卒桓公始與管仲屬公子昭於㐮公至是五公子争立昭來奔九年公及曹伯衛人邾人伐齊立昭而還十年三月執滕子嬰齊六月公及曹人邾人盟于曹南鄫子㑹盟于邾公使邾文公執鄫子用之次且之社欲以屬東夷目夷曰古者六畜不相為用況敢用人乎齊桓公存三亡國以屬諸侯義士猶曰薄德今一㑹而虐二國之君又用諸滛昏之鬼将以求伯不亦難乎得死為幸秋圍曹目夷曰文王伐崇三旬而不降退脩教而復伐之因壘而降今君德無乃猶有所闕而以伐人盍姑内省德乎十二年公将為鹿上之盟求諸侯於楚楚人許之目夷曰小國争盟禍也宋其亡乎幸而後敗秋㑹于鹿上楚人執公以伐我冬諸侯㑹于薄以釋公十三年公㑹諸侯伐鄭楚人救鄭公将戰目夷諌不聼冬公及楚人戰于泓宋人既成列楚人未濟目夷請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之我師敗績公傷股門官殱焉國人皆咎公公不悔曰我雖亡國之餘不皷不成列晉公子重耳過我公既敗於楚欲厚於晉贈之以馬二十乗十四年襄公卒子成公王臣立元年及楚平公如楚晉文公立三年遂叛楚即晉楚令尹成得臣伐我圍緡四年楚子及諸侯圍我使公孫固告急于晉五年晉侯伐曹衛以救我畀我曹衛之田敗楚師于城濮十一年成公卒子昭公杵臼立昭公将去羣公子樂豫諌不聼穆㐮之族帥國人攻公殺公孫固公孫鄭六卿和公室樂豫舍司馬以譲公子卭㐮公夫人㐮王之姊也公亦不禮焉元年夫人因戴氏之族以去公之黨殺孔叔公孫鍾離及司馬卭司城蕩意諸出奔魯三年楚子蔡侯次于厥貉将伐我華御事曰楚欲弱我也先為之弱乎乃逆而道之以田孟諸公為右盂鄭伯為左盂期思公復遂為右司馬子朱及申之無畏為左司馬命夙駕載燧公違命無畏扶公僕以狥四年蕩意諸歸自魯七年髙哀出奔魯高哀者蕭之封人也自蕭為卿以公為不義而亡公既失衆公子鮑禮於國人宋饑竭其粟而貸㐮夫人欲通之不可乃助之施九年國人奉鮑以因夫人夫人使公田孟諸将殺之公知之盡以寳行蕩意諸從公曰盍適諸侯公不可盡以其寳賜左右而使行夫人使司城去公對曰臣之而逃其難若後君何十一月夫人使甸人弑公意諸死之國人立鮑是為文公元年晉人以諸侯來討聞公既定乃還二年武氏之族道昭公子将奉母弟須以作亂公殺須及昭公子而出武穆之族三年楚子鄭人侵我我伐鄭四年鄭公子歸生以楚令伐我華元樂吕禦之戰于大棘華元殺羊食士其御羊斟不及怒而入鄭師師大敗鄭人囚華元樂吕以兵車百乗文馬百駟贖之乃歸武穆之族以曹師伐我五年圍曹十四年華椒㑹晉原縠衛孔逹曹人盟于清邱曰恤病討貳陳貳於楚我以盟故伐之衛人救陳十五年楚人伐我十六年楚使申舟聘于齊曰無假道于宋我以孟諸之役惡舟執而殺之九月楚子圍我十七年使樂嬰齊告急于晉晉伯宗曰天方授楚未可與争乃使解揚來告曰無降楚楚人得之厚賂使反其言登諸樓車遂致其君命晉救不至楚人築室反耕國人懼華元夜入楚師登其司馬側床而起之曰寡君使元以病告曰敝邑易子而食析骸而爨雖然城下之盟有以國敝不能從也去我三十里惟命是聽側懼與之盟而告荘王退三十里而盟華元質焉二十二年文公卒子共公瑕立始厚𦵏君子譏華元樂吕以為不臣七年晉人使楚公子鍾儀求成於楚楚人許之華元善於楚令尹嬰齊又善於晉欒書九年元聘于晉楚合二國之成十年五月晉士燮楚公子罷許偃盟于宋西門之外十三年其公卒子平公成立華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城荘族也六官者皆桓族也魚石将止華元曰彼多大功國人與之不反懼桓氏之無後於宋也追之及於河上請討許之乃反使華喜公孫師帥國人攻蕩澤殺之桓氏之五官出舍於睢上華元止之不可遂出奔楚華元使向戍為左師老佐為司馬樂裔為司冦以靖國人三年夏楚子鄭伯侵我納魚石于彭城以三百乗戍之國人患之西鉏吴曰非吾患也使楚人與吾同惡以德於我吾固事之矣不然收吾憎以賛其政以間吾釁亦吾患也今将崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吴晉吾庸多矣且事晉何為晉必恤之四年晉人以諸侯圍彭城降之以五大大歸寘諸瓠邱九年樂轡以弓梏華弱於朝公見之曰司武而梏於朝難以勝矣逐之弱奔魯司城樂喜曰同罪異罰非刑也專戮於朝罪孰大焉亦逐樂轡轡射子罕之門曰幾日而不我從喜善之如初十二年大火十三年公㑹諸侯于柤晉人以諸侯滅偪陽将以封向戊戌不敢受乃以予我二十年華閲卒其弟臣殺其宰華吴公将逐臣向戍曰臣亦卿也大臣不順不如蓋之從之向戌為短䇿過華臣之門必騁十一月國人逐瘈狗入于華臣氏臣懼奔陳皇國父為公築臺妨於農收樂喜請竢農隙公不許築者謳曰澤門之晢實興我役邑中之黔實慰我心喜聞之親執扑以抶其不勉曰吾儕小人皆有闔閭以辟燥濕寒暑君為一臺而不速成何以為役謳者乃止或問其故曰宋國區區而有詛有祝禍之本也平公太子痤庶子佐佐惡而婉痤羙而很向戌惡痤寺人惠牆伊戾為太子内師無寵二十九年楚客過宋太子請野享之公使往伊戾從之至則坎用牲加書騁而告公曰太子将為亂向戌徴之公囚太子太子縊公徐聞其無罪也乃烹伊戾向戌善於晉趙武又善於楚屈建欲弭諸侯之兵以為名告於晉楚皆許之三十年夏諸侯㑹于我七月辛巳盟向戍請賞公與之邑六十樂喜曰天生五材民並用之廢一不可誰能去兵兵之設乆矣所以威不軌而昭文德也聖人以興亂人以廢而子求去之不亦誣乎以誣道蔽諸侯而又求賞乎削其書而投之戍懼辭邑三十二年宋饑樂喜聞鄭罕虎以其粟貸乃請於公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸國無飢人三十三年五月甲午大災共姬待姆卒于火十月諸侯為災故㑹于澶淵将周我既而無歸寺人栁有寵於公太子佐惡之華合比請殺之栁譛之公而逐之合比奔衛四十四年十二月平公卒子元公佐立将殺寺人栁及喪栁熾炭于位将至則去之比𦵏又有寵八年五月壬午宋衛陳鄭火元公無信多私而惡華向華亥華定與向寧謀曰亡愈於死先諸十年六月華亥偽有疾以誘羣公子公子問之則執而殺之公如華氏請弗許遂劫公取太子欒母弟辰公子地以為質公亦取華向之子以為質十月公殺華向之質而攻之華向奉諸公子以歸公而出奔陳華登奔吴登者司馬華費遂之子也費遂之子三人曰貙曰多僚曰登登既出多僚譛貙於公曰将納亡人公将逐之十一年夏貙殺多僚劫費遂而召華亥華定向寧於陳皆入於南里以叛十月華登以吴師救華氏齊烏枝鳴戍我與我師敗華氏于新里十一月晉齊衛曹皆來救我大敗華氏圍諸南里華登如楚乞師楚薳越以師逆之十二年薳越請釋華向于楚公将拒之諸侯之救者請之乃緩之皆出奔楚十五年魯昭公出奔齊公為魯故如晉卒于曲棘子景公欒立史記景公名頭曼左傳元公将亡夢太子欒即位於廟今以左氏為正二年樂祁㑹諸侯之大夫于扈将納魯君晉不可而止八年諸侯城成周仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職将從王官何故以役諸侯仲幾曰三代異物薛焉得有舊晉士弥牟曰子姑受功吾歸視諸故府仲幾曰從子忘之山川鬼神其忘諸乎士伯怒告韓不信執仲幾歸諸京師十三年樂祁言於公曰諸侯惟我事晉今又不往晉其憾矣公使樂祁徃晉趙鞅逆而飲之酒獻楊楯六十范鞅嫉之言於晉侯執樂祁十五年趙鞅為之請而歸之卒於大行范鞅止其尸以求成十六年使樂大心逆其喪辭以有疾乃使向巢祁之子溷訴之曰大心将為亂十七年大心出奔曹公嬖向魋公子地有白馬四公取而朱其尾鬛以予魋地怒使其徒扶魋而奪之魋懼将走公閉門而泣之目盡腫母弟辰曰子為君禮不過出竟君必止子地出奔陳辰為之請弗聽辰曰是我廷吾兄也吾以國人出君誰與處冬辰及仲佗石彄出奔陳十八年辰地佗彄入于蕭以叛樂大心從之大為國患二十一年辰出奔魯地出奔鄭鄭人城戈錫以處之自是宋鄭歳相侵伐二十五年孔子自陳來桓魋惡而欲害之孔子去二十八年春向巢帥師伐曹二十九年秋圍曹築五邑於其郊鄭人救曹三十年公復伐曹滅之執曹伯陽以歸殺之桓魋以寵偪三十六年公使夫人驟請享焉而将討之魋先謀公公知之與皇野謀之野曰不得左師巢不可以君命召之至而與之言拜不能起公與之盟而使攻魋魋入于曹以叛又使巢攻之不克亦入于曹曹人叛之魋奔衛巢奔魯三十七年熒惑守心心宋星也公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰無民誰君曰可移於嵗公曰嵗饑民困吾亦病矣子韋曰天高聽卑君有君人之言三熒惑冝有動候之果徙三度景公無子取元公之孫周之子得與啓畜諸公宫未有立焉四十九年十月公遊于空澤卒于連中公之嬖臣大尹興空澤之甲奉公以入召六卿劫而盟之以立啓司城樂茷宣言於國曰大尹惑蠱吾君君無疾而死死又匿之皆大尹之罪也大尹懼将復盟六卿六卿謀曰民與我逐之乎皆歸授甲使民施罪於大尹大尹奉啓以奔楚乃立得是為昭公左傳言景公之死昭公之立其事甚詳史記稱景公六十四年卒又言公子特殺太子而自立皆非也然景公之年比左傳多十四年則其後諸公之年皆未可信故疑而不録昭公卒子悼公購由立悼公卒子休公田立休公卒子桓公辟兵立案索隐汲冢紀年作桓公辟兵荘子曰桓公出前驅呼辟蒙人以為狂而史記作辟公辟兵且名辟兵而謚辟事必不爾史記蓋誤也桓公卒子剔成立梁惠王伐邯鄲徴師於宋宋君使使請於趙曰梁兵勁而權重今徴師於弊邑弊邑不從則恐危社稷若扶梁伐趙以害趙國則寡人不忍也願王之有以命弊邑也趙王曰然宋之不足以敵梁寡人知之矣弱趙以强梁宋必不利也則吾何以告子而可使者曰臣請受邊城徐其攻而留其日以待下吏之有城而已趙王曰善宋人因舉兵入趙境圍一城焉梁王説曰宋人助我矣趙王亦說曰宋人止於此矣其後剔成之弟偃襲攻剔成剔成奔齊偃自立為君既而稱王有雀生􅞖於城隅史占之曰小而生巨必伯天下王大喜於是滅滕伐薛東敗齊取五城南敗楚取地三百里西敗魏乃愈自信欲伯之亟成射天笞地斬社稷而焚滅之剖傴之背鍥朝渉之脛國人大駭羣臣諌者輒射之諸侯皆曰桀宋宋其復為紂所為不可不誅於是齊湣王與楚魏伐宋殺王偃而三分其地宋滅之嵗齊涽王之三十八年也蘇子曰宋襄公欲求諸侯與楚人戰于泓不鼔不成列不禽二毛以此兵敗身死而公羊嘉之以為文王之戰不過於此余竊笑之夫襄公凌虐小國至使邾人用鄫子于次且之社雖桀紂有不為矣乃欲以不皷不成列不禽二毛求為文王不亦過甚矣哉夫堯舜文武其所以自為者至矣始於其身而至於其室家仰不愧於天俯不慚於人夫是以干羽可以格三苗因壘可以伏有崇不然将敗折自救之不暇而况以伏人哉嗚呼儒者不原本末而惑於虚名将以盃水勝輿薪之火悲夫古史卷十五
