body:
  text: 古史卷三宋蘇轍撰夏本紀夏禹帝顓頊之後禹之父鯀顓頊五丗孫也太史公以鯀為顓頊之子其世太迫班固律歷志以為五世孫近得之故取焉以崇伯事堯堯被洪水之患訪於四嶽求可治水者四嶽舉鯀可用堯曰鯀方命圯族不可嶽曰等之未有賢於鯀者於是堯聼四嶽用鯀鯀堙洪水汨陳其五行水不潤下上帝震怒不畀洪範九疇彛倫攸斁九年功用不成堯更求人得舜舜登用攝行天子之政巡守行視鯀之治水無狀乃殛鯀于羽山而舉鯀之子禹使續鯀之業天乃錫禹洪範九疇彛倫攸敘禹以此治水水得其性所謂洛書者也禹之為人克勤于邦克儉于家不自滿假不矜不伐既受命傷先人功之不成受誅乃勞身焦思居外十三年三過其門而不入取于塗山辛壬癸甲啓􅈱􅈱而泣亦弗遑子也菲飲食致孝乎鬼神惡衣服致美乎黻冕卑宫室盡力乎溝洫陸行乘車水行乘船泥行乘橇山行乘攆隨山刋木暨益奏庶鮮食決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂蓋禹行自冀州始自冀而東治兖青徐自徐而南治揚荆自荆而西治豫梁雍皆相其土田草木之宜以作貢賦謂之禹貢東漸于海西被于流沙朔南暨聲教訖于四海堯賜之玄圭以告成功使為司空及堯崩舜為天子復代舜典百揆三十三年而舜命以位讓于臯陶舜不可禹固辭不獲命乃以正月朔旦受命于神宗帥百官若帝之初是時三苗之君雖已流竄其國人猶不用帝舜復命禹征之禹會諸侯誓師而行三旬苗民不服益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽叟夔夔齊栗瞽亦允若至諴感神矧兹有苗禹拜受其言而班師舜乃大敷文德舞干羽于兩階七旬而有苗格舜崩禹即天子位號曰帝禹改正朔服色歲首建寅色尚黑大事斂用昏戎事乘驪牲用玄合諸侯於塗山執玉帛者萬國其後南巡守復會諸侯於江南計功而崩因葬焉命曰會稽會稽者會計也子帝啓立有扈氏不共啓伐之大戰于甘將戰作甘誓啓崩子帝太康立太康盤逰無度田于有洛之表十旬弗反有窮后羿因民弗忍距于河太康弟五人御其母以從徯于洛之汭作五子之歌羿遂逐太康而立其弟仲康是為帝仲康羲和湎淫廢時亂日仲康命胤侯征之作胤征仲康崩子帝相立羿之放太康也自鉏遷于窮石因夏民以代夏政滅樂正后夔之子伯封恃其射也不修民事而虞于原獸武羅伯因熊髠厖圉皆其賢臣也棄之不用而用寒浞寒浞伯明氏之讒子弟也信而使之以為已相浞行媚于內施賂于外而虞羿于田內外咸服而羿不知也將歸自田家衆殺而烹之以食其子其子不忍食死于窮門夏之遺臣靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不德于民使澆用師滅斟灌及斟尋氏處澆于過處豷于戈滅夏后相相之后緍方娠逃出自竇歸于有仍生少康惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思妻之以二姚而邑諸綸有田一成有衆一旅能布其德以收夏衆使女艾諜澆使季杼誘豷靡自有鬲氏收二斟之燼以殺浞而立少康少康滅澆于過后杼滅豷于戈以復禹之迹是為帝少康少康崩子帝杼立帝杼崩子帝槐立帝槐崩子帝芒立帝芒崩子帝泄立帝泄崩子帝不降立帝不降崩弟帝扃立帝扃崩子帝厪立帝厪崩立帝不降之子孔甲孔甲好方鬼神事夏后氏始衰諸侯畔之得乘龍河漢各二各有雄雌孔甲不能食有劉纍者學擾龍于豢龍氏以事孔甲能飲食之孔甲賜之氏曰御龍龍一雌死潛醢以食孔甲孔甲求之懼而遷去孔甲崩子帝臯立帝臯崩帝臯墓在殽之南陵蹇叔云子帝發立帝發崩子帝履癸立是為桀自孔甲以來諸侯多畔桀不務德而武傷百姓百姓弗堪伐有施氏有施以妹喜女焉桀嬖愛之政益亂復克有緍淫侈滋甚召湯而囚之夏臺已而釋之湯益修德諸侯歸之遂帥兵伐桀桀兵敗奔南巢遂放而死蓋夏后氏禘黃帝郊鯀祖顓頊宗禹報杼周興封其後把繒以奉禹祀禹本姒姓其後分封以國為氏有夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏把氏繒氏辛氏冥氏斟氏戈氏蘇子曰聖人之於天下茍可以安民不求為異也堯舜傳之賢而禹傳之子後世以為禹無聖人而傳之而後授之其子孫此以好異期聖人也昔者湯有伊尹武王有周公而周公又武王之弟也湯之太甲武之成王皆可以為天下而湯不以豫其臣武王不以豫其弟誠以為其子之才不至於亂天下者無事乎授之它人而以為異也而天下何獨疑禹哉今夫人之愛其子是天下之通義也有得焉而以豫其子孫又情之所皆然也聖人以是為不可易故因而聼之使之父子相繼而無相亂以至於堯堯舉天下而授之舜舜得堯之天下而又授之禹舉天下而授之人此聖人之所以大過人而天下後世之所不能也天下後丗之所不能而聖人獨為之豈以為異哉天下之人不能皆賢而有異人焉為異而震之則天下皆將喜其名而失其真故夫堯舜之傳賢者是不得已而然也使堯之丹朱舜之商均僅可以守天下而堯肯傳之舜舜肯傳之禹以為異而疑天下哉然則禹之不以天下授益非以益為不足授也使天下復有禹豫知禹之不以天下授之矣何者啓足為天下故也啓為天下而益為之佐是益不失為伊尹周公其功猶可以及天下也聖人之不喜異也如此魯人之法贖人者受金於府子貢贖人而不受賞夫子嘆曰嗟夫使魯之不復贖人者賜也夫夫贖人而不以為功此君子之所以異於衆人者而其弊乃至於不贖是故聖人不喜夫異以其有時而窮也閔子終三年之喪見於夫子援琴而歌戚戚而不樂子夏終三年之喪見於夫子取琴而鼓之其樂侃侃然作而曰先王制禮不敢不及也而夫子皆以為賢由此觀之禹益之事傳者之過也記有之曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏禘黃帝而郊鯀祖顓頊而宗禹舜禹皆有所從受天下者也其所從受天下者不可忘也故舜宗堯而置瞽叟此天下之大義也至禹不獨廢堯而且忘舜鯀雖得罪以父故得祭於郊從舜之義則禹為忘其君從禹之義則舜為忘其親二者皆聖人之所不為也豫聞之禮之所行義之所許也故禮雖先王未之有可以義起也舜禹之有天下則先王之所未有也故堯雖非父而其德載於後丗不可以不宗瞽雖其親而無功於人不可以私享二者皆義也至夏后氏郊鯀而宗禹此禹之子孫之禮也孰謂禹之不宗舜哉栁下惠稱有虞氏郊堯而宗舜先儒以為此虞氏子孫之禮也以虞推禹則禹其有不宗舜乎雖然夏之子孫所以不宗舜者以有鯀也鯀雖得罪於舜而從事於水者九年非瞽瞍之比也故卒為夏郊而三代祀之三代猶以其功祀之而其子孫顧可以它人廢之乎故夫虞夏之祀皆義之所豫也古史卷三
