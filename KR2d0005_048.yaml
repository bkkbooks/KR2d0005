body:
  text: 古史卷四十八宋蘇轍撰春申君列傳第二十五春申君者楚人也名歇姓黄氏游學博聞事楚頃襄王頃襄王以歇為辯使於秦秦昭王使白起攻韓魏敗之於華陽禽魏將芒卯韓魏服而事秦昭王方令白起與韓魏共伐楚未行而歇適至聞秦之計當是之時秦已前使白起攻楚取巫黔中郡拔鄢郢東至竟陵頃襄王東徙治陳楚懐王既為秦所誘入朝遂見欺留死於秦頃襄王其子也秦輕之歇恐秦王舉兵而滅楚乃上書説秦昭王曰天下莫强於秦楚今聞大王欲伐楚此猶兩虎相與鬭兩虎相與鬭而駑犬受其弊不如善楚臣請言其説臣聞物至則反冬夏是也致至則危累棊是也今大國之地徧天下有其二垂此從生民以來萬乗之地未嘗有也先帝文王莊王之身秦昭王前有惠文王武王耳今此云文王莊王則始皇父祖蓋記録者之悮耳三世不忘接地於齊以絶從親之要今王使盛橋守事於韓盛橋以其地入秦是王不用甲不信威而得百里之地王可謂能矣王又舉甲而攻魏杜大梁之門舉河内拔燕酸棗虛桃入邢魏之兵雲翔而不敢捄王之功亦多矣王休甲息衆二年而後復之又并蒲衍首垣以臨仁平丘黄濟陽嬰城而魏氏服王又割濮磨之北注齊秦之要絶楚趙之脊天下五合六聚而不敢救王之威亦單矣王若能持功守威絀攻取之心而肥仁義之地使無後患三王不足四五伯不足六也王若負人徒之衆仗兵革之强乘毁魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終易曰狐渉水濡其尾此言始之易終之難也何以知其然也昔智氏見伐趙之利而不知榆次之禍吳見伐齊之便而不知干隧之敗此二國者非無大功也沒利於前而易患於後也吳之信越也從而伐齊既勝齊人於艾陵還為越王禽三渚之浦智氏之信韓魏也從而伐趙攻晉陽城勝有日矣韓魏叛之殺智伯瑶於鑿臺之下今王妬楚之不毁也而忘毁楚之强韓魏也臣為王慮而不取也詩曰大武逺宅而不渉從此觀之楚國援也隣國敵也詩云趯趯毚兔遇犬獲之他人有心余忖度之今王中道而信韓魏之善王也此正呉之信越也臣聞之敵不可假時不可失臣恐韓魏卑辭除患而實欲欺大國也何則王無重世之徳於韓魏而有累世之怨焉夫韓魏父子兄弟接踵而死於秦者將十世矣本國殘社稷壊宗廟毁刳腹絶腸折頸摺頤首身分離暴骸骨於草澤頭顱僵仆相望於境父子老弱係脰束手為羣虜者相及於路鬼神孤傷無所血食人民不聊生族類離散流亡為僕妾者盈滿海内矣故韓魏之不亡秦社稷之憂也今王資之與攻楚不亦過乎且王攻楚將惡出兵王將借路於仇讎之韓魏乎兵出之日而王憂其不返也是王以兵資於仇讎之韓魏也王若不借路於仇讎之韓魏必攻隨水右壤隨水右壤此皆廣川大水山林谿谷不食之地也王雖有之不為得地是王有毁楚之名而無得地之實也且王攻楚之日四國必悉起兵以應王秦楚之兵構而不離魏氏將出而攻留方與銍湖陵碭蕭相故宋必盡齊人南面攻楚泗上必舉此皆平原四達膏腴之地而使獨攻王破楚以肥韓魏於中國而勁齊韓魏之强足以校於秦齊南以泗水為境東負海北倚河而無後患天下之國莫强於齊魏齊魏得地葆利而詳事下吏一年之後為帝未能其於楚王之為帝有餘矣夫以王壤土之博人徒之衆車革之强壹舉事而樹怨於楚還令韓魏歸帝重於齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨韓韓必歛手王施以東山之險帶以曲河之利韓必為闗内之侯若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往來也如此而魏亦闗内侯矣王一善楚而闗内兩萬乗之主注地於齊齊右壤可拱手而取也王之地一經兩海要約天下是燕趙無齊楚齊楚無燕趙也然後危動燕趙直揺齊楚此四國者不待痛而服矣昭王曰善於是乃止白起而謝韓魏發使賂楚約為與國歇受約歸楚楚使歇與太子完入質於秦秦留之數年頃襄王病太子不得歸而楚太子與秦相應侯善於是黄歇乃説應侯曰相國誠善楚太子乎應侯曰然歇曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮是親與國而得儲萬乗也若不歸則咸陽一布衣耳楚更立太子必不事秦夫失與國而絶萬乗之和非計也願相國孰慮之應侯以聞秦王秦王曰令楚太子之傅先往問楚王之疾返而後圖之歇為楚太子計曰秦之留太子也欲以求利也今太子力未能有以利秦也歇憂之甚而陽文君子在中必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之楚太子因變衣服為楚使者御以出闗而歇守舍嘗為謝病度太子已逺秦不能追歇乃自言秦昭王曰楚太子已歸出逺矣歇當死願賜死昭王大怒欲聽其自殺也應侯曰歇為人臣出身以徇其主太子立必用歇故不如無罪而歸之以親楚秦因遣歇歇至楚三月頃襄王卒太子完立是為考烈王元年以歇為相封為春申君賜淮北地十二縣後十五歲歇言於王曰淮北地邊齊其事急請以為郡便因并獻淮北十二縣請封於江東考烈王許之歇因城吳故墟以自為都邑是時齊有孟嘗君趙有平原君魏有信陵君方爭下士招致賔客以相傾奪輔國持權歇為楚相四年秦破趙長平軍四十餘萬五年圍邯鄲邯鄲告急於楚楚使歇將兵往救之秦兵亦去歇相楚八年為楚北伐滅魯以荀卿為蘭陵令當是時楚復强趙平原君使人於歇歇舎之於上舎趙使欲夸楚為瑇瑁簪刀劒室以珠玉飾之請命於歇歇之客三千餘人其上客皆躡珠履以見趙使趙使大慙歇相十四年秦莊襄王立以吕不韋為相封為文信侯取東周歇相二十二年諸侯患秦攻伐無已時乃相與合從西伐秦而楚王為從長歇用事至函谷闗秦出兵攻諸侯兵皆敗走考烈王以咎歇歇以此益疎客有觀津人朱英謂歇曰人皆以楚為强而君用之弱其於英不然先君時善秦二十年而不攻楚何也秦踰黽隘之塞而攻楚不便假道於兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬭也楚於是去陳徙壽春而秦徙衞野王作置東郡歇由此就封於呉行相事考烈王無子歇患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐久毋寵李園求事歇為舍人已而謁歸故失期還謁歇問之狀對曰齊王使使求臣之女弟與其使者飲故失期歇曰聘入乎對曰未也歇曰可得見乎曰可於是李園乃進其女弟即幸於歇知其有身李園乃與其女弟謀園女弟承間以説歇曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百歲後將更立兄弟兄弟更立亦各貴其故所親君又安得長有寵乎非徒然也君貴用事久多失禮於王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身矣而人莫知妾幸君未久誠以君之重而進妾於楚王王必幸妾妾賴天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎歇大然之乃出李園女弟謹舎而言之楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事益驕恐歇語泄陰養死士欲殺歇以滅口國人頗有知之者歇相二十五年考烈王病朱英謂歇曰世有毋望之福又有毋望之禍今君處毋望之世事毋望之主安可以無毋望之人乎歇曰何謂毋望之福曰君相楚二十餘年矣雖名相國實楚王也今楚王病旦暮且卒而君相少主因而代立當國如伊尹周公王長而反政不即遂南面稱孤而有楚國此所謂毋望之福也歇曰何謂毋望之禍曰李園不治國而君之仇也不為兵而養死士之日久矣楚王卒李園必先入據權而殺君以滅口此所謂毋望之禍也歇曰何謂毋望之人對曰君置臣郎中楚王卒李園必先入臣為君殺李園此所謂毋望之人也歇曰足下置之李園弱人也僕又善之且又何至此朱英知言不用恐禍及身乃亡去後十七日考烈王卒李園果先入伏死士於棘門之内歇入死士俠刺之斬其頭投之棘門外於是遂使吏盡滅其家而李園女弟初幸歇有身而入之王所生子者遂立是為楚幽王楚世家幽王悍立十年卒同母弟猶立猶庶兄負芻之徒襲殺猶而立負芻今此傳言考烈王無子春申君進李園之妹而生太子二説相反無以質其孰信然要之春申進妾以僥倖則無疑也是歲也秦始皇帝立九年矣嫪毐亦為亂於秦覺夷其三族而吕不韋廢蘇子曰黄歇相楚王患王無子而以己子盗其後雖使聽朱英殺李園終擅楚國亦將不免大咎何以言之秦楚立國僅千歲矣無功於民而獲罪於天天以不韋歇陰亂其嗣而與之俱斃豈區區朱英所能為哉不然以黄歇之智而朱英之言獨無槩於中乎古史卷四十八
