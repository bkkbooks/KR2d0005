body:
  text: 古史卷二十二宋蘇轍撰韓世家第十五韓之先曲沃桓叔之後也外傳韓宣子憂貧叔向賀之宣子拜曰其自桓叔以下嘉吾子之賜故杜預韋昭皆言韓氏桓叔之後桓叔生莊伯莊伯之子曰武公弟曰韓萬晉鄂侯四年武公伐翼韓萬御戎梁𢎞為右逐翼侯殺之武公三十八年代有晉國韓氏始入晉為大夫萬之孫簡事晉惠公惠公與秦穆公戰于韓原使簡視秦師簡曰師少於我鬬士倍我不可與戰惠公不聽兵敗秦人執之以歸簡曽孫子輿子輿之子曰獻子厥晉靈公之六年趙盾言之於公以為司馬秦晉戰于河曲盾使人以其乗車干行獻子戮之衆皆怒盾獨喜曰舉而不黨二三子可以賀我矣召獻子而禮之曰子勉之終是心也可以臨長晉國矣景公十一年獻子之為司馬二十七年矣從於伐齊齊師敗獻子從齊侯執縶於其馬前奉觴加璧以進㡬獲齊侯逄丑父以身代齊侯齊侯逸十二年晉作六軍而獻子將新中軍十三年晉人謀去故絳諸大夫欲居郇瑕氏之地曰饒沃而近盬不可失也獻子曰山澤林盬國之寶也國饒則民驕佚近寶公室乃貧不如新田土厚水深有汾澮以流其惡居之無疾公從之遷于新田是歳楚伐鄭欒書禦之遇於繞角楚師還遂侵蔡楚人以申息之師救蔡羣帥皆欲戰獻子與荀首士爕諌曰不可吾來救鄭而遂伐蔡既遷戮矣若又怒楚戰必不克欒書從之自是軍行以三卿為謀主師輙有功十七年景公誅趙氏朔之子武從其母姬氏畜于公宫分其田以與祁奚獻子言於公立武而反其田厲公六年獻子將下軍晉楚戰於鄢陵楚師敗績厲公歸而殺三郤欒書荀偃執公而召獻子獻子辭焉乃免於亂悼公立獻子為政楚人伐宋獻子曰欲求得人必先勤之遂起師遇於靡角之谷楚師畏之而還七年獻子請老長子無忌有廢疾將立之讓其弟宣子起以無忌掌公族大夫獻子雖去位而荀罃為上卿禀焉以從政卒以服楚而伯諸侯十三年命宣子將上軍宣子願上趙武而佐之平公十一年宣子聘于周稱晉士起靈王曰韓氏其昌阜於晉乎辭不失舊十五年諸侯之大夫會於澶淵魯叔孫豹歸語其大夫曰趙孟將死矣為政者必韓子可以樹善君子也晉君將失政矣政在大夫韓子懦弱大夫多貪若不早善韓子魯必病十七年趙文子卒宣子為政出聘於諸侯至魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王至齊見公孫竈之子旗與蠆之子彊曰非保家之主也弗臣齊人多笑之惟晏子信之曰夫子君子也君子有信其有以知之矣昭公六年宣子聘于鄭求玉于賈人子産弗與宣子以玉與馬謝之曰子命起舍玉是賜我玉而免吾死也宣子好善而不立晉大夫范鞅荀躒貪而不信以賄誅祁氏羊舌氏而分其邑楚滅陳蔡畏楚而不能救魯季氏逐其君取賄而不能納宣子居其間無所可否自趙武死而晉益衰魯叔孫之言皆信頃公十二年宣子卒子簡子不信嗣定公三年簡子會諸侯之大夫以城成周十五年與知趙魏三家共逐范中行氏左傳晉頃公之十二年當魯昭公之二十八年周敬王之六年是歳韓宣子卒魏獻子為政而史記年表周元王元年猶為韓宣子之年故逐范中行猶為宣子之事左傳宣子沒簡子不信繼之史記年表宣子之後遂至康子而世家宣子之後有貞子而後至簡子太史公言韓氏世次自此以上脱謬尤甚簡子卒子莊子嗣莊子卒子康子嗣晉哀公四年康子與趙魏共滅知氏將分其地叚規謂康子必取成臯康子曰成臯石田也無所用之規曰一里之厚而動千里之權者地利也君用臣言韓必取鄭從之及韓之取鄭也實自成臯康子卒子武子嗣武子二年伐鄭殺其君幽公十六年武子卒子景侯䖍立景侯元年伐鄭取雍丘二年鄭敗我負黍六年與趙魏俱列為諸侯九年鄭圍我陽翟景侯卒子列侯取立九年秦伐我宜陽取六邑十三年列侯卒子文侯立二年伐鄭取陽城伐宋至彭城執宋君七年伐齊至桑丘鄭敗晉九年伐齊至靈丘十年文侯卒子哀侯立哀侯元年與趙魏分晉國二年滅鄭因徙都鄭六年嚴遂弑哀侯及相韓傀史記年表世家皆書列侯三年聶政殺相俠累後二十六年當哀侯六年皆書韓嚴弑哀侯而刺客傳言嚴仲子事韓哀侯與相俠累有郤使聶政刺殺俠累戰國䇿亦言韓傀相韓嚴遂重於其君二人相害故嚴遂使聶政刺俠累累走抱哀侯并中哀侯以刺客傳及戰國䇿考之則聶政刺俠累當在哀侯六年是時嚴遂之去韓乆矣而史書韓嚴弑哀侯者亦春秋趙盾弑君之義也然則年表世家書列侯二年盜殺相俠累者誤矣今故削之仲子嚴遂字俠累韓傀字也子懿侯立懿侯元年與趙因魏亂伐之圍魏惠王二年魏敗我馬陵五年與魏惠王會宅陽九年魏敗我澮十二年懿侯卒子昭侯立昭侯元年秦敗我西山二年宋取我黄池魏取我朱六年伐東周取陵觀邢丘八年申不害相脩術行道國内以治諸侯不來侵伐十一年昭侯如秦史記十年韓姬弑其君悼公未詳何君故不書二十二年申不害死二十四年秦㧞我宜陽二十五年旱作髙門屈宜臼曰昭侯不出此門矣徃年秦㧞冝陽今年旱昭侯不以此時恤民之急而顧益奢是謂時絀舉嬴二十六年髙門成昭侯卒子宣惠王立宣惠王八年魏敗我韓舉十年初稱王十一年與趙會區黍十四年秦敗我鄢十六年秦敗我脩魚虜我將䱸申差於濁澤公仲謂王曰與國非可恃也今秦之欲伐楚乆矣王不如因張儀為和於秦賂以一名都具甲與之南伐楚此以一易二之計也王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之陳軫曰秦之欲伐楚乆矣今又得韓之名都一而具甲秦韓并兵而伐楚此秦所禱祀而求也王聽臣為之警四境之内起師言救韓命戰車滿道路發信臣多其車重其幣使信王之救己也縱韓不能聽我韓必徳王不為鴈行以來是韓秦不和也兵雖至楚不大病矣為能聽我絶和於秦秦必大怒以厚怨韓韓南交楚必輕秦其應秦必不敬是因韓秦之兵而免楚國之禍也楚王曰善乃警四境之内興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不榖國雖小已悉發之矣願大國遂肆志於秦不榖將以楚徇韓王聞之大恱止公仲之行公仲曰不可夫以實伐我者秦也以虛名救我者楚也王恃楚之虛名而輕絶强秦之敵必為天下大笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐形因發兵言救韓此必陳軫之謀也且王已使人報秦今不行是欺秦也夫輕欺强秦而信楚之謀臣恐王必悔之韓王不聽遂絶秦秦大怒益甲伐韓大戰楚救不至十九年大破我岸門太子倉質於秦以和二十一年楚圍雍氏韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道於南鄭藍田以入攻楚出兵於三川以待公殆不合矣公仲曰奈何對曰秦王必祖張儀之故智楚威王之攻梁也張儀謂秦王曰與楚攻梁魏折而入于楚韓固其與國也是秦孤也故不如出兵以勁魏於是攻皮氏魏氏勁威王怒楚與魏大戰秦取西河外以歸今也其狀陽言與韓其實隂善楚公恃秦而勁必輕與楚戰楚隂得秦之不用也必易與公相支也公戰而勝楚遂與公乗楚弛三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚三反於郢甘茂與昭魚遇於商於其言収璽實類有約也公仲恐曰然則奈何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚秦必委國於公以解伐是公之所外者張儀而已其實猶不失秦也自楚圍雍氏至猶不失秦一節史記誤在襄王十二年徐廣曰秦本紀惠王後元十三年周赧王三年楚懐王十七年齊涽王十二年皆云楚圍雍氏韓宣王卒秦助韓共敗楚屈丏然則楚圍雍氏以下是楚前圍雍氏赧王之三年事今據徐說正之公仲從之秦果出兵與韓共攻楚敗楚將屈丏斬首八萬於丹陽宣惠王卒太子倉立是為襄王襄王四年與秦武王會臨晉其秋秦使甘茂攻我宜陽五年秦㧞冝陽斬首六萬秦武王卒六年秦復與我武遂九年秦復取我武遂十年太子嬰與秦王會臨晉因至咸陽而歸十一年秦伐我取穰與秦伐楚敗楚將唐昧十二年太子嬰死公子咎公子蟣虱爭為太子時蟣虱質於楚冷向謂韓咎曰蟣虱亡在楚楚王欲内之甚今楚兵十餘萬在方城之外臣請令楚王築萬室之都雍氏之旁韓必起兵以救之公必將矣公因以韓楚之兵奉蟣虱而内之其徳公必矣必以楚韓封公也韓咎從其計蘇代謂秦太后弟芈戎曰公叔伯嬰恐秦楚之内蟣虱也公何不為韓求質於楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣虱為事必以韓合於秦楚秦楚挾韓以窘魏魏氏不敢合於齊是齊孤也公又為秦求質子於楚楚不聽怨結於韓韓挾齊魏以圖楚楚必重公公挾秦楚之重以積徳於韓公叔伯嬰必以國待公於是蟣虱竟不得歸韓史記說韓咎芉戎者皆蘇代一人而異說理必不然矣戰國䇿以說韓咎為冷向葢得之矣十三年立子咎為太子齊魏王來十六年與齊魏共擊秦至函谷秦與我河外及武遂以和襄王卒太子咎立是為釐王釐王三年使公孫喜率周魏攻秦秦敗我二十四萬虜喜伊闕五年秦㧞我宛六年與秦武遂地二百里十年秦敗我兵夏山十二年與秦昭王會西周助諸侯攻齊濟西齊敗湣王出亡十四年與秦會兩周間二十一年使暴鳶救魏為秦所敗鳶走開封二十三年趙魏攻我華陽韓告急於秦秦不救韓相國謂陳筮曰事急矣公雖病為一宿之行陳筮見穰侯穰侯曰事急乎故使公來曰未急也穰侯怒曰冠葢相望告弊邑甚急公來言未急何也曰彼韓急則將變而他從以未急故復來耳穰侯曰公無見王請今發兵救韓八日而至敗趙魏於華陽之下釐王卒子桓惠王立桓惠王元年伐燕九年秦㧞我陘城汾旁十年秦王謂公子他他或作池曰昔歳殽下之事韓為中軍以與諸侯攻秦秦韓接境壤界其地不能千里展轉不可約日者秦楚戰於藍田韓出銳師以佐秦秦戰不利因轉與楚不固信盟惟便是從韓之在我腹心之疾吾將伐之何如公子他曰王出兵臨韓韓必懼懼則可以不戰而深割王曰善乃起兵一軍臨滎陽一軍臨太行韓王恐使陽城君謝秦請效上黨以和令韓陽告上黨守靳􅀈曰秦起二軍以臨韓韓不能支王將入上黨以和於秦使陽言之太守靳􅀈曰人有言挈瓶之智不失守器雖有王命臣請悉發守以應秦若不能則死之韓陽趨以報王王曰吾始以諾應侯矣今不與是欺之也乃使馮亭代靳􅀈馮亭守上黨三十日隂使人請趙王曰韓不能守上黨將以與秦其民皆不欲秦而願為趙請敬内之趙王受之秦怒移兵攻趙十三年秦㧞趙上黨擊殺趙括坑趙兵四十餘萬於長平十七年秦㧞我陽城負黍二十二年秦昭王卒二十四年秦㧞我成臯滎陽二十六年秦悉㧞我上黨二十九年秦㧞我十三城三十四年桓惠王卒子王安立王安五年秦攻韓韓急使韓非使秦秦留非殺之九年秦虜王安盡入其地為潁川郡韓遂亡信陵之說魏王曰今韓氏以一女子奉一弱主内有大亂外交强秦魏之兵王以為不亡乎又李斯上書言趙髙必為亂曰如韓玘之為韓安相也此二事皆二人所親見而至漢氏太史公不得其事矣大抵戰國事韓最䟱略耳蘇子曰韓之先獻子厥最賢然春秋之際諸侯之賢大夫如獻子者多矣而子孫莫興太史公以獻子存趙氏之孤為天下之隂徳故冝有後予以謂不然韓之先與晉同祖皆周武王之後也史伯謂鄭桓公武實昭文之功文之祚盡武其嗣乎武王之子應韓不在其在晉乎晉自文公伯諸侯至乎八世猶未足以究武之烈而繼之以韓此天意也獻子何足以當之然周衰姬姓復興者三國燕與韓魏皆據地千里后稷播種百榖以濟飢饉其報固當然哉古史卷二十二
