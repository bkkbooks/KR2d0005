body:
  text: 古史卷二十八宋蘇轍撰晉范文子列傳第五晋范氏陶唐氏之後也陶唐在周為杜氏宣王誅杜伯其子隰叔入晋范氏之祖也隰叔之子曰士蒍事晋獻公為司空蒍之子曰會逮事文公為戎右事景公為上卿秉國政晋國之盜逃歸於秦所謂范武子也武子生文子文子名燮郤獻子克有憾於齊武子請老以避之文子始佐下軍有秦客廋辭於朝大夫莫能對文子知之歸以告武子武子怒曰爾以童子掩人於朝吾死亡無日矣擊之杖折其委笄已而從卻獻子伐齊勝之歸而後入武子曰何後也對曰師以喜歸恐人屬耳目於我也武子乃喜曰吾免矣景公之季年欒武子為政以文子及知莊子韓獻子為謀主師不妄出出輒有功欒武子所以能保晋國者三人力也及厲公即位三郤驕侈而公多外寵六年將與楚爭鄭文子畏其成功也言於公曰若逞吾願諸侯皆叛晋可以逞若惟鄭叛晋國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師及河聞楚帥將至文子欲還曰我僞逃楚可以紓憂夫合諸侯非吾所能也我若羣臣輯睦以事君多矣武子又不可六月晋楚遇於鄢陵文子不欲戰曰吾先君之亟戰也有故齊狄秦楚皆强不盡力子孫將弱今三强服矣敵楚而已惟聖人能外內無患自非聖人外寧必有內患盍釋楚以為外懼乎甲午晦楚晨壓晋軍而陳軍吏患之文子之子丐進曰若塞井夷竈陳於軍中而疏行首何患文子執戈逐之曰國之存亡天也童子何知焉遂戰晋人勝楚而歸文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有德之謂厲公卒不悟文子歸而使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死范氏福也遂自殺公果欲盡去諸大夫而立其左右先去三郤將殺欒書中行偃而不忍書偃懼遂弒公及其外嬖而立悼公文子之子曰宣子丐為晋執政傳子鞅及孫吉射而敗為趙氏所滅蘇子曰欒武子始用智范韓所至有功一不用文子幾不免死雖免死卒蒙弒君之惡嗚呼死生之於人亦大矣文子以死易亂而欒武子耻失諸侯不知兵之加其頸也其愚知蓋已逺矣趙文子與叔向游於九原論晉大夫之賢者稱范武子夫武子文子吾未知其孰賢彼以死生取之是以遺文子與古史卷二十八
  hash: sha256:308c3724fd2436ae540653f0dfc7ecd15814024891bebc43c110838e58143dac
