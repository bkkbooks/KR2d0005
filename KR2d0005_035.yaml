body:
  text: 古史卷三十五宋蘇轍撰伍員列傳第十二伍員楚人也字子胥父曰奢兄曰尚其先伍舉楚之名大夫也楚平王之在蔡也郹陽封人之女奔之生子建即位以為太子使奢為之師費無極為之少師無極無寵於太子謀陷之言諸王為娶於秦至而勸王自取之因説王大城城父以置太子王聼之從而譛之曰建與奢將以方城之外叛王信之執奢而使奮陽殺建建亡奔宋無極言於王曰奢之子材若在吳必為楚患王使召尚與貟曰來吾免而父尚謂貟曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也爾勉之矣尚至奢聞貟不來曰楚君大夫其旰食乎楚并殺之貟亡走吳過昭關昭關欲執之貟獨身步走幾不得脫追者在後至江江上有漁父乘舟知貟之急渡之貟既渡解其劒曰此劒直百金以與父父曰楚國有命得伍貟者賜粟伍萬石爵執圭豈徒百金劒耶不受貟未至吳疾止中道乞食至吳因公子光以見王僚時王僚五年也八年吳伐州來敗頓胡沈蔡之師于雞父太子建之母在鄓召吳人而啓之吳入郹取楚夫人及其寶器以歸明年侵楚滅巢及鍾離貟因言伐楚之利於王僚公子光將為亂沮止之貟亦知光有內志未可説以外事乃進勇士専設諸於光退而耕於野以俟十一年楚平王卒秦女之子􅎮立是為楚昭王王僚因楚喪使母弟掩餘燭庸侵楚楚師強吳師不能退光因吳國內空乃令専設諸襲刾王僚而自立是為王闔廬闔廬以貟為吳行人楚伯州犂之孫嚭奔吳吳亦以為太宰以謀楚貟言於闔廬請為三師以肄楚楚出則歸楚歸則出欲使楚道弊而後以三師乘之闔廬以為然楚於是始病自昭王即位無嵗不有吳師其令尹囊瓦貪而不仁國人惡之蔡侯唐侯朝於楚瓦以賄故三年止之二君歸因子胥伯嚭請師於吳九年三國伐楚敗囊瓦於柏舉五戰及郢楚昭王奔隨吳遂入郢貟乃掘楚平王墓出其尸鞭之三百始貟在楚與申包胥友貟之亡也謂包胥曰我必覆楚包胥曰我必存之及貟鞭平王尸包胥亡存山中使人謂貟曰子之報讐其已甚乎吾聞人衆者勝天天定亦能勝人今子故平王之臣親北面事之今至於僇死人此豈天道乎貟曰為我謝申包胥吾日莫塗逺吾故倒行而逆施之於是申包胥走秦求救秦不許包胥立於秦庭哭七日七夜不絶聲秦哀公憐之為出車五百乘救楚與楚子西子期連敗吳師闔廬之弟夫槩王亡歸自立闔廬釋楚還擊夫槩王楚昭王乃復入郢十九年吳伐越越王勾踐擊傷闔廬闔廬死子夫差立二年而報越敗之夫椒越王以其餘兵五千人棲於會稽使大夫種厚幣遺太宰嚭以請和求委國為臣妾夫差將許之貟諫曰不可臣聞樹德莫如滋去惡莫如盡昔有過澆殺斟灌以伐斟尋滅夏后相后緍方娠逃出自竇歸于有仍生少康澆使椒求之逃奔有虞虞思妻以二姚而邑諸綸有田一成有衆一旅遂收夏衆以滅過戈復禹之績今吳不如過而越大於少康或將豐之不亦難乎句踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是乎克而弗取又將存之違天而長寇讐後雖悔之弗可食已弗聼退而告人曰越十年生聚而十年教訓二十年之後吳其為沼乎十一年夫差將為魯伐齊句踐率其衆而朝王及列士皆有賂吳人皆喜貟獨懼曰是豢吳也夫諫曰越在我腹心之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也弗聼貟屬其子於齊鮑氏太宰嚭因讒之曰貟恨其計不用將為亂王使賜之屬鏤以死將死曰樹吾墓以檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也吳王聞之怒乃取貟尸盛以鴟夷革浮之江中吳人憐之為立祠江上命曰胥山吳王既誅貟遂伐齊大敗齊人於艾陵十四年會諸侯于黃池越入吳二十三年而越卒滅吳蘇子曰伍貟以父兄之怨破楚入郢鞭平王之墓世皆憐其志多其才然士不幸至此不足以言功名矣而貟至鞭舊君以逞逆天而傷義卒以盡忠而喪其軀豈非天哉古史卷三十五
