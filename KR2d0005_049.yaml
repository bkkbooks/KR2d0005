body:
  text: 古史卷四十九宋蘇轍撰范雎蔡澤列傳第二十六范雎者魏人也字叔游説諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈須賈為魏昭王使於齊雎從留數月未得報齊襄王聞雎辯口乃使人賜雎金十斤及牛酒雎辭謝不敢受須賈知之大怒以為雎持魏國陰事告齊故得此饋令雎受其牛酒還其金既歸心怒雎以告魏相魏相魏之諸公子曰魏齊魏齊大怒使舍人笞擊雎折脅摺齒睢佯死即卷以簀置厠中賔客飲者醉更溺雎故僇辱以懲後令無妄言者雎從簀中謂守者曰公能出我我必厚謝公守者請出棄簀中死人魏齊醉曰可矣雎得出後魏齊悔復召求之魏人鄭安平聞之乃遂操雎亡伏匿更名姓曰張禄秦昭王使謁者王稽於魏安平詐為卒侍稽稽問魏有賢人可與俱遊者乎安平曰臣里中有張禄先生欲見君言天下事其人有仇不敢晝見稽曰夜與俱來安平夜與張禄見稽語未究稽知雎賢謂曰先生待我於三亭之南與私約而去稽辭魏去過載雎入秦至湖闗望見車騎從西來雎曰彼來者為誰稽曰秦相穰侯東行縣邑雎曰吾聞穰侯專秦權惡内諸侯客此恐辱我我寧且匿車中有頃穰侯果至勞稽因立車而語曰闗東有何變曰無有又謂稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳稽曰不敢即别去雎曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之於是睢下車走曰此必悔之行十餘里果使騎還索車中無客乃已稽遂與雎入咸陽已報使因言曰魏有張禄先生天下辯士也曰秦王之國危於累卵得臣則安然不可以書傳也臣故載來秦王弗信使舍食草具待命嵗餘當是時昭王已立三十六年南拔楚之鄢郢楚懐王幽死於秦東破齊涽王嘗稱帝後去之數困三晉厭天下辯士無所信穰侯華陽君昭王母宣太后之弟也而涇陽君高陵君皆昭王同母弟也穰侯相三人者更將有封邑以太后故私家富重於王室及穰侯為秦將且欲越韓魏而伐齊綱壽欲以廣其陶封雎乃上書曰臣聞明王立政有功者不得不賞有能者不得不官勞大者其禄厚功多者其爵尊能治衆者其官大故無能者不敢當職有能者亦不得隱蔽使以臣之言為可願行而益利其道以臣之言為不可久留臣無為也語曰庸主賞所愛而罰所惡明王則不然賞必加於有功而刑必斷於有罪今臣之胷不足以當椹質而要不足以待斧鉞豈敢以疑事嘗試於王哉雖以臣為賤人而輕辱獨不重任臣者之無反復於王邪且臣聞周有砥砨宋有結緑梁有懸藜楚有和璞此四寳者土之所生良工之所失也而為天下名器然則聖王之所棄者獨不足以厚國家乎臣聞善厚家者取之於國善厚國者取之於諸侯天下有明主則諸侯不得擅厚者何也為其割榮也良醫知病人之死生而聖主明於成敗之事利則行之害則舎之疑則少嘗之雖舜禹復生弗能改矣語之至者臣不敢載之於書其淺者又不足聽也意者臣愚而不概於王心耶亡其言臣者賤而不可用乎自非然者臣願得少賜游觀之間望見顔色一語無效請伏斧質於是昭王大説乃謝王稽使以傳車召睢於是雎乃得見於離宫佯為不知永巷而入其中王來而宦者怒逐之曰王至雎繆謂曰秦安得王秦獨有太后穰侯耳欲以感怒昭王昭王至聞其與宦者爭言遂延迎謝曰寡人宜以身受命久矣㑹義渠之事急寡人旦暮自請太后今義渠之事已寡人乃得受命竊閔然不敏敬執賔主之禮雎辭讓是日觀雎之見者羣臣莫不洒然變色易容者秦王屛左右宫中虛無人跽而請曰先生何以幸教寡人雎曰唯唯有間秦王復跽而請曰先生何以幸教寡人雎曰唯唯若是者三秦王跽曰先生卒不幸教寡人邪雎曰非敢然也臣聞昔者吕尚之遇文王也身為漁父而釣於渭濵耳若是者交疎也已説而立為太師載與俱歸者其言深也故文王遂收功於吕尚而卒王天下鄉使文王疎吕尚而不與深言是周無天子之徳而文武無以成其王業也今臣覉旅之臣也交疎於王而所願陳者皆匡君之事處人骨肉之間願效愚忠而未知王之心也此所以王三問而不敢對者也臣非有畏而不敢言也臣知今日言之於前而明日伏誅於後然臣不敢避也大王信行臣之言死不足以為臣患亡不足以為臣憂漆身為厲被髪為狂不足以為臣恥且以五帝之聖焉而死三王之仁焉而死五伯之賢焉而死烏獲任鄙之力焉而死成荆孟賁慶忌夏育之勇焉而死死者人之所必不免也處必然之勢可以少有補於秦此臣之所大願也臣又何患哉伍子胥橐載而出昭闗夜行晝伏至於陵水無以餬其口膝行蒲伏稽首肉袒鼓腹吹篪乞食於呉市卒興呉國闔閭為伯使臣得盡謀如伍子胥加之以幽囚終身不復見是臣之説行也臣又何憂箕子接輿漆身為厲被髪為狂無益於主假使臣得同行於箕子可以有補所賢之主是臣之大榮也臣有何恥臣之所恐者獨恐臣死之後天下見臣之盡忠而身死因以杜口裹足莫肯鄉秦耳足下上畏太后之嚴下惑於姦臣之態居深宫之中不離阿保之手終身迷惑無與昭姦大者宗廟滅覆小者身以孤危此臣之所恐耳若夫窮辱之事死亡之患臣不敢畏也臣死而秦治是臣死賢於生秦王跽曰先生是何言也夫秦國僻逺寡人愚不肖先生乃幸辱至於此是天以寡人慁先生而存先王之宗廟也寡人得受命於先生是天所以幸先王而不棄其孤也先生奈何而言若是事無小大上及太后下至大臣願先生悉以教寡人無疑寡人也雎拜秦王亦拜雎曰大王之國四塞以為固北有甘泉谷口南帶涇渭右隴蜀左闗阪奮擊百萬戰車千乗利則出攻不利則入守此王者之地也民怯於私鬬而勇於公戰此王者之民也王并此二者而有之夫以秦卒之勇車騎之衆以治諸侯譬若馳韓盧而摶蹇兎也霸王之業可致也而羣臣莫當其位至今閉闗十五年不敢窺兵於山東者是穰侯為秦謀不忠而大王之計有所失也秦王跽曰寡人願聞失計然左右多竊聽者雎恐未敢言内先言外事以觀秦王之俯仰因進曰夫穰侯越韓魏而攻齊綱夀非計也少出師則不足以傷齊多出師則害於秦臣意王之計欲少出師而悉韓魏之兵也則不義矣今見與國之不親也越人之國而攻可乎其於計疎矣且昔齊涽王南攻楚破軍殺將再辟地千里而齊尺寸之地無得焉者豈不欲得地哉形勢不能有也諸侯見齊之罷敝君臣之不和也興兵而伐齊大破之士辱兵頓皆咎其王曰誰為此計者乎王曰文子為之大臣作亂文子出走故齊所以大破者以其伐楚而肥韓魏也此所謂借賊兵而齎盗糧者也王不如逺交而近攻得寸則王之寸也得尺亦王之尺也今釋此而逺攻不亦繆乎且昔者中山之國地方五百里趙獨吞之功成名立而利附焉天下莫之能害也今夫韓魏中國之處而天下之樞也王其欲霸必親中國以為天下樞以威楚趙楚强則附趙趙强則附楚楚趙皆附齊必懼矣齊懼必卑辭重幣以事秦齊附而韓魏因可虜也昭王曰吾欲親魏久矣而魏多變之國也寡人不能親請問親魏奈何對曰王卑詞重幣以事之不可則割地而賂之不可因舉兵而伐之王曰寡人敬聞命矣乃拜雎為客卿謀兵事卒聽雎語使五大夫綰伐魏拔懐後二歲拔邢丘雎復説昭王曰秦韓之地形相錯如繡秦之有韓也譬如木之有蠧也人之有心腹之病也天下無變則已天下有變其為秦患者孰大於韓乎王不如收韓昭王曰吾固欲收韓韓不聽為之奈何對曰韓安得無聽乎王下兵而攻滎陽則鞏成臯之道不通北斷太行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三夫韓見必亡安得不聽乎若韓聽而霸事因可慮矣王曰善且欲發使於韓睢日益親因請間説曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽高陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱高陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得從王出乎臣聞善治國者乃内固其威而外重其權穰侯使者操王之重決制於諸侯剖符於天下征敵伐國莫敢不聽戰勝攻取則利歸於陶國幣御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋懸之於廟梁宿昔而死李兑管趙囚主父於沙丘百日而餓死今臣聞秦太后穰侯用事高陵華陽涇陽佐之卒無秦王此亦淖齒李兑之類也且夫三代所以亡國者君專授政縱酒馳騁弋獵不聽政事其所授者妬賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼曰善於是廢太后逐穰侯高陵華陽涇陽君於闗外秦王乃拜睢為相收穰侯之印使歸陶因使縣官給車牛以徙千乗有餘到闗闗閲其寳器珍怪多於王室秦封雎以應號為應侯時昭王四十一年也雎既相秦秦號曰張禄而魏不知以為范睢已死久矣魏聞秦且東伐韓魏使須賈於秦雎聞之為微行敝衣間歩之邸見須賈須賈見之而驚曰范叔固無恙乎雎曰然須賈笑曰范叔有説於秦邪曰不也睢前日得過於魏相故亡逃至此安敢説乎須賈曰今叔何事睢曰臣為人庸賃須賈意哀之留與坐飲食曰范叔一寒如此哉乃取其一綈袍以賜之須賈因問曰秦相張君公知之乎吾聞幸於王天下之事皆決於相君今吾事之去留在張君孺子豈有客習於相君者哉雎曰主人翁習知之唯雎亦得謁睢請為君見於張君須賈曰吾馬病車折軸非大車駟馬吾不出雎曰願為君借大車駟馬於主人翁睢歸取大車駟馬為須賈御之入秦相府府中望見有識者皆避匿須賈怪之至相舍門謂須賈曰待我我為君先入通於相君須賈待門下持車良久問門下曰范叔不出何也門下曰無范叔須賈曰鄉者與我載而入者門下曰乃吾相張君也須賈大驚自知見賣乃肉袒膝行因門下人謝罪於是睢盛帷帳侍者甚衆見之須賈頓首言死罪曰賈不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事賈有湯鑊之罪請自屛於胡貊之地唯君死生之雎曰汝罪有幾曰擢賈之髪以續賈之罪尚未足睢曰汝罪有三耳昔者楚昭王時而申包胥為楚卻吳軍楚王封之以荆五千戸包胥辭不受為丘墓之寄於荆也今雎之先人丘墓亦在魏公前以雎為有外心於齊而惡雎於魏齊公之罪一也當魏齊辱我於厠中公不止罪二也更醉而溺我公其何忍乎罪三矣然公之所以得無死者以綈袍戀戀有故人之意故釋公乃謝罷入言之昭王罷歸須賈須賈辭雎大供具盡請諸侯使與坐堂上食飲甚設而坐須賈於堂下置莝豆其前令兩黥徒夾而馬食之數曰為我告魏王急持魏齊頭來不然者我且屠大梁須賈歸以告魏齊魏齊恐亡走趙匿平原君所睢既相王稽謂雎曰事有不可知者三有不可奈何者亦三宫車一日晏駕是事之不可知者一也君卒然捐舘舍是事之不可知者二也使臣卒然填溝壑是事之不可知者三也宫車一日晏駕君雖恨於臣無可奈何君卒然捐舘舍君雖恨於臣亦無可奈何使臣卒然填溝壑君雖恨於臣亦無可奈何雎不懌乃入言於王曰非王稽之忠莫能納臣於函谷闗非大王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非其納臣之意也昭王召稽拜為河東守三歲不上計又任鄭安平昭王以為將軍雎於是散家財物盡以報所嘗困戹者一飯之徳必償睚眦之怨必報雎相秦二年昭王之四十二年東伐韓少曲高平拔之昭王聞魏齊在平原君所欲為雎必報其仇乃詳為好書遺平原君曰寡人聞君之高義願與君為布衣之友君幸過寡人寡人願與君十日之飲平原君畏秦且以為然而入秦見昭王昭王與平原君飲數日謂平原君曰昔周文王得吕尚以為太公齊桓公得管夷吾以為仲父今范君亦寡人之叔父也范君之讎在君之家願使人歸取其頭來不然吾不出君於闗平原君曰貴而為友者為賤也富而為交者為貧也夫魏齊者勝之友也在固不出也今又不在臣所昭王乃遺趙王書曰王之弟在秦范君之讎魏齊在平原君之家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟於闗趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可説乃解其相印與魏齊亡間行念諸侯莫可以急抵者乃復走大梁欲因信陵君以走楚信陵君聞之畏秦猶豫未肯見曰虞卿何如人也時侯嬴在旁曰人固未易知知人亦未易也夫虞卿躡屩擔簦一見趙王賜白璧一䨇黄金百鎰再見拜為上卿三見卒受相印封萬戸侯當此之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵禄解相印捐萬戸侯而間行急士之窮而歸公子公子曰何如人人固不易知知人亦未易也信陵君大慙駕如野迎之魏齊聞信陵君之初難見之大怒而自剄趙王聞之卒取其頭予秦昭王乃出平原君歸趙昭王四十三年秦攻韓汾涇抜之因城河上廣武後五年昭王用雎謀縱反間賣趙趙以其故令馬服子代廉頗將秦大破趙於長平遂圍邯鄲已而與武安君白起有隙言而殺之任鄭安平使將擊趙鄭安平為趙所困急以兵二萬人降趙雎席藁請罪秦之法任人而所任不善者各以其罪罪之於是應侯罪當收三族昭王恐傷雎意乃下令國中有敢言鄭安平事者以其罪罪之而加賜雎食物日益厚以順適其意後二歲王稽為河東守與諸侯通坐法誅雎日益以不懌雎封在汝南既而䧟於韓昭王謂雎曰君亡國亦憂之乎雎曰臣不憂也王曰何故曰梁人有東門吳者其子死而不憂其相室曰公之愛子天下無有今子死而不憂何也東門吳曰吾嘗無子無子之時不憂今子死乃即與無子同耳吾何憂臣嘗為梁餘子矣為餘子之時不憂今亡汝南乃與為梁餘子同也臣何為憂昭王以為不然以告䝉驁曰寡人一城圍食不甘卧不便蓆應侯亡地而言不憂此豈情也驁曰臣請得其情因往見睢曰驁欲死雎曰何謂也曰秦王師君天下莫不聞况秦國乎今驁勢得為秦將將兵以韓之細而顯奪君地驁尚奚生雎起拜之曰願委之卿驁以報昭王自是雎毎言韓事昭王弗聽昭王臨朝歎息雎進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺夫以逺思慮而御勇士吾恐楚之圖秦也夫物不素具不可以應卒今武安君既死而鄭安平等畔内無良將而外多敵國吾是以憂欲以激勵雎懼不知所出蔡澤聞之往入秦蔡澤者燕人也游學干諸侯小大甚衆不遇而從唐舉相曰吾聞先生相李兑曰百日之内持國秉政有之乎曰有之曰若臣者何如唐舉孰視而笑曰先生曷鼻巨肩魁顔蹙齃膝攣吾聞聖人不相殆先生乎澤知舉戯之乃曰富貴吾所自有吾所不知者壽也願聞之舉曰先生之壽從今以往者四十三嵗澤笑謝而去謂其御者曰吾持梁齧肥躍馬疾驅懐黄金之印結紫綬於要揖讓人主之前食肉富貴四十三年足矣去之趙見逐入韓魏遇奪釜鬲於塗聞范雎任鄭安平王稽皆負重罪於秦雎内慙澤乃西入秦將見昭王使人宣言以感怒雎曰燕客蔡澤天下雄俊宏辯智士也彼一見秦王秦王必困君而奪君之位雎聞曰五帝三代之事百家之説吾既知之衆口之辯吾皆摧之是惡能困我而奪我位乎使人召澤入則揖雎雎固不快及見之又倨雎因讓之曰子常宣言欲代我相秦事有之乎對曰然雎曰請聞其説澤曰吁君何見之晚也夫四時之序成功者去夫人生百體堅强手足便利耳目聰明而心聖智豈非士之願與雎曰然澤曰質仁秉義行道施徳得志於天下懐樂敬愛而尊慕之皆願以為君王豈不辯智之期與雎曰然澤復曰富貴顯榮成理萬物使各得其所性命壽長終其天年而不夭傷天下繼其統守其業傳之無窮名實純粹澤流千里世世稱之而無絶與天地終始豈道徳之符而聖人所謂吉祥善事者與雎曰然澤曰若夫秦之商君楚之吳起越之大夫種其卒然亦可願與雎知澤之欲困已以説復謬曰何為不可夫公孫鞅之事孝公也極身無貳慮盡公而不顧私設刀鋸以禁姦邪信賞罰以致治披腹心示情素䝉怨咎欺舊友奪魏公子卬安秦社稷利百姓卒為秦禽將破敵攘地千里吳起之事悼王也使私不得害公讒不得蔽忠言不取茍合行不取茍容不為危易行行義不避難然為霸主强國不辭禍凶大夫種之事越王也主雖困辱悉忠而不解主雖絶亡盡能而弗離成功而弗矜貴富而不驕怠若此三子者固義之至也忠之節也是故君子以義死難視死如歸生而辱不如死而榮士固有殺身以成名唯義之所在雖死無所恨何為不可哉蔡澤曰主聖臣賢天下之盛福也君明臣直國之福也父慈子孝夫信妻貞家之福也故比干忠而不能存殷子胥智而不能完呉申生孝而晉國亂是皆有忠臣孝子而國家滅亂者何也無明君賢父以聽之故天下以其君父為僇辱而憐其臣子今商君吳起大夫種之為人臣是也其君非也故世稱三子致功而不見徳豈慕不遇世死乎夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也夫人之立功豈不期於成全邪身與名俱全者上也名可法而身死者其次也名在僇辱而身全者下也於是應侯稱善蔡澤少得間因曰夫商君呉起大夫種其為人臣盡忠致功則可願矣閎夭事文王周公輔成王也豈不亦忠聖乎以君臣論之商君吳起大夫種其可願孰與閎夭周公哉雎曰商君吳起大夫種弗若也蔡澤曰然則君之主慈仁任忠惇厚舊故其賢智與有道之士為膠漆義不倍功臣孰與秦孝公楚悼王越王乎雎曰未知何如也澤曰今主親忠臣不過秦孝公楚悼王越王君之設智能為主安危修政治亂强兵批患折難廣地殖穀富國足家强主尊社稷顯宗廟天下莫敢欺犯其主主之威蓋震海内功彰萬里之外聲名光輝傳於千世君孰與商君吳起大夫種雎曰不若澤曰今主之親忠臣不忘舊故不若孝公悼王句踐而公之功績愛信親幸又不若商君吳起大夫種然而君之禄位貴盛私家之富過於三子而身不退者恐患之甚於三子竊為君危之語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也故國有道則仕國無道則隱聖人曰飛龍在天利見大人不義而富且貴於我如浮雲今君之怨已讎而徳已報意欲至矣而無變計竊為君不取也且夫翠鵠犀象其處勢非不逺死也而所以死者惑於餌也蘇秦智伯之智非不足以辟辱逺死也而所以死者惑於貪利不止也是以聖人制禮節欲取於民有度使之以時用之有止故志不溢行不驕常與道俱而不失故天下承而不絶昔者齊桓公九合諸侯一匡天下至於葵丘之㑹有驕矜之志畔者九國吳王夫差兵無敵於天下勇强以輕諸侯陵齊晉故遂以殺身亡國夏育太史噭叱呼駭三軍然而身死於庸夫此皆乗至盛而不返道理不居卑退處儉約之患也夫商君為秦孝公明法令禁姦本尊爵必賞有罪必罰平權衡正度量調輕重決裂阡陌以靜生民之業而一其俗勸民耕農利土一室無二事力田稸積習戰陳之事是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯秦國之業功已成矣而遂以車裂楚地方數千里持㦸百萬白起率數萬之師以與楚戰一戰舉鄢郢以燒夷陵再戰南并蜀漢又越韓魏而攻强趙北坑馬服誅屠四十餘萬之衆盡之於長平之下流血成川沸聲若靁遂入圍邯鄲使秦有帝業楚趙天下之强國而秦之仇敵也自是之後楚趙皆懾伏不敢攻秦者白起之勢也身所服者七十餘城功已成矣而遂賜劒死於杜郵吳起為楚王立法卑減大臣之威重罷無能廢無用捐不急之官塞私門之請一楚國之俗禁游客之民精耕戰之士南收楊越北并陳蔡破横散從使馳説之士無所開其口禁朋黨以厲百姓定楚國之政兵震天下威服諸侯功已成矣而卒枝解大夫種為越王深謀逺計免㑹稽之危以亡為存因辱為榮墾草入邑辟地殖榖率四方之士專上下之力輔句踐之賢報夫差之讎卒禽勁呉令越成霸功已彰而信矣句踐終負而殺之此四子者功成不去禍至於此此所謂信而不能詘往而不能返也范蠡知之超然辟世長為陶朱公君獨不觀夫博者乎或欲大投或欲分功此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利施三川以實宜陽決羊腸之險塞太行之道又斬范中行之塗六國不得合從棧道千里通於蜀漢使天下皆畏秦秦之欲得矣君之功極矣此亦秦之分功之時也如是而不退則商君白公呉起大夫種是也吾聞之鑒於水者見面之容鑒於人者知吉與凶書曰成功之下不可久處四子之禍君何居焉君何不以此時歸相印讓賢者而授之退而巖居川觀必有伯夷之廉長為應侯世世稱孤而有許由延陵季子之讓喬松之壽孰與以禍終哉即君何居焉忍不能自離疑不能自決必有四子之禍矣易曰亢龍有悔此言上而不能下信而不能詘往而不能自返者也願君孰計之雎曰善吾聞欲而不知止失其所以欲有而不知足失其所以有先生幸教雎敬受命於是乃延入坐為上客後數日入朝言於昭王曰客新有從山東來者曰蔡澤其人辯士明於三王之事五伯之業世俗之變足以寄秦國之政臣之見人甚衆莫及臣不如也臣敢以聞昭王召見與語大説之拜為客卿睢因謝病請歸相印昭王强起之睢遂稱病篤雎免相昭王新説澤計畫遂拜為秦相東收周室澤相秦數月人或惡之懼誅乃謝病歸相印號為綱成君居秦十餘年事昭王孝文王莊襄王卒事始皇帝為秦使於燕三年而燕使太子丹入質於秦蘇子曰范雎相秦其所以利秦者少而害秦者多以魏冉之專忘其舊勲而逐之可也而并逐宣太后使昭王以子絶母不已甚乎宣太后之於秦非有鄭武姜莊襄后之惡也鄭武姜莊襄后猶不可絶而雎勇絶之獨不愧頴考叔茅焦乎及雎任秦事殺白起而用王稽鄭安平使民怨於内兵折於外曽不若魏冉之一二以予觀之范雎蔡澤自為身謀取卿相可耳未見有益於秦也古史卷四十九
