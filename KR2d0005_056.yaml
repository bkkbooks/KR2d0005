body:
  text: 古史卷五十六宋蘇轍撰李斯列傳第三十三李斯者楚上蔡人也年少時為郡小吏見吏舍厠中鼠食不潔近人大數驚恐入倉觀倉中鼠食積粟居大廡之下不見人犬之憂於是斯乃嘆曰人之賢不肖譬於鼠矣在所自處耳乃從荀卿學帝王之術學已成度楚王不足事而六國皆弱無可為建功者欲西入秦辭於荀卿曰斯聞得時無怠今萬乘方爭遊者主事秦王欲吞天下稱帝而治此布衣馳騖之時而遊説者之秋也處卑賤之位而計不為者此禽鹿視肉人靣而能強行者耳故詬莫大於卑賤而卑莫甚於窮困久處卑賤之位困苦之地非世而惡利自託於無為此非士之情也故斯將西説秦王矣至秦會莊襄王卒斯乃求為秦相文信侯呂不韋舍人不韋賢之任以為郎斯因説秦王曰胥人者去其幾也成大功者在因瑕釁而遂忍之昔者秦穆公之伯終不東并六國者何也諸侯尚衆周德未衰故五伯迭興更尊周室自孝公以來周室卑微諸侯相兼關東為六國秦之乘勝役諸侯六世矣今諸侯服秦譬若郡縣夫以秦之強大王之賢猶竈上騷除足以滅諸侯成帝業為天下一統此萬世之一時也今怠而不急就諸侯復強相聚約從雖有黃帝之賢不能并也秦王乃拜斯為長史聽其計隂遣謀士齎黃金玉以遊説諸侯諸侯名士可下以財者厚隂結之不肯者利劍刺之離其君臣之計秦王乃使其良將隨其後秦王拜斯為客卿會韓人鄭國來間秦以作注溉渠已而覺秦宗室大臣皆言秦王曰諸侯人來事秦者大抵為其主遊間於秦耳請一切逐客斯議亦在逐中斯乃上書曰臣聞吏議逐客竊以為過矣昔繆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉此五子者不産於秦而繆公用之并國二十遂霸西戎孝公用商鞅之法移風易俗民以殷盛國以富強百姓樂用諸侯親服獲楚魏之師舉地千里至今治強惠王用張儀之計拔三川之地西并巴蜀北收上郡取漢中包九夷制鄢郢東據成臯之險割膏腴之壤遂散六國之從使之西靣事秦功施到今昭王得范睢廢穰侯逐華陽強公室杜私門蠶食諸侯使秦成帝業此四君者皆以客之功由此觀之客何負於秦哉向使四君却客而不內疏士而不用是使國無富利之實而秦無強大之名也今陛下致昆山之玉有隨和之寶垂明月之珠服太阿之劍乘纎離之馬建翠鳯之旗樹靈鼉之鼓此數寶者秦不生一焉而陛下説之何也必秦國之所生然後可則是夜光之璧不飾朝廷犀象之器不為玩好鄭衛之女不充後宫而駿良駃騠不實外廄江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娛心意説耳目者必出於秦然後可則是宛珠之簮傅璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也夫擊甕叩缶彈筝搏髀而歌呼嗚嗚快耳目者真秦之聲也鄭衛桑間昭虞武象者異國之樂也今棄擊甕叩缶而就鄭衛退彈筝而取昭虞若是者何也快意當前適觀而已矣今取人則不然不問可否不論曲直非秦者去為客者逐然則是所重者在乎色樂珠玉而所輕者在乎人民也此非所以跨海內制諸侯之術也臣聞地廣者粟多國大者人衆兵強則士勇是以太山不讓土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德是以地無四方民無異國四時充美鬼神降福此五帝三王之所以無敵今乃棄黔首以資敵國却賔客以業諸侯使天下之士退而不敢西向褁足不入秦此所謂藉寇兵而齎盜糧者也夫物不産於秦可寶者多士不産於秦而願忠者衆今逐客以資敵國損民以益讎內自虗而外樹怨於諸侯求國無危不可得也秦王乃除逐客之令復斯官卒用其計謀官至廷尉二十餘年竟并天下尊王為皇帝以斯為丞相夷郡縣城銷其兵刃示不復用使秦無尺土之封不立子弟為王功臣為諸侯者使後無戰攻之患始皇三十四年置酒咸陽宫博士僕射周青臣等頌稱始皇威德齊人淳于越進諌曰臣聞之殷周之王千餘歲封子弟功臣自為支輔今陛下有海內而子弟為匹夫卒有田常六卿之患臣無輔弼何以相救哉事不師古而能長久者非所聞也今青臣等又靣諛以重陛下過非忠臣也始皇下其議丞相丞相謬其説絀其辭乃上書曰古者天下散亂莫能相一是以諸侯並作語皆道古以害今飾虛言以亂實人善其所私學以非上所建立今陛下并有天下辨白黑而定一尊而私學乃相與非法教之制聞令下即各以其私學議之入則心非出則巷議非主以為名異趣以為高率羣下以造謗如此不禁則主勢降乎上黨與成乎下禁之便臣請諸有文學詩書百家語者蠲除去之令到滿三十日弗去黥為城旦所不去者醫藥卜筮種樹之書若有欲學法令者以吏為師始皇可其議收去詩書百家之語以愚百姓使天下無以古非今明法度定律令皆以始皇起同文書治離宫别館周遍天下明年又巡狩外攘四夷斯皆有力焉斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子三川守由告歸咸陽斯置酒於家百官長皆前為夀門庭車騎以千數斯喟然而歎曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也始皇三十七年十月行出遊會稽並海上北抵琅邪丞相斯中車府令趙高兼行符璽令事皆從始皇有二十餘子扶蘇以數直諌上上使監兵上郡蒙恬為將少子胡亥愛請從上許之餘子莫從其年七月始皇帝至沙丘病甚令趙高為書賜公子扶蘇曰以兵屬蒙恬與喪會咸陽而葬書已封未授使者始皇崩書及璽皆在趙高所獨子胡亥丞相斯趙高及幸宦者五六人知始皇崩餘羣臣皆莫知也斯以為上在外崩無真太子故祕之置始皇居輼輬車中百官奏事上食如故宦者輒從輼輬車中可諸奏事趙高因留所賜扶蘇璽書而謂公子胡亥曰上崩無詔封王諸子而獨賜長子書長子至即立為皇帝而子無尺寸之地為之奈何胡亥曰固也吾聞之明君知臣明父知子父捐命不封諸子何可言者趙高曰不然方今天下之權存亡在子與高及丞相耳願子圗之且夫臣人與見臣於人制人與見制於人豈可同日道哉胡亥曰廢兄而立弟是不義也不奉父詔而畏死是不孝也能薄而材譾因人之功是不能也三者逆德天下不服身殆傾危社稷不血食高曰臣聞湯武殺其主天下稱義焉不為不忠衛君殺其父而衛國載其德孔子著之不為不孝夫大行不小謹盛德不辭讓鄉曲各有宜而百官不同功胡顧小而忘大後必有害狐疑猶豫後必有悔斷而敢行鬼神避之後有成功願子遂之胡亥喟然歎曰今大行未發喪禮未終豈宜以此事干丞相哉趙高曰時乎時乎間不及謀贏糧躍馬唯恐後時胡亥既然高之言高曰不與丞相謀恐事不能成臣請為子與丞相謀之髙乃謂斯曰上崩賜長子書與喪會咸陽而立為嗣書未行今上崩未有知者也所賜長子書及符璽皆在胡亥所定太子在君侯與高之口耳事將何如斯曰安得亡國之言此非人臣所當議也高曰君侯自料能孰與蒙恬功髙孰與蒙恬謀逺不失孰與蒙恬無怨於天下孰與蒙恬長子舊而信之孰與蒙恬斯曰此五者皆不及蒙恬而君責之何深也高曰高故內官之厮役也幸得以刀筆之文進入秦宫管事二十餘年未嘗見秦免罷丞相功臣有封及二世者也卒皆以誅亡皇帝二十餘子皆君之所知長子剛毅而武勇信人而奮士即位必用蒙恬為丞相君侯終不懷通侯之印歸於鄉里明矣高受詔教習胡亥使學以法事數年矣未嘗見過失慈仁篤厚輕財重士辨於心而詘於口盡禮敬士秦之諸子未有及此者可以為嗣君計而定之斯曰君其反位斯奉主之詔聼天之命何慮之可定也高曰安可危也危可安也安危不定何以貴聖斯曰斯上蔡閭巷布衣也上幸擢為丞相封為通侯子孫皆至尊位重祿者固將以存亡安危屬臣也豈可負哉夫忠臣不避死而庶幾孝子不勤勞而見危人臣各守其職而已矣其勿復言將令斯得罪高曰蓋聞聖人遷徙無常就變而從時見末而知本觀指而覩歸物固有之安得常法哉方今天下之權命懸於胡亥高能得志焉且夫從外制中謂之惑從下制上謂之賊故秋霜降者草花落水搖動者萬物作此必然之效也君何見之晚斯曰吾聞晉易太子三世不安齊桓兄弟爭位身死為戮紂殺親戚不聼諌者國為丘墟遂危社稷三者逆天宗廟不血食斯其猶人哉安足為謀高曰上下合同可以長久中外若一事無表裏君聼臣之計即長有封侯世世稱孤必有喬松之夀孔墨之智今釋此而不從禍及子孫足以為寒心善者因禍為福君何處焉斯乃仰天而嘆垂淚太息曰嗟乎獨遭亂世既以不能死安託命哉於是斯乃聼高高乃報胡亥曰臣請奉太子之明命以報丞相丞相斯敢不奉令於是乃相與謀詐為受始皇詔丞相立子胡亥為太子更為書賜長子扶蘇曰朕巡天下禱祀名山諸神以延夀命今扶蘇與將軍蒙恬將師數十萬以屯邊十有餘年矣不能進而前士卒多耗無尺寸之功乃反數上書直言誹謗我所為以不得罷歸為太子日夜怨望扶蘇為人子不孝其賜劍以自裁將軍恬與扶蘇居外不匡正宜知其謀為人臣不忠其賜死以兵屬禆將王離封其書以皇帝璽遣胡亥客奉書賜扶蘇於上郡使者至發書扶蘇泣入內舍欲自殺蒙恬止扶蘇曰陛下居外未立太子使臣將三十萬衆守邊公子為監此天下重任也今一使者來即自殺安知其非詐請復請而後死未暮也使者數趣之扶蘇為人仁謂蒙恬曰父而賜子死尚安復請即自殺蒙恬不肯死使即以屬吏繫於陽周使者還報胡亥斯高大喜至咸陽發喪太子立為二世皇帝以趙高為郎中令常侍中用事二世燕居乃召髙與謀事謂曰夫人生居世間譬猶騁六驥過決隙也吾既已臨天下矣欲悉耳目之所好窮心志之所樂以安宗廟而樂萬姓長有天下終吾年夀其道可乎高曰此賢主之所能行也而昏亂主之所禁也臣請言之不敢避斧鉞之誅願陛下少留意焉夫沙丘之謀諸公子及大臣皆疑焉而諸公子盡帝兄大臣又先帝之所置也今陛下初立此其屬意怏怏皆不服恐為變且蒙恬已死蒙毅將兵居外臣戰戰栗栗唯恐不終且陛下安得為此樂乎二世曰為之奈何趙高曰嚴法而刻刑令有罪者相坐誅至收族滅大臣而遠骨肉貧者富之賤者貴之盡除去先帝之故臣更置陛下之所親信者近之此則隂德歸陛下害除而姦謀塞羣臣莫不被潤澤蒙厚德陛下則高枕肆志寵樂矣計莫出於此二世然高之言乃更為法律於是羣臣諸公子有罪輒下高令鞫治之殺大臣蒙毅等公子十二人僇死咸陽市十公主矺死於杜財物入於縣官相連坐者不可勝數公子高欲奔恐收族乃上書曰先帝無恙時臣入則賜食出則乘輿御府之衣臣得賜之中廄之寶馬臣得賜之臣當從死而不能為人子不孝為人臣不忠不忠者無名以立於世臣請從死願葬驪山之足唯上幸哀憐之書上胡亥大悅召趙高而示之曰此可謂急乎趙高曰人臣當憂死而不暇何變之得謀胡亥可其書賜錢十萬以葬法令誅罰日益刻深羣臣人人自危欲畔者衆又作阿房之宮治直馳道賦斂愈重戍徭無已於是楚戍卒陳勝吳廣等乃作亂起於山東傑俊相立自置為侯王叛秦兵至鴻門而却斯數欲請間諌二世不許二世責問斯曰吾聞於韓子曰堯之有天下也堂高三尺采椽不斫茅茨不翦雖逆旅之宿不勤於此矣冬日鹿裘夏日葛衣粢糲之食藜藿之羹飯土匭啜土鉶雖監門之養不觳於此矣禹鑿龍門通大夏疏九河曲九防決渟水致之海而股無胈脛無毛手足胼胝靣目黎黑遂以死於外葬於會稽臣虜之勞不烈於此矣然則夫所貴於有天下者豈欲苦形勞神身處逆旅之宿口食監門之養手持臣虜之作哉此不肖人之所勉也非賢者之所務也彼賢人之有天下也專用天下適已而已矣此所以貴於有天下也夫所謂賢人者必能安天下而治萬民今身且不能利將惡能治天下哉故吾願肆志廣欲長享天下而無害為之奈何斯子由為三川守羣盜吳廣等西略地過去弗能禁章邯以破逐廣等兵使者覆案三川相屬誚讓斯居三公位如何令盜如此斯恐懼重爵祿不知所出乃阿二世意欲求容以書對曰夫賢主者必且能全道而行督責之術者也督責之則臣不敢不竭能以徇其主矣此臣主之分定上下之義明則天下賢不肖莫敢不盡力竭任以徇其君矣是故主獨制於天下而無所制也能窮樂之極矣賢明之主也可不察焉故申子曰有天下而不恣睢命之曰以天下為桎梏者無他焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也夫不能修申韓之道專以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉夫以人徇已則已貴而人賤以已徇人則已賤而人貴故徇人者賤而人所徇者貴自古及今未有不然者也凡古之所為尊賢者為其貴也而所為惡不肖者為其賤也而堯禹以身徇天下者也因隨而尊之則亦失所為尊賢之心矣夫可謂大繆矣謂之為桎梏不亦宜乎不能督責之過也故韓子曰慈母有敗子而嚴家無格虜者何也則能罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也彼唯明主為能深督輕罪夫罪輕且督深而况有重罪乎故民不敢犯也是故韓子曰布帛尋常庸人不釋鑠金百鎰盜跖不搏者非庸人之心重尋常之利深而盜跖之欲淺也又不以盜跖之行為輕百鎰之重也搏必隨手刑則盜跖不搏百鎰而罰不必行則庸人不釋尋常是故城高五丈而樓季不輕犯也泰山之高百仞而跛牂牧其上夫樓季也而難五丈之限豈跛牂也而易百仞之髙哉峭塹之勢異也明主聖王之所以能久處尊位長執重勢而獨擅天下之利者非有異道也能獨斷而審督責必深罰故天下不敢犯也今不務所不犯而事慈母之所以敗子也則亦不察於聖人之論矣夫不能行聖人之術則舍為天下役何事哉可不哀耶且夫儉節仁義之人立於朝則荒肆之樂輟矣諌説論理之臣開於側則流漫之志詘矣烈士死節之行顯於世則淫康之虞廢矣故明主能外此三者而獨操主術以制聼從之臣而修其明法故身尊而勢重也凡賢主者必將能拂世摩俗而廢其所惡立其所欲故生則有尊重之勢死則有賢明之諡也是以明君獨斷權不在臣也然後能滅仁義之塗掩馳説之口困烈士之行塞聰掩明內獨視聼故外不可傾以仁義烈士之行而內不可奪以諌説忿爭之辨故能犖然獨行恣睢之心而莫之敢逆若此然後可謂能明申韓之術而修商君之法法修術明而天下亂者未之聞也故曰王道約而易操也唯明主為能行之若此則謂督責之成督責成則臣無邪臣無邪則天下安天下安則主嚴尊主嚴尊則督責必督責必則所求得所求得則國家富國家富則君樂豐故督責之術設則所欲無不得矣羣臣百姓救過不給何變之敢圗若此則帝道備而可謂能明君臣之術矣雖申韓復生不能加也書奏二世悅於是行督責益嚴稅民深者為明吏二世曰若此則可謂能責矣刑者相半於道而死人日成積於市殺人衆者為忠臣二世曰若此可謂能督矣初趙高為郎中令所殺及報私怨衆多恐大臣入朝奏事毁惡之乃説二世曰天子所以貴者但以聞聲羣臣莫得見其靣故號曰朕且陛下富於春秋未及盡通諸事今坐朝廷譴舉有不當者則見短於大臣非所以示神明於天下也且陛下深拱禁中與臣及侍中習法者待事事來有以揆之如此則大臣不敢奏疑事天下稱聖主矣二世用其計乃不坐朝廷見大臣居禁中趙髙常侍中用事事皆決於髙髙聞斯以為言乃見斯曰關東羣盜多今上急益發繇治阿房宫聚狗馬無用之物臣欲諌為位賤此真君侯之事君何不諌斯曰固也吾欲言之久矣今時上不坐朝廷上居深宫吾有所言者不可傳也欲見無間髙曰君誠能諌請為君候上間語君於是髙待二世方燕樂婦人居前使人告丞相上方間可奏事丞相至宫門上謁如此者三二世怒曰吾常多間日丞相不來吾方燕私丞相輒來請事丞相豈少我哉且固我哉髙因曰如此殆矣夫沙丘之謀丞相與焉今陛下已立為帝而丞相貴不益此其意亦望裂地而王矣且陛下不問臣臣不敢言丞相長男李由為三川守楚盜陳勝等皆丞相傍縣之子以故楚盜公行過三川城守不肯擊髙聞其文書相往來未得其審故未敢以聞且丞相居外權重於陛下二世以為然欲按丞相恐其不審乃使人按驗三川守與盜通狀斯聞之是時二世在甘泉方作觳抵優俳之觀斯不得見因上書言趙髙之短曰臣聞之臣疑其君無不危國妾疑其夫無不危家今有大臣於陛下擅利擅害與陛下無異此甚不便昔者司城子罕相宋身行刑罰以威行之期年遂劫其君田常為簡公臣爵列無敵於國私家之富與公家均布惠施德下得百姓上得羣臣隂取齊國殺宰豫於庭即弒簡公於朝遂有齊國此天下所明知也今髙有邪佚之志危反之行如子罕相宋也私家之富若田氏之於齊也兼行田常子反之逆道而劫陛下之威信其志若韓玘為韓安相也陛下不圗臣恐其為變也二世曰何哉夫髙故宦人也然不為安肆志不以危易心潔行修善自使至此以忠得進以信守位朕實賢之君疑之何也且朕少失先人無所識知不習治民而君又老恐與天下絶矣朕非屬趙君當誰任哉且趙君為人精廉強力下知人情上能適朕君其勿疑斯曰不然夫髙故賤人也無識於理貪欲無厭求利不止列勢次主求欲無窮臣故曰殆二世已前信髙恐斯殺之乃私告髙髙曰丞相所患者獨髙髙已死丞相即欲為田常所為於是二世曰其以李斯屬郎中令趙髙按治斯拘執束縳居囹圄中仰天而嘆曰嗟乎悲夫不道之君何可為計哉昔者桀殺關龍逄紂殺王子比干吳王夫差殺伍子胥此三臣者豈不忠哉然而不免於死身死而所忠者非也今吾智不及三子而二世之無道過於桀紂夫差吾以忠死宜矣且二世之治豈不亂哉日者夷其兄弟而自立也殺忠臣而貴賤人作為阿房之宫賦斂天下吾非不諌也而不吾聼也凡古聖王飲食有節車器有數宫室有度出令造事加費而無益於民利者禁故能長久治安今行逆於昆弟不顧其咎侵殺忠臣不思其殃大為宫室厚賦天下不愛其費三者已行天下不聼今反者已有天下之半矣而心尚未寤也而以趙高為佐吾必見寇至咸陽麋鹿遊於朝也於是二世乃使髙按丞相獄治罪責斯與子由謀反狀皆收捕宗族賔客趙髙治斯榜掠千餘不勝痛自誣服斯所以不死者自負其辨有功實無反心幸得上書自陳幸二世之寤而赦之斯乃從獄中上書曰臣為丞相治民三十餘年矣逮秦地之狹隘先王之時秦地不過千里兵數十萬臣盡薄材謹奉法令隂行謀臣資之金玉使遊説諸侯隂修甲兵飭政教官鬪士尊功臣盛其爵祿故終以脅韓弱魏破燕趙夷齊楚卒兼六國虜其王立秦為天子罪一矣地非不廣又北逐胡貊南定百越以見秦之強罪二矣尊大臣盛其爵位以固其親罪三矣立社稷修宗廟以明主之賢罪四矣更尅畫平斗斛度量文章布之天下以樹秦之名罪五矣治馳道興遊觀以見主之得意罪六矣緩刑罰薄賦斂以遂主得衆之心萬民戴主死而不忘罪七矣若斯之為臣者罪足以死固久矣上幸盡其能力乃得至今願陛下察之書上趙髙使吏棄去不奏曰囚安得上書髙使其客十餘輩詐為御史謁者侍中更往覆訊斯斯更以其實對輒使人榜之後二世使人驗斯斯以為如前終不敢更言辭服奏當上二世喜曰微趙君幾為丞相所賣及二世所使按三川之守至則項梁已擊殺之使者來會斯下吏趙髙皆妄為反辭二世二年七月具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族斯已死二世拜趙髙為中丞相事無大小輒決於髙髙自知權重乃獻鹿謂之馬二世問左右此乃鹿也左右皆曰馬也二世驚自以為惑乃召太卜令卦之太卜曰陛下春秋郊祀奉宗廟鬼神齋戒不明故至於此可依盛德而明齋戒於是乃入上林齋戒日遊弋獵有行人入上林中二世自射殺之趙髙教其女壻咸陽令閻樂劾不知何人賊殺人移上林髙乃諌二世曰天子無故賊殺不辜人此上帝之禁也鬼神不享天且降殃當逺避宫以禳之二世乃出居望夷之宫留三日高詐詔衛士令士皆素服持兵內鄉入告二世曰山東羣盜兵大至二世上觀而見之恐懼髙即因劫令自殺引璽而佩之左右百官莫從上殿殿欲壞者三髙自知天弗與羣臣不許乃召二世兄子子嬰授之璽子嬰即位患之乃稱疾不聼事與宦者韓談及其子謀殺髙髙上謁請病因召入令韓談刺殺之夷其三族子嬰立三月沛公兵從武關入至咸陽羣臣百官皆畔不適子嬰與妻子自係其頸以組降軹道旁沛公因以屬吏項王至而斬之遂以亡天下此傳所載趙髙殺二世子嬰殺趙髙與秦本紀少異兩存之以廣異聞蘇子曰始皇以詐力兼天下志得意滿諱聞過失李斯燔書詩誦功德以成其氣至其晚節不可告語君老太子在外履危亂之機而莫敢以一言合其父子之親者雖始皇之暴非斯養之不至此也及其事二世知趙髙之姦復偷合取容使髙勢已成天下已亂乃欲力諌不亦晚乎至於國破家滅非不幸也古史卷五十六
