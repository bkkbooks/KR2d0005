body:
  text: 古史卷二宋蘇轍撰五帝本紀帝少昊金天氏曰摯亦曰青陽都於曲阜其立也鳳鳥適至故以鳥紀為鳥師而鳥名鳳鳥氏歷正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也瞗鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正九扈為九農正而其四叔重為勾芒該為蓐收修及熙為玄冥少昊氏既衰而黃帝之孫顓頊代之少昊之後見於周衰有郯子焉帝顓頊髙陽氏黃帝之孫而昌意之子也都於帝丘始為民師而命以民事少昊氏之衰也九黎亂德民神雜糅不可方物家為巫史民匱於祀民瀆齊盟而神不蠲民嘉生不降禍災荐至顓頊乃命南正重司天以屬神火正黎司地以屬民絶地天通使無相侵瀆然後民安其生髙陽氏之滅也歲在鶉火左傳晉史趙曰陳顓頊之族也歲在鶉火是以卒滅陳將如之黃帝之曽孫嚳代之顓頊之後六丗生舜五丗生鯀故虞夏皆祖顓頊帝嚳髙辛氏黃帝之曽孫也父曰蟜極祖曰玄囂都於亳取陳􅀈氏生堯取娵訾氏生摯取有娀氏生契取有邰氏生稷帝嚳崩而摯代立帝摯立不善崩而其弟立是為帝堯契之後為殷稷之後為周故堯禪舜舜祀嚳於郊而殷周皆祀嚳於禘帝堯陶唐氏都於平陽黃收純衣彤車白馬茅茨不翦土階三等為咸池之樂克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍髙辛氏既衰而三苗復亂九黎之德堯乃復育重黎之後曰羲仲羲叔和仲和叔使平秩四方以正四時允釐百工庶績咸熙於是堯訪於羣臣曰疇咨若時登庸放齊曰嗣子丹朱開明堯曰吁嚚訟可乎堯又曰疇咨若豫采歡兜曰共工方鳩僝功堯曰吁靜言庸違象共滔天不可堯復問四嶽曰湯湯洪水滔天浩浩懷山襄陵下民其咨誰可使治者皆曰鯀可堯曰鯀方命圯族不可嶽曰異哉試不可用乃已堯於是聼嶽用鯀九載功用不成堯復問曰朕在位七十載汝能庸命巽朕位嶽曰否德忝帝位堯曰明明揚側陋衆皆曰有鰥在下曰虞舜堯曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦堯曰我其試哉於是妻之二女以觀其德舜飭下二女於媯汭如婦禮堯善之堯知子丹朱不肖不足授天下得舜試之三年而告之曰豫詢事考言乃言底可績三載矣汝遂陟帝位舜讓于德弗嗣堯不許以正月上日受終于文祖堯遂老使舜攝行天子之政二十有八載而堯崩百姓如喪考妣三載四海遏密八音舜乃封丹朱使奉堯祀服其禮樂以客見天子而舜亦宗祀堯至舜之子孫乃更郊堯而宗舜自黃帝至堯皆姬姓同姓而異其國號所以章明德也堯後有劉纍者學擾龍於豢龍氏事夏孔甲賜氏曰御龍以更豕韋之後為豕韋氏商之衰遷居於唐周以唐封叔虞復自唐徙杜為唐杜氏周宣王誅杜伯其子隰叔適晉為范氏范武子奔秦自秦復歸于晉其處者為劉氏而漢其苖裔也蘇子曰四嶽薦鯀於堯堯知鯀之不可用而屈於四嶽民被其害者九年後丗疑之知其不可而用之不仁屈於四嶽而不能信不知豫嘗論之水之為害不可一日不治而人之知治水者雖聖賢有不能也是以堯舜皆不自治得禹而後濟方禹之未見也天下言治水者莫如鯀棄鯀而不試有不仁焉斯堯之所以用鯀也歟帝舜有虞氏媯姓舜父瞽叟瞽叟父曰橋牛橋牛父曰勾望勾望父曰敬康敬康父曰窮蟬窮蟬帝顓頊之子也自窮蟬至舜皆微為庶人舜父病瞽母亡而更娶生象父母愛象而惡舜遇舜不以道舜事父母撫弟篤於敬愛瞽猶不順舜往于田日號泣于旻天于父母負罪引慝祗載見瞽叟夔夔齊栗瞽亦允若不至於姦以是耕於歷山歷山之人皆讓畔漁於雷澤雷澤之人皆讓居陶於河濱器不苦窳一年而所居成聚二年成邑三年成都堯聞其賢妻之二女以觀其內事之九男以觀其外二女不敢以其貴驕而九男皆益篤堯知其聖人也乃命舜愼徽五典五典克從納于百揆百揆時敘賓于四門四門穆穆納于大山林麓烈風雷雨弗能迷也世或言所謂納于大麓者太山之麓帝王禪代告終之所在此太山之所以為岱宗者也然方舜之納于大麓也蓋未受終于文祖類于上帝猶人臣也而遽告代于太山可乎如是三載堯乃命舜以位正月上日受終于文祖察琁璣玉衡齊七政以觀天命之逆順而天命無違於是類于上帝禋于六宗儒者言六宗皆不同禮祭法曰泰昭祭時也坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也孔安國王肅以此為六宗夫言古事當以古説為近舍祭法不用而以意立説未可信也或以乾坤六子宗廟三昭三穆當之其數雖合然自古無祭八卦之文舜既受終于文祖然後推考天人觀其逆順而遍祭之則三昭三穆於其祭文祖兼之矣望于山川遍于羣神輯五瑞以觀諸侯之從否而諸侯莫有不至於是覲四嶽羣牧班瑞于羣后遂以四時巡守方嶽燔柴告至望秩山川肆覲諸侯協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復歸格于藝祖用特五載一巡守羣后四朝敷奏以言明試以功車服以庸舜舉禹使治水水行地中建十有二州封十有二山濬川民咸安其生於是象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服二十有八年而堯崩舜除三年之喪正月元日見于文祖詢于四嶽咨十有二牧舜自百揆為天子未有代之者於是舜問四嶽誰可使宅百揆皆曰伯禹作司空可帝曰俞咨禹汝平水土惟時懋哉禹讓于稷契臯陶帝曰俞汝往哉是時棄既已為稷契既已為司徒臯陶既已為士矣舜皆稱其功申命其事復博訪羣臣因其所舉而即用之所舉無不賢者乃以垂為工以益為虞以夷為秩宗以夔典樂以龍為納言凡命四嶽十二牧九官二十有二人丗咸以四嶽為四人非也傳言齊許皆四嶽之後薑姓蓋一人耳三載考績三考黜陟幽明庶績咸熙惟三苗之遺民為惡不悛乃復分北處之以散其衆然後四海咸戴舜德興九招之樂致異物鳯凰來翔天下明德皆自虞帝始舜弟象封於有鼻舜子商均亦不肖舜乃命禹曰朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師禹讓於臯陶舜曰天之歷數在汝躬汝終陟元后禹曰枚卜功臣而從其吉可也舜不許正月朔旦受命于神宗率百官若帝之初神宗者舜之所宗堯也舜受命于文祖禹受命于神宗蓋將以天下與人必告其所從受天下者也舜既老任禹以政苗民猶弗率舜命舜命禹征之禹伐之三旬而苗民不服益贊于禹稱舜之在歷山日號泣于昊天負罪引慝而瞽叟允若至諴感神矧兹有苗其有不服者乎禹用其言而班師舜乃誕敷文德舞干羽于兩階七旬而有苗格是時舜在位三十三年德之及物也久矣以舜之德而誅三苗之虐以天下之衆而伐三苗之微其為不敵也明矣然而攻之三旬而不服引兵而歸舞干羽于兩階七旬而格之何也雖以舜之德舉天下之衆而伐之是以力較之也以力較之必其力竭而後服引兵而歸不較其力而俟之以德吾無爭心而三苖愧耻之心生矣七旬而後格雖以為遲可也蓋舜三十而徵庸攝位三十年即位五十年都於蒲坂南巡守崩於蒼梧之野而葬于九疑禹封其子於虞有虞氏丗禘黃帝郊堯祖顓頊宗舜報幕其後有虞思箕伯直柄虞遂伯戲虞思封夏少康者也其餘四人見晏子與叔向言齊事皆失其丗次至商而封遂左傳舜置德于遂至周而封陳陳敬仲完自陳奔齊其後代齊蘇子曰學者言堯舜之事有三妄焉太史公得其一不得其二莊子稱堯以天下讓許由許由不受耻之逃隱莊子蓋寓言焉而後丗信之太史公曰舜禹之間嶽牧咸薦試之於位典職數十年功用既興然後授政示天下重器王者大統傳天下若斯之難而許由何以稱焉孟子曰堯將舉舜妻以二女瞽叟不順不告而娶既而猶欲殺舜而分其室然舜終不以為怨余考之於書孟子蓋失之矣丗豈有不能順其父母而能治天下者哉四嶽之薦舜曰蒸蒸乂不格姦益之稱舜曰夔夔齊栗瞽亦允若則舜之為庶人既已能順其親使不至於姦矣父母兄弟之際智力之所不施也有頑父嚚母傲弟而能和之以不失其親惟至仁能之此堯之所以用舜而不疑者也父子相賊姦之大也豈其既已用之而猶欲殺之哉孟子又言堯舜禹之終皆薦人於天堯崩舜辟堯子於南河之南舜崩禹辟舜子於陽城天下皆往歸之然後之中國踐天子位禹崩益辟禹子於箕山之隂朝覲獄訟者皆不之益而之啓故益不得為天子以書觀之此亦非君子之言也舜禹之攝格于祖考郊祀天地朝見諸侯巡守方嶽行天子之事矣及其終而又辟之何哉使舜禹辟之天下歸之而其子不順將從天下而廢其子歟將奉其子而違天下歟此事之至逆由辟致之也至益不度天命而受位於禹辟之而天下不從然後不敢為匹夫猶且耻之而謂益為之哉古史卷二
