body:
  text: 古史卷三十八宋蘇轍撰葉公列傳第十五葉公諸梁字子髙楚莊王之玄孫也父曰沈尹戌戌初事平王平王城州來以挑吳戌知其必敗及令尹囊瓦城郢戌又曰子常必亡郢昭王即位瓦為令尹戌為司馬瓦貪而不仁楚人惡之戌為之二而彌縫其闕國人賴焉及柏舉之戰戌與瓦謀所以捍吳而行瓦畏其克吳也背之出戰而敗戌反息而還敗吳師于雍澨三戰皆傷謂其臣吳句卑曰子以吾首免句卑布裳剄而褁之藏其身而免其首昭王既定以諸梁為葉公初楚太子建之遇讒也自城父奔宋又辟華氏之亂於鄭鄭人甚善之適晉與晉人謀襲鄭鄭人復之晉人使諜於建請期建暴虐於其私邑邑人訴之鄭人得晉諜遂殺建其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊境使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處吳竟為白公請伐鄭子西曰楚未節也不然吾不忘也它日又請許之師未起晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣勝自厲劔子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝謂石乞曰王與二卿士皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言説告之故辭承之以劒不動勝曰不為利諂不為威惕不泄人言以求媚者去之吳人伐慎白公敗之請以戰備獻許之遂作亂秋七月殺子西子期于朝而劫惠王子西以袂掩面而死子期曰昔吾以力事君不可以弗終抉豫章以殺人而後死石乞曰焚庫弒王不然不濟白公曰不可弒王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡方城之外皆曰不可入矣葉公曰吾聞之以險徼幸者其求無饜偏重必離聞其殺齊管修也而後入白公欲以子閭為王子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後卑焉啓之願也敢不聼從若將専利以傾王室不顧楚國有死不能遂殺之而以王如髙府石乞尹門圉公陽穴宫負王以如昭夫人之宫葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日日以幾若見君面是得艾也民知不死其亦大有奮心猶將旌君以徇於國而又掩面以絶民望不亦甚乎乃免胄而進遇針固帥其屬將與白公子髙曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人攻白公白公奔山而縊其徒微之生拘石乞而問白公之死對曰余知其死所而長者使余勿言曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞子髙兼二事國寧乃使子西之子寧為令尹使子期之子寬為司馬而老於葉白公之亂陳人恃其聚而侵楚楚既寧將取陳麥王問帥於太師子穀子穀曰右領差車與左史老皆相令尹司馬以伐陳其可使也子髙曰帥賤民慢之懼不用命焉子穀曰觀丁父鄀俘也武王以為軍帥是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝唯其任也何賤之有子髙曰天命不諂令尹有憾於陳天若亡之其必令尹之子是與君盍舍焉臣懼右領與左史有二俘之賤而無其令德也王卜之武城尹朝吉使帥師取陳麥陳人禦之敗遂圍陳秋七月滅陳王將以王弟子良為令尹卜之沈尹朱曰吉過於其志子髙曰王子而相國過將何為他日改卜子國而使為令尹楚遂以安蘇子曰孔子稱知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也春秋之末諸侯之士知者多矣而未見其仁也葉公子髙於白公之未亂也知其不可近及其既亂也舉兵而入罪人斯得而楚國以定可以言知矣使葉公因惠王之復而身為令尹以行楚國之政楚豈有間言者哉然葉公追念子西子期之功以其子為令尹司馬而身老於葉有存國之勞而不享存國之利於是可以言仁矣昔孔子去衛磐桓陳蔡之間六年陳蔡之君無足取也意在楚葉耳當是之時葉公未有白公之功也而孔子知其仁可謂明矣然葉公終不能用孔子使聖人之效不見於當世豈仁雖能守而未暇由禮歟傳曰葉公好龍室屋雕文無非龍者天龍下之懼而還走喪其魂魄此言蓋謂孔子非謂龍也昔楚昭王將用孔子矣令尹子西知孔子聖人畏其害楚而沮之或問子西於孔子孔子曰彼哉彼哉夫諸侯大夫不知孔子者衆矣孔子未嘗疾之子西知孔子矣而獨以其害楚疑之此其罪甚於不知故孔子深疾之歟古史卷三十八
