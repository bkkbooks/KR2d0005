body:
  text: 古史卷六十宋蘇轍撰滑稽列傳第三十七優孟者故楚之樂人也長八尺多辨常以談笑諷諌楚莊王之時有所愛馬衣以文繡置之華屋之下席以露牀啖以棗脯馬病肥死使羣臣喪之欲以棺槨大夫禮葬之左右爭之以為不可王下令曰有敢以馬諌者罪至死優孟聞之入殿門仰天大哭王驚而問其故優孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請以雕玉為棺文梓為槨楩楓豫章為題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之奈何孟曰請為大王六畜葬之以壠竈為槨銅歷為棺齎以薑棗薦以木蘭祭以粳稻衣以火光葬之於人腹腸於是王乃使以馬屬太官無令天下久聞也楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逄孟與言曰我孫叔敖之子也父且死時屬我貧困往見優孟孟曰若無逺有所之即為孫叔敖衣冠抵掌談語歲餘像孫叔敖楚王及左右不能别也莊王置酒孟前為夀莊王大驚以為孫叔敖復生也欲以為相孟曰請歸與婦計之三日而為相莊王許之三日後孟復來王曰婦言謂何孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為亷吏奉法守職竟死不敢為非亷吏安可為也楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘四百户以奉其祀後十世不絶也西門豹事魏文侯為鄴令初到鄴㑹長老問民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常歲賦斂百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視小家女好者云是當為河伯婦即娉取洗沐之為治新繒綺縠衣間居齊戒為治齊宫河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒人家有好女者恐大巫祝為河伯取之以故多持女逺逃亡以故城中益空無人又困貧所從來久逺矣民人俗語曰即不為河伯娶婦水來漂溺其人民云豹曰至河伯娶婦時願三老巫祝父老送女河上幸來告語之吾往送女皆曰諾至其時豹往㑹之河上三老官屬豪長者父老皆㑹人民往觀者三二千人其巫老女子也已年七十弟子女十人所皆衣繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子豹曰巫嫗弟子女子也不能白事煩三老為入白之復投三老河中西門豹簮筆磬折嚮河立待良久長老吏旁觀者皆驚恐豹顧曰巫嫗三老不來奈之何欲復使廷掾與豪長者一人入趣之皆叩頭且破額血流地色如死灰豹曰諾且留待之須㬰須㬰豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦豹即發民鑿十二渠引河水灌民田當其時民治渠少煩苦不欲也豹曰民可以樂成不可與慮始今父老子弟雖患苦我然百嵗後其令父老子孫思我言其後皆得水利民人以給足十二渠經絶馳道漢世長吏或以為十二渠橋絶馳道相比近不可欲合三渠為一橋鄴民人父老不肯聼以為西門君所為不可更也長吏終聼置之傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺豹雖不若子産子賤然要為賢大夫矣淳于髠者齊之贅壻也長不滿七尺滑稽多辨數使諸侯不能屈辱齊威王喜隱好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡左右莫敢諌髠說之以隱曰國有大鳥止王之庭三年不蜚又不鳴王知此何鳥也王曰此鳥不飛則已一飛冲天不鳴則已一鳴驚人於是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯振驚皆還齊侵地威行三十六年威王八年楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有說乎髠曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是威王乃益齎黃金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乘楚聞之夜引兵而去威王大說置酒後宫召髠賜之酒問曰先生能飲幾何而醉髠對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其說可得聞乎髠曰賜酒大王之前執法在傍御史在後恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠帣韝鞠􅎽侍酒於前時賜餘瀝奉觴上夀數起飲不過二斗徑醉矣若朋友交游久不相見卒然相覩歡然道故私情相語飲可五六斗徑醉矣若乃州閭之㑹男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁前有墯珥後有遺簮髠竊樂此飲可八斗而醉二參日暮酒闌合尊促坐男女同席履舄交錯杯盤狼籍堂上燭滅主人留髠而送客羅襦襟解微聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰齊王曰善乃罷長夜之飲以髠為諸侯主客宗室置酒髠常在側優旃者秦倡朱儒也善為笑言然合於義理始皇置酒而天雨陛楯者皆沾寒旃見而哀之謂之曰汝欲休乎陛楯者皆曰幸甚優旃曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬歲旃臨檻大呼曰陛楯郎郎曰諾旃曰汝雖長何益幸雨立我雖短也幸休居於是始皇使陛楯者得半相代始皇嘗議欲大苑囿東至函谷關西至雍陳倉旃曰善多縱禽獸於其中寇從東方來令麋鹿觸之足矣始皇以故輟止二世立又欲漆其城旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城蕩蕩冦來不能上即欲就之易為漆耳顧難為䕃室於是二世笑之以其故止居無何二世殺死旃歸漢數年而卒蘇子曰太史公傳滑稽三人褚先生一人皆以優笑有益於事故并録之然西門豹古循吏非滑稽者也特以止河伯娶婦事發於俳故巧而捷是以載之滑稽而實非也太史公以齊威王事先楚莊今既正之然優孟語稱齊趙韓魏蓋戰國記事者粉澤之過耳古史卷六十豫少好讀詩春秋皆為之集傳讀太史公書質之詩書左氏戰國䇿知其未能詳復而遽以為書亦欲正之而未暇也元豐中以罪謫高安五年不得調職雖賤且冗而豫僚許以閒暇乃以其間終緝二傳刋正古史得七本紀十世家七列傳功未及究也七年九月得邑於歙明年至邑而病寒熱殆不能起病愈蒙恩召還為諌官又明年改元元祐遂以愚暗進當要劇與聞國政而性弱才短日不遑給回視舊學常恐終身不能復就也九年三月始以罪黜守臨汝不數月復降守富春行至彭澤復以少府監分司南京而居髙安往來之間凡十有一年太守栁君平年老更事憐豫逺來其吏民亦知豫疇昔之無害也相與安之於城東南陬得民居十數間葺而居之逾月而定借書於州學不足者求之諸生以續古史之缺明年三月而成凡六十卷蓋豫十年所欲成就者俯仰而得堯舜三代之遺意太史公之所不喻者於此而明戰國君臣得失成敗之迹太史公之所脫遺者於此而足非閒廢有所不暇者也時季子遜侍豫紬繹往牒知豫去取之意舉為之注後世可考焉紹聖二年三月二十五日眉山蘇轍子由志
