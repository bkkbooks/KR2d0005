body:
  text: 古史卷二十六宋蘇轍撰桞下惠列傳第三桞下惠者魯公族展氏也名禽仕魯爲士師三黜不去人曰子未可以去乎曰直道而事人焉徃而不三黜枉道而事人何必去父母之邦故魯雖不能用終身不去魯僖公二十六年齊孝公侵魯僖公使展喜犒師受命於展禽齊侯未入竟喜從之曰寡君聞君親舉玉趾將辱於弊邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也藏在盟府太師職之桓公是以糾合諸侯而謀其不恊彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其帥桓之功我弊邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還海鳥曰爰居止於魯東門之外三日臧文仲使國人祭之展禽曰異哉臧孫之爲政也夫聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之非此族也不在祀典今海鳥至不知而祀之難以爲仁且智矣夫仁者講功智者處物無功而祀之非仁也不知而不能周非智也今兹海其有災乎夫廣川之鳥獸常知避其災害是嵗也海多大風冬温臧文仲聞之曰信吾過也使書以爲三筴故孔子曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虗器縱逆祀祀爰居三不知也又曰臧文仲其竊位者與知栁下惠之賢而不與立也及孔子叙古之逸民謂伯夷叔齊不降其志不辱其身謂桞下惠少連降志辱身言中倫行中慮謂虞仲夷逸隠居放言身中清廢中權我則異於是無可無不可孟子因之曰伯夷聖之清者也柳下惠聖之和者也伯夷非其君不事非其民不使思與鄉人立其冠不正望望然去之若將凂焉柳下惠不羞汙君不辭小官曰爾爲爾我爲我雖祖裼裸䄇於我側安能浼我哉夫二子之行不至於此而其風之所及則有至是者與蓋孔子稱作者七人其三人伯夷叔齊柳下惠皆見於書其四人朱張少連夷逸皆不見虞仲或曰太伯之弟所謂仲雍者也蓋始斷髮文身以治句吳儻或是歟蘇子曰伯夷叔齊不降其志不辱其身義不事武王而柳下惠降志辱身三黜於魯而不去行若氷炭之異而聖人皆取之者其心一也心茍不然則伯夷必䧟於狷柳下惠必䧟於鄉原而孔子奚取焉易曰君子之道或岀或處或黙或語二人同心其利斷金夫君子平治其心外累既盡至於不可加損人莫得而見也雖其岀處語黙應於外者不一而其中未嘗違仁然後知其爲同耳然孔子之論此三人或謂之賢人或謂之仁人未甞以聖人許之孔子曰見善如不及見不善如探湯吾聞其語矣吾見其人矣隱居以求其志行義以逹其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂歟蓋孔子之稱夷齊以爲賢於當世之君子至於當世諸侯大夫則不能望其垣墻耳非以爲堯舜等比也故其叙逸民亦曰我則異於是無可無不可夫人而不能無可無不可而尚足以爲聖人乎至孟子始謂伊尹伯夷桞下惠皆古之聖人與孔子異而世俗又從而廣其說曰此三人者皆聖人之趨時者也伊尹之後士多進而寡退故伯夷岀而矯之伯夷之後士多退而寡進故栁下惠出而矯之夫三代之風今世不得見矣而春秋之際士方以功利爲急孰謂其多退而寡進也哉此皆妄意古人耳湯之稱伊尹曰聿求元聖與之戮力以與爾有衆請命伊尹之自稱亦曰維尹躬暨湯咸有一徳克享天心受天明命以有九有之師及孔子叙書皆不以爲過謂之聖人或庻幾焉如伯夷柳下惠吾從孔子而已古史卷二十六
