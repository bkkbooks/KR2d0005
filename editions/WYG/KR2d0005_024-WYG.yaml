body:
  text: 古史卷二十四宋蘇轍撰伯夷列傳第一伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊譲伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子於是伯夷叔齊聞西伯昌善養老皆徃歸之盖西伯受命稱王紂雖無道置而不伐者九年及文王崩武王終三年之喪帥諸侯之兵觀政於商而還居二年紂日長惡不悛遂舉兵伐之伯夷叔齊乃相與扣馬陳君臣以諌左右欲兵之太公曰此義人也扶而去之史記周本紀武王即位九年上祭于畢為文王木主載之車中東觀兵孟津十一年遂伐誅紂伯夷傳記伯夷諌武王之言曰父死未𦵏爰及干戈可謂孝乎進退皆不可㩀故一取尚書為信武王已平殷亂天下宗周而伯夷叔齊耻之隐於首陽義不食周粟採薇而食之卒以餓死孔子稱之曰伯夷叔齊不念舊惡怨是用希衛岀公與父莊公爭國冉有疑之曰夫子爲衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨岀曰夫子不爲也由此言之伯夷叔齊之岀也父子之間必有間言焉而能脫身以逺於亂安於喪亡不以舊惡爲怨故凡言伯夷之不怨以譲國言之也孔子稱古之逸民伯夷叔齊虞仲夷逸朱張桞下惠少連曰不降其志不辱其身伯夷叔齊歟謂桞下惠少連降志而辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隐居放言身中清廢中權夫伯夷叔齊隐居以求其志行義以逹其道義之所在無以生爲也故志不降身不辱自桞下惠以下皆全生者也故志䧏身辱獨其言行不汙耳至扵虞仲夷逸雖隐居不屈而佯狂放言身絜而言蕩蓋未有若伯夷者故凡言伯夷之不辱以去周言之也蘇子曰武王以大義伐商而伯夷叔齊亦以義非之二者不得兩立而孔子與之何哉夫文武之王非其求而得之也天下從之雖欲免而不得紂之存亡不復為損益矣文王之置之知天命之不可先也武王之伐之知天命不可後也然湯以克夏爲慙而孔子謂武未盡善則伯夷之義豈可廢哉宋昭公以無道弑春秋雖書曰宋人弑其君杵臼然晉荀林父衛孔逹陳公孫寧鄭石楚伐宋以不討賊稱人晉靈公為之會諸侯於扈以不討賊不叙明君臣之義不以無道廢也古史卷二十四
