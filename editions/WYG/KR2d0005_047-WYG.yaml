body:
  text: 古史卷四十七宋蘇轍撰魏公子列傳第二十四魏公子無忌者魏昭王少子而安釐王異母弟也安釐王即位封為信陵君是時范雎亡魏相秦以怨魏齊故秦兵圍大梁破魏華陽下軍走芒卯魏王及無忌患之無忌為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以其賢多客不敢加兵謀魏十餘年無忌嘗與魏王博而北境傳舉烽言趙冦至且入界魏王釋博欲召大臣謀無忌止王曰趙王田獵耳非為冦也復博如故王恐心不在博居頃之復從北方來傳言曰趙王獵耳非為冦也魏王大驚曰公子何以知之無忌曰臣之客有能探得趙王陰事者趙王所為客輙以報臣臣以此知之是後魏王畏無忌之賢能不敢任以國政魏有隱士曰侯嬴年七十家貧為大梁夷門監者無忌聞之往請欲厚遺之不肯受曰臣修身潔行數十年終不以監門困故而受公子財無忌乃置酒大㑹賔客坐定無忌從車騎虛左自迎侯生侯生攝弊衣冠直上載無忌上坐不讓欲以觀無忌無忌執轡愈恭侯生又謂無忌臣有客在市屠中願枉車騎過之無忌引車入市侯生下見其客朱亥睥睨故久立與客語微察無忌無忌顏色愈和當是時魏將相宗室賔客滿堂待無忌舉酒市人縱觀從騎皆罵侯生侯生視無忌色終不變乃謝客就車至家無忌引侯生坐上坐徧贊賓客賓客皆驚酒酣無忌起為壽侯生前侯生因謂無忌曰今日嬴之為公子亦足矣嬴乃夷門抱闗者也而公子親枉車騎自迎嬴於衆人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故久立公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也於是罷酒侯生遂為上客侯生謂無忌曰臣所過屠者朱亥此子賢者世莫能知故隱屠間耳無忌數往請之朱亥故不復謝無忌怪之安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲無忌姊為趙惠文王弟平原君夫人數遺書請救於魏魏王使將軍晉鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已拔趙必移兵先擊之魏王恐使人止晉鄙留軍壁鄴名為救趙實持兩端以觀望平原君使者冠蓋相屬於魏讓無忌曰勝所以自附為婚姻者以公子之高義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊耶無忌患之數請魏王及賔客辯士説王萬端魏王畏秦終不聽無忌自度終不能得之於王計不獨生而令趙亡乃請賔客約車騎百餘乗欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀辭決而行侯生曰公子勉之矣老臣不能從無忌行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曽無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也無忌再拜因問侯生乃屛人間語曰嬴聞晉鄙之兵符常在王卧内而如姬最幸出入王卧内力能竊之嬴聞如姬父為人所殺如姬資之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬如姬之欲為公子死無所辭顧未有路耳公子誠一開口請如姬如姬必許諾則得虎符奪晉鄙軍北救趙而西却秦此五覇之伐也無忌從其計請如姬如姬果盗晉鄙兵符與之無忌行侯生曰將在外主令有所不受以便國家公子即合符而晉鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晉鄙聽大善不聽可使擊之於是無忌泣侯生曰公子畏死耶何泣也無忌曰晉鄙嚄唶宿將往恐不聽必當殺之是以泣耳豈畏死哉於是無忌請朱亥朱亥笑曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與無忌俱無忌過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北向自剄以送公子無忌遂行至鄴矯魏王令代晉鄙晉鄙合符疑之舉手視無忌曰今吾擁十萬之衆屯於境上國之重任今單車來代之如何哉欲無聽朱亥袖四十斤鐵椎椎殺晉鄙無忌遂將晉鄙軍勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸養得選兵八萬人進兵擊秦軍秦軍解去遂救邯鄲存趙趙王及平原君自迎無忌於界平原君負韊矢先引趙王再拜曰自古賢人未有及公子者也當此之時平原君不敢自比於人無忌與侯生決至軍侯生果北鄉自剄魏王怒無忌之盗其兵符矯殺晉鄙無忌亦自知也已却秦存趙使將將其軍歸魏而無忌獨與客留趙趙孝成王徳無忌與平原君計以五城封無忌無忌聞之意驕矜有自功之色客有説無忌曰物有不可忘或有不可不忘夫人有徳於公子公子不可忘也公子有徳於人願公子忘之且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子乃自驕而功之竊為公子不取也於是無忌立自責似若無所容者趙王埽除自迎執主人之禮引無忌就西堦無忌側行辭讓從東堦上自言辠過以負於魏無功於趙趙王侍酒至暮口不忍獻五城以無忌退讓也無忌竟留趙趙王以鄗為湯沐邑魏亦復以信陵奉之無忌留趙聞趙有處士毛公藏於博徒薛公藏於賣漿家無忌欲見兩人兩人自匿不肯見無忌間歩往從此兩人游甚歡平原君聞之謂其夫人曰始吾聞夫人弟公子天下無雙今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告無忌無忌乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之游徒豪舉耳不求士也無忌自在大梁時常聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從游乃裝為去夫人具以語平原君平原君乃免冠謝固留無忌平原君門下聞之半去平原君歸無忌無忌留趙十年不歸秦聞之日夜出兵伐魏魏王患之使使往請無忌無忌恐王怒之乃誡門下有敢為魏王使通者死賔客皆背魏之趙莫敢勸無忌歸毛公薛公兩人往見無忌曰公子所以重於趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先王之宗廟公子當何面目立天下乎語未及卒無忌立變色告車趨駕歸救魏魏王見無忌相與泣而以上將軍印授之安釐王三十年無忌使使遍告諸侯諸侯聞無忌將各遣將將兵救魏無忌率五國之兵破秦兵於河外走䝉驁遂乘勝逐秦兵至凾谷闗抑秦兵秦兵不敢出當是時無忌威振天下諸侯之客進兵法無忌皆名之故世稱魏公子兵法秦王患之乃行金萬斤於魏求晉鄙客令毁無忌曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞魏公子不聞魏王公子亦欲因此時定南面而王諸侯畏公子之威方欲共立之秦數使反間偽賀公子得立為魏王未也魏王日聞其毁不能不信後果使人代無忌將無忌自知再以毁廢乃謝病不朝與賔客為長夜飲飲醇酒多近婦女日夜為樂飲者四歲竟病酒而卒其歲安釐王亦薨秦聞公子死使䝉驁攻魏拔二十城初置東郡其後秦稍蠶食魏十八歲而虜魏王屠大梁漢高祖始微時數聞無忌賢及即天子位每過大梁常祠之高祖十二年從擊黥布還為置守冡五家世以四時奉祠焉蘇子曰魏公子始用侯嬴之計盗兵符殺晉鄙而奪其軍擊秦以全趙成桓文之功矣然兄弟自是相失十年不敢還魏幾無以安其身殆哉其後秦兵攻魏無忌無還魏之心毛薛惎之翻然而歸合諸侯破秦軍使宗廟復安兄弟如故然後得明目以立於世蓋無忌之名發於侯生而全於毛薛侯生之奇毛薛之正廢一不可而正之所全者多矣古史巻四十七
