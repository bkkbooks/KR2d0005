body:
  text: 古史卷五宋蘇轍撰周本紀周后稷名棄帝嚳之子也母有邰氏之女曰姜原為帝嚳元妃禋祀上帝以求子見巨人迹忻然踐之身動如孕期而生子不坼不副疑而棄之隘巷牛羊過者皆辟不踐徙置之林中㑹伐林者取之復置之氷上飛鳥覆且翼之姜原以為神收而養長之因名曰棄幼而岐嶷其㳺戲輙樹藝五穀所植無不羙大及為成人遂好耕農事其所稼穡若有相之者以此教民民咸法則之堯舉以為后稷封之於邰佐禹治水播奏庶艱食鮮食盖嘗得嘉種而徧種之周人以為天所遺也故詩曰貽我来牟帝命率育后稷卒子不窋立夏后氏政衰弃稷不務不窋失其官自竄於戎狄之間而居於豳不敢怠業不窋卒子鞠立鞠卒子公劉立公劉修后稷之業務農積穀用兵征伐厈大豳土始有朝廷邑里之制然猶處於復穴無宫室之羙公劉卒子慶節立慶節卒子皇僕立皇僕卒子差弗立差弗卒子毁隃立毁隃卒子公非立公非卒子髙圉立髙圉卒子亞圉立亞圉卒子公叔祖類立公叔祖類卒子古公亶父立自公劉以来子孫㣲弱至古公為狄人所攻事之以皮幣犬馬皆不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之君子不以其所以養人者害人二三子何患無君去之踰梁山邑於岐山之下豳人曰此仁人也扶老擕幼而從之古公於是伐山刋木立宗廟冢土城郭宫室黜戎狄之俗周之王迹盖始於此古公取姜女生三子長曰太伯次曰虞仲次曰季歴季歴取於摯曰太任生昌有聖徳古公曰我丗當有興者其在昌乎太伯虞仲知古公欲立季歴以次傳昌乃二人亡如荆楚以讓季歴古公卒季歴立是為公季自后稷至季歴經夏商千餘歳而子孫相傳十四丗而已使人人在位皆七十年然後及此此理之所無也盖必有脱遺者矣然今世無以考證姑従史記之舊而已公季循古公遺業篤於行義諸侯順之公季卒子昌立是為文王文王在母不憂處師弗煩事季不怒取於莘曰太姒比三世皆得賢妃文王刑于寡妻至于兄弟以御于家邦王化之盛始於室家敬老慈少禮下賢者日中不暇食伯夷叔齊太公望太顛閎夭南宫适㪚宜生鬻子辛甲之徒皆往歸之是時殷紂無道嘗以文王為三公崇侯虎譛之紂囚之羑里文王方幽囚憂患乃因古八卦為六十四為之卦辭爻辭謂之周易先儒或言文王始重易八卦為六十四今以書洪範考之盖伏犧始畫八卦其後禹得洛書九疇而其七曰乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔是時卜筮貞悔已見於丗則八卦之重久矣文王之丗盖因古人已重之卦而為之辭耳然明夷之辭稱文王箕子豈文王之後周公又成之與居羑里七年諸侯或從之囚紂以此懼閎夭之徒又求羙女竒物善馬獻之紂紂喜釋文王以為西伯得専征伐中國方亂西戎北狄更来侵暴天子以命文王文王使南仲伐而却之諸侯頼焉宻須氏不共以兵侵周文王禦之敗其兵遂滅其國因徙居岐渭之間大雅言克宻之後即曰居岐之陽在渭之将是也遂伐崇侯軍三旬不服退修教而復伐之因壘而降始作豐邑自岐渉渭東徙都焉周自是益大南服江漢三國三分天下有其二以事紂既而以兵戡黎黎近於殷殷人震焉虞芮之君相與争田久而不平乃皆質之於周入其境耕者譲畔行者譲路入其邑男女異路班白不提挈入其朝士譲為大夫大夫譲為卿虞芮之君愧焉乃以其所争為間田而去諸侯聞之相帥而歸周者四十餘國東北既集黎即黎陽虞芮在馮翊皆周之東北也王業以成文王於是受命稱王追王古公為大王公季為王季文王享國五十年葢受命九年年九十有七而崩太姒之子十人長曰伯邑考次曰武王𤼵文王舎伯邑考而立武王武王終三年之䘮周之受命葢十年矣武王大㑹諸侯于孟津觀政于商渡河中流白魚躍入王舟武王俯取以祭既渡有火自上復于下至于王屋流為烏是時諸侯不期而至者八百國諸侯皆欲伐紂武王猶庶㡬紂恐懼遷善乃以諸侯退師還而紂不改昏亂益甚十三年武王復帥諸侯伐紂一月戊午師渡孟津戎車三百兩虎賁三百人癸亥陳于商郊甲子昧爽紂帥其旅若林㑹于牧野罔有敵于我師前徒倒戈攻其後以北紂師敗績紂自焚死武王立其子武庚禄父以奉殷後使復行殷之舊政釋箕子囚封比干墓式商容閭㪚鹿臺之財𤼵鉅橋之粟大賚于四海而萬姓恱服四月自商還至于豐歸馬于華山之陽放牛于桃林之野示天下弗服天下雖安兵不可弭武王始誅紂而遂歸馬放牛何也商之亡也天下諸侯盖有助為無道者矣紂既滅恐兵以次及之必有不安之心武王恐其自疑而沮兵以自救故為之歸馬放牛盖以權示天下弗服而已丁未祀于周廟庚戌柴望大告武成庻邦冢君暨百工受命于周武王追思先聖乃封神農之後於焦封黄帝之後于祝封帝堯之後於薊封帝舜之後於陳封夏禹之後於把於是大封功臣而師尚父為首封尚父於營邱曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封弟叔度於蔡餘各以次受封盖兄弟之國十有五人姬姓之國四十人列爵維五分土維三遷九鼎於洛邑以示卜洛之意改正朔服色以建子為正月色尚赤大事歛用日出戎事乗騵牲用騂中國既定遂通道于九夷八蠻西旅巢伯之属皆至既克商二年武王有疾羣公懼將穆卜周公乃為壇告太王王季文王禮宗子在它國庶子無爵而居者望墓為壇以祭周公所以為壇而告三王者盖亦禮不得入廟也欲以身代武王王疾有瘳及武王崩太子誦立是為成王成王幼方亮隂周公為冢宰聼政事管叔蔡叔疑周公不利成王二叔方監殷遂與武庚及淮夷畔周周公以王命伐之居東二年誅武庚及管叔而放蔡叔封㣲子啓於宋以代殷後成王既誅二叔有疑周公之意公乃為詩以貽王名之曰䲭鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯㧞邦人大恐王與大夫發金縢之書得周公代武王之册王執書以泣曰昔公勤勞王家而予弗知以致天怒今其以禮逆周公矣王出郊天乃雨反風禾盡起太公召公使邦人起大木而築之歲則大熟周公終相成王誕保文武受命凡七年以殷餘民封康叔於衛營洛邑以為東都成武王之意詔成王烝祭於洛而歸政焉王命公子伯禽為公後留魯而公留相周周公乃遷殷頑民居之洛邑明年淮夷復叛成王東伐淮夷遂踐奄遷其君於蒲姑還歸在豐作周官六卿分職各帥其屬以倡九牧於是六服羣辟無不承徳禮樂興而頌聲作文王之樂為象武王之樂為武象箾南籥文王之樂也而鄭康成以象為大武盖失之矣周公没成王命君陳分正東郊成周繼周公之事成王将崩命召公畢公率諸侯相太子釗王崩而釗立是為康王成康之際天下安寕刑措四十餘年不用君陳既没康王復以成周之衆命畢公保釐東郊康王崩子昭王瑕立王道衰昭王南廵守不及崩於江上周人諱之昭王取于房曰房后生子滿是爲穆王穆王即位年五十矣愍文武之道缺乃命君牙為大司徒伯冏為太僕正周以復寕其後將伐犬戎祭公謀父諫曰不可先王耀徳不觀兵兵戢而時動動則威觀則玩玩則無震先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎狄荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修徳序成而不至則修刑今自大畢伯士之終也犬戎氏以其職来王天子曰予必以不享征之無乃廢先王之訓而王㡬頓乎王弗聼征之得四白狼四白鹿以歸自是荒服不至王猶欲肆其心周行天下將皆必有車轍馬跡祭公復為祈招之詩以止之其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心祈招者周之司馬也王是以獲没其身盖享國百年耄荒而命吕侯訓夏贖刑作吕刑吕刑之法五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五刑之疑有赦五罰之疑有赦墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰墨罰之属千劓罰之屬千剕罰之属五百宫罰之属三百大辟之罰其属二百凢五刑之属三千穆王立五十五年而崩子共王繄扈立共王崩子懿王囏立王室始衰懿王崩共王弟辟方立是為孝王孝王崩諸侯復立懿王太子燮是為夷王王室益衰王亦有惡疾王子朝告諸侯曰夷王愆于厥身諸侯莫不並走其望以祈王身是也覲禮天子不下堂而見諸侯下堂而見諸侯自夷王始夷王崩子厲王胡立厲王說榮夷公大夫芮良夫諌曰王室其將卑乎夫榮夷公好利而不知大難夫利百物之所生也天地之所載也而有専之其害多矣天地百物皆將取焉何可専也所怒甚多而不備大難以是教王其能久乎夫王人者將𨗳利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之来也故頌曰思文后稷克配彼天立我烝民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至于今今王學専利其可乎匹夫専利猶謂之盗王而行之其歸鮮矣榮公若用周必敗王不聼卒以榮公為卿士國人謗王召公告曰民不堪命矣王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚於防川壅而潰傷人必多民亦如之是故為川者決之使𨗳為民者宣之使言故天子聼政使公卿至於列士獻詩瞽獻典史獻書師箴瞍賦矇誦百工諌庻人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口猶土之有山川也財用於是乎出猶其原隰之有衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗其所以阜財用衣食者也夫民慮之於心而宣之於口成而行之胡可壅也王不聼於是國莫敢出言三年乃流王於彘太子静匿召公之家國人圍之召公曰昔吾驟諌王王不從是以及此今殺太子王其以我為懟而怒乎夫事君者嶮而不懟怨而不怒况事王乎乃以其子代太子厲王居彘諸侯無所適從共伯和者時之賢諸侯也諸侯皆往宗焉因以名其年謂之共和凡十四年案汲冡紀年共伯和于王位故曰共和又左傳王子朝奔楚告于諸侯曰厲王戾虐萬民弗忍流王于彘諸侯釋位以間王政宣王有志而後效官推是言則厲宣之間諸侯有去其位而代王為政者矣荘子曰共伯得之於邱首則所謂共和者也厲王死於彘太子静立是為宣王宣王即位遭旱恐懼修徳勸分民忘其災任召虎申伯仲山甫尹吉甫皇父之徒内修政事安集流散習車馬考宫室畜牛馬外則懐来諸侯攘却戎狄周以復興既而少懈不藉千畝虢文公諌不聼十二年魯武公来朝以其子括與戯見王王立戲仲山甫曰不可不順必犯犯王命必誅故出令不可不順也若魯從之諸侯効之王命將有所壅若不從而誅之是自誅王命也王卒立之及魯侯卒魯人殺戲而立括三十三年乃伐魯而立孝公諸侯自是不睦三十九年伐𦍑戎氏戰于千畆王師敗績復䘮南國之師乃料民於太原仲山甫曰民不可料也古者不料民而知其少多司民協孤終司商協民姓司徒協旅司冦協姦牧協職工協革埸協入廪協出是則少多生死出入徃来皆可知也於是乎又審之以事王治農于藉蒐于農隙耨穫亦於藉獮于既烝狩於畢時是皆習民數者也又何料焉王不聼卒料之四十一年宣王崩子幽王宫湼立幽王二年西周三川皆震伯陽父曰周將亡矣天地之氣不失其序若失其序民亂之也陽伏而不能出隂廹而不能烝於是有地震今三川實震是陽失其所而鎮隂也陽失而在隂川源必塞源塞國必亡夫水土演而民用也土無所演民失財用不亡何待昔伊洛竭而夏亡河竭而商亡今周徳若二季其川源又塞塞必竭川竭山必崩山崩川竭亡之徵也若國亡不過十年數之紀也是嵗也三川竭岐山崩幽王娶于申生太子宜臼又得褒姒生子伯服愛褒姒將黜申后及宜臼而立之伯陽父曰周亡矣昔夏后氏之衰也有二龍止於夏廷卜殺之去之止之莫吉卜請其漦而藏之吉於是布幣而筞告之龍亡而漦在櫝而去之比三代莫敢發厲王之末𤼵而觀之漦流于庭化為𤣥黿以入王宫童妾既齓而遭之既笄而孕無夫而生子懼而弃之宣王之世童謡有之曰檿弧箕服實亡周國有夫婦鬻是器者王使執之逃而遇所弃妖子聞其夜啼哀而收之遂亡於褒褒人有罪請入弃女于王以贖幽王見而愛之故伯陽父曰禍成矣無可奈何幽王以尹氏為太師皇父為卿士番為司徒家伯為宰仲允為膳夫棸子為内史蹶為趣馬楀為師氏皆讒慝貪暴滛辟之人而褒姒之黨也褒姒不好笑幽王欲其笑萬方故不笑幽王為㷭燧大鼓有冦則舉㷭諸侯悉至至而無冦褒姒乃大笑幽王恱之為數舉㷭其後不信諸侯益不至申侯以申后故與繒西夷犬戎攻幽王幽王舉㷭火徵兵諸侯莫至遂殺幽王驪山下虜褒姒盡取周賂而去伯服自立謂之携王諸侯黜之迎太子宜臼於申而立之是為平王平王辟戎狄之暴東徙洛邑依晉文侯鄭武公以為固周自是失文武之舊諸侯強并弱齊晉秦楚始大政由方伯天子反與諸侯比周之變風始作謂之王黍離云平王五十一年崩太子洩父蚤死立其子林是為桓王鄭桓公武公皆為平王卿士王貳于虢鄭莊公怨王故周鄭交質王崩周人將畀虢公政鄭祭足帥師取温之麥及成周之禾三年鄭伯来朝王不為禮周桓公諌不聼鄭伯自是不朝四年王使凡伯聘于魯戎私怨凡伯伐之于楚邱以歸十三年王帥陳蔡之師伐鄭鄭人先敗陳蔡射王中肩二十三年桓王崩子莊王佗立王弟克有寵于桓王桓王属之周公黒肩辛伯諌曰並后匹嫡兩政偶國亂之本也弗聼莊王三年周公將弑王而立克辛伯告王王殺周公克奔燕衛人不義其君朔逐之而立黔牟八年諸侯伐衛以納朔九年王使子突救黔牟不克朔入于衛十五年王崩子僖王胡齊立僖王三年齊桓公始覇五年王崩自荘王僖王崩𦵏皆不赴於諸侯諸侯莫弔子恵王閬立初荘王嬖妾姚生子頽有寵蒍國為之師惠王即位取蔿國之圃以為囿邉伯之宫近於王宫王取之王奪子禽祝跪詹父田而收膳夫之秩二年五大夫作亂奉子頽以伐王不克出奔衛衛師燕師伐王立子頽三年王出居鄭櫟子頽享五大夫樂及徧舞鄭伯謂虢公曰哀樂失時殃咎必至奸王之位禍孰大焉今子頽歌不勌是樂禍也曷納王乎虢公許之四年同伐王城殺子頽逆王而復之鄭伯享王王賜之鞶鑑予之武公之略自虎牢以東王廵虢守賜虢公爵與之酒泉鄭伯由是怨王十年王使召伯廖命齊桓公為侯伯且使伐衛討立子頽初王取于陳曰恵后生子帶有寵将廢太子鄭而立帶二十二年齊桓公率諸侯㑹丗子鄭于首止以定其位王怒使周公召鄭伯教之叛齊從楚鄭伯逃歸不盟齊人伐之二十四年王崩鄭畏帶告于齊明年齊為之合諸侯于洮鄭立是為襄王四年叔帶召揚拒泉臯伊洛之戎同伐京師秦晉伐戎以救周五年叔帶奔齊齊侯使管仲平戎于周六年齊侯使仲孫湫言叔帶于王将歸之湫見王不敢言曰王怒未怠不十年不召也以戎難故諸侯戍周十五年冨辰言於王請召叔帶帶自齊歸于京師十七年鄭人伐滑王使伯服㳺孫伯如鄭請滑鄭伯怨王之不予厲公爵又怨王之與滑也遂執二子王怒將以狄伐鄭冨辰諌曰鄭有平恵之勲又有厲宣之親今不忍小忿而棄之不可王弗聼使頽叔桃子出狄師狄伐鄭取櫟王徳狄人將以狄女為后冨辰又諌曰臣聞報者倦矣施者未厭狄固貪惏王又啓之女徳無極婦怨無終狄必為患王又弗聼遂納之叔帶通焉王絀狄后頽叔桃子曰我實使狄狄其怨我遂奉叔帶以狄師伐王冨辰曰昔吾驟諌王王弗聼以及此我若不出王其以我為懟乎遂與周公忌父原伯毛伯死之王適鄭處于汜叔帶以狄后居于温王使告于晉晉文公新得國欲勤王以求諸侯十八年晉師納王而誅叔帶王賜之南陽之田二十一年晉文公敗楚師于城濮王往勞之踐土晉侯以楚俘献鄭伯傳王王命尹氏及王子虎内史叔興䇿命晉侯為侯伯王子虎及諸侯盟于王廷冬晉文公復㑹諸侯于温召王以諸侯見孔子曰以臣召君不可以訓故書曰天王狩于河陽衛成公殺其弟叔武其大夫元咺訟之於晉晉人執衛侯歸之京師請殺之王曰不可夫君臣無獄元咺雖直不可聼也君臣皆獄父子將獄是無上下也晉人乃歸衛侯三十四年襄王崩子頃王壬臣立頃王六年崩周公閲與王孫蘇争政王崩不赴于諸侯子匡王班立六年崩弟定王瑜立定王元年楚子伐陸渾之戎觀兵于周郊王使王孫滿勞之楚子問鼎之大小輕重對曰在徳不在鼎十四年宣榭火十七年晉使瑕嘉平戎于王劉康公徼戎将伐之叔服曰背盟而欺大國此必敗不聼遂伐茅戎敗績于徐吾氏孔子書曰王師敗績于茅戎不諱敗言自敗也定王二十一年崩子簡王夷立十四年簡王崩子靈王泄心立王生而有髭周人以為神故以為謚二十三年榖洛鬪将毁王宫王将壅之以飾宫太子晉諌曰古者不墮山不崇藪不防川不竇澤夫天地成而聚於髙歸物於下疏為川谷以𨗳其氣陂塘汙庫以鍾其羙是故聚不阤崩而物有所歸氣不沉滯而亦不散越民生有財用而死有所葬故能上下相固以待不虞昔共工棄此道也壅防百川堕髙堙庳以害天下皇天弗福庶民弗助共工用滅及有崇伯鯀播其滛心稱遂共工之過堯用殛之羽山其後伯禹念前之非髙髙下下䟽川𨗳滯鍾水豐物皇天嘉之祚以天下今吾執政無乃實有所辟而滑夫二川之神使至於争以妨王宫王而飾之無乃不可乎王弗聼二十七年靈王崩子景王貴立二年儋括欲立王弟佞夫佞夫弗知尹言多劉毅單蔑甘過鞏成殺佞夫儋括奔晉十八年太子夀卒二十一年王将鑄大錢單穆公曰不可古者天災降戻於是乎量資幣權輕重以拯救民民患輕則為作重幣以行之於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎王弗聼二十三年王将鑄無射而為之大林單穆公又諌曰夫鐘不過以動聲若無射有林耳弗及也夫鐘聲以為耳也耳所弗及非鐘聲也先王之制鐘也大不出鈞重不過石今鐘無益於樂而鮮民財将焉用之夫樂不過以聼耳而羙不過以觀目若聼樂而震觀羙而眩患莫甚焉王又不聼遂遇心疾太子夀之卒也王立子猛又嬖子朝與賓孟謀欲立之殺子猛之傅下門子單子劉子不順二十五年王将去單劉而立子朝不及而崩子猛立子朝作亂劉子單子以王猛居于皇晉籍談荀躒帥師助之入于王城子猛卒謚曰悼王周人立其弟匄是為敬王敬王元年王出居狄泉尹氏立子朝四年王告急于晉晉荀躒趙鞅帥師納王子朝奔楚五年晉人帥諸侯以戌周十年王殺尹氏固召伯盈原伯魯之子皆子朝之黨也萇𢎞與劉文公謀城成周王使告于晉晉魏舒合諸侯之大夫于狄泉以令城事十一年正月始城三旬而畢十五年吳入楚王人因楚亂殺子朝十六年翩儋以子朝之徒因鄭人以作亂晉閻没戍周王出居姑蕕十七年劉子單子敗尹氏王入于王城二十八年晉人逐范氏討范氏之黨殺萇𢎞三十九年齊田恒弑其君簡公凢諸侯之事它國皆不書此所以書者自田氏篡齊三家分晉遂為戰國變之大者也它放此四十九年敬王崩子元王仁立元王七年崩子貞王介立史記作定王丗本作貞王皇甫謐作貞定王司馬貞索隐以為周家不應有两定王况丗數非逺然皇甫謐彌縫二書之錯而謂之貞定王未為得也當以貞王為正今従之貞王十六年三晉滅知伯分有其地二十八年貞王崩長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王考王十五年崩子威烈王午立考王封其弟于河南是為桓公以續周公之官桓公卒子威公代立威公卒子恵公代立乃封其少子於鞏以奉王號東周恵公威烈王二十三年九鼎震命韓魏趙為諸侯二十四年崩子安王驕立二十六年崩子烈王喜立烈王二年周太史儋見秦獻公曰始周與秦國合而别别五百歲復合合十七歲而伯王者出焉秦之先君始為周西埀大夫所謂合也襄公七年始列為諸侯所謂别也自襄公七年至昭王五十一年㓕周凡五百一十六年所謂復合也自昭王五十一年至始皇九年誅嫪毒始親國政正十七年也十年烈王崩弟顯王扁立顯王五年賀秦獻公獻公稱伯九年致文武胙於秦孝公二十五年秦㑹諸侯於周二十六年致伯於秦孝公二十七年秦㑹諸侯逢澤帥以朝王三十三年賀秦恵王三十五年致文武胙於秦恵王四十四年秦惠王稱王時諸侯皆為王四十八年顯王崩子慎靚王定立慎靚王六年崩子赧王延立時東西周分治王赧徙都西周八年秦攻宜陽楚救之楚以周為秦将伐之蘇代為周説楚王曰言周之為秦甚於楚者欲令周入秦也周知其不可觧必入於秦此為秦取周之精者也為王計者周於秦因善之不於秦亦言善之以疏之於秦周絶於秦必入於郢矣秦借道两周之間将以伐韓周恐借之畏於韓不借畏於秦史厭謂周君曰何不令人謂韓公叔曰秦之敢絶周而伐韓者信周也公何不與周地𤼵質使於楚秦必疑楚不信周是韓不伐也又謂秦曰韓強與周地将以疑周於秦也周不敢不受秦必無辭而令周不受是受地於韓而聼於秦也秦召西周君西周君惡徃令人謂韓王曰秦召西周君将使攻王之南陽也王何不出兵南陽周君将以為詞於秦周君不入秦秦必不敢踰河而攻南陽矣東周與西周戰韓救西周或為東周說韓王曰西周故天子之國多名噐重寳王案兵毋出可以徳東周而西周之寳噐必可以盡矣韓徵甲與粟於東周東周君恐召蘇代而告之代曰君何患於是臣能使韓無徴甲與粟於周又能為君得髙都周君曰子苟能請以國聼子代見韓相國曰楚圍雍氏期三月也今五月不能㧞是楚病也今相國乃徵甲與粟於周是告楚病也韓相國曰善遣使止之代曰何不與周髙都韓相國大怒曰吾毋徴甲與粟於周亦已多矣何故與周高都代曰與周高都是周折而入於韓也秦聞之大怒不通周使是以弊高都得完周也曷為不與相國曰善果與周高都秦興師臨周以求九鼎周君患之以告顔率顔率曰大王勿憂請東借兵於齊顔率至齊謂齊王曰夫秦為無道也欲興兵臨周而求九鼎周之君臣内自畫計與秦不若歸之大國夫存危國羙名也得九鼎厚實也願大王圗之齊王大説𤼵兵五萬人使田臣思将以救周而秦兵罷齊求九鼎周君又患之顔率曰大王勿憂臣願東觧之顔率至齊謂王曰周頼大國之義得君臣父子相保也願獻九鼎不識大國何塗之從而致之齊齊王曰寡人将寄徑於梁顔率曰不可梁之君臣欲九鼎謀之暉臺之下少海之上其日久矣鼎入梁必不出齊王曰寡人将寄徑於楚對曰不可楚之君臣欲得九鼎謀之於葉庭之中其日久矣若入楚必不出王曰寡人将何塗之從而致之齊顔率曰弊邑固竊為大王患之昔周之伐殷得九鼎凡一鼎而九萬人輓也九九八十一萬人今大王縱有其人何塗之從而出臣竊為大王私憂之齊王曰子之數来者猶無與耳顔率曰不敢欺大國速定所從出弊邑遷鼎以待命齊王乃止二十二年秦攻魏将師武戰國䇿作犀武於伊闕進兵而攻周或為周謂李兊曰君不如禁秦之攻周趙之上計莫如令秦魏復戰今秦攻周而得之則衆必多傷矣秦欲待周之得必不攻魏秦若攻周而不得前有勝魏之勞後有攻周之敗又必不攻魏今君禁之而秦未與魏講也而趙令其止必不敢不聼是君却秦而定周也秦去周必復攻魏魏不能支必因君而講則君重矣若魏不講而疾支之是君存周而戰秦魏也重亦盡在趙三十四年蘇厲謂周君曰秦破韓魏仆師武北取趙藺離石者皆白起也是善用兵又有天命今又将兵出塞攻梁梁破則周危矣君何不令人説白起乎楚有養由基者去栁葉百歩而射之百發而百中之左右觀者數千人皆曰善射有一夫立其旁曰善可教射矣養由基釋弓搤劒曰客安能教我射乎客曰我非能教子支左詘右也夫去栁葉百歩而射之百𤼵而百中不以善息少焉氣衰力勌弓撥矢鉤一發不中百𤼵盡息今破韓魏仆師武北取趙藺離石者公之功多矣今又将兵出塞背韓攻梁一舉不得前功盡棄公不如稱病而無出四十五年周君之秦秦攻周周最謂秦王曰攻周實不足以利而聲畏天下天下以聲畏秦必東合於齊兵敝於周而合天下於齊則秦不王矣五十九年秦取韓陽城負黍西周恐背秦與諸侯約從将天下鋭師出伊闕攻秦令秦毋得通陽城秦昭王怒使将軍摎攻西周西周君奔秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸其君於周周君王赧卒周民遂東亡秦取九鼎寳器而遷西周君於􅓆狐後七歲秦荘襄王滅東西周周既不祀漢興武帝封太山東廵守至河南求周苗裔得其後嘉封之三十里號曰周子南君比列侯以奉其先祀蘇子曰傳曰夏之政尚忠商之政尚質周之政尚文而仲尼亦云周監於二代郁郁乎文哉吾從周余讀詩書歴觀唐虞至於夏商以為自生民以来天下未嘗一日而不趋於文也文之為言猶曰萬物各得其理云爾父子君臣之間兄弟夫婦之際此文之所由起也昔者生民之初父子無義君臣無禮兄弟不相愛夫婦不相保天下紛然而淆亂忿鬪而相苦文理不著而人倫不明生不相養而死不相葬天下之人舉皆戚然不寕於中然後反而求其所安属其父子而列其君臣聮其兄弟而正其夫婦至於虞夏之丗乃益去其鄙野之制然猶以天子之尊飯土塯啜土鉶土堦三尺茅茨而不剪至於周而後大備其粗始於父子之際其精布於萬物其用甚廣而無窮盖其當時莫不自謂文於前丗而後之人乃更以為質也是故祭祀之禮陳其籩豆列其鼎俎備其醪醴俯伏以薦思其飲食醉飽之樂而不可見也於是灌用鬱鬯藉用白茅既沃而莫之見以為神之縮之也體魄降於地䰟氣升於天怳忽誕漫而不知其所由處聲音氣臭之類恐不能得當也於是終祭於屋漏繹祭於祊以為人子之心無所不至也薦之以滋味重之以膾炙恐鬼神之不屑也薦之以血毛重之以體薦恐父祖之不吾安也於是先黍稷而飯稻梁先大羮而飽庶羞以為不敢忘禮亦不敢忘愛也丁寕反復以為可以盡人子之心而人子之心亦可以安矣故凢丗之所謂文者皆所以安夫人之所不安而人之所安者事之所當然也仲尼區區於衰周之末收先王之遺文而與曽子推論禮之所難處至於毫釐纎悉盖以為王道之盛其文理當極於此焉耳及周之亡天下大壊強凌弱衆暴寡而後丗乃以為用文之弊夫自唐虞以至於商漸而入於文至周而文極扵天下當唐虞夏啇之世盖将求周之文而其勢有所未至非有所謂質與忠也自周而下天下習於文非文則無以安天下之所不足此其勢然也今夫冠昏䘮祭而不為之禮墓祭而不廟室祭而無所仁人君子有所不安於其中而曰不文以從唐虞夏商之質夫唐虞夏商之質盖将求周之文而未至非所以為法也古史卷五
