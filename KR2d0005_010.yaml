body:
  text: 古史卷十宋蘇轍撰魯周公世家第三周公旦者周文王之子而武王之弟也武王同母兄弟十人母曰太姒文王之正妃也其長子曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰霍叔處次曰康叔封次曰冉季載兄弟唯旦長且賢逮文王世任以國事邑之于周凡周之內治始於室家而至於國人者屬之周公凡周之外治所以交接四鄰至於江漢之國者屬之召公故文王之風周人之詩謂之周南諸侯之詩謂之召南言二公之治自北而南也及文王崩周公相武王伐殷武王曰豫小子既獲仁人敢祇承上帝以遏亂略謂周召也武王克殷封周公於魯曲阜周公留相武王不就封既克殷二年武王有疾天下未集羣公懼周公乃為三壇同墠請命太王王季文王為壇於南方北面周公立焉植璧秉圭以冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身余仁若考能多才多藝能事鬼神乃元孫不若旦多才多藝不能事鬼神乃命于帝廷敷佑四方用能定爾子孫于下地四方之民罔不祇畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭乃卜三龜一襲吉公曰體王其無害歸納其冊于金縢之匱明日而王疾瘳武王崩成王少方諒隂周公位冡宰正百工管叔蔡叔監殷疑周公不利成王遂以武庚祿父及淮夷叛周公告太公召公曰我若自嫌不以法正之則周必亂無以告我先王遂出兵征之二年而罪人皆服然成王亦以此疑周公公為鴟梟之詩以貽王王不悟秋大熟未穫大風雷電禾偃木拔國人震恐二公道王以發金縢王得書問諸史百執事皆曰信公命我勿言王感泣命逆周公于東周公卒相成王方就學周公使其子伯禽與成王處抗世子法於伯禽以示成王誕保文武受命凡七年既成洛邑詔成王蒸祭文武於新邑而歸政焉古者君在諒隂三年不言百官總已聽於冢宰此三代之常禮也武王崩成王幼周公位冡宰當國聽政蓋禮然也其所以異者既終三年成王尚幼未能涖政故至於七年耳今考於書其說止於此初無攝位之文太史公因秦漢之謬以為周公居攝七年此亦何所據哉夫成王即位稱王矣而周公攝則是二天子也隱公知桓公當立而攝以待之遂至羽父之禍若使隱公如周公當國而不攝雖有讒口禍不至此矣王謂公曰我其退即君于周命公後四方未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔周公許焉答曰孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先豫旦以多子越御事篤前人成烈答其師作周孚先祭之日王命史佚冊告公子伯禽為公後於魯而公留相周分魯公以大路大旗夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏錫之山川土田附庸廟祀文王郊享上帝所以褒顯周公異於諸侯也成王歸涖政周公作無逸言殷三宗及周文武皆以勤勞抑畏享國長久及商後王耽樂怠敖逺者十年近者四三年所以戒飭成王者甚至是時周公為師召公為保相成王為左右然召公猶不說恐成王未能繼先王君天下周公乃作書告之名之曰君奭言湯之伊尹太甲之保衡太戊之伊陟臣扈巫咸祖乙之巫賢武丁之甘盤周文武之虢叔閎夭散宜生泰顛南宫括皆能左右其君保國配天豈亦當國聽政而後可哉故曰豫往暨汝奭其濟小子同未在位誕無我責召公乃說世言周公居攝召公不說太史公信之今書君奭之篇在洛誥後孔子叙之曰召公為保周公為師相成王為左右召公不說然則召公之不說非不說其聽政蓋不說其歸政也且以召公之賢歷事文武與周公從事老矣而猶疑周公有不順之意則周公將何賴焉周公治周作禮樂致太平退老於豐將沒欲葬成周示不忘所營邑公卒成王葬之于畢從文王示不敢臣周公也周公之子封者八人伯禽在魯其弟嗣周公食采於周世輔王室凡蔣邢茅胙祭或在畿內或在畿外伯禽之就封周公戒之曰我文王之子武王之弟而王之叔父也然我一沭三捉髮一飯三吐哺起以待士猶恐失天下之賢人汝之魯慎無以國驕人伯禽始至國徐夷並起為寇東郊不開將築城而徐夷擾之乃誓兵於費出兵攻之徐夷釋魯自救遂以其日築徐夷服費誓既曰甲戍我惟征徐戎又曰甲戍我惟築所以出兵與築城同日者蓋欲徐夷釋魯自救不能為板築之害耳治魯三年報政周公周公曰何遲也伯禽曰變其俗易其禮喪三年然後除之故遲太公之封齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民必歸之魯公卒子考公酋立考公四年卒弟煬公熙立煬公築茅闕門六年卒子幽公宰立幽公十四年幽公弟沸弒幽公而自立是為魏公魏公五十年卒子厲公擢立厲公三十七年卒弟獻公具立獻公三十二年卒子真公濞立真公三十三年卒弟武公敖立武公九年與長子括少子戲朝周宣王愛戲欲立之仲山甫諌不聽夏武公歸而卒戲立是為懿公懿公九年國人與兄括之子伯御弒懿公而立伯御伯御十一年宣王伐誅伯御而立懿公弟稱是為孝公仲山甫言於宣王曰魯侯肅恭明神敬事耇老賊事行刑必問於遺訓而資於故實不干所問不犯所咨於是王命孝公於夷宫以為侯伯二十七年孝公卒子惠公弗湟立惠公元妃孟子無子其娣聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人惠公娶之生桓公四十六年惠公卒桓公以適子當立魯人為其少奉隱公攝君事以待之隱公四年宋公為衛州吁乞師以伐鄭公不許公子翬固請以師㑹之五年春公觀魚于棠臧僖伯諌不聽八年春鄭伯以太山之防易許田釋太山而祀周公十年二月公㑹齊侯鄭伯于中丘謀伐宋公子翬先期往十一年公子翬請殺桓公以求太宰公曰為其少故也吾將授之矣使營莬裘吾將老焉翬懼反譛公于桓公使賊弒公于蒍氏立桓公桓公二年宋督殺其君與夷及其大夫孔父公㑹諸侯于稷以成宋亂取郜大鼎于宋納于太廟臧哀伯諌曰武王克商遷九鼎于洛邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聽北戎病齊鄭世子忽救齊大敗戎師諸侯之大夫戍齊齊人饋之餼使魯為之班後鄭鄭忽怒十年齊侯衛侯鄭伯來戰于郎十八年公㑹齊侯于濼遂與夫人如齊夫人齊襄公之妹也未嫁而襄公通之申繻諌曰女有家男有室無相瀆也易此必亂不聽齊侯復通焉公謫之以告四月丙子齊侯享公使公子彭生乘公公卒于車魯人告于齊請以彭生除惡齊人殺彭生子莊公同立元年三月夫人孫于齊夏單伯送王姬以齊讎故築王姬之館于外二年十二月夫人會齊侯于禚四年二月夫人享齊侯于祝丘冬公及齊人狩于禚五年正月夫人如齊師七年春夫人㑹齊侯于防冬又㑹于榖八年公及齊師圍郕郕降于齊師仲慶父請伐齊師公曰我實不德齊師何罪姑務修德以待時乎師還冬齊人弒襄公公子紏來奔九年春公及齊大夫盟于蔇夏公伐齊納子紏齊小白自莒先入八月公及齊師戰于乾時我師敗績齊人以兵脅我為之殺子紏于生竇將以管仲與齊施伯言於公曰管仲賢者齊將用之非殺之也齊用管仲必為魯患不如殺而與之公不聽齊人卒相管仲十年齊師伐我公將戰曹劌請見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛不敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰公與之乘戰于長勺大敗齊師十三年公㑹齊侯盟于柯始及齊平二十年夫人姜氏如莒二十一年夫人姜氏卒二十二年公如齊納幣二十三年公如齊觀社曹劌諌不聽將納夫人丹桓宫楹而刻其桷御孫諌不聽夏公如齊逆女秋公至自齊公之嬖孟任夫人要公八月丁丑乃入大夫宗婦覿用幣御孫曰男贄大者玉帛小者禽鳥女贄不過榛栗棗修今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎又不聽孟任之子曰般圉人犖有罪般鞭之公曰犖有力焉不如殺之未及殺也公母弟三人長曰慶父次曰叔牙次曰季友公疾問後於叔牙牙曰慶父材問於季友友曰臣以死奉般公曰牙欲立慶父奈何季友以君命命牙待於針巫氏使針季鴆之曰飲此則有後於魯不然死且無後牙死立叔孫氏三十二年八月公卒慶父使犖賊般季友奔陳慶父奔齊齊人立哀姜之娣叔姜之子開是為閔公閔公元年及齊侯盟于洛姑召季友於陳而復之冬齊侯使仲孫湫來省難二年慶父使卜齮賊公于武闈慶父通於哀姜哀姜欲立之亂作季友以莊公子申適邾慶父奔莒哀姜孫于邾季友以申入立之是為僖公以賂求慶父于莒而殺之立孟孫氏齊桓公召哀姜殺之于夷以其尸歸季友之生也桓公卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌及生有文在其手曰友遂以命之其後為季孫氏僖公元年賜季友汶陽之田及費十六年公㑹諸侯于淮十七年滅項齊人以為討而止公秋夫人姜氏㑹齊侯于卞乃免公齊桓公卒十八年宋襄公伐齊納孝公師救齊不克二十一年邾人滅須句須句子來奔為成風故公伐邾二十二年春公伐邾取須句納須句子秋及邾人戰于升陘公小邾不為備敗焉邾人獲公胄二十六年春齊人侵我西鄙夏齊人伐我北鄙公使展喜辭焉齊師還公以楚師伐齊取榖二十七年楚子及諸侯圍宋公㑹諸侯盟于宋二十八年晉文公伐曹衛楚人救之公使公子買戍衛楚師敗公畏晉殺買以說夏公㑹諸侯于踐土冬復㑹諸侯于溫晉人為衛元咺執衛侯歸之京師三十年使醫鴆之不死臧孫辰言於公曰衛君殆無罪矣刑五而已無有隱者隱乃諱也今晉人鴆衛君不死亦不討其使者諱而惡殺之也有諸侯之請必免之臣聞班相恤也故能有親君曷請衛君以示親於諸侯且以動晉公說納玉於王與晉侯皆十㲄乃免衛侯自是晉人聘於魯加諸侯一等三十一年晉人分曹地以畀諸侯豫我濟西田三十三年十二月僖公卒魯自慶父之禍政事不舉僖公選賢任能修兵革治牧圉新閟宫泮宫魯人善之季孫行父請於周使史克頌之魯頌是也子文公興立二年晉人以公不朝來討公如晉晉人使陽處父盟公八月丁卯大事于大廟躋僖公三年晉人懼其無禮請改盟公如晉及晉侯盟七年公子遂娶于莒公孫敖如莒涖盟且為遂逆見之美而自取之遂將攻之公止之使遂舍之敖反之八年公孫敖奔莒從巳氏十四年九月齊商人弒其君舍而自立舍魯甥也告于王將以王寵求其母于齊王使單伯如齊齊人執之并執子叔姬十五年春季孫行父以單伯叔姬故如晉齊人釋單伯秋齊人侵我西鄙行父復訴于晉晉侯㑹諸侯于扈將討齊取賂而還齊人歸子叔姬齊侯謂諸侯無能為也復伐我西鄙十六年春及齊平公疾四不視朔使季孫行父盟齊齊侯不信使公子遂納賂乃盟于郪丘十七年夏齊侯伐我北鄙八月癸未公及齊侯盟于榖十八年二月文公卒公娶于齊曰哀姜生惡及視二妃敬嬴生倭敬嬴嬖而私事公子遂且屬其子故遂欲立之叔仲彭生不可遂請於齊齊侯許之十月遂殺惡及視而立倭是為宣公彭生死之哀姜歸于齊魯由此公室卑三桓强莒太子僕弒其君以其寶玉來奔公命與之邑季孫行父使出之竟宣公以篡立求定于齊元年㑹齊侯于平州賂之以濟西田四年秋公朝于齊五年春公朝于齊齊為髙固止公以求叔姬許之七年冬公㑹諸侯于黑壤晉人以公不朝止公以賂免九年春公朝于齊十年春公朝于齊齊以我服故歸濟西田四月齊侯元卒公如齊奔喪十五年初稅畝公子遂之子曰公孫歸父有寵於公將去三桓以張公室十八年與公謀而聘于晉將以晉人去之冬公卒子成公黑肱立季孫行父言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏歸父還及笙壇帷復命於介袒括髮即位哭三踊而出遂奔齊宣公季年不復事齊將以楚師伐之莊王卒楚師不出成公元年為齊難故作丘甲二年春齊侯伐我北鄙臧孫許如晉乞師晉使郤克帥師伐齊六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊㑹晉師及齊侯戰于鞍齊師敗績齊人歸我汶陽田楚人以我用晉師故冬楚公子嬰齊帥師伐我使仲孫蔑以賂求平於楚十一月公及諸侯之大夫盟于蜀晉人惡之而不能禁四年夏公朝于晉晉侯不敬歸將叛晉季孫行父曰晉雖無道國大臣睦而邇於我諸侯聽焉未可以二乃止八年春晉侯使韓穿來言汶陽之田歸之于齊自是諸侯二於晉十年五月晉侯獳卒公如晉弔晉人以公二於楚止公使送葬諸侯莫在魯人耻之十一年公請受盟晉人歸公叔孫僑如通於穆姜欲去季孟而取其室十六年公將㑹晉師伐鄭穆姜送公使逐二子公辭以晉難待於壞隤申官警備設守而後行故不及其戰晉既敗楚于鄢陵秋復㑹諸侯于沙隨僑如賂郤犫使告曰魯侯待于壞隤以待勝者晉侯不見公公歸復㑹諸侯伐鄭將行姜又命公如初公又申守而行僑如復告郤犫曰季孟將叛晉君止行父而殺之我斃蔑也而事晉蔑有二矣九月晉人執行父于苕丘公還待于鄆使子叔嬰齊請于晉晉士燮知僑如之情乃許魯平而赦行父十月出僑如而盟之僑如奔齊十八年晉悼公立公往朝焉八月成公卒子襄公午立生三年矣襄公二年仲孫蔑㑹諸侯之大夫于戚謀鄭蔑言於智罃請城虎牢以逼鄭晉人從之鄭人乃成三年公朝於晉及晉侯盟于長樗五年十一月季孫行父卒家無衣帛之妾無食粟之馬無藏金玉無重器備君子稱其忠九年冬公㑹諸侯伐鄭晉侯與公燕于河上問公之年曰可冠矣還及衛冠于成公之廟假鐘鼓焉十一年正月作三軍三分公室三桓各有其一季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氐使盡為臣十五年夏齊侯伐我圍成城成郛邾人伐我南鄙十六年齊再伐我叔孫豹以齊難告于晉十七年秋齊侯伐我圍桃髙厚伐我圍防冬邾人伐我南鄙十八年秋齊師伐我北鄙冬公㑹諸侯圍齊十九年春盟于祝柯晉人以我故執邾子取邾田自漷水冬齊及晉平魯人懼城武城二十年秋仲孫速帥師伐邾二十一年公如晉拜師及邾田季孫宿無適子公彌長而愛紇欲立之訪於申豐豐不可訪於臧紇紇立之仲孫速之子秩與羯也羯使人謂公彌茍得立請讎臧氏仲孫速卒公彌立羯孟氏告季孫曰臧氏將為亂不使我葬臧孫聞之以甲自從季孫信之命攻臧氏臧紇奔邾乃立臧為二十七年晉趙武楚屈建㑹諸侯之大夫盟于宋二十八年為宋之盟故公朝于楚及漢楚康王卒遂行二十九年送葬而還及方城季氏取卞使公冶以書告曰聞守卞者將叛臣帥徒以討之既得之矣公曰欲之而言叛祇見踈也謂公冶吾可以入乎對曰君實有國誰敢違君公欲無入榮駕鵝賦式微乃歸晉侯使司馬侯來治杞田三十一年公作楚宫叔孫豹曰君欲楚也夫若不復適楚必死是宫六月公卒于楚宫立敬歸之子野九月子野卒立敬歸之娣齊歸之子禱叔孫豹不欲曰太子死有母弟則立之無則立長年均擇賢義均以卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂季孫宿不聽卒立之比及葬三易衰衰衽如故衰於是昭公十九年矣猶有童心君子知其不能終也昭公元年叔孫豹㑹諸侯之大夫于虢季孫宿伐莒取鄆楚公子圍欲戮魯使晉樂王鮒求貨於豹豹不與謂其人曰諸侯之㑹衛社稷也若我以貨免魯必受師雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨晉趙武聞之固請諸楚而免之四年十一月叔孫豹卒初豹夢天壓已顧而見人號之曰牛助余乃勝之它日見其人未問其名以牛呼之曰唯遂使為宰有寵長使為政豹有疾牛讒其子孟殺之復讒其子仲逐之告人曰夫子疾病不欲見人遂去其飲食豹以飢死牛立其子婼而相之五年正月舍中軍四分公室季氏擇二三子各一皆盡征之而貢于公叔孫婼即位朝其家衆曰竪牛禍叔孫氏殺適立庶必速殺之牛懼奔齊孟仲之子殺之公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮夫禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈不能用也干大國之盟陵虐小國公室四分民食於它為國君難將及身是之不恤而習儀以亟言善於禮不亦逺乎七年楚靈王成章華之臺將與諸侯落之使薳啓疆來召公三月公如楚晉人復治杞田以成與之十年七月季孫意如伐莒取郠獻俘始用人於亳社十一年五月夫人齊歸卒大搜于比蒲九月葬齊歸公不戚晉叔向聞之曰君有大喪而不廢搜不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國夏公如晉以郠故晉人辭公至河而復季氏之臣南蒯意如不禮焉蒯謂公子憗吾出季氏而立子歸其室於公我以費為公臣憗許之南蒯語叔仲小小欲搆季孫叔孫婼與意如皆三命小謂意如曰三命逾父兄非禮也意如使謂婼婼怒意如懼歸罪於小故叔仲小南蒯公子憗三人謀季氏憗以告公從公於晉南蒯懼不克以費叛如齊公子憗還及郊亦奔齊十三年秋公㑹諸侯于平丘以郠故公不與盟晉人執季孫意如以歸冬公如晉晉人辭公至河而復子服椒謂晉荀吳曰魯事晉何以不如夷之小國若為夷棄之使事齊楚其何瘳於晉荀吳告韓起曰楚滅陳蔡不能救而為夷執親安用之乃歸季孫十五年冬公如晉晉人猶以郠故止公十六年夏公至自晉十七年六月甲戍朔日有食之祝史請所用幣叔孫婼曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也季孫意如禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否太史曰在此月也日過分而未至三辰有災於是百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集於房瞽奏鼓嗇夫馳庶人走此月之謂也當夏四月是謂孟夏意如弗從婼曰夫子將有異志不君君矣二十三年春邾人城翼還自離姑武城人塞其前斷其後之木而弗殊邾師過之推而蹶之遂取邾師邾人訴于晉晉人來討叔孫婼如晉晉人執之二十四年春婼至自晉二十五年春有鸜鵒來巢師已曰異哉文成之世童謡曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與𥜗鸜鵒之巢逺哉遙遙禱父喪勞宋父以驕鸜鵒鸜鵒往歌來哭今鸜鵒來巢其將及乎季公若郈昭伯臧昭伯與季氏皆有怨公若獻弓於世子為與之出射謀去季氏為告公弟公果公賁公果告公公告臧孫臧孫以難告郈孫郈孫以可勸告子家羈羈曰讒人以君僥幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也弗聽叔孫婼如闞九月戊戍遂伐季氏意如登臺請待於沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家羈曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也君必悔之弗聽郈孫曰必殺之叔孫氏之司馬騣戾帥徒以救季氏孟氏從之遂伐公徒子家羈曰諸臣僞劫君者而負罪以出君止意如之事君不敢不改公曰余不忍也遂行孫于齊齊景公欲以千社待公公喜子家羈曰失魯而以千社為臣誰與之立齊君無信不如早之晉叔孫婼自闞歸責意如意如稽顙將納公婼如齊與公言將安衆而納公歸而意如有異志婼齊於寢使祝宗祈死遂自殺二十六年春齊人取鄆公至自齊居于鄆夏公以齊師圍成二十七年秋諸侯之大夫㑹于扈令戍周且謀納公也宋衛皆利納公晉士鞅取貨於季孫不克納孟懿子陽虎伐鄆將逆公及鄆人戰敗之冬公如齊齊侯饗公使宰獻而請安子家羈以君出二十八年春公如晉子家羈請待命于竟弗聽晉人使公復於竟而後逆之居于乾侯二十九年春公至自乾侯居于鄆齊侯使髙張來唁公稱主君羈曰齊卑君矣君祗辱焉復如乾侯意如每嵗歸公馬及從者之衣屨公執歸者賣之乃不復歸公使公衍獻龍輔於齊侯齊侯喜與之陽榖公衍公為之生也其母偕出請相與偕告公為實後而母先告遂為太子公私於陽榖而思於魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為太子三十一年晉侯將以師納公范鞅曰若召季孫而不來則信不臣矣然後伐之若何晉人召意如鞅使私焉曰子必來我受其無咎意如㑹晉荀躒于適歷意如請從君而歸子家羈曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰必逐之荀躒以晉侯之命唁公且請公歸公曰己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難退謂意如君怒未怠子姑歸祭子家羈曰君以一乘入于魯師意如必與君歸公欲從之衆從者脅公不得歸三十二年十二月公卒于乾侯魯人立公弟宋是為定公元年夏叔孫不敢逆公之喪于乾侯意如使不敢召子家羈將用之羈不見喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位意如使役如闞公氏將溝焉又欲為公惡諡問於榮駕鵝駕鵝不可乃止秋七月葬昭公於墓道南孔子之為司冦也溝而合諸墓二年五月雉門及兩觀災五年六月季孫意如卒陽虎將以璠璵斂仲梁懷弗與曰改步改玉陽虎欲逐之公山不狃曰彼為君也子何怨九月陽虎囚季孫斯及公父歜而逐仲梁懷十月殺公何藐己丑盟季孫于稷門之內庚寅大詛公父歜秦遄皆奔齊六年春公為晉侵鄭陽虎將害季孟使不假道於衛衛人知虎之為也不問夏季孫斯如晉獻鄭俘陽虎彊使仲孫何忌往報夫人之幣晉人兼享之七年春齊人歸鄆陽關陽虎居之以為政秋齊國夏伐我西鄙陽虎使季孟宵軍齊師齊師墮伏而待之公斂處父苫夷欲殺虎虎懼乃還不敗陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏八年冬十月順祀先公而祈焉將享季氏于蒲圃而殺之戒都車曰癸巳至公斂處父知之告孟孫曰亂必及子先備諸乃與孟孫以壬辰為期陽虎以季孫斯如蒲圃斯奔孟氏陽虎劫公與叔孫不敢伐孟氏公斂處父以成人伐敗之陽虎如公宫取寶玉大弓以出入于歡陽關以叛九年四月得寶玉大弓六月伐陽關陽虎奔齊已而奔晉趙氏十年春及齊平夏公㑹齊侯于夾谷孔丘相齊人使萊人以兵劫公孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也齊侯聞之遽辟之終事齊卒不能加魯齊人愧焉乃歸鄆歡龜隂之田十一年冬及鄭平自是始叛晉十二年仲由為季氏宰請墮三都春叔孫氏墮郈將墮費公山不狃叔孫輒帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之入及公側孔丘命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父不可十二月公圍成弗克齊人畏魯之用孔丘也以女樂來饋季孫斯受之三日不朝孔子去魯十四年夏公㑹齊侯衛侯于牽救晉叛臣范中行氏十五年五月定公卒子哀公蔣立三桓每嵗更伐邾取漷東田及沂西田三年五月桓宫僖宫災四年六月亳社災七年夏公㑹吳于鄫吳徴百牢曰宋百牢我魯不可以後宋子服何對曰先王未之有也周禮上物不過十二以為天之大數也吳人弗聽何曰吳將亡矣棄天而背本不與必棄疾於我乃與之太宰嚭召季孫季孫使端木賜辭焉乃免反自鄫以吳為無能為也季孫斯欲伐邾饗大夫而謀之子服何曰小所以事大信也大所以保小仁也背大國不信伐小國不仁失二德者危將焉保孟孫曰二三子以為如何惡賢而逆之對曰知必危何故不言魯德如邾而以衆加之可乎不樂而出秋公伐邾入之師晝夜掠以邾子益來邾大夫茅夷鴻以束帛乘韋請救於吳八年春吳伐我克武城東陽次于泗上微虎欲宵攻吳屬徒三百人有若與焉或謂季孫不足以害吳而多殺國士乃止吳王聞之一夕三遷吳人行成將盟子服何曰楚人圍宋易子而食析骸而㸑猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久請少待之弗從吳人盟而還齊悼公之在魯也季氏以其妹妻之即位而逆之季魴侯通焉弗敢與也齊侯怒五月齊鮑牧伐我取歡及闡齊侯使如吳請師將以伐我我乃歸邾子秋及齊平齊逆季姬以歸嬖十二月齊人歸歡及闡九年春齊侯使辭師于吳吳子怒冬吳人來警師將伐齊十年公㑹吳子邾子郯子伐齊齊人弒悼公以說十一年春齊國書帥師伐我季氏之宰冉求勸季孫戰二子皆不欲彊而後可孟孺子泄帥右師冉求帥左師及齊師戰于郊右師奔左師獲甲首八十齊人不能師而遁夏公㑹吳伐齊吳獲齊國書季氏用冉有有功思孔子以幣召之孔子自衛歸魯季孫斯欲用田賦使冉有訪諸孔子孔子言其不可弗聽十二年春用田賦十二月螽季孫斯問之孔子孔子曰火伏而後蟄者畢今火猶西流司歷過也十四年春狩於大野獲麟以為不祥以賜虞人孔子觀之曰麟也然後取之六月齊田恆弒其君壬孔丘告於公請討之不聽孟孺子泄與成宰公孫宿有怨八月孟孫卒成人奔喪弗納十五年成叛于齊冬及齊平子服何如齊子貢為介田恆曰寡君願事君如事衛君子貢對曰寡君之願也昔晉人伐衛齊為衛故伐晉冠氏喪車五百因與衛地自濟以西禚媚杏以南書社五百吳人加敝邑以亂齊因其病取歡與闡寡君是以寒心若得視衛君之事君則固所願也田恆病之乃歸成十六年四月孔子卒十七年公㑹齊侯盟于蒙仲孫彘相齊侯稽首公拜齊人怒彘曰非天子寡君無所稽首二十一年齊人責稽首秋公及齊侯盟于顧公子荆之母嬖二十四年公將以為夫人使宗人釁夏獻其禮對曰無之公曰立夫人大禮也何故無之對曰周公及武公娶于薛孝惠娶于商自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡公閏月公如越得太子適郢將妻公而多與之地季孫懼因太宰嚭納賂乃止二十五年六月公至自越季孟逆於五梧郭重僕公以季孟燕彘為祝惡郭重曰何肥也斯曰請飲彘也以魯國之密邇仇讎臣是以不獲從君免於大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡二十七年越子使后庸來聘且言邾田封于駘上二月盟于平陽三子皆從季孫病之言及子貢曰若在此吾不及此四月季孫斯卒公弔焉降禮公患三桓之侈也欲以諸侯去之三桓亦患公之多妄也故君臣多間公遊于陵阪遇孟孫曰請問余及死乎對曰臣無由知之三問不答公欲以越去三桓八月公如公孫有陘氏因孫于邾乃遂如越國人施公孫有山氏公卒於越案子貢言哀公不沒於魯而史記稱哀公自越歸卒於有山氏歸於有山氏而不歸國事未可信也子悼公寧立三桓益彊魯如小侯三十七年悼公卒子元公嘉立二十一年卒子穆公顯立穆公以公儀子為相子栁子思為臣然不能用三十三年穆公卒子共公奮立二十二年卒子康公屯立九年卒子景公匽立二十九年卒子平公叔立是時六國皆稱王二十二年平公卒子文公賈立二十三年卒子傾公讎立十九年楚伐我取徐州二十四年楚考烈王伐滅魯傾公亡遷於卞為家人卒于把魯不祀蘇子曰魯自宣公殺其世子而自立公室遂卑三桓分有其民而竊咻之民知有大夫而不知有君襄公二十九年季武子取卞公還自楚不敢入歸而不敢問蓋魯君之失國也久矣至昭公不忍其詬未能收民而舉兵攻之遂以失國哀公孤弱甚於昭公又欲以越人攻之終亦出死於越嗟夫棄民五世而欲一朝收之冝其難哉昔齊晏子嘗告景公以田氏之禍公問所以救之者晏子曰唯禮可以已之在禮家施不及國而大夫不收公利景公稱善而不能用齊卒以亡語稱哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔子聞之曰成事不說遂事不諌既往不咎豫嘗考之以為哀公將去三桓而不敢正言古者戮人於社其託於社者有意於誅也宰我知其意而亦以隱答焉其曰使民戰栗以誅告也孔子知其不可曰此先君之所為植根固矣不可以誅戮齊也蓋亦有意於禮乎不然何咎豫之深也孔子曰禮樂征伐自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣自隱至昭而逐於季氏凡十世自宣至定而制於陽虎凡五世虎不逾世而敗自是三桓微散沒不復見而魯公室雖微不絶遂與戰國相終始蓋以臣僣君不義而得民要以其力自斃君雖失衆而其實無罪久則民將哀之其勢固當然哉古史卷十
