  text: 欽定四庫全書史部四
  hash: sha256:607f6fc3903a942f795e30a3f03095836467f0a196c1fe41ce827ec4c38e184a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0005_WYG_000-1a, image: WYG0371/WYG0371-0205a.png}
body:
  text: 古史别史類提要臣等謹按古史六十五卷宋蘇轍撰轍有詩傳已著録轍以司馬遷史記多不得聖人之意乃因遷之舊上自伏羲神農下訖秦始皇為本紀七世家十六列傳三十七自謂追録聖賢之遺意以明示來世至於得失成敗之際亦備論其故以今考之如於三皇紀增入道家者流謂黃帝以無為為宗其書與老子相出入於老子傳附以佛家之説謂釋氏視老子體道愈逺而立於世之表於孟子傳謂孟子學於子思得其説而漸失之反稱譽田駢慎到之徒又謂其為佛家所謂鈍根聲聞者班固論遷之失首在先黃老而後六經轍所更定烏在其能正遷耶朱子語録曰伯恭子約宗太史公之學某嘗與之痛辨子由古史言馬遷淺陋而不學疏略而輕信此二句最中馬遷之失伯恭極惡之古史序云古之帝王其必為善如火之必熱水之必寒其不為不善如騶虞之不殺竊脂之不榖此語最好某嘗問伯恭此豈馬遷之所及然子由此語雖好却又有病處如云帝王之道以無為為宗之類他只説得箇頭勢大然下面功夫又皆空疏云云蓋與吕祖謙議論相激故平日作雜學辨以攻轍此時反為之左袒然其混合儒墨之失亦終不能為之掩也平心而論史至於司馬遷猶詩至於李杜書至於鍾王畫至於顧陸非可以一支一節比擬其長短者也轍乃欲點定其書殆不免於輕妄至於糾正補掇如史記載堯典妻舜之後瞽瞍尚欲殺舜轍則本尚書謂妻舜在瞽瞍允若之後史記載伊尹以負鼎説湯造父御周穆王見西王母事轍則刪之史記不載禱雨桑林事轍則增之宋世家史記贊宋襄公泓之戰為禮讓轍則貶之辨管子之書為戰國諸子所附益於晏子傳增入晏子處崔杼之變知陳氏之篡與諷諫數事於宰我則辨其無從叛之事於子貢則辨其無亂齊之事又據左氏傳為栁下惠曹子臧吳季札范文子叔向子産等傳以補史記所未及魯連傳附以虞卿刺客傳不載曹沫其去取之間亦頗為不茍存與遷書相參考固亦無不可矣書中間有附注以葉大慶考古質疑考之蓋其子遜之所作舊本不載其名今附著焉乾隆四十一年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書古史原敘蘇子曰古之帝王皆聖人也其道以無為為宗萬物莫能嬰之其於為善如水之必寒如火之必熱其於不為不善如騶虞之不殺如竊脂之不榖不學而成不勉而得其積之中者有餘故其推之以治天下者有不可得而知也孔氏之遺書曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉天地萬物猶將賴之以存而况於人乎自三代之衰聖人不作世不知本而馳騁於喜怒哀樂之餘故其發於事業日以鄙陋不足以睎聖人之萬一雖春秋之際王澤未竭士生其間習於禮義而審於利病如管仲晏子子産叔向之流皆不足以知之至於孔子其知之者至矣而未嘗言孟子知其一二時以告人而天下亦莫能信也陵遲及於秦漢士益以功利為急言聖人者皆以其所知億之儒者留於度數而智者溺於權利皆不知其非也太史公始易編年之法為本紀丗家列傳記五帝三王以來後丗莫能易之然其為人淺近而不學疏略而輕信漢景武之間尚書古文詩毛氏春秋左氏皆不列於學官丗能讀之者少故其記堯舜三代之事皆不得聖人之意戰國之際諸子辨士各自著書或增損古事以自信一時之説遷一切信之甚者或采丗俗相傳之語以易古文舊説及秦焚書戰國之史不傳於民間秦惡其議已也焚之略盡幸而野史一二存者遷亦未暇詳也故其記戰國有數年不書一事者余竊悲之故因遷之舊上觀詩書下考春秋及秦漢雜録記伏犧神農訖秦始皇帝為七本紀十六丗家三十七列傳謂之古史追録聖賢之遺意以明示來丗至於得失成敗之際亦僃論其故嗚呼由數千嵗之後言數千嵗之前其詳不可得矣幸其猶有存也而或又失之此古史之所為作也欽定四庫全書史部四古史目録别史類本紀七三皇第一五帝第二夏第三商第四周第五秦第六秦始皇第七世家十六吳太伯第一齊太公第二魯周公第三燕召公第四蔡叔曹叔第五陳把第六衛康叔第七宋微子第八晉唐叔第九楚第十鄭第十一越王勾踐第十二趙第十三魏第十四韓第十五田敬仲第十六列傳三十七伯夷第一管晏第二柳下惠第三曹子臧吳季札第四晉范文子第五晉叔向第六鄭子産第七孔子第八孔子弟子第九老子第十孟子孫卿第十一伍員第十二孫吳第十三范蠡大夫種第十四葉公第十五商君第十六蘇秦第十七張儀第十八樗里子甘茂第十九穰侯第二十白起王翦第二十一孟嘗君第二十二平原君第二十三魏公子第二十四春申君第二十五范睢蔡澤第二十六樂毅第二十七亷頗藺相如第二十八田單第二十九屈原第三十虞卿魯仲連第三十一吕不韋第三十二李斯第三十三蒙恬第三十四扁鵲第三十五刺客第三十六滑稽第三十七
