body:
  text: 古史卷五十九宋蘇轍撰刺客列傳第三十六專諸者吳堂邑人也伍子胥之亡楚而如吳也知專諸之能子胥既見王僚説以伐楚之利公子光曰彼伍員父兄皆死於楚而言伐楚欲自為報讎也非能為吳吳王乃止子胥知光之欲殺王僚乃曰彼光將有內志未可説以外事乃進專諸於光光既得專諸善客待之十二年而楚王死王僚因楚喪使其二弟公子蓋餘屬庸將兵圍楚之潛使季子於晉以觀諸侯之變楚發兵絶吳兵不得還於是光謂專諸曰此時不可失不求何獲且光真王嗣當立季子雖來不吾廢也專諸曰王僚可殺也母老子弱而兩弟將兵伐楚楚絶其後方今吳外困於楚而內空無骨鯁之臣是無如我何光頓首曰光之身子之身也四月丙子光伏甲士於窟室中而具酒請王僚王僚使兵陳自宫至光之家門户階陛左右皆王僚之親戚也夾立侍皆持長鈹酒既酣光詳為足疾入窟室中使專諸置匕首魚炙之腹中而進之既至王前專諸擘魚以匕首刺王僚立死左右亦殺專諸王人擾亂光出其伏甲以攻王僚之徒盡滅之遂自立為王是為闔閭闔閭乃封專諸子以為上卿豫讓者晉大夫畢陽之孫也故嘗事范中行氏而無所知名去而事智伯甚尊寵之及智伯伐趙襄子與韓魏合謀滅智伯而三分其地趙襄子最怨智伯漆其頭以為飲器讓遁逃山中曰嗟乎士為知己者死女為説己者容今智伯知我我必為報讎而死乃變名姓為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠中刑人則豫讓內持兵曰欲為智伯報仇左右欲誅之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之居頃之讓又漆身為厲吞炭為啞使形狀不可知行乞於市其妻不識也行見其友其友識之曰汝非豫讓邪曰我是也其友為泣曰以子之才委質而臣趙氏彼必近幸子乃為所欲顧不易邪何乃殘身苦形欲以求報不亦難乎讓曰既以委質臣事人而求殺之是懷二心以事其君也且吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心以事其君者也頃之襄子當出讓伏於所當過之橋下襄子至橋馬驚襄子曰此必豫讓也使人問之果豫讓於是襄子乃數讓曰子不嘗事范中行氏乎智伯盡滅之而子不為報讎而反委質臣於智伯智伯亦已死矣而子獨何以為之報讎之深也讓曰臣事范中行氏范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之襄子喟然歎息而泣曰嗟乎豫子子之為智伯名既成矣而吾赦子亦已足矣子其自為計吾不復釋子使兵圍之讓曰臣聞明主不欲掩人之美而忠臣有死名之義前君已寬赦臣天下莫不稱君之賢今日之事臣固伏誅然願請君之衣而擊之以致報讎之意則雖死不恨非所敢望也於是襄子大義之乃使使持衣與讓讓拔劍三躍而擊之曰吾可以下報智伯矣遂伏劍自殺死之日趙國志士聞之皆為涕泣聶政者軹深井里人也殺人避仇與母姊如齊以屠為事久之濮陽嚴仲子事韓哀侯與韓相俠纍有郤仲子恐誅亡去遊求人可以報俠纍者至齊齊人或言聶政勇敢士也避仇隱於屠者之間仲子至門請數反然後具酒聶政母前酒酣奉黃金百鎰前為政母夀政驚怪其厚固謝仲子仲子固進而政謝曰臣幸有老母家貧客遊以為狗屠可以旦夕得甘毳以養親親供養備不敢當仲子之賜仲子辟人因為政言曰臣有仇而遊諸侯衆矣然至齊竊聞足下義甚髙故進百金者將用為夫人粗糲之費得以交足下之歡豈敢以有求望邪政曰臣所以降志辱身居市井屠者徒幸以養老母老母在政身未敢以許人也仲子固讓政竟不肯受也然仲子卒備賔主之禮而去久之政母死既已葬除服政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不遠千里枉車騎而交臣臣之所以待之至淺鮮矣未有大功可以稱者而仲子奉百金為親夀我雖不受然是者徒深知政也夫賢者以感忿睚眥之意而親信窮僻之人而政獨安得默然而已乎且前日要政政徒以老母老母今以天年終政將為知己者用乃遂西至濮陽見仲子曰所以不許仲子者徒以親在今不幸而以天年終仲子所欲報仇者為誰請得從事焉仲子具告曰臣之仇韓相俠纍俠纍又韓君之季父也宗族盛多居處兵衛甚設臣欲使人刺之衆終莫能就今足下幸而不棄請益其車騎壯士可為足下輔翼者政曰韓之與衛相去中間不甚逺今殺人之相相又國君之親此其勢不可以多人多人不能無生得失則語泄語泄是韓舉國而與仲子為讎豈不殆哉遂謝車騎人徒獨行杖劒至韓韓相俠纍方坐府上持兵戟而衛侍者甚衆政直入上階刺殺俠纍左右大亂政大呼所擊殺者數十人因自皮面抉眼自屠出腸遂以死韓取政尸暴於市購問莫知誰子於是韓購縣之有能言殺相俠纍者豫千金久之莫知也政姊榮聞人有刺殺韓相者賊不得國不知其名姓暴其尸而縣之千金乃於邑曰其是吾弟與嗟乎嚴仲子知吾弟立起如韓之市而死者果政也伏尸哭極哀曰是軹深井里所謂聶政也市行者皆曰此人暴虐吾國相王縣購其名姓千金夫人不聞與何敢來識之也榮應之曰聞之然政所以蒙汚辱自棄於市販之間者為老母幸無恙妾未嫁也親既以天年下世妾已嫁夫嚴仲子乃察舉吾弟困汚之中而交之澤厚矣可奈何士固為知己者死今乃以妾尚在之故重自刑以絶從妾其奈何畏沒身之誅終滅賢弟之名大驚韓市人乃大呼天者三卒於邑悲哀而死政之旁晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也鄉使政誠知其姊無濡忍之志不重暴骸之難必絶險千里以列其名姊弟俱僇於韓市者亦未必敢以身許嚴仲子也嚴仲子亦可謂知人能得士矣荆軻者衛人也其先乃齊人徙於衛衛人謂之慶卿而之燕燕人謂之荆卿荆卿好讀書擊劒以術説衛元君衛元君不用軻嘗遊過榆次與蓋聶論劒蓋聶怒而目之軻出人或言復召荆卿蓋聶曰曩者吾與論劒有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報蓋聶曰固去也吾曩者目攝之軻遊於邯鄲魯句踐與軻博爭道句踐怒而叱之軻默而逃去遂不復會軻既至燕愛燕之狗屠及善擊築者髙漸離軻嗜酒日與狗屠及髙漸離飲於燕市酒酣以往髙漸離擊築軻和而歌於市中相樂也已而相泣旁若無人者軻雖遊於酒人乎然其為人沈深好書其所遊諸侯盡與其賢豪長者相結其之燕燕之處士田光先生亦善待之知其非庸人也居頃之會燕太子丹質秦亡歸丹故嘗質於趙而秦王政生於趙其少時與丹歡及政立為秦王而丹質於秦秦王遇丹不善故丹怨而亡歸歸而求為報秦王者國小力不能其後秦日出兵山東以伐齊楚三晉稍蠶食諸侯且至於燕燕君臣皆恐禍之至丹患之問其傅鞠武武對曰秦地遍天下威脅韓魏趙氏北有甘泉谷口之固南有涇渭之沃擅巴漢之饒右隴蜀之山左關殽之險民衆而士厲兵革有餘意有所出則長城之南易水以北未有所定也奈何以見陵之怨欲批其逆鱗哉丹曰然則何由對曰請入圗之居有間秦將樊於期得罪於秦王亡之燕丹受而舍之鞠武諌曰不可夫以秦王之暴而積怒於燕足為寒心又况聞樊將軍之所在乎是謂委肉當餓虎之蹊也禍必不振矣雖有管晏不能為之謀也願太子疾速遣樊將軍入丐奴以滅口請西約三晉南連齊楚北購於單于其後乃可圗也丹曰太傅之計曠日彌久心惛然不能須臾且非獨於此也夫樊將軍窮困於天下歸身於丹丹終不以迫於強秦而棄所哀憐之交置之丐奴是固丹命卒之時也願太傅更慮之鞠武曰夫行危而求安造禍而求福計淺而願深連結一人之後交不顧國家之大害此謂資怨而助禍矣夫以鴻毛燎於爐炭之上必無事矣且以雕鷙之秦行怨暴之怒豈足道哉燕有田光先生其為人智深而勇沈可與謀丹曰願因太傅而得交於田先生可乎鞠武曰敬諾出見田先生道太子願圗國事於先生也光曰敬奉教乃造焉丹逢迎却行為道跪而蔽席光坐定左右無人丹避席而請曰燕秦不兩立願先生留意也光曰臣聞騏驥盛壯之時一日而馳千里至其衰老駑馬先之今太子聞光壯盛之時不知臣精已消亡矣雖然光不敢以圗國事所善荆卿可使也丹曰願因先生得結交於荆卿可乎光曰敬諾即起趨出丹送至門戒曰丹所報先生所言者國之大事也願先生勿泄也光俯而笑曰諾僂行見荆卿曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言足下於太子也願足下過太子於宫軻曰謹奉教光曰吾聞之長者為行不使人疑今太子告光曰所言者國之大事也願先生勿泄是太子疑光也夫為行而使人疑之非節俠也欲自殺以激荆卿曰願足下急過太子言光已死明不言也因遂自刎而死軻遂見丹言田光已死致光之言丹再拜而跪膝行流涕有頃而後言曰丹所以誡田先生毋言者欲以成大事之謀也今田先生以死明不言豈丹之心哉軻坐定丹避席頓首曰田先生不知丹之不肖使得至前敢有所道此天之所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海內之王者其意不厭今秦已虜韓王盡納其地又舉兵南伐楚北臨趙王翦將數十萬之衆距漳鄴而李信出太原雲中趙不能支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦窺以重利秦王貪其勢必得所願矣誠得劫秦王使悉反諸侯侵地若曹沫之與齊桓公則大善矣則不可因而刺殺之彼秦大將擅兵於外而內有亂則君臣相疑以其間諸侯得合從其破秦必矣此丹之上願而不知所委命唯荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請毋讓然後許諾於是尊荆卿為上卿舍上舍日造門下供太牢具異物間進車騎美女恣軻所欲以順適其意久之軻未有行意秦將王翦破趙虜趙王盡收入其地進兵北略地至燕南界丹恐懼乃請軻曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉軻曰微太子言臣願謁之今行而無信則秦未可親也夫樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圗奉獻秦王秦王必説見臣臣乃得有以報丹曰樊將軍窮困來歸丹丹不忍以己之私而傷長者之意願足下更慮之軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期仰天太息流涕曰於期每念之常痛於骨髓顧計不知所出耳軻曰今有一言可以解燕國之患報將軍之仇者何如於期乃前曰為之奈何軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸然則將軍之仇報而燕見陵之愧除矣將軍豈有意乎樊於期偏袒扼捥而進曰此臣之日夜切齒腐心也乃今得聞教遂自剄丹聞之馳往伏尸而哭極哀既已不可奈何乃遂盛樊於期首函封之於是丹豫求天下之利匕首得趙人徐夫人匕首取之百金使工以藥焠之以試人血濡縷人無不立死者乃裝為遣荆卿燕國有勇士秦舞陽年十三殺人人不敢忤視乃令秦舞陽為副軻有所待欲與俱其人居逺未來而為治行頃之未發丹遲之疑其改悔乃復請曰日已盡矣荆卿豈有意哉丹請得先遣秦舞陽軻怒叱丹曰何太子之遣往而不返者豎子也且提一匕首入不測之強秦僕所以留者待吾客與俱今太子遲之請辭決矣遂發丹及賔客知其事者皆白衣冠以送之至易水之上既祖取道髙漸離擊築軻和而歌為變徴之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髮盡上指冠於是軻就車而去終已不顧遂至秦持千金之資幣物厚遺秦王寵臣中庶子蒙嘉嘉為先言於秦王曰燕王誠振怖大王之威不敢舉兵以逆軍吏願舉國為內臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期之頭及獻燕督亢之地圗函封燕王拜送於庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賔見燕使者咸陽宫軻奉樊於期頭函而秦舞陽奉地圗匣以次進至陛舞陽色變振恐羣臣怪之軻顧笑舞陽前謝曰北蕃蠻夷之鄙人未嘗見天子故振懾願大王少假借之使得畢使於前秦王謂軻曰取舞陽所持地圗軻既取圗奏之秦王發圗圗窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶拔劒劒長操其室時惶急劒堅故不可立拔荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下非有詔召不得上方急時不及召下兵以故軻乃逐秦王而卒惶急無以擊軻而以手共搏之是時侍醫夏無且以其所奉藥囊提荆軻也秦王方環柱走不知所為左右乃曰王負劒遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以擲秦王不中中銅柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕踞以罵曰事所以不成者以欲生劫之必得約契以報太子也於是左右既前殺軻秦王不怡者良久已而論功賞羣臣及當坐者各有差而賜夏無且黃金二百鎰曰無且愛我乃以藥囊提荆軻也於是秦王大怒益發兵詣趙詔王翦軍以伐燕十月而拔薊城燕王喜太子丹等盡率其精兵東保於遼東秦將李信追擊燕王急代王嘉乃遺燕王喜書曰秦所以尤追燕急者以太子丹故也今王誠殺丹獻之秦王秦王必解而社稷幸得血食其後李信追丹丹匿衍水中燕王乃使使斬太子丹欲獻之秦秦復進兵攻之後五年秦卒滅燕虜燕王喜其明年秦并天下立號為皇帝於是秦逐太子丹荆軻之客皆亡髙漸離變名姓為人庸保匿作於宋子久之作苦聞其家堂上客擊築傍徨不能去每言彼有善有不善從者以告其主曰彼庸乃知音竊言是非家丈人召使前擊築一坐稱善賜酒漸離念久隱畏約無窮時乃退出其裝匣中築與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使擊築而歌客無不流涕而去者宋子傳客之聞於始皇召見人有識者乃曰髙漸離也始皇惜其善擊築重赦之乃矐其目使擊築未嘗不稱善稍益近之漸離乃以鉛置築中復進得近舉築撲秦皇帝不中於是遂誅漸離終身不復近諸侯之人魯句踐已聞荆軻之刺秦王私曰甚矣吾不知人也曩者吾叱之彼乃以我為非人也蘇子曰周衰禮義不明而小人奮身以犯上相夸以為賢孔子疾之齊豹以衛司寇殺衛侯之兄縶蔡公孫翩以大夫弒其君申春秋皆以盜書而不名所謂求名而不得者也太史公傳刺客凡五人皆豹翩之類耳而其稱之不容口失春秋之意矣獨豫讓為舊君報趙襄子有古復讎之義如荆軻刺秦始皇雖始皇以強暴失天下心聞者快之要以盜賊乘人主不意法不可長也至曹沫之事豫以左氏考之魯莊公十年沫始以謀干莊公公用之敗齊於長勺自是魯未嘗敗十三年而會齊侯於柯安得所謂三戰三敗沫以匕首劫齊桓求侵地者哉始公羊髙采異説載沫事於春秋後戰國遊士多稱沫以為口實而實非也莊公之禦齊沫問所以戰以小惠小信為不足恃唯忠為可以一戰沫蓋知義者也而肯以其身為刺客之用乎春秋宋楚盟於城下齊魯盟於夾谷皆以要盟不書書平及會而已使沫信以匕首劫桓公得非要盟乎而春秋書公會齊侯盟於柯足以知其非要盟也是以削去曹沫而録其四人然亦非所謂賢也古史卷五十九
