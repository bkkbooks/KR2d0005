body:
  text: 古史卷五十八扁鵲列傳第三十五扁鵲者勃海鄚人也姓秦氏名越人少時為人舍長舍客長桑君過扁鵲獨竒之常謹遇之長桑君亦知扁鵲非常人也出入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公毋泄扁鵲曰敬諾乃出其懷中藥與扁鵲飲是以上池之水三十日當知物矣乃悉取其禁方書盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以診脉為名耳為醫或在齊或在趙在趙者名扁鵲趙簡子為晉大夫專國事疾五日不知人大夫皆懼於是召扁鵲扁鵲入視病出董安于問之扁鵲曰血脉治也而何怪昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有所學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦䇿於是出夫獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫此子之所聞今主君之病與之同不出三日必間間必有言也居二日半簡子寤語諸大夫曰我之帝所甚樂與百神游於鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝其後扁鵲過虢虢太子死扁鵲至虢宫門下問中庶子喜方者曰太子何病國中治禳過於衆事中庶子曰太子病氣血不時交錯而不得泄暴發於外則為中害精神不能止邪氣邪氣畜積而不得泄是以陽緩而隂急故暴蹶而死扁鵲曰其死何如時曰雞鳴至今曰收乎曰未也其死未能半日也言臣齊勃海秦越人也家在於鄚未嘗得望精光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石嬌引案几毒尉一撥見病之應因五藏之輸乃割皮解肌訣脉結筋搦髓腦揲荒爪幕湔浣腸胃漱滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曽不可以告咳嬰之兒扁鵲仰天嘆曰夫子之為方也若以管窺天以郤視文越人之為方也不待切脉望色聼聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至於隂當尚溫也中庶子聞扁鵲言目眩然而不瞚舌嬌然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞髙義之日久矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆魂精泄橫流涕長澘忽忽承䀹悲不能自止容貌變更扁鵲曰若太子病所謂尸蹶者也夫以陽入隂中動胃繵緣中經維絡别下於三焦膀胱是以陽脉下遂隂脉上爭㑹氣閉而不通隂上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脉亂故形靜如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹶中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲針砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之尉以八减之齊和煮之以更尉兩脅下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利也欲以不疾者為功後五日扁鵲復見曰君有疾在血脉不治恐深桓侯曰寡人無疾扁鵲出桓侯不悅後五日扁鵲復見曰君有疾在腸胃間不治將深桓侯不應扁鵲出桓侯不悅後五日扁鵲復見望見桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯尉之所及也在血脉針石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無奈之何今在骨髓臣是以無請也後五日桓侯體病使人召扁鵲扁鵲已逃去桓侯遂死使聖人豫知微能使良醫得蚤從事則疾可已身可活也人之所病病疾多而醫之所病病道少故病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也隂陽并藏氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也有此一者則重難治也扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫來入咸陽聞秦人愛小兒醫隨俗為變秦太醫令李䤈自知伎不如扁鵲也使人刺殺之至今天下言脉者由扁鵲也蘇子曰豫於趙世家削簡子之夢黜扁鵲之說以為為國不可以語怪及扁鵲列傳則具載其說曰世或有是不足怪也蓋孔子作春秋非人事不書而左丘眀所記鬼神變怪世所共傳者録之無疑世有逹者當辨此耳扁鵲見趙簡子齊桓侯而中有虢公之事虢之亡在春秋之初而趙簡子在春秋之末齊桓侯復次其後或疑其說之妄然戰國之際薛亡久矣而孟嘗君稱薛公安知是時無虢公者哉古史卷五十八
