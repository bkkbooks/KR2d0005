body:
  text: 古史卷五十宋蘇轍撰樂毅列傳第二十七樂毅其先樂羊為魏文侯將伐取中山魏封以靈壽羊死葬於靈壽其後子孫因家焉中山復國至趙武靈王時復滅中山而樂氏後有樂毅毅賢好兵趙人舉之及武靈有沙丘之亂乃去趙適魏聞燕昭王以子之之亂而齊大敗燕將報之患國小僻逺力不能致於是屈身下士先禮郭隗以招賢者毅於是為魏昭王使於燕燕王以客禮待之毅辭讓遂委質為臣昭王以為亞卿當是時齊涽王強南敗楚相唐昧於重丘西摧三晉於觀津遂與三晉擊秦助趙滅中山破宋廣地千餘里與秦昭王爭重為帝已而復歸之諸侯皆欲背秦而服於齊涽王自矜百姓弗堪於是昭王問伐齊之事毅對曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏於是使毅約趙惠文王别使連楚魏令趙啖秦以伐齊之利諸侯害涽王之驕暴皆爭合從與燕伐齊毅還報昭王悉起兵使毅為上將軍趙惠文王以相國印授毅毅於是并護趙楚魏韓燕之兵以伐齊破之濟西諸侯兵罷歸而燕軍獨追至于臨災涽王之敗濟西亡走保莒毅獨留徇齊齊皆城守毅攻入臨災盡取齊寶財物祭器輸之燕昭王大説親至濟上勞軍行賞饗士封毅於昌國號為昌國君於是昭王收齊鹵獲以歸而使毅復以兵平齊城之不下者毅留徇齊五歲下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服會昭王死子惠王立惠王自為太子時嘗不快於毅及即位齊田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患唯恐他將之來耳惠王固已疑毅得齊反間乃使騎劫代將而召毅毅畏誅遂西降趙趙封毅於觀津號曰望諸君尊寵之以警動於燕齊齊田單後與騎劫戰果設詐誑燕軍遂破騎劫於即墨下而轉戰逐燕北至河上盡復得齊城而迎襄王於莒入於臨災惠王後悔使騎劫代毅以故破軍亡將失齊又恐毅之降趙恐趙用毅而乘燕之弊以伐燕惠王乃使人讓毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不震動寡人豈敢一日忘將軍之功哉會先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久暴露於外故召將軍且休計事將軍過聽以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎毅報遺惠王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞聖賢之君不以祿私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有高世主之心故假節於魏以身得察於燕先王過舉厠之賔客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知自以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入於燕齊器設於寧臺大吕陳於元英故鼎反乎磨室薊丘之植植於汶篁自五伯已來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞聖賢之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之強國收八百歲之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法令慎庶孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥説聽於闔閭而吳王逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沉子胥而不悔子胥不早見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣恐侍御者之親左右之説不察疏逺之行故敢獻書以聞唯君王之留意焉於是燕王復以毅子間為昌國君而毅往來復通燕燕趙以為客卿毅卒於趙間居燕三十餘年燕王喜用其相栗腹之計欲攻趙以問間間曰趙四戰之國也其民習兵伐之不可燕王不聽遂伐趙趙使廉頗擊之大破栗腹之軍於鄗禽栗腹樂乘樂乘者間之宗也於是間奔趙趙遂圍燕燕重割地以與趙和趙乃解而去燕王恨不用間間既在趙乃遺間書曰紂之時箕子不用犯諫不怠以冀其聽商容不達身祗辱焉以冀其變及民志不入獄囚自出然後二子退隱故紂負桀暴之纍二子不失忠信之名何者其憂患之盡矣今寡人雖愚不若紂之暴也燕民雖亂不若殷民之甚也室有語不相盡以告鄰里二者寡人不為君取也間與乘怨燕不聽其計二人卒留趙趙封乘為武襄君其明年乘與廉頗為趙圍燕燕重禮以和乃解後五歲趙孝成王卒襄王使乘代廉頗廉頗攻乘乘走廉頗亡入魏其後十六年而秦滅趙其後二十餘年漢高祖過趙問樂毅有後世乎對曰有樂叔高帝封之樂鄉號曰華成君毅之孫也而樂氏之族有樂瑕公樂臣公趙且為秦所滅亡之齊高密樂臣公善修黃帝老子之言顯聞於齊稱賢師其本師號曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂臣公樂臣公教蓋公蓋公教於齊高密膠西為曹相國師蘇子曰梁惠王拔趙邯鄲而齊宣王敗之馬陵虜其太子申齊涽王滅宋而五國伐齊涽王出死於莒何者無德而有功諸侯之所共疾兵之招也故非有功之難而有以保其功之難耳樂毅為燕合諸侯破齊殺涽王舉全齊之富而歸之燕徇齊五年下七十餘城惟莒即墨未服兵久於外而燕人無怨心諸侯無異議其所以鎮撫內外必有道矣涽王之暴神人之所共棄而伐齊之利諸侯之所共有此固毅之本計歟至與莒即墨相持田單拒之五年而不決此非戰之罪勇智相敵勢固然耳廉頗拒王齕於長平司馬懿拒諸葛亮於岐山智均力敵雖有小負莫肯先決而要之以久使毅不遭惠王之隙以燕齊之衆而臨二城磨以歲月雖田單之智將何能為乎其勢如燕將之守聊愈久而愈困耳至夏侯元不達兵勢以謂毅不下二城將以成王者之業此書生之論非其實也古史卷五十
