body:
  text: 古史卷四十五宋蘇轍撰孟嘗君列傳第二十二孟嘗君名文姓田氏父曰靖郭君嬰齊威王少子而宣王庶弟也自威王時嬰任職用事與田忌將而救韓伐魏矣宣王二年復與田忌孫臏將而伐魏敗之馬陵虜魏太子申殺其將龐涓六年越伐齊齊使人説越王無強移其兵伐椘楚威王伐越滅之由此怨齊七年嬰使於韓魏韓魏皆服韓昭侯魏惠王來會宣王盟於東柯南眀年復與梁惠王會甄椘威王惡韓魏之朝齊也謀伐齊愈急九年嬰為齊相宣王與梁襄王會徐州相王眀年楚伐齊敗齊師於徐州而使人逐嬰嬰使張丑説楚威王威王乃止嬰相齊十一年宣王卒涽王即位三年封嬰於薛初嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長因兄弟而見其子嬰怒曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與户齊將不利其父母文曰人生受命於天乎將受命於户耶嬰默然文曰必受命於天君何憂焉必受命於户則可髙其户耳誰能至者嬰曰子休矣久之文承間問嬰曰子之子為何曰為孫孫之孫為何曰為玄孫玄孫之孫為何曰不能知也文曰君用事相齊至今三王矣齊不加廣而君私家富纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得裋褐僕妾餘粱肉而士不厭糟粳今君又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之於是嬰乃禮文使主家待賔客賔客日進聲名聞於諸侯諸侯皆使人請嬰以文為太子嬰許之犀首居魏與其相田需相惡東入齊見嬰相結約歸謂魏王請以文為相魏王許之秦將伐魏魏王聞之夜見文告之曰秦且攻魏子為寡人謀奈何文曰有諸侯之救則國可存也王曰寡人願子之行也重為之約車百乘文之趙謂趙王曰文願借兵以救魏趙王曰寡人不能文曰夫敢借兵者以忠王也王曰可得聞乎文曰夫趙兵非強於魏魏兵非弱於趙也然而趙之地不嵗危而民不嵗死而魏之地嵗危而民嵗死者何也以其西為趙蔽也今趙不救魏魏歃盟於秦是趙與強秦為界也地亦且嵗危民亦且嵗死矣此文之所以忠於大王也趙王許諾為起兵十萬車三百乘又北見燕王曰先日公子常約兩主之交矣今秦且攻魏願大王之救之燕王曰吾嵗不熟二年矣今又行數千里而以助魏且奈何文曰夫行數千里而救人者此國之利也今魏王出國門而望見軍雖欲行數千里而助人可得乎燕王尚未許也又曰臣效便計於王王不用臣恐天下之將有大變也王曰大變可得聞乎曰秦攻魏未能克之也而臺已燔遊已奪矣而燕不救魏魏王折莭割地以國之半與秦秦必去矣秦已去魏魏王悉韓魏之兵又西借秦之兵以因趙之衆以四國攻燕王且何利利行數千里而助人乎利出燕南門而望見軍乎則道里近而輸又易矣王何利燕王曰子行矣寡人聽子乃為之起兵八萬車二百乘以從之魏王大説秦王恐割地請講於魏魏因歸燕趙之兵而封文嬰卒文代立於薛號為孟嘗君孟嘗君在薛招致諸侯賔客及亡人有罪者皆舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等文待客坐語而屏風後常有侍史主記君所與客語問親戚居處客去已使使者存問獻遺其親戚文曾待客夜食有一人蔽火光客怒以飯不等輟食辭去文起自持其飯比之客慚自剄文於客無所擇皆善遇之人人各自以為孟嘗君親已秦昭王聞其賢乃使涇陽君為質於齊以求見文文將入秦賔客莫欲其行諫不聽蘇代謂文曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗則歸土今天雨流子而行未知所止息也今秦虎狼之國也而君欲往如有不得還君得無為土偶人所笑乎文乃止齊涽王二十五年卒使文入秦昭王即以文為秦相人或説昭王曰孟嘗君賢而又齊族也今相秦必先齊而後秦秦其危矣於是昭王囚文謀欲殺之文使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時有一狐白裘直千金天下無雙入秦獻之昭王更無他裘文患之遍問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦幸姬幸姬為言昭王昭王釋文文得出即馳去更封傳變名姓以出關夜半至函谷關昭王後悔求之已去即使人馳逐之文至關關法雞鳴而出客文恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出出如食頃秦追乃至已後而止始文列此二人於賔客賔客盡羞之及有秦難卒此二人拔之自是客皆服文過趙趙平原君客之趙人聞其賢出觀之皆笑曰始以薛公為魁然也今視之乃眇小丈夫耳文聞之怒客與俱者下斫擊殺數百人遂滅一縣以去始涽王遣文入秦不自得及其至則以為齊相任政文怨秦昭王甚是時秦留椘懷王已二年矣文因合韓魏為楚攻秦而借兵食於西周蘇代為西周謂文曰君以齊為韓魏攻椘九年取宛葉以北以強韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣韓魏必輕齊畏秦臣為君危之君不如令弊邑深合於秦而君無攻又無借兵食君臨函谷而無攻令弊邑以君之情謂秦曰薛公必不破秦以強韓魏其攻秦也欲王之令楚王割東國以與齊而秦出楚王以為和君令弊邑以此患秦秦得無破而以東國自免也秦必欲之椘王得出必德齊齊得東國益強而薛世世無患矣秦不大弱而處三晉之西三晉必重齊文曰善因使三國無攻而不借兵食於西周然秦不果出楚懷王文舍人魏子為文收邑入三反而不致一入文問之對曰有賢者竊假與之以故不致入文怒而退魏子居數年人或毁文於涽王曰文將為亂及田甲劫涽王涽王意疑文文出奔魏子所與粟賢者聞之乃上書言文不作亂請以身為盟遂自剄宫門涽王乃驚而蹤迹驗問文果無反謀乃復召文文因謝病歸老於薛涽王許之其後秦亡將吕禮相齊欲困蘇代代乃謂文曰周最於齊至厚也而齊王逐之而聽親弗戰國䇿作祝弗相吕禮者欲取秦也齊秦合則親弗與吕禮重矣有用齊秦必輕君君不如急北兵趨趙以和秦魏收周最以厚行且反齊王之信又禁天下之變齊無秦則天下集齊親弗必走則齊王孰與為其國也文從其計而吕禮嫉害文文懼乃遺秦相穰侯魏冉書曰吾聞秦欲以吕禮收齊齊天下之強國也子必輕矣齊秦相取以臨三晉吕禮必并相矣是子通齊以重吕禮也若齊免於天下之兵其讎子必深矣子不如勸秦王伐齊齊破吾請以所得封子齊破秦畏晉之強秦必重子以取晉晉國弊於齊而畏秦晉必重子以取秦是子破齊以為功挾晉以為重是子破齊定封秦晉交重子若齊不破吕禮復用子必大窮於是穰侯言於秦昭王伐齊而吕禮亡後涽王滅宋益驕欲去文文恐乃如魏魏昭王以為相初齊女為魏夫人文入魏而出齊女韓春謂秦王曰何不取為妻以齊秦劫魏齊秦合而立負芻負芻立其母在秦則魏秦之縣也若魏懼而復之負芻必以魏沒世事秦齊女入魏而怨薛公終以齊事王矣文以魏西合於秦趙與燕共伐破齊涽王亡在莒死焉齊襄王立而文中立為諸侯無所屬襄王新立畏文與連和文卒諸子爭立而齊魏共滅薛孟嘗君絶嗣初馮歡聞孟嘗君好客躡屩而見之文曰先生逺辱何以教文也歡曰聞君好士以貧身歸於君文置之傳舍十日問傳舍長曰客何所為答曰馮先生甚貧猶有一劍耳又蒯緱彈其劒而歌曰長鋏歸來乎食無魚命遷之幸舍食有魚矣五日又問傳舍長答曰客復彈劍而歌曰長鋏歸來乎出無輿又遷之代舍出入乘輿矣五日復問傳舍長答曰先生又嘗彈劍而歌曰長鋏歸來乎無以為家文不悅居期年馮歡無所言文時相齊封萬户於薛其食客三千人邑入不足以奉客使人出錢於薛嵗餘不入貸錢者多不能與其息客奉將不給文憂之問左右何人可使收債於薛者傳舍長曰代舍客馮公形容狀貌甚辨長者無他伎能宜可令收債文乃進歡而請之曰賔客不知文不肖幸臨文者三千餘人邑入不足以奉賔客故出息錢於薛薛嵗不入民頗不與其息今客食恐不給願先生責之歡曰諾辭行至薛召取孟嘗君錢者皆會得息錢十萬乃多釀酒買肥牛召諸取錢者能與息者皆來不能與息者亦來皆持取錢之劵書合之齊為會日殺牛置酒酒酣乃持劵如前合之能與息者與為期貧不能與息者取其劵而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也令富給者以要期貧窮者燔劵書以捐之諸君強飲食有君如此豈可負哉坐者皆起再拜文聞歡燒劵書怒使使召歡歡至文曰文食客三千人故貸錢於薛文奉邑少而民尚多不以時與其息客食恐不足故請先生收責之聞先生得錢即以多具牛酒而燒劵書何歡曰然不多具牛酒即不能畢會無以知其有餘不足有餘者為要期不足者雖守而責之十年息愈多急即以逃亡自捐之上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虛債之劵捐不可得之虛計令薛民親君而彰君之善聲也君有何疑焉文乃拊手而謝之涽王惑於秦楚之毁以為孟嘗君名髙其主而擅齊國之權遂廢文諸客見文廢皆去歡曰借臣車一乘可以入秦者必令君重於國而奉邑益廣可乎文乃約車幣而遣之歡乃西説秦王曰天下之遊士憑軾結靷西入秦者無不欲強秦而弱齊憑軾結靷東入齊者無不欲強齊而弱秦此雄雌之國也勢不兩立為雄者得天下矣秦王跽而問之曰何以使秦無為雌而可歡曰王亦知齊之廢孟嘗君乎秦王曰聞之歡曰使齊重於天下者孟嘗君也今齊王以毁廢之其心怨必背齊背齊入秦則齊國之情人事之誠盡委之於秦齊地可得也豈直為雄也君急使使載幣隂迎孟嘗君不可失時也如有齊覺悟復用孟嘗君則雌雄之所在未可知也秦王大説乃遣車十乘黃金百鎰迎文歡辭以先行至齊説齊王曰天下之遊士憑軾結靷東入齊者無不欲強齊而弱秦者憑軾結靷西入秦者無不欲強秦而弱齊者夫秦齊雄雌之國秦強則齊弱矣此勢不兩立今臣竊聞秦遣使車十乘載黃金百鎰以迎孟嘗君孟嘗君不西則已西入相秦則天下歸之秦為雄而齊為雌雌則臨淄即墨危矣王何不先秦使之未到復孟嘗君而益與之邑以謝之孟嘗君必喜而受之秦雖強國豈可以請人相而迎之哉折秦之謀而絶其霸強之略齊王曰善乃使人至境候秦使秦使車適入齊境使還馳告之王召文復其相位而與其故邑又益以千户秦使者聞文復相齊還車而去始文廢諸客皆去後召而復之歡迎之未到文太息曰文常好客遇客無所敢失食客三千有餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客有何面目復見文乎如復見文者必唾其面而大辱之歡結轡下拜文下車接之曰先生為客謝乎歡曰非為客謝也為君之言失夫物有必至事有固然君知之乎文曰愚不知所謂也曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎眀旦側肩爭門而入日暮之後過市者掉臂而不顧非好朝而惡暮所期物亡其中今君失位賔客皆去不足以怨士而徒絶賔客之路願君遇客如故文再拜曰敬從命矣聞先生之言敢不奉教焉蘇子曰戰國以詐力相侵伐二百餘年兵出未嘗有名秦昭王欺楚懷王而囚之要以割地諸侯孰視無敢以一言問秦者惟田文免相於秦幾不得脫歸而怨之乃借楚為名與韓魏伐秦兵至函谷秦人震恐割地以豫韓魏僅乃得免自小東難秦未有若此其壯者也夫兵直為壯曲為老有名之兵誰能禦之使田文能奮其威則是役也齊可以伯惜其聽蘇代之計臨函谷而無攻以求楚東國而出師之名索然以盡東國既不可得而懷王卒死於秦由此觀之秦惟不遇桓文是以橫行而莫之制耳世豈有以大義而屈於不義者哉古史卷四十五
