body:
  text: 古史卷二十宋蘇轍撰趙世家第十三趙氏之先與秦共祖至中衍為帝大戊御其後世蜚廉有子二人其一曰惡來事紂為周所殺其後為秦其二曰季勝其後為趙季勝生孟增孟增幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父幸於周穆王得八駿馬獻之穆王穆王使造父御欲周行天下將皆必有車轍馬迹史記言造父取驥之乘匹與桃林盜驪驊騮騄耳獻之穆王為穆王御以見西王母事近於誕故不録而取鄭丹言穆王事足之而徐偃王反穆王馳歸攻徐大破之乃賜造父以趙城由此為趙氏自造父以下六世至奄父曰公仲周宣王時伐戎為御及千畝戰奄父脫宣王奄父生叔帶周幽王無道去周如晉事晉文侯始建趙氏于晉趙宗益興五世而生趙夙晉獻公十六年伐霍伐魏伐耿滅之皆趙夙御戎霍公求奔齊晉大旱卜之霍太山為祟使夙召霍君於齊復之以奉霍太山之祀晉復穰獻公賜夙耿夙生共孟共孟生成子衰衰字子餘杜預曰趙夙趙衰兄未詳孰是卜事晉獻公及諸公莫吉卜事公子重耳吉即事重耳重耳以驪姬之難亡奔翟成子從之翟伐牆咎如得二女以其少女妻重耳長女妻成子生盾重耳亡十九年而反國為晉文公文公更以姬氏妻成子生同括嬰齊及狄人歸季隗趙姬亦請逆盾與其母既至姬以盾為才固請于公以為適子而以叔隗為內子文公二年克原問誰可守者寺人勃鞮曰趙衰以壺飱從徑餒而弗食乃以成子為原大夫四年謀元帥成子曰郤縠可將以成子為卿讓於欒枝先軫八年搜于清原作五軍乃以成子為卿晉襄公六年成子卒盾代任國政是為宣子七年襄公卒宣子欲立文公子雍不克更立襄公太子夷臯是為靈公宣子修明典法晉國以治賈季在狄狄人問趙衰盾孰賢賈季曰趙衰冬之日也趙盾夏之日也靈公立十四年侈而虐宣子驟諌公患之使鉏麑賊之宣子盛服將朝坐而假寐麑歎其忠敬不忍害而自殺公又伏甲而飲宣子宣子知之趨出公使猛犬噬之其車右提彌明殺犬戰而死公徒有嘗餓于翳桑宣子見而食之並以食遺其母者倒戈以出宣子宣子出奔族子穿攻靈公弒之宣子未出山而復故太史書曰趙盾弒其君宣子乃立襄公弟黑臀是為成公成公始以卿之適子為公族餘子為餘子庶子為公行宣子請以括為公族而已為旄車曰括君姬氏之愛子也微君姬氏臣狄人耳成公許之宣子卒子莊子朔嗣史記晉景公時趙盾卒子朔嗣案左傳魯宣公八年亦晉成公之八年也書晉胥克有蠱疾郤缺為政廢胥克使趙朔佐下軍郤缺為政而趙朔為卿則盾已死矣非景公之時也景公成公子後此二年始亡晉景公三年莊子將下軍及卒子文子武嗣初嬰齊通于莊姬莊姬景公之姊也十四年同括放嬰齊于齊莊姬怨之譛之景公曰同括將為亂十七年誅同及括武尚幼從姬氏畜于公宫以其田與祁奚韓厥少畜于宣孟言於景公曰成季之勳宣孟之忠而無後為善者懼矣乃立武而反其田史記晉景公三年大夫屠岸賈欲誅趙氏韓厥告趙朔趣亡朔不聽遂殺朔及同括嬰齊朔妻晉成公姊有遺腹走公宫生武朔友人程嬰公孫杵臼以計脫武得嗣趙氏今按左傳景公三年朔方將下軍拒楚于邲十二年晉作六軍括始為卿十四年乃放嬰齊十七年禍作而武已生畜于公宫韓厥為言而復歸其田耳其事皆有本末不可誣也且趙氏大宗非其家亂倚公室而去之勢不能動豈一大夫屠岸賈所能滅乎春秋之後好事者喜立異説如公羊邾叔術吳語黃池之會其類皆不可信今太史公信此亦已妄矣晉悼公立文子始為卿十三年超將上軍平公十年遂為正卿薄諸侯之幣而重其禮諸侯説之十二年會楚屈建及諸侯之大夫于宋以弭諸侯之兵楚人𠂻甲文子不與較楚不敢動楚人又欲先歃文子亦不爭諸侯貴之十七年復會楚公子圍及諸侯之大夫盟于虢文子於是年未五十耄而語偷周劉夏魯叔孫豹秦公子針與醫和皆知其將死嵗終而卒子景叔成嗣晉平公非賢君也文子相之八年能以禮與信結諸侯以無失伯文子死晉遂衰景叔卒子簡子鞅嗣晉頃公九年簡子會諸侯之大夫于黃父謀納周敬王明年王入于周十二年六卿滅公族祁氏羊舌氏而分其邑晉公室由此益弱十三年簡子及荀寅城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書孔子譏之晉定公十年將盟衛侯簡子使涉他成何往衛侯請執牛耳二子捘衛侯之手衛侯怒遂叛晉十一年魯陽虎來奔簡子納而用之十五年簡子謂邯鄲午曰歸我衛貢五百家將置之晉陽午許諾歸而父兄不聽簡子召午殺之趙稷涉賔以邯鄲叛使籍秦圍邯鄲荀寅范吉射午之姻也不與圍午將作亂董安于請備之七月范中行氏伐趙氏之宫簡子奔晉陽晉人圍之韓不信惡寅魏曼多惡吉射荀躒嬖梁嬰父欲以為卿范臯夷無寵於吉射亦欲作亂謀以嬰父代寅而以臯夷代吉射荀躒言於晉侯曰君命大臣始禍者死今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之遂以君命伐范中行氏二子反伐公敗奔朝歌韓魏為趙氏請十二月盟而入梁嬰父惡董安于謂荀躒曰不殺安于趙氏必得晉國盍以其發難也討之躒以告簡子簡子患之安于曰我死而晉國寧趙氏定將焉用生乃縊而死趙氏祀之于廟十九年夏簡子帥師納衛世子蒯聵于戚秋齊人輸范氏粟鄭人送之簡子禦之于戚大敗之二十年簡子圍朝歌荀寅奔邯鄲二十一年簡子圍邯鄲寅奔鮮虞齊人納寅于柏人二十二年圍柏人寅吉射出奔齊趙遂有邯鄲柏人雖名晉卿實專晉權奉邑侔於諸侯三十年晉會吳于黃池爭長未決而越入吳簡子謂司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也吳以越難不能久乃先晉衛莊公入而不朝于晉三十四年夏簡子伐衛齊救之師還冬復伐衛將入其城簡子止之曰怙亂滅國者無後衛人出莊公而立般師乃還趙氏有直臣周舍舍死簡子每聽朝常不樂大夫問焉簡子曰諸大夫朝徒聞唯唯不聞周舍之鄂鄂吾是以憂也晉人悅之有姑布子卿者善相人簡子使相諸子曰無為將軍者至子母恤曰此將軍矣簡子曰此其母賤翟婢耳對曰天之所命雖賤必貴簡子因此盡召諸子與語母恤果賢後又告諸子吾藏寶符常山上先得者賞諸子爭往無所得母恤還曰已得符矣簡子曰奏之母恤曰從常山上臨代代可取也簡子於是知母恤果賢乃廢世子伯魯而以母恤為世子三十六年簡子卒母恤嗣左傳魯哀公二十年晉定公之三十七年也是嵗越圍吳趙襄子降喪食然則簡子死三年喪未終也而史記稱定公三十七年卒簡子除三年之喪此説既已謬矣又稱出公十一年簡子疾使太子母恤與知伯伐鄭十七年簡子卒襄子元年越圍吳使楚隆問吳王蓋出公定公之子也使簡子之死實出公十七年則非吳滅之嵗使襄子實吊吳王則簡子之死前此矣進退不可考據故其記簡子多十八年記襄子少十八年言襄子在位凡三十三年而已今定以左氏為本仍以越圍吳之嵗為襄子元年而推次襄子行事之年故襄子在位凡五十一年也三十七年越圍吳襄子降於喪食楚隆曰三年之喪親昵之極也主又降之無乃有故乎襄子曰黃池之會先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之非晉之所及也吾是以為降隆曰盍使吳王知之乃使隆往弔焉襄子姊前為代王夫人簡子既葬未除喪與代王會夏屋使厨人操銅斗以食代王隂以斗擊殺之及其從官遂興兵平代地其姊聞之泣而呼天磨笄自殺代人憐之所死地名之為磨笄之山遂以代封伯魯子周為代成君晉出公十三年襄子從荀瑶伐鄭門于桔柣之門瑶謂襄子入之對曰主在此瑶曰惡而無勇何以為子對曰以能忍耻庶無害趙宗乎襄子由此怨知氏十七年知氏與趙韓魏盡分范中行故地出公怒欲以齊魯伐四卿四卿恐共攻出公出公奔齊道死是年四卿分地見晉世家而六國年表在晉哀公三年趙世家云襄子之四年蓋太史公不能正簡襄亡立之年故於年表遷就其事尤為乖舛今簡襄之年既正則分邑之年以晉世家為允四卿乃立昭公曽孫驕是為哀公荀瑶專決晉國之政四年請地韓魏韓魏與之請地趙趙以圍鄭之怨不與瑶怒隂約韓魏將以伐趙襄子召張孟談戰國䇿作張孟談史記作孟同蓋太史公以其父名改之耳而告之曰知伯請地三家而吾獨弗與其移兵伐我必矣吾安居而可張孟談曰夫董安于簡主之才臣也世治晉陽其餘政教猶存其必居晉陽襄子曰諾發車騎趨晉陽城郭府庫倉廩兵甲既具而三家之兵至三月不能拔舒兵而圍之決晉水以灌其城城不沉者三版城中巢居懸釡易子而食羣臣皆有外心禮益慢惟高共不敢失禮襄子懼乃夜使張孟談私於韓魏韓魏與趙合謀殺守堤之吏決水以灌瑶軍瑶救水軍大亂三家交攻之遂禽瑶而分其地史記趙簡子疾五日不知人醫扁鵲視之曰非病也昔秦穆公嘗如此寤將有所言矣居二日半簡子寤告諸大夫曰我之帝所甚樂因言夢所見董安于記之皆驗於後蓋滅范中行立襄子及取代皆兆於夢矣及襄子奔晉陽原過見三人得竹書以遺襄子自稱霍太山亦言滅知伯及武靈王胡服之事此皆戰國好事者所為雜説無所考證存之無益於治亂而有無不可知非為國之要不可載之世家故獨載簡子事於扁鵲傳而已於是襄子行賞高共為上張孟談曰晉陽之難惟共無功襄子曰方晉陽急羣臣皆懈惟共不敢失人臣禮是以先之於是趙北有代南並知氏強於韓魏襄子娶空同氏生五子為伯魯之不立也不肯立子必欲傳伯魯子代成君代成君先死乃立其子浣為太子襄子在位五十一年而卒浣立是為獻侯獻侯少即位治中牟此非今之中牟今之中牟非趙地春秋傳曰衛侯如晉過中牟蓋趙自有中牟耳襄子弟桓子逐獻侯自立於代一年卒國人曰桓子立非襄子意乃殺其子而復迎立獻侯十年中山武公初立史記中山事分散數處於此言中山武公初立類始建國者於魏文侯十七年記伐中山使子擊守之於樂毅傳言樂羊既取中山其後中山復國至趙武靈王時復滅中山然戰國䇿言犀首立五王齊王羞與中山並王犀首與趙武靈時不甚逺或曰中山古鮮虞姬姓竟未詳其實也徐廣曰中山武公西周桓公之子也桓公者孝王弟而定王子也不知廣何自得此説然是時周衰已甚亦安能使其子弟據中山乎十三年城平邑十五年獻侯卒子烈侯籍立六年趙韓魏始立為諸侯追尊獻子為獻侯烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然鄭歌者槍石二人吾賜之田人万畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝番吾君自代來謂公仲曰君實好善而未知所持君相趙於今四年矣亦有進士乎曰未也番吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功德所養無不充君説使謂相國歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜相國衣二襲九年烈侯卒弟武公立武公十三年卒趙人立烈侯太子章是為敬侯敬侯元年武公子朝作亂不克出奔魏趙始都邯鄲二年敗齊于靈丘三年救魏于廩丘大敗齊人四年魏敗我兔臺築剛平以侵衛五年齊魏為衛攻趙取我剛平六年借兵於楚伐魏取棘蒲八年拔魏黃城九年伐齊齊伐燕趙救燕十年與中山戰房子十一年魏韓趙共滅晉分其地伐中山又戰於中人十二年敬侯卒子成侯種立成侯元年公子勝與成侯爭立為亂二年六月雨雪三年大戊午為相伐衛取鄉邑七十三魏敗我藺四年與秦戰高安敗之五年伐齊于鄄攻鄭敗之以與韓韓與我長子魏惠王與公中緩爭國成侯與韓因其亂伐之敗之濁澤圍魏惠王六年中山築長城魏敗我懷成侯五年魏惠王之元年也則濁澤之圍當在五年史記在六年誤矣魏惠王既定位二年敗趙于懷敗韓于馬陵據韓魏世家年表並同而趙世家在五年亦誤今並正之七年侵齊至長城與韓攻周八年與韓分周以為兩九年與齊戰阿下十年攻衛取甄十一年秦攻魏趙救之石阿十二年秦攻魏少梁趙救之十三年魏敗我澮取皮牢成侯與韓昭侯遇上黨十四年與韓攻秦十五年助魏攻秦十六年與韓魏分晉封晉君以端氏敬侯十一年三國已滅晉分其地矣至此復分晉者必有餘地昔所未分耳十七年成侯與魏惠王遇葛孽十九年與齊宋會平陸與燕會阿二十年魏獻榮椽因以為檀臺二十一年魏圍我邯鄲二十二年魏拔我邯鄲二十四年魏歸我邯鄲與魏盟漳水上秦攻我藺二十五年成侯卒公子緤與太子爭立緤敗亡奔韓太子立是為肅侯元年奪晉君端氏徙處屯留二年與魏惠王遇於隂晉三年公子范襲邯鄲不勝死四年朝天子六年攻齊拔高唐七年公子刻攻魏首垣十年秦使商鞅伐魏虜其將公子卬趙伐魏十五年起夀陵十六年肅侯遊大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝蘇秦自燕來言六國約從以擯秦肅侯從之以車百乘黃金千鎰白璧百雙錦繡千純使秦東約諸侯十七年圍魏黃不克秦以公孫衍為大良造説齊魏謀共伐趙以敗從約十八年齊魏伐我我決河水灌之兵去肅侯以讓蘇秦秦恐遂去趙而從約解二十二年張儀相秦趙疵與秦戰敗秦殺疵河西取我藺離石二十三年韓舉與齊魏戰死于桑丘二十四年肅侯卒子武靈王立秦楚燕齊魏出鋭師各萬人來會葬武靈王元年陽文君趙豹相梁襄王與太子嗣韓宣王與太子倉來朝信宫武靈王少未能聽政博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮三年城鄗四年與韓會區鼠五年娶韓女為夫人八年使國人謂侯曰君時五國相王趙獨否曰無其實敢有其名乎齊宣王九年魏襄王元年會於徐州始相王後十一年秦惠文王始稱王明年韓宣惠王燕易王始稱王至此五年趙猶不稱王然卒不見趙稱王之年豈自惠文始而追諡武靈王李兑約五國伐秦無功罷於成臯欲隂構於秦以解其怨楚與韓魏將應之齊弗欲齊王令公孫衍以攻宋説李兑李兑報齊王曰臣之所以堅三晉以攻秦者欲以使攻宋也而宋置太子以為王下親其上而守堅臣是以欲足下之速歸休士民也今太子走諸善太子者皆有死心若復攻之其國必有亂此亦舉宋之時也臣已為足下使公孫衍説奉陽君曰君之身老矣封不可不早定也為君慮封莫若於宋他國莫可夫秦人貪韓魏危燕楚辟中山之地薄莫如於隂失今之時不可復得已宋之罪重齊之怒深殘亂宋得大齊定身封此百世一時也臣願足下大發攻宋之舉而無庸致兵也蘇代亦為齊謂奉陽君曰天下散而爭秦秦必據宋魏冉必妬君之有隂也秦王貪魏冉妬則隂不可得矣君無構齊必攻宋齊攻宋則楚必攻宋燕趙助之五國據宋不至一二月隂必得矣得隂而構秦雖有變則君無患矣奉陽君曰善乃絶和於秦而收齊魏以成取隂九年與韓魏共擊秦秦敗我斬首八万齊敗我觀澤十年秦取我西都及中陽燕相子之為君君反為臣齊破燕十一年王召公子職於韓立以為燕王樂池送之裴駰曰案燕世家子之死燕人共立公子平是為燕昭王無趙送公子職為燕王之事當是趙聞燕亂遙立職為燕王雖使樂池送之竟不能就也十三年秦拔我藺虜將軍趙莊楚魏王來過邯鄲十四年趙何攻魏十六年王遊大陵夢處女鼓琴而作詩曰美人熒熒兮顔若苕之華命乎命乎曽無我嬴異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人內其女娃嬴娃嬴孟姚也甚有寵是為惠后十七年王出九門為野臺以望齊中山之境十八年秦武王卒王使代相趙固迎公子稷於燕送之秦立為昭王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至於房子遂之代北至無窮西至河登黃華之上召樓緩謀曰我先王因世之變以長南藩之地阻漳滏之險立長城又取藺郭狼敗林人於荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邊而無強兵之救奈何夫有髙世之名必有遺俗之纍吾欲胡服樓緩曰善羣臣皆不欲於是肥義侍王曰吾欲繼襄主之業啓胡狄之鄉用力少而功多無盡百姓之勞而享前世之勳吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆愚者暗成事智者覩未形王何疑焉於是遂胡服使王孫緤告公子成曰寡人胡服將以朝也亦欲叔服之家聽於親國聽於君古今之公行也子不反親臣不逆君兄弟之通義也今寡人作教易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明德先論於賤而行政先信於貴今胡服之意非以養欲而樂志也事有所出而功有所止事成功立然後善也今寡人恐叔逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故寡人願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也不佞寢疾不能趨走是以不先進王今命之臣敢竭其愚忠臣聞之中國者聰明徇知之所居也萬物財用之所聚也賢聖之所教仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之教易古之道逆人之心而怫學者離中國故臣願王圖之也使者以報王曰吾固聞叔之疾也我將自往請之王遂往之公子成家因自請之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順宜因事而制禮所以利其民而厚其國也夫剪髮文身錯臂左衽甌越之民也黑齒雕題卻冠秫絀大吳之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而教離况於山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異曲學多辨不知而不疑異於已而不非者公於求善也今叔之所言者俗也吾所言者所以制俗也吾國東有薄洛之水與齊中山同之而無舟楫之用自常山以至代上黨東有燕東胡之境而西有樓煩秦韓之邊而無騎射之備故寡人將聚舟楫之用求水居之民以守河薄洛之水變服騎射以備燕三胡秦韓之邊且昔者簡主實晉陽以及上黨而襄主並戎取伐以攘諸胡此愚智所明也先時中山負齊之強兵侵暴吾地係纍吾民引水圍鄗微社稷之神靈則鄗幾於不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不逹於王之義敢道世俗之聞臣之罪也今王將繼簡襄之意以順先王之志臣敢不聽命乎再拜稽首而賜胡服明日服而朝於是始出胡服令趙文趙造周祒趙俊皆諌止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮世不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制者所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書御者不盡馬之情以古制今者不逹事之變循法之功不足以高世法古之學不足以制今子不及也遂胡服招騎射二十年王略中山地至寧葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙袑為右軍許鈞為左軍公子章為中軍王並將之牛剪將車騎趙希並將胡代趙與之陘徐廣曰陘者山絶之名常山有井陘中山有苦陘也合軍曲陽攻取丹丘華陽鴟之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷兵二十三年攻中山二十五年惠后卒使周袑胡服傅王子何二十六年復攻中山攘地北至燕代西至雲中九原二十七年五月大朝於東宫傳國王子何是為惠文王王廟見禮畢出臨朝肥義為相國並傅王王惠后吳娃子也武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北略胡地又欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫關矣審問之乃主父也秦人大驚主父所以入秦者欲自略地形因觀秦王之為人也惠文王元年以公子勝為相封平原君二年主父行新地遂出代西遇樓煩王於西河而致其兵楚懷王自秦來奔弗內楚王之未入秦也或謂主父曰三晉合而秦弱三晉離而秦強此天下之所明也秦之有燕而伐趙有趙而伐燕有梁而伐趙有趙而伐梁有楚而伐韓有韓而伐楚此亦天下之所明也然山東不能易其路兵弱也弱而不能相一是何楚之智山東之愚也虎將即禽禽不知虎之即已也而相鬬兩罷而歸其死於虎使禽知虎之即已決不相鬬矣今山東之主不知秦之即已也而尚相鬬兩斃而歸其國於秦知不如禽逺矣願王熟慮之也今事有可急者秦之欲伐韓梁東窺周室甚惟寐忘之今南攻楚者惡三晉之大合也今其攻楚休而復之已五年矣攘地千餘里今謂楚王茍來舉玉趾而見寡人必與楚為兄弟之國必為楚攻韓梁反楚之故地楚王美秦之語怒韓梁之不救己必入於秦秦楚有謀故發使之趙以燕餌趙而離三晉今主美秦之言而攻燕攻燕食未飽而禍已及矣楚王入秦秦楚為一東面而攻韓韓南無楚北無趙韓不待伐而西走秦與韓為上交秦禍安移於梁矣以秦之強有楚韓之用梁不待伐而西走秦與梁為上交秦禍安環中趙矣以強秦之有韓梁楚與韓之怒割必深矣此臣之所為來臣故曰事有可急為者及楚王之未入也三晉相親相堅出鋭師以戍韓梁西邊楚王聞之必不入秦秦必怒而循攻楚是秦禍不離楚也便於三晉若楚王入秦見三晉之大合而堅也必不出楚王而多割是秦禍亦不離楚也又利於三晉願王熟計之也趙因起兵伐戎翟戍韓梁之西邊秦見三晉之堅也果不出楚王而多求地三年滅中山遷其王於膚施還歸行賞大赦置酒酺五日封長子章為代安陽君使田不禮相之章素侈心不服其弟為王李兑謂肥義曰公子章強壯而志驕黨衆而欲大田不禮之為人也忍殺而驕二人相得殆有私乎小人輕慮淺謀見利而忘害同類相持俱入禍門以吾觀之必不久矣子任重而勢大亂之所始禍之所集也子奚不稱疾毋出傳政於公子成無為怨府無為禍梯肥義曰不可昔者主父以王屬我也曰無變而度無異而慮堅守一心以沒而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身乎子則有賜而忠我矣吾不敢失吾言也李兑曰諾子勉之矣吾見子已今年耳涕泣而出兑乃數見公子成與謀備田不禮異日肥義謂信期曰公子與田不禮甚可憂也吾聞之姦臣在朝國之殘也讒臣在中主之蠹也此人貪而欲大內得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國自今以往若有召王者必見吾面我先以身當之無故而王乃入信期曰善哉吾得聞此也四年朝羣臣安陽君亦來朝主父從旁觀羣臣宗室之禮見長子章北面屈於其弟心憐之初章嘗為太子矣主父得惠后愛之為不出者數嵗生惠文王乃廢章而立之及惠后死愛弛憐故太子欲分趙而王章於代計未決而輟主父及王遊沙丘異宫章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之即與王戰公子成與李兑自國至起四邑之兵入距難敗公子章及田不禮滅其黨章之敗往走主父主父開之成兑因圍主父宫章死成兑謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫中人後出者夷宫中人悉出主父不得食探爵鷇食之三月餘餓死沙丘宫成為相號安平君兑為司冦王少成兑專政五年與燕鄭易八年城南行唐九年趙梁將與齊合軍攻韓至魯關下十一年齊秦自立為東西帝既而皆復為王董叔與魏伐宋得河陽於魏秦取梗陽十二年趙梁將攻齊秦攻魏取安邑諸侯皆賀趙王往賀三反不得通趙王憂之謂左右曰以秦強得安邑以制齊趙諸侯皆賀吾往賀而獨不得通此必加兵於我為之奈何左右曰使者三往不得通者必所使者非其人也諒貇者辨士也大王可試使之諒貇受命而往至秦獻書秦王曰大王廣地安邑諸侯皆賀寡君亦竊嘉之不敢寧居使下臣奉其幣物三至王廷而使不得通使若無罪願大王無絶其歡若使有罪願得請之秦王報曰吾所使趙國者小大皆聽吾言則受書幣若不從吾言則使者歸矣諒貇對曰下臣之來固願承大國之意也豈敢有難大王若有以令之請奉而行之無所敢疑於是秦王乃見使者曰平陽君平原君數欺寡人趙能殺此二人則可若不能殺請今率諸侯受命邯鄲城下諒貇曰平陽君平原君親寡君之母弟猶大王之有華陽君涇陽君也大王以孝弟聞於天下衣服之便於體膳啖之嗛於口未嘗不分華陽君涇陽君華陽君涇陽君之車馬衣服無非大王之服御者臣聞之覆巢毁卵而鳯皇不翔刳胎焚夭而麒麟不至今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷華陽君涇陽君之心乎秦王曰諾勿使從政諒貇曰敝邑之君有母弟不能教誨以惡大王請黜之勿使與政事以稱大國秦王乃喜受其幣而厚遇之十三年韓徐將攻齊十四年相國樂毅將趙秦韓魏燕兵攻齊取靈丘與秦會中陽十五年燕昭王來見樂毅以五國兵共擊齊齊王敗走燕獨深入取臨淄十六年秦復與趙擊齊齊人患之蘇厲為齊遺趙王書曰足下之賢行功力非數加於秦也怨毒積怒非素深於齊也秦趙與國以強徴兵於韓秦誠愛趙乎其實憎齊乎物之甚者賢主察之秦非愛趙而憎齊也欲亡韓而吞二周故以齊餤天下恐事之不合故出兵以劫魏趙恐天下畏己也故出質以為信恐天下亟反也故徴兵於韓以威之聲以德與國實而伐空韓臣以秦計為必出於此夫物固有勢異而患同者楚久伐而中山亡今齊久伐而韓必亡破齊王與六國分其利也亡韓秦獨擅之收二周西祭器秦獨私之賦田計功王之獲利孰與秦多説士之計曰韓亡三川魏亡晉國市朝未變而禍已及矣燕盡齊之北地去沙丘巨鹿斂三百里韓之上黨去邯鄲百里燕秦謀王之河山間三百里而通矣秦之上郡近挺關至於榆中者千五百里秦以三郡攻王之上黨羊腸之西句注之南非王有已榆句注斬常山而守之三百里而通於燕代馬胡犬不東下昆山之玉不出北三寶者亦非王有已王久伐齊從強秦攻韓其禍必至於此願王熟慮之且齊之所以伐者以事王也天下屬行以謀王也燕秦之約成而兵出有日矣五國三分王之地齊倍五國之約而殉王之患西兵以禁強秦秦廢帝請服反高平根柔於魏反巠分先俞於趙齊之事王宜為上交而今乃抵罪臣恐天下後事王者之不敢自必也願王熟計之也今王無與天下攻齊天下必以王為義齊抱社稷而厚事王天下必盡重王義王以天下善秦秦暴王以天下禁之是一世之名寵制於王也於是趙乃輟謝秦不擊齊王與燕王遇廉頗將攻齊昔陽取之十七年樂毅將趙師攻魏伯陽而秦怨趙不與已擊齊伐趙拔我兩城十八年秦拔我石城王再之衛東陽決河水伐魏氏大潦漳水出魏冉來相趙十九年秦敗我二城趙與魏伯陽趙奢將攻齊麥丘取之二十年廉頗將攻齊王與秦昭王遇西河外二十一年徙漳水武平西二十二年大疫公子丹為太子二十三年樓昌將攻魏幾不能取十二月廉頗將攻幾取之二十四年廉頗將攻魏房子拔之因城而還又攻安陽取之二十五年燕周將攻昌城高唐取之與魏共擊秦秦將白起破我華陽得一將軍二十六年取東胡歐代地二十七年徙漳水武平南封趙豹為平陽君河水出大潦二十八年藺相如伐齊至平邑罷城北九門大城二十九年秦韓相攻而圍閼與趙使趙奢將擊秦大破秦軍閼與下賜奢號為馬服君三十三年惠文王卒太子丹立是為孝成王孝成王元年秦伐我拔三城王新立太后用事秦急攻之趙求救於齊齊曰必以長安君為質兵乃出太后不肯大臣強諫太后謂左右復言長安君為質者老婦必唾其面左師觸龍言願見太后太后盛氣而胥之入徐趨而坐謝曰老臣病足曽不能疾走不得見久矣竊自恕而恐太后體有所苦也故願望見太后太后曰老婦恃輦而行曰食得無衰乎曰恃粥耳曰老臣間者殊不欲食乃強步日三四里少益嗜食太后曰老婦不能太后不和之色少解左師曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黑衣之缺以衛王官昧死以聞太后曰敬諾年幾何矣對曰十五嵗矣雖少願及未填溝壑而託之太后曰丈夫亦愛憐少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師曰父母愛子則為之計深逺媪之送燕后也持其踵為之泣念其逺也亦哀之矣已行非不思祭祀則祝之曰必勿使反豈非計長久為子孫相繼為王也哉太后曰然左師曰今三世以前趙主之子孫為侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及其身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞挾重器多也今媪尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君之計短也故以為愛之不若燕后太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊兵乃出燕封宋人榮蚠為高平君使將而攻趙趙因割濟東三城令盧高唐平原城邑五十七以與齊求安平君田單而將之趙奢謂平原君曰國奚無人甚哉三城五十七邑此與敵國戰覆軍殺將而求者也今以此求安平君而將之國奚無人甚哉奢嘗為燕守上谷燕之通谷要塞奢習知之百日之內天下之兵未聚奢已舉燕矣君奚求安平君為乎平原君曰將軍釋之僕已言之王王許我矣奢曰君過矣齊之於燕豈茹肝涉血之仇耶使安平君愚安用之使安平君知又安肯與燕戰且安平君奚以趙之強為趙強則齊不復伯矣今得強趙之兵必將曠日持久使士大夫餘子之力盡於溝壘車甲羽毛敝府庫倉廩虗乃引兵而歸耳平原君不聽田單將而攻燕中陽拔之又攻韓注人拔之略如奢之言二年惠文后卒田單為相四年王夢衣偏裻之衣乘飛龍上天不至而墜見金玉之積如山明日召筮史敢占之曰夢衣偏裻之衣者殘也乘飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也後三日韓氏上黨守馮亭使者至曰韓不能守上黨入之於秦其吏民皆安為趙不欲為秦有城市邑十七願再拜入之趙惟王財之王大喜召平陽君豹告之曰馮亭入城市邑十七受之何如對曰聖人甚禍無故之利王曰人懷吾德何謂無故乎對曰夫秦蠺食韓氏地中絶不令相通固自以為坐而受上黨也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖強大不能得之於小弱小弱顧能得之於強大乎豈可謂非無故之利哉王曰今發百萬之軍而攻踰年歷嵗未得一城也今以城市邑十七幣吾國此大利也趙豹出王召平原君與趙禹而告之對曰發百萬之軍而攻踰嵗未得一城今坐受城市邑十七此大利不可失也王曰善乃令趙勝受地告馮亭曰寡君使勝致命以萬户都三封太守千户都三封縣令皆世世為侯吏民皆益爵三級吏民能相安皆賜之六金馮亭垂涕不見使者曰吾不處三不義也為主守地不能死不義一矣入之秦不聽主令不義二矣賣主地而食之不義三矣趙遂發兵取上黨廉頗將軍長平七年王信秦間免廉頗使趙括代將秦人圍之射殺括軍四十餘萬降秦秦皆坑之王乃悔不聽趙豹之計秦圍邯鄲王欲媾秦虞卿説王請以重寶附楚魏使秦疑天下之合從而後秦媾可合也王不聽與趙豹謀遣鄭朱入秦為媾諸侯見秦趙為媾遂不肯救趙邯鄲幾拔武垣令傅豹王容蘇射率燕衆反燕地趙以靈丘封楚相春申君八年平原君如楚請救還楚將景陽及魏公子無忌皆來救秦圍乃解十年燕攻昌壯五月拔之趙將樂乘慶舍攻秦信梁軍破之西周君納地於秦秦受而歸其君王赧卒十一年城元氏縣上原武陽君鄭安平死收其地十二年邯鄲廥焚十四年平原君勝死十五年以尉文封相國廉頗為信平君燕王使栗腹約歡以五百金為趙王酒還歸報燕王曰趙氏壯者皆死長平其孤未壯可伐也燕王從之起二軍車二千乘使栗腹將而攻鄗卿秦將而攻代廉頗樂乘為將破殺栗腹虜卿秦十六年廉頗圍燕以樂乘為武襄君十七年樂乘假相將而攻燕圍其國十八年延陵鈞率師從廉頗助魏攻燕秦拔我榆次三十七城十九年趙與燕易七以龍兑汾門臨樂與燕燕以葛武陽平舒與趙二十年秦王政初立秦拔我晉陽二十一年孝成王卒子悼襄王偃立廉頗將攻繁陽取之使樂乘代之廉頗攻樂乘樂乘走廉頗亡入魏悼襄王元年大備魏欲攻平邑中牟之道不成二年李牧將攻燕拔武遂方城太子質秦秦復歸之史記六國年表是嵗太子從質秦歸而世家不載其事載秦召春平君國而留之泄鈞為之謂文信侯曰春平君者趙王甚愛之而郎中妬之故相與謀曰春平君入秦秦必留之故相與謀而納之秦也君留之是絶趙而郎中之計中也君不如遺春平君而留平都春平君者言行信於王王必厚割趙而留平都文信侯曰善因遣之太子與春平君疑其一人耳城韓臯三年龐暖將攻燕禽其將劇辛四年龐暖將趙楚魏燕之鋭師攻秦蕞不拔移攻齊取饒安五年傅抵將居平邑慶舍將東陽河外之師守河梁六年封長安君以饒魏與趙鄴九年趙攻燕取貍陽城兵未罷秦攻鄴拔之悼襄王卒子王遷立史記遷諡幽繆徐廣曰一日湣王世本悼襄王偃生今王遷年表及史考皆無遷諡遷失國後死恐不當有諡遷之母倡也嬖於悼襄王悼襄王廢適子嘉而立遷遷素無行信讒趙人輕之王遷元年城柏人二年秦攻武城扈輒率師救之軍敗死焉三年秦攻赤麗宜安李牧率師與戰肥下却之封牧武安君四年秦攻番吾李牧與戰却之五年代地大動自徐樂以西北至平隂臺屋墻垣太半壞地坼東西百三十步六年大飢民訛言曰趙為號秦為笑以為不信視地之生毛七年秦人攻趙趙大將李牧將軍司馬尚擊之王信秦間誅牧而免尚以趙匆及齊將顔聚代之匆軍破聚亡去以王遷降秦人徙遷房陵八年十月邯鄲為秦趙之亡大夫共立公子嘉為王王代六年秦進兵破嘉遂滅趙蘇子曰趙於戰國強國也非大失計未遽亡也孝成王貪上黨之利不聽趙豹而聽趙勝以致秦怒一失矣使廉頗拒秦長平聽秦之間而使趙括代頗再失矣趙括既敗邯鄲被圍虞卿請以重寶附楚魏以援國示秦則秦媾可合王不能用而聽趙豹使鄭朱入秦求媾諸侯由此莫肯救趙三失矣積此三失以致大敗僅能自存由此觀之非秦獨能敗趙而趙之所以自敗者多矣故善為國者必先定計慮計慮既定雖有禍敗不至亡國也古史卷二十
