body:
  text: 古史卷三十四宋蘇轍撰孟子孫卿列傳第十一孟子鄒人也名軻魯公族孟孫之後也學於孔子之孫子思明孔之遺業㳺事齊宣王宣王始以為卿不用其言孟子致為臣而歸又欲中國而授之室養弟子以萬鍾孟子不願也去齊適梁梁惠王方東敗於齊南辱於楚西䘮地於秦折節下士将以求報問利國於孟子孟子曰王何必曰利亦有仁義而已矣惠王亦不能用孟子往來齊梁之間見梁襄王齊湣王間適魯適宋適鄒適滕庻㡬或用魯平将見孟子而嬖人臧倉沮止之滕文公為世子将之楚過宋見孟子説之及即位使然友見孟子於鄒孟子誨之三年之䘮文公行之既而之滕教之井田學校四方之士聞滕行仁政有相帥而從之者後齊涽王聞燕噲之亂将伐燕沈同以問孟子曰燕可伐歟孟子曰可子噲不得與人燕子之不得受燕於子噲齊人伐燕克之諸侯多謀救燕或謂孟子勸齊伐燕何也孟子曰我言燕之可伐而不言齊之可以伐燕也乃勸涽王反其耄倪止其重器為燕立君而去史記齊世家言孟子勸齊涽王伐燕是不考之孟子也而孟子稱齊宣王伐燕亦失之矣是時秦已用商君富國強兵楚魏用吴起戰勝克敵齊威宣王用孫子田忌諸侯東面朝齊秦儀軫衍之徒合從連横以欺詐茍得相髙㳺談之士得志於時而楊朱墨翟諸子雜學方熾孟子推明孔氏崇三代之故所如不合知世将大亂恐周孔之道絶而不續退而與其弟子公孫丑萬章之徒記其平生荅問稱道之言作孟子七篇後世傳之蘇子曰孟子生於戰國知仁義可以化服暴彊以此游説諸侯諄諄言之兾其或信而諸侯皆習於鄙詐莫以為然者梁襄王問孟子天下烏乎定孟子對曰定于一曰孰能一之曰不嗜殺人者能一之當是時諸侯皆将以多殺人一天下誠有不嗜殺人之君招而撫之天下必将歸之孟子之言非茍為大而已也然不深原其意而詳究其實未有不以為迂者矣于觀戰國之後更始皇項籍殺人愈多而天下愈亂及漢髙帝雖以兵取天下而心不在殺人然後乃定子孫享國二百餘年王莽之亂盗賊蜂起光武復以不嗜殺人収之及桓靈之禍曹公孫劉皆有盖世之略而以喜怒人故天下卒於三分司馬父子力能一之而殺心益熾故既一復㪚裂為五胡離為南北隋文帝又能合之矣而好殺不已至子而敗及唐太宗始復不嗜殺人天下乃定其後五代之君出於盗賊乞養屠戮生靈如恐不及數十年之間天下五禪皆不能有天下之半及宋受命藝祖皇帝雖以神武誅鉏僣偽而不嗜殺人之心神民信之未及十年而削平之功比於漢唐天下既定輕刑厲禁凡所誅戮一附於法匹夫匹婦無寃死之獄其仁過於前代是以百有餘年兵革不試户口充溢有死於癘疾而無死於兵亂盖自孟子以來能一天下者四君皆以不嗜殺人致之由此觀之孟子之言豈偶然而已哉三騶子皆齊人齊威宣相繼喜士養士稷門之下自淳于髠以下七十餘人髙者為列大夫為開第康荘之衢髙門大屋尊寵之覽天下諸侯賔客言齊能致天下賢士三騶子前曰騶忌先孟子以鼔琴干威王因及國政遂受相印封成侯稷下先生淳于髠之徒始輕騶忌相與設微言挑之忌答之如響髠等乃服其次騶衍後孟子騶衍深觀隂陽消息而作怪迂之變始終大聖之篇十餘萬言其語閎大不經必先騐小物推而大之至於無垠先序今以上至黄帝學者所共知並世盛衰因載其禨祥度制推而逺之至天地未生不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能賭稱引天地剖判以來五徳轉移治各有宜而符應若兹以為儒者所謂中國者於天下乃八十一分之一分耳名曰赤縣神州赤縣神州内自有九州禹所叙九州是也不得為州數中國外如赤縣神州者九乃所謂九州也各有禆海環之人民禽獸莫能相通者如一區中乃為一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施王公大人初見其術驚而化之其後亦莫能行衍始以此重於齊適梁惠王郊迎執賔主之禮適趙平原君側行襒席如燕昭王擁彗先驅請列弟子之坐而受業築碣石宫身往師之其見尊禮如此稷下先生自淳于髠慎到環淵接子田駢騶奭之徒各著書言治亂以干世主云淳于髠齊人也博聞強記學無所主其諫説慕晏嬰之為人也然以承意觀色為務客有見髠於梁惠王惠王屏左右獨坐而再見之終無言也惠王怪之以譲客曰子之稱淳于先生管仲不及及見寡人寡人未有得也豈寡人不足為言耶客以謂髠髠曰固也吾前見王王志在馳逐後見王王志在聲音吾是以黙然客具以報王王大駭曰淳于生聖人也前先生之來人有獻善馬者寡人未及視㑹先生至後先生之來人有獻謳者未及試亦㑹先生來寡人雖屏人然私在彼後淳于髠見一語連三日三夜無倦惠王欲以卿相待之髠謝去送以安車駕駟束錦加璧黄金百鎰終身不仕慎到趙人田駢接子齊人環淵楚人皆學黄老道徳之術發明其指意慎到著十二論環淵著上下篇最後騶奭頗采騶衍之術以為書盖騶衍迂大而閎辯奭也文具難施淳于髠久與處時有善言故齊人頌曰談天衍雕龍奭炙轂過髠然其書今皆不傳荘子曰田駢慎到不師知慮不知前後魏然而已矣推而後行曵而後往若飄風之還若羽之旋若磨石之墜全而無非動靜無過未甞有罪若無知之物而已田駢學於彭蒙彭蒙曰古之道人至於莫之是莫之非其道則釋氏所謂鈍根聲聞者耶孫卿趙人年五十始來游學於齊田駢之屬皆已死齊襄王時孫卿最為老師齊尚修列大夫之缺而孫卿三為祭酒焉齊人或䜛孫卿孫卿乃適楚春申君以為蘭陵令春申君死孫卿廢因家蘭陵李斯甞為弟子已而相秦孫卿疾濁世君臣不知三代之正而以變詐相怵滛侈相説士爭為小説詭辯以欺惑世俗著書數萬言其辭憤切反復卒因𦵏蘭陵自孔子沒諸子不聞大道之要各以意言之老子清淨無為雖與世䟽濶然其本則天地之至理也至於列子荘子推而廣之渉迂怪矣然猶不失正也如慎到田駢則蕩矣若楊朱墨翟始亦皆有見焉而楊朱破法以便身墨翟増法以為物其説皆不可用此其卓然可得而論者也至於公孫龍堅白同異之辯雖巧無益於道及楚之尸子阿之吁子今皆不傳於世蘇子曰易曰一隂一陽之謂道繼之者善也成之者性也一隂一陽隂陽之未形也猶喜怒哀樂之未發也隂陽之未形也謂之道喜怒哀樂之未發也謂之中中則道也其在人為性及其發而中節仁義禮知之用見於物則所謂善亦所謂和也故孔子曰性相近也習相逺也聖人之言性止於是而已矣孟子學於子思得其説而漸失之則指善以為性至於孫卿自任而好異因孟子而反之則曰人性惡夫善惡皆習也指習以為性而不知其非二子之失一也然而性之有習習之有善惡譬如火之能熟與其能焚也孟子之所謂善則火之能熟者也是火之得其性者也孫卿之所謂惡則火之能焚者也是火之失其性者也孫卿之失則逺矣古史卷三十四
