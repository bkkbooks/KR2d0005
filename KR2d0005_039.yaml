body:
  text: 古史卷三十九宋蘇轍撰商君列傳第十六商君者衛之公族也名鞅少好刑名之學事魏相公叔痤為中庻子痤知其賢未及進㑹痤病魏惠王親往問病曰公叔病有如不可諱将奈社稷何痤曰痤之中庻子公孫鞅年雖少有竒才願王舉國而聼之王嘿然王且去痤屏人言曰王即不聼用鞅必殺之無令出境王許諾而去痤召鞅謝曰今者王問可以為相者我言若王色不許我我方先君後臣因謂王即弗用鞅當殺之王許我汝可疾去矣且見禽鞅曰彼王不能用君之言任臣又安能用君之言殺臣乎卒不去惠王既去謂左右曰公叔病甚悲乎欲令寡人以國聼公孫鞅也豈不悖哉痤既死鞅聞秦孝公下令國中求賢者将修穆公之業東復侵地乃西入秦因孝公寵臣景監以求見孝公既見鞅語事良久孝公時時睡弗聼罷孝公怒景監曰子之客妄人耳安足用邪景監以讓鞅鞅曰吾説公以帝道其志不開悟矣後五日復求見孝公益愈然而未中㫖罷孝公復讓景監景監亦讓鞅鞅曰吾説公以王道而未入也請復見孝公善之而未用也孝公謂景監曰汝客善可與語矣鞅曰吾説公以覇道其意欲用之矣誠復見我我知之矣鞅復見孝公公與語不自知䣛之前於席也語數日不厭景監曰子何以中吾君吾君之歡甚也鞅曰吾説公以帝王之道比三代而君曰久逺吾不能待且賢君者各及其身顯名天下安能邑邑待數十百年以成帝王乎故吾以強國之術説君君大説之耳然亦難以比徳於殷周矣孝公既用鞅鞅欲變法恐天下議已鞅曰疑行無名疑事無功且夫有髙人之行者固見非於世有獨知之慮者必見敖於民愚者闇於成事知者見於未萌民不可與慮始而可與樂成論至徳者不和於俗成大功者不謀於衆是以聖人茍可以強國不法其故茍可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教知者不變法而治因民而教不勞而成功縁法而治吏習而民安之鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而覇智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過循禮無邪鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善以鞅為左庻長卒定變法之令令民為什伍而相收司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者顯榮無功者雖富無所芬華令既具未布恐民之不信已乃立三丈之木於國都市南門募民有能徙置北門者予十金民怪之莫敢徙復曰能徙者予五十金有一人徙之輙予五十金以明不欺卒下令令行於民朞年秦民之國都言初令之不便者以千數於是太子犯法鞅曰法之不行自上犯之将法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民道不拾遺山無盜賊家給人足民勇於公戰怯於私鬬鄉邑稱治秦民初言令不便者有來言令便者鞅曰此皆亂化之民也盡遷之於邊城其後民莫敢議令於是以鞅為大良造将兵圍魏安邑秦本紀及此皆言鞅圍魏安邑降之按此後鞅欺魏将公子卬殺之破其軍然後魏去安邑徙都大梁則於此言圍魏安邑降之者皆誤也但當言圍耳居三年築冀闕宫庭於咸陽秦自雍徙都之令民父子兄弟同室内息者為禁集五都鄉邑聚為縣置令丞凡三十一縣為田開阡陌封疆而賦稅平平㪷桶權衡丈尺行之四年公子䖍復犯約劓之居五年秦人富強天子致胙於孝公諸侯畢賀其明年齊敗魏兵於馬陵虜其太子申殺将軍龎涓其明年鞅説孝公曰秦之與魏譬若人之有腹心疾非魏并秦秦即并魏何者魏居嶺阨之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢國頼以盛而魏往年大破於齊諸侯畔之可因此時伐魏魏不支秦必東徙秦因據河山之固東鄉以制諸侯此帝王之業也孝公以為然使鞅将而伐魏魏使公子卬将而擊之軍既相距鞅遺卬書曰吾始與公子歡今俱為兩國将不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏卬以為然㑹盟已飲而鞅伏甲士襲虜卬因攻其軍盡破之魏惠王兵數破於齊秦國内空日以削恐乃使使割河西之地獻於秦以和而魏遂去安邑徙都大梁梁惠王曰寡人恨不用公叔痤之言也鞅既破魏還秦封之於商十五邑號為商君商君相秦十年宗室貴戚多怨望者趙良見商君商君曰鞅之得見也從孟蘭臯今鞅請得交可乎良曰僕弗敢願也孔丘有言曰推賢而戴者進聚不肖而王者退僕不肖故不敢受僕聞之曰非其位而居之曰貪位非其名而有之曰貪名僕聼君之義則恐僕貪位貪名也故不敢聞命啇君曰子不說吾治秦歟良曰反聼之謂聰内視之謂明自勝之謂強虞舜有言曰自卑也尚矣君不若道虞舜之道無為問僕矣商君曰始秦戎狄之教父子無别同室而居今我更制其教而為其男女之别大築冀闕營如魯衛矣子觀我治秦也孰與五羖大夫賢良曰千羊之皮不如一狐之掖千人之諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅将事子子又何辭焉良曰夫五羖大夫荆之鄙人也聞秦繆公之賢而願望見行而無資自粥於秦客被褐食牛期年繆公知之舉之牛口之下加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉國之君一救荆國之禍發教封内而巴人致貢施徳諸侯而八戎來服由余聞之欵闗請見五羖大夫之相秦也勞不坐乘暑不張盖行於國中不從車乘不操干戈功名藏於府庫徳行施於後世五羖大夫死秦國男女流涕童子不歌謡㫪者不相杵此五羖大夫之徳也今君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事大築冀闕非所以為功也刑黥太子之師傅殘傷民以峻刑是積怨畜禍也教之化民也深於命民之効上也㨗於令今君又左建外易非所以為教也君又南面而稱寡人日繩秦之貴族詩曰相䑕有體人而無禮人而無禮何不遄死以詩觀之非所以為夀也公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者崩此數事者非所以得人也君之出也後車十數從車載甲多力而駢脅者為驂乘持矛而操闟㦸者旁車而趨此一物不具君固不出書曰恃徳者昌恃力者亡君之危若朝露尚将欲延年益夀乎則何不歸十五都灌園於鄙勸秦王顕巖穴之士飬老存孤敬父兄序有功尊有徳可以少安君尚将貪商於之富寵秦國之教畜百姓之怨秦王一旦捐賔客而不立朝秦國之所以收君者豈其微哉亡可翹足而待商君弗從後五月而秦孝公卒太子立公子䖍之徒告商君欲反發吏捕商君商君亡至闗下欲舍客舍舍人不知其是商君也曰商君之法舍人無驗者坐之商君喟然嘆曰嗟乎為法之敝一至此哉去之魏魏人怨其欺公子卬而破魏師弗受商君欲之他國魏人曰商君秦之賊秦強而賊入魏弗歸不可遂内秦商君既復入秦走商邑與其徒屬發邑兵北出擊鄭秦發兵攻商君殺之於鄭黽池秦惠王車裂商君以徇曰莫如商鞅反者遂滅商君之家蘇子曰解牛之技恥於屠狗禦人之盜恥於穿窬衛鞅有帝王之術而肯以強國之事說孝公乎盖鞅之志本於強國而已恐孝公之不能用是以極言其上以要之耳鄭子華欲以鄭為市於齊管仲不受而諸侯歸之鞅欺公子卬以取魏河西利之所在無所復頋鞅而知帝王之術其肯為此哉古之制刑輕重必與事麗殺人者死傷人及盜抵罪故人雖死而無憾今鞅使不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男不分異者倍賦事末利及怠而貧者舉為收孥刑之輕重豈復與事麗哉其後始皇之世有子而嫁者有刑夫為寄豭者殺之無罪妻為逃嫁者子不得母法皆與情不應至於偶語詩書者弃市以古非令者族其端皆自鞅發之然鞅之死至於車裂而李斯之死至具五刑皆被赤族之禍天之報人豈誣也哉古史卷三十九
