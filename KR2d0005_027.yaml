body:
  text: 古史卷二十七宋蘇轍撰曹子臧吳季札列傳第四曹子臧者曹宣公之庶子也名欣時宣公之十九年會諸侯伐秦而卒于師曹人使公子負芻守使欣時逆公之喪負芻殺其世子而自立諸侯將討之宣公既葬子臧欲亡去國人皆將從之負芻懼告罪且請焉子臧反而置其邑負芻之二年諸侯來討執而歸之京師將以子臧見王而立之子臧辭曰志有之聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋眀年曹人告於晉請歸負芻而反欣時晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡置其邑與卿而不出孔子善之故於負芻之歸也書曰曹伯歸自京師春秋諸侯失地必名於其反也書曰自某歸于某曹伯不名而書曰歸自京歸言無與爭國者也其後二十年而吳季子稱子臧之義讓其兄諸樊吳季札者吳子壽夢之幼子也兄弟四人長曰諸樊次曰餘祭次曰夷昧次曰季札季札賢父欲立之季札讓不可則立諸樊諸樊既除喪復欲立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節君義嗣也誰敢干君有國非吾節也札雖不才願附於子臧之義以無失節固立之棄其室而耕乃舍之諸樊十三年卒有命立餘祭欲以次必致國於季子餘祭四年卒夷末立使季子聘於上國至魯説叔孫穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼舉何以堪之請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉儉而易行以德輔此則盟主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰直而不倨曲而不屈邇而不逼逺而不擕遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八音平節有度守有敘盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慚德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已遂聘於齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將作矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢於幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難季子之初使過徐徐君好其寶劒口弗敢言季子心知之為使上國未獻也及還至徐徐君已死遂解劔懸之徐君冢樹而去從者曰徐君死矣尚誰豫季子曰始吾心已許之豈以死背吾心哉夷昧十七年卒吳人將以先君之命立季子季子逃去吳人乃立夷昧之子僚諸樊之子光以僚之立也不順陰飬死士欲以為亂僚立十二年將因楚平王之喪伐楚復使季子出聘以觀諸侯季子至齊而長子死葬於嬴慱之間孔子聞之曰延陵季子吳之習於禮者也往吊而觀焉坎深不至於泉斂以時服既葬而封廣輪掩坎其高可隱左袒右旋而號者三曰骨肉歸復於土魂氣無不之也已而遂行孔子曰延陵季子之於禮也其合矣乎及季子歸則光已弒僚矣季子復命哭墓復位而待曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之古之道也季子復事闔廬夫差年九十餘楚子期伐陳吳使季子救之季子謂子期曰二君不務德而力爭諸侯民何罪我請退以為子名務德而安民乃還後十二年而吳亡季子蓋已沒矣蘇子曰春秋之際世不知義而以權利為貴雖齊桓晉文皆以爭國成名者也如子臧之於曹季子之於吳皆有可取之義棄而不顧而况於爭乎豫髙二子之義欲考其行事而子臧反國而致事事不復見季子事吳九十餘年觀其挂劔於墓不以死背其心葬子嬴博不以恩纍其志引兵避楚不以名害其德蓋其所以養心者至矣雖祿之天下將有所不受而況於吳乎彼其所養者誠重故也古史卷二十七
