body:
  text: 古史卷四十六宋蘇轍撰平原君列傳第二十三平原君趙勝者趙武靈王子而惠文王弟也諸子中勝最賢喜賔客賔客蓋至數千人相惠文王及孝成王三去相三復位封於東武城勝家樓臨民家民家有躄者盤𣪚行汲美人居樓上臨見大笑之眀日躄者至門曰臣聞君之喜士士不逺千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宫臨而笑臣臣願得笑臣者頭勝應曰諾躄者去勝笑曰觀此豎子乃欲以一笑之故殺吾美人不亦甚乎終不殺居嵗餘賔客門下舍人稍稍引去者過半勝怪之曰勝所以待諸君者未嘗敢失禮而去之者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是勝斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來是時齊有孟嘗魏有信陵楚有春申故爭相傾以待士秦之圍邯鄲趙使勝求救合從於楚約與食客門下有勇力文武備具者二十人偕勝曰使文能取勝則善矣文不能取勝則㰱血於華屋之下必得定從而還士不外索取於食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣勝曰先生處勝之門下幾年於此矣毛遂曰三年於此矣勝曰夫賢士之處世也譬若錐之處􅌩中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃頴脫而出非特其末見而已勝與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服勝與楚合從言其利害日出而言之日中不决十九人謂毛遂曰先生上毛遂按劔歷階而上謂勝曰從之利害兩言而决耳今日出而言從日中不决何也楚王曰客何為者也勝曰是勝之舍人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂按劔而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今椘地方五千里持㦸百萬此霸王之資也以楚之強天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取狗馬雞之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與㰱此血於堂下公等録録所謂因人成事者也勝已定從而歸歸至於趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃於毛先生而失之毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌強於百萬之師勝不敢復相士遂以為上客勝既返趙楚使春申君將兵赴救趙魏信陵君亦矯奪晉鄙軍往救趙皆未至秦急圍邯鄲邯鄲急且降邯鄲傳舍吏子李同謂勝曰君不憂趙亡耶勝曰趙亡則勝為虜何為不憂乎李同曰邯鄲之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘粱肉而民褐衣不完糟糠不厭民困兵盡或剡木為矛矢而君器物鍾磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編於士卒之間分功而作家之所有盡𣪚以饗士士方其危苦之時易德耳於是勝從之得敢死之士三千人李同遂與三千人赴秦軍秦軍為之却三十里亦會楚魏救至秦兵遂罷邯鄲復存李同戰死封其父為李侯虞卿欲以信陵君之存邯鄲為勝請封公孫龍聞之夜駕見勝曰龍聞虞卿欲以信陵君之存邯鄲為君請封有之乎勝曰然龍曰此甚不可且王舉君而相趙者非以君之智能為趙國無有也割東武城而封君者非以君為有功也而以國人無勳乃以君為親戚故也君受相印不辭無能割地不言無功者亦自以為親戚故也今信陵君存邯鄲而請封是親戚受地而國人計功也此甚不可且虞卿操其兩權事成操右劵以責事不成以虛名德君君必勿聽也勝遂不聽虞卿勝以趙孝成王十五年卒子孫代後竟與趙俱亡勝厚待公孫龍公孫龍善為堅白之辨及鄒衍過趙言至道乃絀公孫龍蘇子曰趙勝傾身下士以竊一時之聲可耳至於為國計慮勝不知也趙欲距燕有廉頗趙奢不能用而割地與齊以借田單知單之賢而不知其不為趙用也及韓馮亭以上黨嫁禍於趙趙豹眀其不可而勝貪取之長平之禍成於勝一言此皆貴公子不知務之禍也乃欲使之相危國拒強秦難矣哉古史卷四十六
