body:
  text: 古史卷十九宋蘇轍撰越世家第十二越王句踐其先禹之苗裔夏后少康之庶子也封於會稽謂之越子斷髮文身披草萊而邑焉或謂越祝融之後芉姓故史伯告鄭桓公曰芉姓夔越不足命也史記以越為禹後姒姓未知孰是其先二十餘世不通於諸侯與吳為鄰世相攻戰至於允常吳王闔閭立五年始舉兵伐之春秋謂之於越魯史墨聞之曰越得嵗而吳伐之不及四十年吳將不免闔閭十年克楚入郢越間之入吳吳亦敗於秦楚而歸允常卒子句踐立時闔閭之十九年也越王句踐元年闔閭因其䘮伐之句踐禦之陳于槜李患吳之整也使死士再禽焉不動使罪人三行屬劒于頸曰二君有治臣奸旗鼓不敢逃死遂自剄也師屬之目因而伐之大敗吳師闔閭傷指而卒其子夫差日夜勒兵且以報越三年越欲先吳未發徃伐之大夫范蠡諫曰不可臣聞兵者凶器也戰者逆徳也争者事之末隂謀逆徳好用凶器試身於所末上帝禁之行者不利越王曰吾已决之矣遂興師吳王悉發精兵擊越敗之夫椒遂入越越王以甲楯五千保於會稽謂范蠡曰以不聽子故至此為之奈何范蠡對曰卑辭厚禮以遺之不許而身與之市越王許諾乃使大夫種因太宰嚭以行成於吳膝行頓首曰君王亡臣句踐使陪臣種敢告下執事句踐請為臣妻為妾吳王將許之伍員言於吳王曰天以越賜吳勿許也種還以報越王越王欲殺妻子燔寶器觸戰以死種止之曰吳太宰嚭可誘以利請間行言之於是越王乃以美女寶器令種間行獻嚭嚭受之乃見種於吳王種頓首言曰願大王赦句踐之罪盡入其寶器不幸不赦句踐將盡殺其妻子燔其寶器悉五千人觸戰必有當也嚭因説吳王越已服為臣若將舍之此國之利也吳王將許之伍員進諫曰今不滅越後必悔之句踐賢君種蠡良臣若反國將為亂吳王弗聽卒赦越罷兵而歸越王之困會稽也喟然歎曰吾終於此乎種曰湯繫夏臺文王囚羑里齊小白奔莒晋重耳奔狄其卒王伯何遽不為福乎及其反乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰汝忘會稽之耻耶身自耕作夫人自織食不加肉衣不重采折節下賢厚遇賔客振貧弔死與百姓同其勞欲使范蠡治國政蠡曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種於是舉國政屬大夫種而使范蠡與大夫拓稽為質於吳五年而吳歸蠡九年越王自會稽歸七年矣其士民皆欲用以報吳大夫逢同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之擊也必匿其形今夫吳兵加齊晋怨結楚越名髙天下實害周室徳少而功多必滛自矜為越計莫若結齊親楚附晋以厚吳吳志廣必輕戰是我連其權三國伐之越承其弊可克也越王曰善十一年吳王伐齊十三年將復伐齊越王率其衆朝焉王及列士皆有饋賂吳人皆喜唯伍員懼諫弗聽遂伐齊敗之而歸殺伍員而任嚭以政越王召范蠡曰吳已殺子胥導䛕者衆可乎對曰未可十四年吳會魯橐臯十五年吳會晋黄池吳精兵從王惟老弱與太子守越王復問范蠡蠡曰可矣夏六月丙子伐吳為二隧疇無餘謳陽自南方先及郊吳太子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讎而弗殺也屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越王至王子地守丙戍復戰大敗獲太子友彌庸夀於姚丁亥入吳吳王歸自黄池使人厚賂以請成越自度亦未能滅吳乃與吳平十九年越復伐吳吳士民罷弊輕鋭死於齊晋遇於笠澤夾水而陳越為左右句卒使夜或左或右鼓譟而進吳師分以禦之越以三軍潜渉當吳中軍而鼓之吳師大亂遂敗之二十一年越圍吳二十三年始聘於魯二十四年夏納邾隐公邾太子革來奔吳王夫差棲於姑蘇之山使公孫雄請成於越肉袒膝行而前曰孤臣夫差敢布腹心異日嘗得罪于會稽夫差不敢逆得與君王成以歸今君王舉玉趾而誅孤臣惟命是聽意者亦如會稽之赦孤臣之罪乎越王不忍欲許之范蠡曰會稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎且夫君王蚤朝晏罷非為吳耶謀之二十二年一旦而棄之可乎天與弗取反受其殃伐柯者其則不逺君忘會稽之厄乎越王曰吾欲聽子不忍其使者范蠡乃鼓進兵曰王已屬政於執事使者去不者且得罪使者泣而去十一月遂滅吳夫差自殺越王葬之史記越王葬吳王而誅太宰嚭嚭之罪誅之固當然左傳哀公二十四年公如越得太子適郢將妻公而多與之地公孫有山告于季孫季孫懼使因太宰嚭而納賂乃止滅吳後二年嚭尚在則越未嘗誅嚭也越王已平吳乃以兵北渡淮與諸侯會于徐州致貢於周周元王使人賜越王胙命為伯越乃以淮北地與楚歸吳所侵宋地於宋與魯泗東方百里當是時越兵横行於江淮東諸侯畢賀號稱伯王范蠡遂去自齊遺大夫種書曰蜚鳥盡良弓藏狡兎死走狗烹越王為人長頸鳥喙可與共患難不可與共樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劔曰子教寡人伐吳七術寡人用其三而敗吳其四在子子為我從先王試之種遂自殺二十五年秋魯哀公使叔青來聘使諸鞅報聘於魯二十六年魯哀公來朝二十七年衛出公在城鉏使其祝史揮來請師以伐衛二十八年夏使臯如后庸帥師會宋魯之師以納衛侯取賂弗克納而還衛侯來奔遂死于越二十九年春使后庸聘于魯且言邾田封于駘上秋魯哀公來奔王句踐卒左傳史記皆不記句踐之年然史記稱越王元年闔閭聞允常死興師伐越敗於槜李今據此而求之春秋以次句踐之年然卒不知其卒之年矣子王鼫與立王鼫與卒子王不夀立王不夀卒子王翁立王翁卒子王醫立王醫卒子王之侯立王之侯卒子王無彊立無彊興師北伐齊西伐楚與中國争彊當楚威王時越方伐齊齊宣王使人説越王曰越不伐楚大不王小不伯圖越之所以不伐楚者為不得晋也韓魏固不攻楚韓之攻楚覆其軍殺其將則葉陽翟危魏亦覆其軍殺其將則陳上蔡不安故二晋之事越不至於覆軍殺將汗馬之力不效所重於得晋者何也越王曰所求於晋者不至於頓兵接刃而况攻城圍邑乎願魏以聚大梁之下願齊之試兵南陽莒地以聚常郯之境則方城之外不南淮泗之間不東商於析酈宋胡之地夏路以左不足以備秦江南泗上不足以待越矣則齊秦韓魏得志於楚也是二晋不戰而分地不耕而穫之不此之為而頓刄於河山之間以為齊秦用所待者如此其失計奈何其以此王也齊使者曰幸也越之不亡也吾不貴其用智之如目見毫毛而不見其睫也今王知晋之失計而不自知越之過是目論也王所待於晋者非其馬汗之力也又非可與合軍連和也將待之以分楚衆也今楚衆已分何待於晋越王曰奈何曰楚三大夫張九軍北圍曲沃於中以至無假之闗者三千七百里景翠之軍北聚齊魯南陽分有大於此者乎且王之所求者鬬晋楚也晋楚不鬬越兵不起是知二五而不知十也此時不攻楚臣是以知越大不王小不伯復讎龐長沙楚之粟也索隐復猶言况復也讎當作犫犫龎長沙三邑也竟澤陵楚之材也越窺兵通無假之闗此四邑者不上貢事於郢矣臣聞之圖王不成其弊可以伯而不伯者王道失也故願大王之轉攻楚也於是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無彊盡取故吳地至浙江北破齊於徐州而越以此散諸族子争立或為王或為君濵於江南海上服朝於楚後七世至閩君揺佐諸侯平秦漢高帝復以揺為越王以奉越後東越閩君皆其後也蘇子曰吳以蠻夷爭盟上國陵蔑齊晋結怨楚越再世而亡何者地逺而民勞勢不順也越王句踐既克夫差雖號伯王而實歛兵自守無大征伐分吳故土以畀楚宋魯遂以保國傳世彼親見其害知所以自監矣哉至王無彊無闔閭之知而有夫差之愚其殘國宜矣昔楚莊王克陳宋鄭力能取之而不有諸侯安之而楚遂以興靈王大城陳蔡不羮經營中夏貪而不止則身受其咎葢東南之常勢於是可見矣自東晋以來至於陳皆國於吳越之墟成敗之迹無不然者雖桓温劉裕善用兵或能一勝而民以罷弊訖於無成至殷浩庾亮葢不足數也如謝安之賢猶勉彊北征失䇿而死亦眩於其名而未安其實故耶嗟夫謀國如蔡謨吾有取焉古史卷十九
