body:
  text: 古史卷三十七宋蘇轍撰范蠡大夫種列傳第十四范蠡大夫種越之二大夫也吴王夫差将伐越以報闔廬之怨越王句踐謀以兵先之范蠡諫曰臣聞持盈者與天定傾者與人節事者與地聖人隨時以行是謂守時天時不作勿為人害人事不起勿為人始今君王未盈而溢天時人事不至而欲先之必災於王身王弗聼乃興師遇於五湖大夫種又諌曰吴之與越惟天所授王其無庸戰夫申胥華登簡服吴國之士於甲兵而未甞有所挫也夫一人善射百夫決拾勝未可成也王不如設戎約辭行成以喜其民以廣侈吴王之心吾以卜之於天天若棄吴必許吾成而不吾足也将必寛然有伯諸侯之心既罷弊其民而天奪之食安受其燼乃無有命矣王又弗聼遂及夫差戰敗於夫椒以餘兵五千棲於㑹稽召范蠡大夫種而謝之蠡曰臣固言之矣持盈者與天定傾者與人節事者與地王曰奈何對曰卑詞厚禮以事之不可而身與之市越王曰諾乃使大夫種行成於吴吴王許之越王将使蠡守國蠡曰四封之内百姓之事蠡不如種四封之外敵國之制種不如蠡乃使種守而蠡為質於吴三年而吴人歸之居四年民有三年之食國之父兄請報吴王召蠡而問之對曰未可也臣聞強索者不祥得時不成反受其殃王其毋早圖王曰諾又一年王召蠡而問曰吾與子謀吴子曰未可也今吴王滛於樂而忘百姓信䜛喜優忠臣解骨其可乎對曰人事至矣天應未也王姑待之王曰諾又一年王召蠡而問曰吾與子謀吴子曰未可今伍貟驟諌吴王吴王怒而殺之其可乎對曰逆節萌生天地未形而先為之征其事不成俱受其刑王姑待之王曰諾又一年王召蠡而問曰吾與子謀吴子曰未可今其稲蟹不遺種其可乎對曰天應至矣人事未盡也王姑待之王怒曰道固然乎吾與子言人事子應我以天今天應至矣子應我以人事何也對曰王姑勿怪夫人事必與天地相參然後可以成功今其禍新民恐人知財用資物不足以支長久将同其力致其死伐之必殆王姑待之使其民盡其力而無所取食乃可以致天地之極及季秋王又召蠡而問曰今嵗晩矣子将奈何對曰㣲君王之言臣固将請之從時猶救火追亡人也王曰諾遂興師伐吴至於五湖吴人聞之出而挑戰一日五反王弗忍欲應之蠡諫曰謀之廊廟失之中原其可乎臣聞得時無怠時不再來天與弗取反受之災贏縮轉化後将悔之天節固然惟謀不遷王曰諾弗許蠡曰臣聞古之善用兵者贏縮以為常四時以為紀無過天極究數而止陽至而隂隂至而陽日困而還月盈而匡後則用隂先則用陽近則用柔逺則用剛後無隂蔽先無陽察用之無藝往從其所剛強以禦陽節不盡不死其野彼來從我固守勿予若将與之必因天地之災及觀其民之饑飽勞佚以參之盡其陽節盈吾隂節而奪之利宜為人客剛強而力疾陽節不盡輕而不可取宜為人主安徐而重固隂節不盡柔而不可追凢陳之道設右以為牝益左以為牡蚤晏無失必順天道周旋無究今其來也剛強而力疾王姑待之王曰諾弗與戰居軍二年吴師自潰越兵歸至五湖蠡辭於王曰君王勉之臣不復入越國矣越王驚問其故對曰臣聞主憂臣辱主辱臣死昔君王辱於㑹稽臣所以不死者為此事也今事已濟矣請從君之罰王曰所以不掩子之惡揚子之美者使其身無終沒於越國聼吾言與子分國不聼吾言身死妻子為戮對曰臣聞命矣君行令臣行意遂乘輕舟以浮於五湖越王使工以良金為蠡之状而朝禮之環㑹稽三百里為蠡封邑後世子孫無得侵蠡之地蠡浮海至齊以書招大夫種種不能用而死蠡遂變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産居無幾何致産數十萬齊人聞其賢以為相蠡喟然嘆曰居家則致千金居官則致卿相此布衣之極也久受尊名不祥乃歸相印盡􅄆其財以分與知友鄉黨而懐其重寳間行以去止于陶以為此天下之中交易有無之路通為生可以致富矣於是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公朱公居陶生少子少子及壮而朱公中男殺人囚於楚朱公曰殺人而死職也然吾聞千金之子不死於市告其少子往視之乃装黄金千鎰置褐器中載以一牛車且遣之朱公長男固請欲行朱公不聼長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言曰今遣少子未必能生中子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故善荘生曰至則進千金于荘生所聼其所為慎無與爭事長男既行亦自私齎數百金至楚荘生家負郭披藜藋到門居甚貧然長男發書進千金如其父言荘生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過荘而私留以其私齎獻遺楚國貴人用事者荘生雖居窮閻然以亷直聞於國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金後復歸勿動而朱公長男不知其意以為殊無短長也荘生間時入見楚王言某星宿某此則害於楚楚王素信荘生曰今為奈何荘生曰獨以徳為可以除之楚王曰生休矣寡人将行之王乃使使者封三錢之府楚貴人驚告朱公長男曰王且赦曰何以也曰毎王且赦常封三錢之府昨暮王使使封之朱公長男以為赦弟固當出也重千金虛棄荘生無所為也乃復見荘生荘生驚曰若不去耶長男曰固未也初為事弟弟今議自赦故辭生去荘生知其意欲復得其金曰若自入室取金長男即自入室取金持去獨自歡幸荘生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修徳報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右故王非能卹楚國而赦乃以朱公子故也楚王大怒曰寡人雖不徳耳奈何以朱公之子故而施惠乎令論殺朱公子明日遂下赦令朱公長男竟持其弟䘮歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟頋有所不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兎豈知財所從來故輕棄之非所吝惜前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其䘮之來也故范蠡三徙成名於天下卒老死于陶故世傳曰陶朱公或曰范蠡之師計然㳺於越范蠡尊事之凢越之政事多計然之䇿蘇子曰天下未甞無智者也而難於擇君田豐陳宫其智皆足以制曹公而豐事袁紹宫事吕布紹布不用其言而君臣皆亡此固無足言者如陸遜之於孫權髙熲之於隋文言聼計從致君於王伯矣而忮心一起二臣不得其死可不哀哉范蠡知句踐可與共患難則為之滅吴以致其功知其不可與同安樂則棄之浮江湖如去仇讐是以君臣免於惡名可不謂賢哉古史卷三十七
