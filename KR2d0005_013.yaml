body:
  text: 古史卷十三宋蘇轍撰陳把世家第六陳胡公滿者虞舜之後也舜為庶人娶堯之二女居于媯汭其後因姓媯氏有虞閼父者為周武王陶正武王賴其利器用與神明之後也封其子媯滿於陳太昊之虛妻之以元女大姬分之以肅慎氏之貢使奉舜祀以備三恪是為胡公胡公卒子申公犀侯立申公卒弟相公臯羊立相公卒立申公之子突是為孝公孝公卒子慎公圉戎立慎公立當周厲王時慎公卒子幽公寧立十二年周厲王奔彘二十三年幽公卒子釐公孝立六年周宣王即位三十六年釐公卒子武公靈立十五年武公卒子夷公說立是嵗周幽王即位三年夷公卒弟平公燮立七年周幽王為犬戎所殺二十三年平公卒子文公圉立十年文公卒子桓公鮑立二十三年魯隱公初立二十七年鄭莊公使來請成公不許公子他曰親仁善鄰國之寶也公曰宋衛實難鄭何能為二十八年鄭伯來侵大獲而歸三十八年正月桓公卒他殺太子免而自立他文公之子也公疾病而亂作國人分散故以甲戍己丑再赴於諸侯桓公之子躍蔡出也明年八月蔡人為之殺他而立躍是為厲公厲公生子完七年厲公卒弟莊公林立七年莊公卒弟宣公杵臼立史記文公娶蔡女生他故蔡人為他殺丑父及太子免而立他是為厲公七年而太子免之弟躍林杵臼使蔡人誘厲公殺之而立躍是為利公利公立五月死明年莊公林立今按左傳他即五父而非蔡出也蔡出乃厲公躍耳蔡人為躍殺他在桓公卒之明年而躍卒在躍之七年皆見於春秋不知太史公何從得此皆不足信也十四年齊桓公始伯㑹諸侯于鄄始進陳叙衛上宣公之太子曰禦冦嬖子曰欵愛欵將立之二十一年殺禦冦而立欵公子完與顓孫奔齊完留齊為田氏顓孫自齊奔魯三十七年齊桓公以諸侯伐楚至召陵還將道陳鄭之間陳轅濤塗患之與鄭申侯謀請出東道申侯反之於齊桓公怒執濤塗使魯人江人黃人伐我冬諸侯復伐我我請成齊歸濤塗四十五年宣公卒子穆公欵立七年宋襄公將求諸侯而虐邾鄫公告於諸侯請修好焉以無忘齊桓之德冬盟于齊十一年楚成得臣伐我取焦夷城頓十三年楚得臣復圍我以納頓子十六年晉文公敗楚于城濮盟諸侯于踐土公背楚如㑹不及六月穆公卒子共公朔立晉文公之季年衛成公不朝而使孔逹侵鄭六年晉襄公伐衛衛人來告公曰更伐之我辭之衛使孔逹伐晉七年公為衛請成于晉執孔逹以說魯臧文仲以陳衛之睦也求好於我十一年使季孫行父來聘十四年夏楚侵我克壺丘秋楚公子朱復伐我敗之獲其公子茷陳人懼及楚平十八年共公卒子靈公平國立共公之卒楚人不禮焉靈公受盟于晉自是晉楚爭陳兵交於國十三年周使單襄公聘于楚假道於我火朝覿矣道茀不可行候不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹墾田若蓻膳宰不致餼司里不授館國無寄寓縣無施舍民將築臺於夏氏及陳公與孔寧儀行父南冠以如夏氏留賔不見單子歸告王曰陳侯不有大咎國必亡靈公與孔寧儀行父通于夏姬衷其衵服以戲于朝泄冶諫曰君臣宣淫民無效焉且聞不令君其納之公曰吾能改矣以告二子二子請殺之公弗禁遂殺泄冶夏姬者鄭穆公之女而陳大夫御叔之妻徴舒之母也十五年公與二子飲於夏氏公曰徴舒似女對曰亦似君徴舒病之公出自其廄射而殺之二子奔楚國人立世子午是為成公元年正月公㑹楚子鄭伯于辰陵始服于楚十月楚子伐我謂陳人無動吾將有討於少西氏遂入陳殺夏徴舒因縣陳成公奔晉楚申叔時曰以義討徴舒而以貪縣陳其若諸侯何楚子感其言乃復封陳而納寧行父焉史記靈公死太子午奔晉徴舒自立為陳侯按春秋靈公死明年楚子陳侯鄭伯盟于辰陵則太子未嘗奔晉徴舒未嘗為君也蓋楚入陳然後陳侯出奔晉耳二年宋人為晉伐我衛人來救二十七年晉悼公復伯楚公子壬夫為令尹侵欲於小國二十九年晉悼公㑹諸侯盟于雞澤公使袁僑如㑹及諸侯之大夫盟楚司馬何忌侵我三十年成公卒子哀公弱立楚人將伐我聞喪而止陳不聼命楚人使頓侵我我圍頓元年楚人討陳叛故殺壬夫而用公子貞晋范丐曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎遂以諸侯戍陳楚再來伐三年晉侯以諸侯來救公㑹之于鄬慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告公曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖公懼逃歸遂及楚平十六年蔡公子燮將以蔡之晉蔡人殺之慶虎慶寅畏公子黃之逼也訴諸楚曰與蔡司馬同謀楚人以為討黃奔楚呼於國曰慶氏求專陳國暴蔑其君而去其親五年不滅是無天也十九年公朝于楚黃訴二慶于楚楚人召之使慶樂往殺之慶氏以陳叛夏楚屈建從公圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納黃二十年公㑹楚子蔡侯伐鄭當陳隧者井堙木刋鄭人怨焉二十一年夏鄭公子喜公孫僑伐我宵突陳城而入公扶太子偃師奔墓使司馬桓子賂以宗器公免擁杜國人男女别而纍以待于朝鄭師還冬鄭公孫夏復伐我乃與鄭成二十三年晉趙武楚屈建盟諸侯之大夫于宋於是晉楚之從始交相見哀公元妃鄭姬生悼太子偃師二妃生子留下妃生子勝二妃嬖留有寵屬諸司徒招與公子過公有廢疾三十五年招過殺太子偃師而立留公縊而卒干徴師赴于楚公子勝訴之于楚楚靈王執徴師殺之留奔鄭招歸罪於過而殺之九月楚公子棄疾奉偃師之子吳來伐遂滅陳放招于越殺孔奐哀公之嬖袁克殺馬毁玉以葬楚子以穿封戍為陳公晉平公問於史趙曰陳其遂亡乎對曰未也陳顓頊之後歲在鶉火是以卒滅陳將如之今在析木之津猶將復興且陳氏得政于齊而後陳卒亡臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣明年陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産曰何故對曰陳水屬也火水妃而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年歲五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年陳滅之五年楚公子棄疾弒靈王代立欲和諸侯立悼太子偃師之子吳為陳侯而歸之是為惠公六年五月壬午宋衛陳鄭災陳鄭不救火許不弔災君子知其先亡史記惠公以陳滅之明年為元年今以惠公反國為元年為得其正十一年夏齧帥師從楚人拒吳于雞父吳敗我師獲夏齧二十四年惠公卒子懷公栁立元年吳入郢使來召公公朝國人而問焉逢滑曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莾而未見德焉天其或者正訓楚也禍之適吳其何日之有公從之四年吳復召公公恐如吳吳以前怒留之因卒於吳國人立公之子越是為涽公八年吳王夫差克越伐我以修先君之怨十年孔子在陳十三年吳復伐我楚昭王來救師于城父卒于師乃及吳平十六年楚人伐我十七年楚復伐我吳季子來救二十二年楚伐吳公使公孫貞子如吳弔焉及良而卒尸入將命二十三年楚白公勝作亂不克而死我以其間侵楚二十四年楚公孫朝帥師來伐遂滅陳蘇子曰楚方北征諸夏而陳蔡許鄭適當其衝其為國也難矣吳季子札見鄭子産曰子為國慎之以禮不然鄭國將敗子産以區區之鄭立於晉楚之間敬而不懾卒免大國之患非禮何以當之若陳蔡許顛沛隕越之不暇卒先鄭以滅善哉鄭渾罕之論之也曰姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法作丘賦鑄刑書皆廢法以便事故曰無法夫無禮則不能自立無以止大國之暴無法則不能字人民將不懷大國不豫不折必仆民不豫將以其力自斃此其所以為亡之先後也杞東樓公者夏禹之苖裔也周武王封之於把以奉夏后氏之祀東樓公生西樓公西樓公生題公題公生謀娶公當周厲王時謀娶公生武公武公立四十七年卒子靖公立靖公二十三年卒子共公立共公八年卒子德公立世本作惠公德公生二子曰成公桓公德公十八年卒子成公立成公十八年卒弟桓公立德公生成公桓公此據世本春秋僖二十三年把子卒左氏曰成公也史記無成公失之自桓公以上把之朝㑹載於春秋而其君之卒葬不録其世不可詳也當魯隱桓之世把君稱侯莊僖之間把君稱伯僖公末年把君稱子文成以來乃復稱伯蓋近於東夷雜用夷禮用夏則進之用夷則退之魯僖公之十四年齊桓公帥師城緣陵遷把以避淮夷之亂考其年疑成公之世也自桓以來乃頗可考桓公六十三年朝于魯魯成公歸自晉言晉悼公之政桓公說驟朝于晉而請為昏自是諸侯之㑹盟未嘗不與桓公七十年卒子孝公丐立孝公十七年卒子文公益姑立晉平公把出也文公六年晉荀盈合諸侯之大夫以城把諸侯皆不說鄭子太叔曰晉不恤周宗之闕而夏肄是屏其棄諸姬亦可知也晉司馬侯如魯治把之侵地侯知諸侯之怨不盡歸也晉悼夫人訴之平公平公亦不之詰文公十四年卒弟平公郁釐立平公二年晉人復治把田魯以成與之十八年卒子悼公成立悼公十二年㑹諸侯于召陵卒于㑹子隱公乞立七月隱公弟過弒隱公而自立是為僖公僖公十九年卒子涽公維立涽公十六年公弟閼路弒涽公而自立是為哀公哀公十年卒涽公子欶立是為出公出公十二年卒子簡公春立元年楚惠王之四十四年伐滅杞昔堯命羲和舜命九官四嶽皆當世有大功子孫不廢禹之後為夏於周為把契為商於周為宋稷為周臯陶為英六益為秦四嶽為齊許申羲和為楚六人皆有世家惟英六微弱無譜而垂夷䕫龍其後不知所封如滕許邾莒薛唐隨之類其事班班見於春秋而世次不傳不可得而録也蘇子曰把宋皆天子之事守也蓋禮樂車服在焉故孔子曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也宋雖不足徴然春秋之際晉楚大國有所不知未嘗不問焉晉悼公過宋觀桑林之舞楚靈王將㑹諸侯向戍獻公合諸侯之禮六如把遂至於夷無足言者昔孔子學官名於郯子之至微矣而其先王之遺文於諸侯為詳孔子之於夏禮蓋猶有考於把歟而國無君子不能自列悲夫古史卷十三
