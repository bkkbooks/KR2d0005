body:
  text: 古史卷八宋蘇轍撰吳太伯世家第一吳太伯太伯弟仲雍皆周太王之子而王季歷之兄也季歷賢而有聖子昌太王欲立之於是太伯仲雍二人逃奔荆蠻以避季歷季歷立為王季而昌為文王太伯之奔荆蠻自號句吳荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子弟仲雍立仲雍斷髮文身裸以為飾以從荆蠻之俗左傳吳太宰嚭謂子貢曰國君道長而大夫不出門此何禮也子貢對曰太伯端委以治吳仲雍嗣之斷髮文身羸以為飾豈禮也哉有由然也太史公曰太伯斷髮文身示不可用失之矣仲雍卒子季簡立季簡卒子叔逹立叔逹卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君吳因而封之乃封周章之弟於周之北故夏墟是為虞仲列為諸侯語曰虞仲夷逸宫之竒云太伯虞仲太王之昭則仲雍號虞仲矣今周章之弟亦號虞仲虞其國仲其字故爾然則仲雍之號虞仲抑以其後封虞故耶周章卒子熊遂立熊遂卒子柯相立柯相卒子强鳩夷立强鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗髙立頗髙卒子句卑立是時晉獻公賂周北虞公假道以滅虢因以滅虞旬卑卒子去齊立去齊卒子夀夢立夀夢始大稱王自太伯作吳五世而武王克殷封其後為二其一吳在蠻夷其一虞在中國十二世而晉滅中國之虞中國之虞滅一世而蠻夷之吳興蓋夀夢以前常役屬於楚楚大夫申公巫臣與其令尹嬰齊爭田與其司馬側爭夏姬出奔晉楚莊王卒嬰齊側殺巫臣之族而分其室巫臣怨之王壽夢二年巫臣請於晉侯而使於吳壽夢說之乃通吳於晉以兩之一卒適吳舍偏兩之一焉教吳用兵乘車使其子狐庸為吳行人教之畔楚吳始伐楚伐巢伐徐入州來見於春秋十年㑹諸侯于鍾離十六年楚嬰齊伐我克鳩兹至于衡山我獲其將鄧廖復伐楚取駕嬰齊遂以憂死十八年使夀越如晉晉悼公使魯衛先㑹我善道遂㑹諸侯于戚二十五年王壽夢卒子諸樊立楚共王卒吳因其喪伐之戰于庸浦我師大敗獲我公子黨王諸樊二年㑹諸侯于向晉將為我謀楚其大夫士丐不義我伐楚喪而止初王壽夢有子四人長曰諸樊次曰餘祭次曰夷昧次曰季札季札賢壽夢欲立之季札讓不可故立諸樊諸樊既除喪將立季札季札辭曰曹宣公之卒也曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之秋楚公子貞伐吳吳擊之獲公子宜穀十二年楚為舟師以伐吳無功而還吳召舒鳩人畔楚十三年楚屈建伐舒鳩吳救之敗焉楚遂滅舒鳩十二月諸樊伐楚門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪諸樊門焉牛臣射之卒有命立弟餘祭欲以次必致國於季子以稱先王壽夢之意王餘祭三年齊慶封有罪自魯來奔封之朱方四年伐越獲俘以為閽使守舟餘祭觀舟閽弒之弟夷昧立史記餘祭十七年而後夷昧立蓋失不考之春秋也使季札聘於諸侯凡諸侯之賢者札無不友也王夷昧二年使屈狐庸聘于晉六年楚靈王合諸侯于申遂以諸侯伐吳圍朱方執齊慶封殺之而盡滅其族冬吳伐楚入棘櫟麻以報七年楚人復以諸侯伐吳吳敗楚師于鵲岸楚王以馹至於羅汭吳使蹶由犒師楚人執之楚師及汝清吳有備楚無功而還八年楚薳泄伐徐吳救之敗楚師於房鐘獲宫廄尹棄疾十四年楚靈王次于乾溪遣兵圍徐以懼吳十五年楚棄疾入楚靈王死楚師還自徐吳敗之豫章獲其五帥冬吳滅州來楚平王初立不敢爭十七年王夷昧卒欲立季札季札逃去吳人立夷昧之子僚王僚二年使公子光伐楚戰于長岸吳師大敗喪其乘舟餘皇楚人塹而守之光使長鬛者三人伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇而歸四年楚城州來楚歸蹶由五年楚平王以讒逐其太子建誅太子之師伍奢奢子貟奔吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也貟曰光將有他志余姑為之求士而鄙以待之乃見鱄設諸而耕於野公子光者王諸樊之子也常以為若兄弟相授則季子當立季子不立則長子之子當立者也故陰養士欲襲王僚八年吳伐州來楚薳越帥師及諸侯之師救之公子光敗頓胡沈蔡之師于雞父胡子髠沈子逞滅獲陳夏齧楚師大奔九年楚為舟師以略吳疆吳人踵之遂滅巢及鍾離十一年楚平王卒十二年王僚欲因楚喪而伐之使其母弟掩餘燭庸率師伐楚圍潜使季子聘于上國以觀諸侯楚人禦之楚師强吳師不能退公子光曰此時也不可失也謂鱄設諸曰我王嗣也事若克季子雖至不吾廢也鱄設諸曰王可弒也母老子弱是無若我何四月光伏甲於窟室而享王王亦以甲為衛光僞足疾入于窟室使鱄設諸置劒於魚中以進抽劒刺王弒之王屬亦殺鱄設諸公子光自立是為王闔閭以鱄設諸之子為卿季子至曰茍先君無廢祀人民無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事先以待天命非我生亂立者從之先人之道也復命哭墓復位而待掩餘奔徐燭庸奔鍾吾楚殺郤宛伯州犂之孫嚭亡奔吳吳以為太宰王闔閭元年舉伍貟以為行人三年闔閭使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚人封之於養將以害吳闔閭怒執鍾吾子而伐徐滅之闔閭問於伍貟曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔閭從之四年侵楚伐夷侵潜六楚沈尹戍帥師救潜吳師還楚師遷潜於南岡而還吳師圍弦左司馬戍右司馬稽帥師救弦及豫章吳師還始用伍貟之謀也五年吳始用師於越晉史墨曰嵗及三紀越其有吳乎越得嵗而吳伐之必受其凶七年桐叛楚闔閭使舒鳩氏誘楚人僞畏楚為之伐桐敗楚師于豫章圍巢克之獲公子繁八年蔡昭侯如楚楚令尹囊瓦欲其裘與佩弗豫唐成公如楚瓦欲其驌驦馬亦弗與皆三年止之蔡侯歸如晉請伐楚晉人求賂於蔡弗得而止蔡侯因伍貟伯嚭以其子乾與大夫之子為質於吳以謀楚九年闔閭從蔡侯唐人以伐楚楚瓦禦之陳于柏舉闔閭之弟夫槩王欲戰言於王曰楚瓦不仁其臣莫有死志先伐之必克王弗許夫槩王曰臣義而行不待命可也以其屬先擊瓦瓦之卒奔吳師大敗之五戰及郢楚昭王出奔隨吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之十年越入吳秦遣兵救楚楚師及秦師大敗夫槩王于沂吳師屢奔夫槩王歸自立闔閭乃歸夫槩王與王戰敗奔楚為堂溪氏十一年吳太子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚大懼遷郢都鄀十九年吳伐越越子句踐禦之陳于檇李吳師敗靈姑浮以戈擊闔閭闔閭傷將指取其一屨還卒於陘子夫差立使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越王夫差二年敗越于夫椒遂入越越子以甲楯五千棲於㑹稽使大夫種因吳太宰嚭以行成夫差將許之伍貟諌不聼遂及越平初闔閭之入楚也使召陳懷公懷公不從夫差既克越乃侵陳以修先君之怨七年復伐陳八年夫差及魯侯㑹于鄫徴百牢魯人辭以禮弗聽魯人以吳無能為也遂伐邾執邾子益邾茅夷鴻請救於吳九年為邾伐魯為城下之盟而還齊悼公娶於魯季氏季姬與季魴侯通魯人不敢歸悼公怒請師於吳將以伐魯魯歸季姬季姬嬖十年使人辭師于吳吳王怒城䢴溝以通江淮且使警師於魯將以伐齊十一年夫差㑹魯侯邾子郯子伐齊齊人弒悼公以說夫差哭之軍門之外三日徐承以舟師自海入齊齊師敗之乃還楚子期伐陳吳使季子救陳不戰而還十二年齊人伐魯魯來請師夫差為魯伐齊戰于艾陵大敗齊師獲齊國書吳之將伐齊也越子率其衆朝焉王及列士皆有饋伍貟又諫弗聽使人屬其子於齊鮑氏為王孫氏王聞之使賜之屬鏤以死十三年夫差㑹魯侯于橐臯又㑹衛侯于鄖衛人嘗殺吳行人且姚於是吳人藩衛侯之舍魯使子貢為衛君辭焉乃舍衛侯十四年夫差㑹晉侯魯侯于黃池六月越子伐吳大敗吳師獲太子友王孫彌庸壽於姚遂入吳吳人告敗於王王惡其聞也自剄七人於幕下秋七月辛丑盟吳晉爭先晉趙鞅欲戰乃長晉侯既盟而歸及越人平十六年楚子西子期伐我及桐汭十八年越子來伐禦之笠澤我師大敗二十一年公子慶忌驟諫於王曰不改必亡弗聽遂適楚聞越將伐吳請歸平越遂歸欲除不忠者以說于越吳人殺之冬越圍我晉趙襄子使楚隆來弔二十三年越滅吳越王句踐使告王毋死將居王於甬東辭曰孤老矣不能事君乃縊越人以歸蘇子曰吳自太伯至壽夢十九世不通中國壽夢以下始與諸侯盟㑹七世而亡然孔子作春秋終以蠻夷書之謂之吳而不人蓋禮義不足故也春秋諸侯國而不入者三楚始稱荆而已僖元年書楚人伐鄭文九年書楚子使椒來聘自是遂與諸侯齒而吳越終春秋不人此其禮義存亡之實也故豫因春秋所書而推考三國得失之效以為吳越皆戰勝攻取能服人矣而無禮義以自將吳欲以乘陵諸夏而不知止故闔閭之後覆亡而不救越能自安於蠻夷無意於王伯故句踐之後固陋而無聞至於楚禮義雖不足道而亦無愧於齊晉故其後遂與戰國相終始由是觀之禮義之於為國豈誣也哉古史卷八
