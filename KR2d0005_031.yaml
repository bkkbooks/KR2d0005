body:
  text: 古史卷三十一宋蘇轍撰孔子列傳第八孔子之先宋涽公之長子曰弗父何涽公之亡也公弟煬公熙立弗父何之弟鮒祀弒煬公而以國授何何弗受鮒祀立是為厲公而何世為宋大夫其曽孫曰正考父考父之子曰孔父嘉嘉為華父督所殺其子奔魯始為郰人孔子之曽太父曰孔防叔生伯夏伯夏生叔梁紇以勇力聞於諸侯與顔氏女野合而生孔子禱於尼丘故名之曰丘字仲尼孔子之生魯襄公之二十二年也孔子為兒嬉戲常陳俎豆設禮容幼而喪父葬於防山母諱之不以告及母死不知其墓乃殯於五父之衢有過而疑者因問之得於郰曼父之母然後合葬於防孔子長九尺六寸人皆謂之長人蓋未有知之者嘗為委吏會計當嘗為乘田畜蕃息年三十有四魯大夫孟僖子病且死召其大夫而屬之曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益恭故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫豫敢侮饘於是粥於是以糊豫口其恭如是臧孫紇有言曰聖人之有明德者若不當世其後必有逹人今其將在孔丘乎我死必屬說與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔皆師事孔子孔子將觀禮於周敬叔言於魯君豫之一乘車兩馬一豎子孔子得以適周問禮於柱下史老聃將辭去𥅆送之曰富貴者送人以財仁人送人以言吾不能富貴竊仁人之號夫聰明深察而近於死者好議人者也慱辨廣大危其身者發人惡者也為人子者無以有已為人臣者無以有已孔子自周反於魯弟子稍益進焉明年魯昭公孫於齊季平子專國季氏饗士孔子要絰而往陽虎絀曰季氏饗士非敢饗子也孔子由是退史記稱孔子年十七而孟僖子死書季氏饗士孔子要絰而往在孟僖子死前案左傳孔子年十七當魯昭公七年是嵗孟僖子相昭公如楚病不克相禮耳僖子之死實昭公二十四年則孔子年三十四矣又昭公二十五年陽虎始見然則孔子要絰亦當在此後故皆改正之魯方亂孔子適齊為髙昭子家臣欲以通乎景公在齊聞韶學之三月不知肉味景公問政孔子曰君君臣臣父父子子景公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸是時景公失政其大夫田氏厚施以奪其民而公不悟故孔子及之它日復問昔秦穆公國小處辟其伯何也對曰秦國雖小其志大處雖辟行中正身舉五羖爵之大夫起纍紲中與語三日授之以政以此取之雖王可也其伯小矣景公說史記言孔子年三十齊景公與晏嬰適魯問孔子以秦穆公事又於齊世家言景公獵魯郊因入魯與晏嬰俱問魯禮左傳皆不載恐出於戰國雜說故正之於此將以尼溪田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破産厚葬不可以為俗遊說乞貸不可以為國自大賢之息周室既衰禮樂缺弛今孔子盛容飾繁登降之禮趨詳之節纍世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也後景公敬見孔子不問其禮曰待子以季氏吾不能以季孟之間待之齊大夫猶欲害孔子孔子聞之欲去景公亦曰吾老矣不能用也孔子遂行反乎魯孔子年四十二魯昭公卒於乾侯定公五年季平子死桓子嗣立桓子穿井得土缶中若羊以問孔子曰得狗孔子曰以丘所聞羊也丘聞之木石之怪夔罔閬水之怪龍罔象土之怪墳羊是時陽虎專季氏嘗囚季桓子盟而釋之虎欲見孔子而惡無禮大夫有賜於士不得受之其家則往拜其門陽虎時孔子之亡也而饋孔子蒸豚孔子亦時其亡也而往拜之遇諸塗謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣魯君臣上下皆失其正故孔子不仕退而修詩書禮樂弟子至自逺方受業者益衆定公八年陽虎將殺三桓不克出奔齊公山不狃為費宰不得志於季氏與虎同惡以費叛召孔子孔子欲往子路不說孔子曰夫召我者而豈徒哉如有用我者吾其為東周乎然卒不行時孔子年五十自陽虎出而魯小安定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司冦十年齊魯會於夾谷孔子相定公將以乘車好往孔子曰臣聞有文事者必有武偹有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公許之犁彌言於齊侯曰孔丘好禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔子以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽避之將盟齊人加於載書曰齊師出竟而不以兵車三百乘從我者有如此盟孔子使茲無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其己乃不果享卒事齊人不能加魯齊侯愧焉乃歸魯鄆歡龜隂之田十二年夏孔子言於定公曰臣無藏甲大夫無百雉之城使仲由為季氏宰將墮三都於是叔孫氏墮郈季氏墮費將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子僞不知我將不墮十二月公圍成弗克十四年孔子年五十六由司冦攝相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂以其貴下人乎於是誅魯大夫亂政者少正卯與聞國政三月粥豚羔者弗飾賈男女行者别於塗塗不拾遺四方之客至乎邑者不求有司皆豫之以歸齊人聞而懼曰孔子為政必伯伯則吾地近焉我為之先并矣盍致地焉犂鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選國中女子八十人皆衣文衣而舞康樂文馬三十駟以遺魯君陳於魯城南髙門外季桓子微服往觀語魯君為周道遊觀終日卒受之三日不朝孔子將行而惡彰君之惡也於是魯方郊不致膰肉於大夫孔子遂行孟子曰孔子從而祭膰肉不至不稅冕而行不知者以為為肉也其知之者以為為無禮也乃孔子則欲以微罪行不欲為茍去君子之所為衆人固不識也然則孔子之去實以女樂而託膰肉耳宿乎屯師已送之曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗蓋優哉遊哉聊以卒歲師已反桓子曰孔子亦何言師已以實告桓子喟然歎曰夫子罪我以羣婢故也夫孔子去魯凡十三年適衛者五適陳適蔡者再適曹適宋適鄭適葉適楚各一諸侯皆莫能用卒自衛反魯孔子之初適衛也主於顔讎由衛靈公問孔子居魯得祿幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譛孔子於靈公靈公使公孫余假一出一入孔子恐獲罪居十月去衛將適陳過匡孔子貌類陽虎陽虎嘗暴匡人匡人以為虎而止之孔子曰文王既沒文不在茲乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何居五日顔淵後子曰吾以汝為死矣顔淵曰子在回何敢死孔子使從者為寧武子臣然後得去月餘復反乎衛主蘧伯玉靈公夫人南子使人謂孔子曰四方之君子不辱與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環佩玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不說孔子矢之曰豫所否者天厭之天厭之居月餘靈公與夫人同車宦者雍渠參乘使孔子為次乘招搖過市孔子曰吾未見好德如好色者也於是醜之去衛過曹是嵗魯定公卒孔子去曹適宋與弟子習禮大樹下宋司馬桓魋欲害孔子拔去其樹孔子曰天生德於豫桓魋其如豫何孔子適鄭與弟子相失獨立鄭東門外鄭人或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産然自腰以下不及禹三寸纍纍若喪家之狗子貢以告孔子欣然笑曰形狀末也而似喪家之狗然哉然哉孔子遂至陳主司城貞子有隼集於陳庭而死楛矢貫之石砮長尺有咫陳涽公使問孔子孔子曰隼來逺矣此肅慎氏之矢也昔武王克商通道九夷八蠻使各以其方賄來貢以無忘職業於是肅慎貢楛矢石砮長尺有咫先王欲昭其令德以肅慎矢分太姬配胡公而封諸陳分同姓以寶玉展親也分異姓以逺方之職貢無忘服也陳人求之故府得之居陳三年吳楚爭陳陳常被冦孔子去陳將復適衛過蒲會公叔氏以蒲叛衛止孔子弟子公良孺以其私車與蒲人鬬蒲人懼與孔子盟曰無適衛孔子既出適衛子貢曰盟可負耶孔子曰要盟神弗聼也衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可靈公曰蒲衛之所以待晉楚也而伐之可乎孔子曰其男子有死之志婦人有保西河之志吾所伐者不過四五人公曰善然不伐蒲靈公老怠於政不用孔子孔子歎曰茍有用我者期月而已可也三年有成擊磬於衛有荷蕢而過門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也夫已而已矣孔子聞之曰果哉末之難矣孔子自衛將適晉趙簡子攻范中行伐中牟佛肹以中牟叛召孔子孔子欲往子路曰由聞諸夫子親於其身為不善者君子不入也佛肹以中牟叛子之往也如之何孔子曰有是言也不曰堅乎磨而不磷不曰白乎涅而不淄吾豈匏瓜也哉焉能繫而不食孔子至河聞趙簡子殺竇鳴犢舜華臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉之賢大夫也趙氏未得志之時須此兩人而後從政及其得志殺之乃從政丘聞之也刳胎殺夭則騏驎不至郊竭澤涸漁則蛟龍不合隂陽覆巢毁卵則鳳凰不翔何則諱傷其類也夫鳥獸之於不義也尚知辟之而况丘哉乃還息於陬鄉作陬操以哀之反乎衛復主蘧伯玉靈公問陳於孔子孔子對曰爼豆之事則嘗聞之軍旅之事未之學也眀日遂行復適陳是嵗靈公死眀年魯哀公三年孔子年六十矣魯桓宫釐宫災孔子聞之曰災必於桓釐之宫已而果然秋季桓子卒其弟康子嗣桓子病且死遺言於康子恨不終用孔子屬使召之故康子欲召孔子公之魚曰昔吾先君用之不終為諸侯笑今又用之不能終是再為諸侯笑也康子曰然則誰召而可曰必召冉求於是使使召冉求冉求將行孔子曰魯人召求非小用之將大用之也是日孔子曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之子貢知孔子思歸送冉求因誡曰即用以孔子為招云冉求既去眀年孔子自陳遷於蔡蔡公孫翩弒昭公眀年孔子自蔡如葉葉公問政孔子曰近者說逺者來他日葉公問孔子於子路子路不對孔子聞之曰爾奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾去葉反於蔡長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰曰為孔丘曰是魯孔丘歟曰然曰是知津矣桀溺曰子為誰曰為仲由曰是魯孔丘之徒歟曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟子路行以告孔子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也他日子路遇荷蓧丈人曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子止子路宿殺雞為黍而食之見其二子焉明日子路以告孔子孔子曰隱者也使子路反見之至則行矣子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣孔子反於蔡三嵗吳伐陳楚昭王救陳師於城父聞孔子在陳蔡之間使人聘孔子孔子將往從之陳蔡大夫謀曰孔子賢者所譏刺皆中諸侯之病今者久留陳蔡之間諸大夫所行非仲尼意若用於楚則陳蔡用事大夫危矣於是相與發徒役圍孔子於野不得行絶糧從者病莫能興孔子講誦弦歌不衰子路愠見曰君子亦有窮與孔子曰君子固窮小人窮斯濫矣孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子路曰意者吾未仁耶人之不我信也意者吾未知耶人之不我行也孔子曰由有是乎使仁者而必信安有伯夷叔齊使知者而必行安有王子比干子路出子貢入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子貢曰夫子之道至大也故天下莫能容夫子夫子盍少貶焉孔子曰賜良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容今爾不修爾道而求為容而志不逺矣子貢出顔回入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此顔回曰夫子之道至大故天下莫能容雖然夫子推而行不容何病不容然後見君子夫道之不修是吾醜也道既已大修而不用是有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢見楚昭王昭王以師迎孔子然後得免昭王將以書社地七百里封孔子楚令尹子西曰王之使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將帥有如子路者乎曰無有王之官尹有如宰豫者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三五之法眀周召之業王若用之則楚安得世世堂堂方數千里乎文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止其秋楚昭王卒於城父楚狂接輿歌而過孔子曰鳳兮鳯兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而孔子下欲與之言趨而辟之不得與之言於是孔子自楚反乎衛是嵗孔子年六十三而魯哀公六年也衛靈公死而世子蒯聵入於戚蒯聵之子出公輒立父子爭國孔子既至而弟子疑所豫冉有子貢以伯夷叔齊之事質之然後知孔子之不豫輒也子路問孔子治衛所先孔子答之以正名而子路不逹前此三年季康子嗣立而召冉有矣後此五年冉有為魯帥師敗齊師于清今冉有在衛豈自魯來見孔子歟哀公七年子貢在魯為季氏說吳太宰嚭豈今嵗自衛反魯歟子路與冉有同為季氏家臣既而仕衛孔氏以死豈與孔子皆歸於魯復自魯仕衛歟傳記脫略無所考證矣孔子既歷聘諸國其君無足與成事者將歸老於魯弟子冉有子貢方為魯臣故孔子磐桓於衛者纍歲魯哀公十一年冉有帥師敗齊師於清季康子嘉欲召孔子問冉有曰孔子何如人哉對曰用之有名播之百姓質之鬼神而無憾然求之不以道雖纍千社夫子不利也康子曰我欲召之可乎對曰無以小人固之則可矣衛大夫孔圉將攻太叔疾訪於孔子孔子辭之退而命駕曰鳥則擇木木豈能擇鳥哉圉遽謝焉將止魯人以幣召孔子乃歸季氏欲以田賦使冉有訪諸孔子孔子曰丘不識也冉有曰子為國老待子而行若之何子之不言也孔子不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則丘亦足矣若不度於禮而貪冒無厭雖以田賦將又不足且季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聼十二年昭夫人孟子卒孔子吊適季氏季氏不絻放絰而拜十四年齊田恆弒其君孔子齊三日而請伐齊哀公曰魯為齊弱久矣子之伐之將如之何對曰田恆弒其君民之不子者半以魯之衆加齊之半可克也公曰告夫三子之三子告不可孔子退而告人曰以吾從大夫之後不敢不告也哀公問何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服季康子問使民敬忠以勸對曰臨之以莊則敬孝慈則忠舉善而教不能則勸康子問政對曰政者正也子帥以正孰敢不正康子患盜對曰茍子之不欲雖賞之不竊又問如殺無道以就有道何如對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃吳之伐越也墮會稽得骨節專車吳子使聘魯且問之孔子曰無以吾命也賔既將命發幣於大夫及孔子孔子爵之既徹爼而燕客執骨而問曰骨何者為大孔子曰丘聞之昔禹致羣神於會稽之山防風氏後至禹殺而戮之其骨專車此為大矣客曰誰為神孔子曰山川之神足以紀綱天下其守為神社禝為公侯皆屬於王者客曰防風何守孔子曰汪罔氏之君守封禺之山為漆姓在虞夏商為汪罔氏於周為長狄今謂之大人客曰人長幾何孔子曰僬僥氏三尺短之至也長者不過十之數之極也吳伐越墮會稽前此十一年然其通魯則五六年耳史記載此事在定公之世則為失之矣孔子之歸魯非求仕也以為父母之邦蓋將老焉而魯之君臣亦莫能用自周室微而禮樂詩書缺孔子憂後世之無述也於是叙書上紀唐虞下至秦穆為百篇刪詩上采契稷中述商周之盛至幽厲之缺為三百五篇皆弦歌之以求合韶武雅頌之音故曰吾自衛反魯然後樂正雅頌各得其所至於禮樂之說遭秦焚書之變世不復見孔子曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣孔子觀三代所損益曰後雖百世可知也周監乎二代郁郁乎文哉吾從周與魯太師論樂曰樂其可知也始作翕如也縱之純如也皎如也繹如也以成至其詳不可得而聞矣蓋晚而學易讀之韋編三絶為之彖象文言繫辭以發其祕復因魯史記作春秋取東周之後戰國之前當魯十二公以為前此者周之典刑行於諸侯無所事春秋後此者禮法大壞中夏幾於夷狄雖有春秋無所復施哀公十四年春西狩獲麟魯人以為不祥孔子傷之故春秋終焉其實田恆三晉自是起也孔子之於當世其志見於春秋故曰後世知我者以春秋罪我者以春秋弟子受業髙弟七十七人其下者三千其於六藝不盡通也獲麟之三年哀公十六年孔子年七十有三蚤作曵杖而歌於門曰泰山其頽乎梁木其壞乎哲人其萎乎子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也趨而入孔子曰夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則賔主夾之也周人殯於西階之上則猶賔之也丘殷人也豫夢坐奠於兩楹之間夫眀王不興天下其孰能宗豫豫殆將死也寢疾七日而沒實四月己丑哀公誄之弟子葬之魯城北泗上皆心喪三年喪畢乃去獨子貢築室於墓復三年而去弟子及魯人從而居者百餘室命曰孔里世世相傳春秋奉祠不絶雖帝王亦以弟子禮事之孔子少好學而無常師嘗從老聃問禮後與弟子言禮猶以聃之言為斷郯子朝於魯道黃帝以來名官孔子從而問焉歎曰吾聞天子失官學在四夷猶信嘗學鼓琴於師襄十日不進師襄曰可以益矣曰丘習其曲矣未得其數也有間曰己習其數可以益矣曰丘未得其志也有間曰己習其志可以益矣曰丘未得其為人也有間曰有所穆然深思有所怡然髙望而逺志焉曰丘得其為人矣黯然而黑頎然而長眼如望羊如王四國非文王其孰能為此也師襄辟席再拜曰師蓋云文王操也故世之知之者曰大哉孔子博學而無所成名而孔子亦自謂少賤故多能鄙事然非其所以為孔子也所以為孔子者人不盡知而孔子蓋略言焉曰我非多學而志之者豫一以貫之又曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩謂伯夷叔齊不降其志不辱其身謂栁下惠少連降志而辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可至語其極也曰豫欲無言天何言哉四時行焉百物生焉然天下莫之知則歎曰鳳鳥不至河不出圖吾已矣夫至其甚也則欲居九夷乘桴以浮于海以示中國莫與立者而非其誠言也孔子生鯉伯魚年五十先孔子死伯魚生伋子思年六十二作中庸子思生白子上年四十七子上生求子家年四十五子家生箕子京年四十六子京生穿子髙年五十一子髙生子慎年五十七嘗為魏相子慎生鮒年五十七為陳王涉博士死於陳鮒弟子襄年五十七為漢惠帝博士遷為長沙守長九尺六寸子襄生忠年五十七忠生武武生延年及安國安國為漢武帝博士至臨淮守蚤卒安國生卬卬生歡蘇子曰孔子一用於魯有成功矣而魯定公季桓子皆庸人一為女樂所誤視棄孔子如脫弊屣孔子去魯而遊諸侯有意於擇君矣乎當是時諸侯無可言者衛靈公雖無道而善用人仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅以無失其國孔子疑可輔焉是以去魯三年而往反於衛者四及知其不用然後適陳適蔡皆再孔子之於陳蔡無取焉耳陳蔡近於楚而楚昭王葉公諸梁一時賢君臣也磐桓以俟焉前後六年見葉公不合卒見昭王將用之矣而子西間之昭王亦死知諸侯無復可與共事者然後浩然有歸老之意然猶反於衛五年以須魯人之招也蓋翔而後集故歟孔子於衛見南子於魯欲從公山弗狃於晉欲從佛肹弟子或疑之而後世亦未免焉昔栁下惠嫗不逮門之女魯人不以為淫魯有男子與婦人皆獨居婦人有急將從之拒而弗納婦人曰子何不為栁下惠男子曰栁下惠則可吾則不可孔子聞之曰學栁下惠者未有若此人者也然則此亦孔子之所獨歟古史卷三十一
