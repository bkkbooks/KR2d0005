body:
  text: 古史卷二十九宋蘇轍撰晋叔向列傳第六叔向晋之公族也名肹氏曰羊舌其祖羊舌大夫事獻公爲軍尉從申生伐臯落氏勸申生以死易亂者也其子職佐祁奚爲軍尉生子四人長曰赤次曰肹次曰虎季曰鮒赤與肹皆賢職死祁奚言赤於悼公以代其父所謂銅鞮伯華也三世皆賢人叔向事悼公平公昭公習於禮而勇於義以直聞於諸侯雖不專任晉國而晋之執政趙文子韓宣子皆訪之而後行晋國頼焉欒懐子好施而多士范宣子畏而逐之叔虎以力嬖於懐子宣子殺虎并囚伯華叔向樂王鮒幸於平公見叔向曰吾爲子請叔向不應人問其故叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎内舉不失親其獨遺我乎詩曰有覺徳行四國順之夫子覺者也公問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乗馹而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨訓明徴定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放太甲而相之卒無怨色管蔡爲戮周公右王若之何其以虎也棄社稷子爲善誰敢不勉多殺何為宣子說與之乗以言諸公而免之不見叔向而歸叔向亦不告免焉而朝平公十二年晋楚會盟於宋楚人𠂻甲趙文子患之以告叔向叔向曰何害匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不㨗矣食言者不病非子之患也將盟楚人爭先叔向曰諸侯歸晋之徳只非歸其尸盟也子務徳無爭先旣罷楚子木歸以語其君曰宜晋之伯也有叔向以佐其卿楚無以當之二十一年楚靈王求昏于晋韓宣子送女叔向為介過鄭鄭子太叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也安能及人若奉吾幣帛守之以信行之以禮雖汰侈若我何及楚楚人弗逆楚王朝其大夫曰晋吾仇敵也今其來者上卿與上大夫也我若以韓起為閽以羊舌肹爲司宫足以辱晋矣何如大夫莫對薳唘彊質譲楚子楚子謝焉乃厚其禮而歸之眀年楚公子棄疾來報平公將亦弗逆叔向曰楚辟我𠂻若之何效辟詩曰爾之教矣民胥效矣從我而已安用效人之辟書曰聖作則無寕以善人為則而則人之辟乎平公說乃逆之平公之季年成虒祁之宫諸侯來賀歸而賤之皆有二心及昭公立叔向知晋德之衰而力不能救言於朝曰諸侯不可以不示威乃並徴會三年七月會于平丘將尋盟齊人不可昭公使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乗以先唘行遲速唯君叔向告于齊曰諸侯尋盟既在此矣今君弗利寡君以爲請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也是故先王之制使諸侯嵗聘以志業間朝以講禮再朝而會以示威冄會而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也存亡之道常由是興晋禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼曰小國言之大國制之敢不聽從既聞命矣敬共以徃遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不旆壬申復斾之諸侯畏之然後就盟叔向事晋見其盛衰及其老也君弱臣强各營其私不在諸侯叔向區區其間弥縫其闕救敗而已其才不盡用也齊侯使晏嬰如晋叔向從之燕語齊晋之故晏子曰齊其為陳氏矣叔向曰然雖吾公室亦季世也晏子曰子將若何叔向曰晋公族盡矣公室將卑宗族枝葉先落肹之宗十一族惟羊舌氏在耳肹又無子公室無度幸而得死豈其獲祀凡叔向所言諸侯大夫吉㓙得失之際後多信者平公作虒祁之宫石言於魏榆叔向曰是宫也成諸侯必叛君必有咎三年而平公卒諸侯不服楚靈王因陳亂以滅陳又將討蔡韓宣子問焉叔向曰蔡侯得罪于君父而不能其民天將假手於楚以斃之何故不克然不信以幸不可再也楚王奉孫吴以討陳曰將定而國陳人聽命而遂縣陳今又誘殺蔡侯雖幸而克必受其咎天之假助不善非祚之也厚其惡而降之罰也既而楚人滅蔡二年而弑靈王楚子干自晋歸于楚韓宣子疑其得立叔向以其無德與人也知其不克子干卒死蓋叔向之母亦賢人也叔虎之母羙而不使其子諌之母曰深山大澤實生龍蛇彼羙吾懼其生龍蛇以害女非嫉之也使徃視寢生叔虎羙而有力欒氏之難羊舌氏卒被其旤叔向將娶扵申公巫臣氏其母欲娶其黨叔向曰吾母多而庻鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚羙必甚惡是鄭穆少妃姚子之子貉之妹也子貉早死無後而天鍾美扵是將必以是大有敗也昔有仍氏生女黰黒而甚羙光可以鑑名曰𤣥妻樂正后䕫娶之生伯封實有豕心貪惏無厭忿纇無期謂之封豕有窮后羿滅之䕫是以不祀且三代之亡共子之廢皆是物也女何以爲哉夫有尤物足以移人茍非德義則必有咎叔向懼不敢取平公强使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也非是莫䘮羊舌氏矣及叔向死晋人誅祁盈伯石黨扵祁氏并及於旤羊舌氏絶鮒字叔魚叔向之季弟也貪而多詐平丘之會攝君司馬求貨扵衛滛芻蕘者衛人請扵叔向叔向數其罪而止滛者晋以莒故執魯季孫意如既而將歸之季孫請受命扵會韓宣子患之使叔向叔向辭不能則請使鮒鮒見季孫而泣曰昔吾逃罪扵魯由武子以不死今歸子而不歸將館子扵西河柰何季孫懼而請歸士景伯如楚使鮒攝理邢侯與雍子爭鄇田雍子納女於鮒鮒蔽罪邢侯邢侯怒殺鮒與雍子於朝韓宣子問其罪叔向曰雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠羙為昏貪以敗官為墨殺人不忌爲賊夏書曰昏墨賊殺臯陶之刑也乃施邢侯而尸雍子與叔魚扵朝仲尼曰叔向古之遺直也治國制刑不隐於親曰義也夫可謂直矣蓋少之云爾蘇子曰樂王鮒言扵君無不從欲為叔向請以其同也棄而不應祁大夫老矣無位扵朝以其覺也知其必為己言何其明哉不然晋楚之際亦多故矣同盟有𠂻甲之變交聘有司宫之禍茍明不足以應之身受其辱而國被其患可勝言哉然平丘之會齊人不服叔向詰之以禮威之以衆攘臂而仍之僅乃得之烏乎殆哉彼不幸而老扵衰晋蓋不得已而然歟古史卷二十九
