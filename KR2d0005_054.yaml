body:
  text: 古史卷五十四宋蘇轍撰虞卿魯仲連列傳第三十一虞卿者遊説之士也躡蹻擔簦説趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿秦昭王以范雎故欲為之報仇求魏相魏齊而殺之魏齊亡走趙依平原君秦召平原君而使趙王殺齊齊夜出見虞卿虞卿解相印與齊皆之魏依信陵君信陵君難之齊怒自剄死虞卿困於大梁不得志乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋秦趙戰於長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聽臣發使出重寶以附楚魏楚魏欲得王之重寶必內吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聽與平陽君趙豹為媾發鄭朱入秦秦內之趙王召虞卿曰寡人使平陽君為媾於秦秦已納鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦既解邯鄲圍而趙王入朝使趙郝約事於秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗豫令秦來年復攻王王得無割其內而媾乎王曰請聽子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交於秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻於秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾來年秦復攻王王得無割其內而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我六城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以強秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王嵗以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰強者善攻弱者不能守今坐而聽秦秦兵不弊而多得地是強秦而弱趙也以益強之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無已以有盡之地而給無已求其勢必無趙矣王計未定樓緩從秦來趙王與樓緩計之曰豫秦地何如毋與孰吉緩辭讓曰此非臣之所能知也王曰雖然試言公之私緩對曰王亦聞夫公甫文伯母乎公父文伯仕於魯病死女子為自殺於房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐於魯而是人不隨也今死而婦人為之自殺者二人若是者必其於長者薄而於婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言者異則人心變矣今臣新從秦來而言勿豫則非計也言豫之恐王以臣為為秦也故不敢對使臣得為大王計不如豫之王曰諾虞卿聞之入見王曰此飾説也王眘勿豫樓緩聞之往見王王又以虞卿之言告緩對曰不然虞卿得其一不得其二夫秦趙構難而天下皆説何也曰吾且因強而乘弱矣今趙兵困於秦天下之賀戰勝者則必盡在於秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之強怒乘趙之弊瓜分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此決之勿復計也虞卿聞之往見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿豫者非固勿豫而已也秦索六城於王而王以六城賂齊齊秦之深讎也得王之六城并力西擊秦齊之聽王不待辭之畢也則是王失之於齊而取償於秦也而齊趙之深讎可以報矣而示天下有能為也王以此發聲兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王重王必出重寶以先於王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去趙於是封虞卿以一城居頃之而魏請為從趙王召虞卿謀過平原君平原君曰願卿之論從也虞卿入見王王曰魏請為從對曰魏過王曰寡人固未之許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過竊以為從便王曰善乃合魏為從蘇子曰遊説之士皆歷抵諸侯以左右網其利獨虞卿始終事趙專持從説其言前後可考無翻覆之病觀其赴魏齊之急捐相印棄萬户侯而不顧此固義俠之士非説客也哉然太史公記虞卿與趙謀事皆秦破長平後而卿為魏齊棄相印走大梁則前此矣意者魏齊死卿自梁還復相趙而太史公失不言之耳魯仲連齊人也好奇偉俶儻之畫䇿而不肯仕宦任職好持高節遊於趙趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦兵遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍魏安釐王使將軍晉鄙救趙畏秦止於蕩陰不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所為急圍趙者前與齊爭強為帝已而復歸帝今齊已益弱方今唯秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦王為帝秦必喜罷兵去平原君猶豫未有所決仲連聞之乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又內圍邯鄲而不能去魏王使客將軍新垣衍令趙帝秦今其人在是勝也何敢言事仲連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯仲連先生者今其人在此勝請為紹介交之於將軍衍曰吾聞魯仲連先生齊國之高士也衍人臣也使事有職吾不願見平原君曰勝既已泄之矣衍許諾仲連見衍而無言衍曰吾視居此圍城圍中者皆有求於平原者也今吾觀先生之玉貌非有求於平原君者也曷為久居此圍城之中而不去仲連曰世以鮑焦為無從頌古容誦通而死者皆非也衆人不知則為一身彼秦者棄禮義而上首功之國也權使其士虜使其民彼即肆然而為帝過而為政於天下則連有蹈東海而死耳吾不忍為之民也所為見將軍者欲以助趙也衍曰先生助之將奈何仲連曰吾將使梁及燕助之齊楚則固助之矣衍曰燕則吾請以從矣若乃梁者則吾乃梁人也先生惡能使梁助之仲連曰梁未睹秦稱帝之害故耳使梁睹秦稱帝之害則必助趙矣衍曰秦稱帝之害何如仲連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居嵗餘周烈王崩齊後往周怒赴於齊曰天崩地坼天子下席東藩之臣因齊後至則斫齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足怪衍曰先生獨不見夫僕乎十人而從一人者寧力不勝而智不若邪畏之也仲連曰嗚呼梁之比於秦若僕邪衍曰然仲連曰吾將使秦王烹醢梁王衍怏然不悅曰噫嘻亦太甚矣先生之言也先生又惡能使秦王烹醢梁王仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯鄂侯爭之強辨之疾故脯鄂侯文王聞之喟然而歎故拘之牖里之庫百日欲令之死曷為與人俱稱王卒就脯醢之地齊涽王將之魯夷維子為執䇿而從謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來吾君彼吾君者天子也天子巡狩諸侯辟舍納管籥攝衽抱機視膳於堂下天子已食乃退而聽朝也魯人投其籥不果納不得入於魯將之薛假途於鄒當是時鄒君死涽王欲入弔夷維子謂鄒之孤曰天子弔主人必將陪殯棺設北面於南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劒而死固不敢入於鄒鄒魯之臣生則不得事養死則不得賻襚然且欲行天子之禮於鄒魯鄒魯之臣不果納今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國各有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯姬妃處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎於是衍起再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也吾請出不敢復言帝秦秦將聞之為却軍五十里適會魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍遂引而去於是平原君欲封仲連仲連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為仲連壽仲連笑曰所謂貴於天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見其後十餘年燕將攻下聊城聊城人或讒之燕燕將懼誅因保守聊城不敢歸齊田單攻聊城歲餘士卒多死而聊城不下仲連乃為書約之矢以射城中遺燕將曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣説士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計審處之今秦人下兵魏不敢東面衡秦之勢成楚國之形危齊棄南陽斷右壤定濟北計猶且為之也且夫齊之必決於聊城公勿再計今楚魏交退於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之敝則臣見公之不能得也且燕國大亂君臣失計上下迷惑栗腹以十萬之衆五折於外以萬乘之國被圍於趙壤削主困為天下僇笑國敝而禍多民無所歸心今公又以敝聊之民拒全齊之兵是墨翟之守也食人炊骨士無反外之心是孫臏之兵也能見於天下雖然為公計者不如全車甲以報於燕車甲全而歸燕燕王必喜身全而歸於國士民如見父母交遊攘臂而議於世功業可明上輔孤主以制羣臣下養百姓以資説士矯國更俗功名可立也亡意亦捐燕棄世東遊於齊乎裂地定封富乎陶衛世世稱孤與齊久存又一計也此兩計者顯名厚實也願公詳計而審處一焉且吾聞之規小節者不能成榮名惡小恥者不能立大功昔者管夷吾射桓公中其鉤篡也遺公子糾不能死怯也束縛桎梏辱也此三行者世主不臣而鄉里不通鄉使管子幽囚而不出身死而不反於齊則亦名不免於辱人賤行矣臧獲且羞與之同名矣况世俗乎故管子不恥身在縲紲之中而恥天下之不治不恥不死公子糾而恥威之不信於諸侯故兼三行之過而為五霸首名高天下而光燭鄰國曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不旋踵刎頸而死則亦名不免為敗軍禽將矣曹子棄三北之恥而退與魯君計桓公朝天下會諸侯曹子以一劒之任枝桓公之心於壇坫之上顏色不變辭氣不悖三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越若此二士者非不能成小廉而行小節也以為殺身亡軀絶世滅後功名不立非智也故去感忿之怨立終身之名棄忿悁之節定纍世之功是以業與三王爭流而名與天壤相弊也願公擇一而行之燕將見仲連書泣三日猶豫不能自決欲歸燕已有隙恐誅欲降齊所殺虜於齊甚衆恐已降而後見辱喟然歎曰與人刃我寧自刃乃自殺聊城亂田單遂屠聊城歸而言仲連欲爵之仲連逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉蘇子曰戰國遊談之士非從即衡説行交合而寵祿附之故事不厭詭詐爭走於利魯仲連辨過秦儀氣凌髠衍而從橫之利不入於口因事放言切中機會排難解紛如決潰堤不終日而成功逃避爵賞脫屣而去戰國以來一人而已古史卷五十四
