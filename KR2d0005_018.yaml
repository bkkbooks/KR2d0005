body:
  text: 古史卷十八宋蘇轍撰鄭世家第十一鄭桓公友者周厲王少子宣王庶弟也宣王二十三年初封於鄭幽王八年為周司徒幽王以褒姒故王室多邪諸侯叛之桓公懼及其難問於史伯吾何所可以逃死史伯對曰王室將卑戎狄必昌不可逼也當成周者南有荆蠻申吕應鄧陳蔡隨唐北有衛燕狄鮮虞路洛泉徐蒲西有虞虢晉隗霍楊魏芮東有齊魯曹宋滕薛鄒莒是非王之支子母弟甥舅則皆蠻荆戎狄非親則頑不可入也濟洛河頴之間子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈貪冒之心君若以周難之故寄孥與賄焉不敢不許周亂矣必將背君若以成周之衆伐之無不克矣既克二邑塢弊補丹依㽥歷華君之土也若前華後河右洛左濟主芣騩而食溱洧修典刑以守之可以少固公説乃東寄孥與賄虢鄶受之十邑皆有寄地遂建國焉十一年申繒召西戎以伐周殺幽王於麗山之下桓公死之鄭人立其子掘突是為武公案索隱鄭昭公名忽厲公名突皆武公之孫世豈有孫與祖同名者武公之名必傳者之誤理或然也然無以考證姑録舊史而已武公復為周司徒國人宜之詩人為之賦緇衣武公十年娶于申生寤生及段薑氏惡寤生而愛段欲立之公弗許二十七年武公卒寤生立是為莊公薑氏請封段邑之於京祭仲曰都城過百雉國之害也公曰薑氏欲之焉辟害段既居京又私其旁邑公子吕復請除之公不聽二十二年段與薑氏謀襲鄭公聞之乃使吕伐之段出奔共遷薑氏于城潁而誓之曰不及黃泉毋相見也既而悔之潁封人考叔聞之言於公曰君何患闕地及泉隧而相見可也公從之乃復薑氏如初鄭自桓公而為周卿士平王始二於虢周鄭相惡王子狐為質於鄭鄭公子忽為質於周二十四年平王崩周人將以政畀虢公四月使祭仲帥師取溫之麥秋又取成周之禾二十七年公朝于周桓王不禮焉二十九年以太山之祊易魯許田釋太山而祀周公虢公忌父遂為周卿士公以齊人朝王三十年王命公為左卿士宋公不王公以王命討之三十二年公及齊魯入許許男奔衛使許大夫百里奉許叔以居許東偏使公孫獲居許西偏曰我死則去之毋與許爭桓王復取我塢蒍邘之田而與我蘇氏十二邑蘇氏叛周王不能有也周自是遂失鄭是時楚方北征諸夏三十三年公會蔡侯于鄧以謀楚三十七年王奪公政公不朝王從蔡衛陳人來伐公禦之王卒敗祝聃射王中肩聃請從王公不許夜使祭仲勞王三十八年北戎伐齊太子忽帥師救之大敗戎師齊人餼諸侯之大夫使魯為之班魯以周班後鄭忽怒四十二年以齊師衛師攻魯四十三年莊公卒祭仲立忽是為昭公公之為太子也齊侯將妻之以齊大非偶故辭及其敗戎師也齊侯又請妻之固辭祭仲曰君多內寵子無大援將不立不聽莊公寵子三人曰子突子亹子儀突母宋雍氏曰雍姞雍氏有寵於宋莊公宋人誘祭仲執而與之盟使立突歸忽出奔衛突立是為厲公宋以立公故責賂無已魯侯欲平我於宋宋公不可元年十二月師及魯師伐宋二年宋以齊衛燕人來戰我及魯師敗之三年宋復以諸侯伐我四年公患祭仲專使其壻雍糾殺之不克糾死夏公出奔蔡昭公復入許叔入于許秋厲公入居于櫟冬諸侯伐我將納厲公不克初莊公將以高渠彌為卿昭公惡之諫不聽公入二年渠彌弒公而立子亹子亹元年齊襄公師于首止將討昭公之亂子亹會之高渠彌相齊人殺子亹而轘高渠彌祭仲逆子儀于陳立之子儀十四年厲公自櫟侵鄭獲傅瑕瑕請納公盟而舍之六月瑕弒子儀及其二子而納厲公公之出十七年矣入而殺傅瑕以其二於子儀又責原繁以其不納已也繁縊而死後元年公會諸侯于鄄齊桓公始伯既而宋齊邾伐郳我間之侵宋二年春宋齊衛伐我冬公及諸侯盟于幽始成于齊三年齊人以公之不朝也執我大夫詹五年周大夫奉王子頽以伐惠王不克出奔衛衛燕為之伐周六年公和王室執燕仲父以王歸處于櫟子頽享大夫樂及遍舞公謂虢公曰子頽干王之位禍莫大焉而歌舞不倦是樂禍也樂禍必敗乃謀納王七年公及虢公納王殺子頽享王于闕西樂備原伯曰鄭伯效尤亦將有咎王賜我武公之略自虎牢以西五月厲公卒子文公捷立七年楚子元伐我入純門縣門不發楚言而出楚師疑焉諸侯來救楚師夜遁十三年狄入衛公惡高克使帥師次于河上以禦狄久而弗召師潰而歸高克奔陳詩人為之賦清人十四年楚人伐我比三嵗來伐以我即齊故十七年齊桓公服楚於召陵師還將出於陳鄭之間陳轅濤塗與我大夫申侯謀譎齊使出於東方申侯許而隂背之齊侯説與之虎牢濤塗謂申侯必城之因譛之公曰申侯將以城叛十八年惠王將廢太子鄭而立帶齊桓公合諸侯盟于首止以定鄭王疾齊使周公導鄭叛齊從楚公喜於王命逃歸不盟十九年諸侯伐我二十年齊復伐我公殺申侯以説秋世子華會諸侯盟于寧母華言於齊侯請去泄氏孔氏子人氏三族而以鄭為內臣齊侯不許二十一年公乞盟于齊二十九年殺世子華三十年齊桓公卒公再朝于楚宋襄公怒三十五年宋伐我楚子來救敗宋公于泓公享楚子取我二姬以歸晉公子重耳亡過我公不為禮叔詹諌不聽三十七年伐滑王使伯服遊孫為滑請公不聽而執二子王以狄伐我取櫟王德狄人以其女為后既而黜之狄攻王王來處于汜公與孔將鉏石甲父侯宣多省視官具而後聽政四十年公及楚人圍宋四十一年公如楚勸伐晉晉文公敗楚師于城濮公懼使子人九行成公及晉侯盟于衡雍四十二年晉侯秦伯圍我責無禮且二於楚公使燭之武夜見秦伯曰鄭知亡矣然亡鄭以陪晉晉之厚君之薄也若舍鄭以為東道主君亦何所不利秦伯説使把子逢孫楊孫戍鄭而還晉師亦去初文公有子六人子華子臧得罪死子士死於楚子俞彌早卒子蘭奔晉惟子瑕在而公惡之弗立也子蘭之母曰燕姞賤妾也夢天使與己蘭曰余為伯鯈余而祖也以是為而子故生子名之曰蘭蘭從晉侯圍鄭石癸曰吾聞姬姞耦其子孫必蕃於是召而立之以與晉平四十五年文公卒子穆公蘭立杞子使告于秦曰鄭人使我掌其北門若潛師以來鄭可得也秦伯從之元年秦師及滑鄭商人弦高將市于周以乘韋先牛十二以君命犒師且使遽告公使皇武子辭焉秦師知其有備乃去十年楚人間晉靈公之少也師于狼淵以伐我囚公子堅公子尨及樂耳遂及楚平十一年楚子伐宋田於孟諸宋公為右盂公為左盂十八年晉侯會諸侯于扈以我二於楚不見公公子歸生使謂趙盾曰居晉楚之間而從於強令豈吾罪也晉人乃行成使趙穿公壻池來質我亦使太子夷石楚為質于晉初宋人弒昭公而齊懿公凌虐魯國晉再合諸侯將討之皆取賂而還二十年公及楚盟以晉為不足與也秋晉趙盾以諸侯伐我會于棐林楚蒍賈來救囚晉解楊冬晉復伐我二十一年春歸生以楚令伐宋敗之于大棘囚華元獲樂吕晉再來伐二十二年及晉士會盟夏楚人侵我冬穆公卒子靈公夷立元年楚人獻黿於公公子宋與歸生將見宋食指動謂歸生曰我如此必嘗異味公食大夫黿知宋之言召而弗與宋怒染指嘗之而出公欲殺之宋與歸生謀而弒公諸大夫欲立公子去疾去疾辭曰公子堅長乃立堅是為襄公襄公欲去穆氏而舍去疾去疾請與穆氏皆亡乃舍之皆為大夫冬楚子伐我元年楚復伐我晉荀林父來救二年楚復伐我成而還三年公會諸侯于黑壤復與晉平五年楚子伐我晉却缺來救公敗楚師于柳棼國人皆喜去疾憂曰是國之災也吾死無日矣六年夏及楚人平諸侯之師伐我亦與之成冬楚子伐我晉士會以諸侯來救逐楚師于潁北遂戍鄭公子歸生卒討靈公之亂斫其棺而逐其族七年楚子伐我去疾曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚盟于辰陵且徼事于晉八年春楚子圍我旬有七日國人大臨守陴者皆哭楚師退我復修城楚師復進三月入鄭公肉袒牽羊以逆楚師為我退三十里而平夏晉荀林父帥師來救羣帥不協楚人敗之於邲十年晉侯伐我公如楚謀晉十七年晉侯復以諸侯伐我公子偃禦之敗諸丘輿十八年春襄公卒悼公費立冬晉欒書伐我楚公子側來救公與許男訟于側元年公與許男皆訟於楚我不勝公歸請成于晉八月及晉趙同盟于垂棘二年春公如晉拜成六月悼公卒弟成公睔立楚公子嬰齊伐我晉欒書來救遇於繞角楚師還成公元年春公如晉秋楚嬰齊伐我晉侯帥諸侯來救囚楚鄖公鍾儀三年春楚人以童賂求我公會楚公子成于鄧秋公如晉晉人執公而使欒書來伐冬楚嬰齊侵陳以救我公孫申謀曰我出師圍許為將改立君者而紓晉使晉必歸君乃圍許四年晉使衛侵我公子班以申之謀立公子繻國人殺繻而立世子髠頑晉人伐我而歸公賂之以襄鐘盟于修澤公子騑質焉公歸而討立君者殺叔申叔禽公子班出奔許六年晉楚之大夫盟于宋曰無相加戎公如晉聽成九年楚背晉侵我喜侵楚取新石十年春楚以汝隂之田求成騑從楚子盟于武城夏喜伐宋宋將鉏樂懼敗諸汋陂宋師舍於夫渠不警喜覆而敗之獲其二帥我及楚子與晉侯戰於鄢陵楚鄭皆敗績晉人射楚子中目秋晉侯復以諸侯伐我喜宵軍之宋齊衛皆失軍十一年春騑侵晉衛人侵我以救晉夏太子髠頑侯獳為質於楚楚人來戍是嵗晉悼公初立以諸侯伐我楚嬰齊來救自是晉再伐我楚再來救十四年夏成公卒子僖公惲立成公疾病大夫請息肩于晉公曰楚君以鄭故親集矢於目若背之其誰䁥我秋諸侯會于戚以謀我冬諸侯城虎牢我及晉成僖公無禮於諸大夫五年將會諸侯于鄬騑相又不禮焉騑使賊弒公而以瘧疾赴于諸侯子喜生五年奉而立之是為簡公元年春羣公子謀討騑騑先之反殺羣公子公子發侵蔡獲蔡公子燮諸侯會于邢丘公親獻捷于會冬楚公子貞伐我公子騑公子發公孫輒欲從楚公子嘉公孫蠆公孫舍之欲待晉騑曰謀之多族事滋無成姑從楚以紓吾民晉師至吾又從之敬共幣帛以待強者而庇民焉可也舍之曰小所以事大信也小國無信兵亂日至亡無日矣晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉騑不從遂及楚平二年晉以諸侯來伐將圍我乃行成將盟晉人為書曰鄭國不唯晉命是聽有如此盟騑曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀人民不獲享其土利夫婦辛苦墊隘無所底告今日既盟之後鄭國不唯有禮與強可以庇民者是從而敢有異志亦如之晉人不得已而盟復以諸侯伐我而去嘉欲擊晉師舍之止之冬楚子伐我騑欲及楚平嘉與蠆曰與大國盟口血未乾而背之若何騑舍之曰吾盟固云乃及楚平三年夏輒及楚公子貞伐宋衛侯救宋舍之曰必伐衛以明與楚使皇耳侵衛衛人獲皇耳輒又與楚侵魯魯仲孫蔑曰鄭執政將有大咎師競甚矣秋晉侯以諸侯伐我師于首止尉止與騑有怨帥羣不逞以作亂殺騑發輒三大夫嘉知而匿之故免嘉當國諸侯城虎牢而戍之晉師城梧及制士魴魏絳戍之乃及晉平楚貞來救宵涉潁與楚人盟諸侯之師侵我北鄙而歸諸大夫患晉楚之故皆曰楚弱於晉晉不吾疾也晉疾楚將辟之能使晉師致死於我楚不敢敵則可固與矣舍之曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説使疆埸致惡於宋四年春宋向戍侵我大獲夏舍之侵宋諸侯圍我秋及諸侯盟于亳楚子秦師來伐我逆而與之伐宋諸侯復來伐我乃使良霄石􅎢如楚告曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之乃行成于晉冬公會諸侯于蕭魚晉人歸鄭囚納斥候禁侵掠十一年冬公會諸侯圍齊公孫蠆良霄公孫黑肱行嘉舍之公孫夏守嘉謀去諸大夫將叛晉而起楚師以圖之楚令尹午帥師伐我二子知其謀完守入保嘉不敢應楚無功而還十二年國人討尉止及楚師之難嘉以甲自守舍之夏率國人伐而殺之逐其黨子革子良皆奔楚立公孫僑為卿十七年秋諸侯會于夷儀將伐齊冬楚子以諸侯之師伐我以救齊當陳隧者井堙木刋鄭人怨之十八年夏舍之僑以車七百乘入陳命師無入公宫陳侯免擁社使其衆男女别而纍以待於朝賂我以宗器舍之執縶而見再拜稽首承飲以獻僑入數俘而出祝祓社司徒致民司馬致節司空致地乃還冬公如晉拜陳之功夏復伐陳取成而還許人有怨於我十九年秋許靈公如楚請師而卒于楚楚子曰不伐鄭何以求諸侯冬楚子來伐僑曰晉楚將平楚王於是昧於一來不如使逞而歸乃易成也舍之説不禦冦楚獲九人而歸二十年良霄會晉楚及諸侯之大夫盟于宋既盟公享趙武于垂壠大夫七人皆從武請賦以觀其志退而告人曰皆數世之主也良霄賦鶉之奔奔武曰是將為戮二十一年秋使遊吉如楚及漢楚人辭之而要公吉還以告舍之舍之曰楚不修政德而貪昧於諸侯以逞其私願欲久得乎君其往也送葬而歸以快楚心楚不十年未能恤諸侯也吾乃休吾民矣九月遊吉如晉告朝于楚公如楚楚康王卒二十二年舍之卒其子虎即位鄭飢虎以父命餼國人粟户一鍾是以得鄭國之民故罕氏世掌國政以為上卿良霄將使公孫黑如楚黑不願強使之黑將攻之大夫和之盟而止裨諶曰禍未歇也必三年而後紓二十三年夏公及大夫盟良霄又將使黑如楚宵嗜酒七月黑及其醉伐之醒而奔許公盟大夫於太宫盟國人于師之梁霄自墓門之竇入駟帶率國人攻而殺之罕虎以政授國僑僑為政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之二十四年夏公如晉使印段如楚以適晉告二十五年楚令尹圍娶于公孫段氏國人懼其襲我使行人翬辭焉楚人知其有備請垂櫜而入乃許之黑與公孫楚爭室婦人欲從楚黑櫜甲以見楚將殺之楚擊之傷大夫畏黑為之放楚於吳六月公及大夫盟于公孫假氏六卿私盟于薰隧黑強與於盟書曰七子晉趙武死公往吊之趙氏辭及雍而復二十六年黑將作亂欲去遊氏而代其位傷疾作而不果大夫數其罪戮之二十七年秋罕虎如晉告將適楚冬公如楚楚子及公田於江南二十八年僑作丘賦國人謗之三十年春僑鑄刑書晉叔向以書非之不聽士文伯曰火未出而作火以鑄刑器火見鄭其災乎六月丙戍鄭災三十六年簡公卒子定公寧立元年秋公會諸侯于平丘僑爭承晉人許之罕虎卒僑哭之曰吾已無為為善矣惟夫子知我四年晉韓起來聘求賈人之玉僑辭焉起以玉與馬私覲於僑而謝之四年冬有星孛於大辰西及漢禆竈謂僑曰宋衛陳鄭將同日火若我用瓘斝玉瓉鄭必不火僑弗與六年五月壬午宋衛陳鄭災三日哭國不市禆竈曰不用吾言鄭又將火鄭人請用之子産不可亦不復火八年僑卒孔子聞之出涕曰古之遺愛也史記聲公五年子産卒後此二十六年今以左氏為信十二年公如晉遊吉相與范鞅言及王子朝之亂鞅曰若王室何吉曰老夫其國家不能恤敢及王室王室之不寧晉之耻也鞅懼與韓起謀而納王十六年定公卒子獻公蠆立二年晉頃公卒遊吉吊且送葬晉人以其無二詰之對曰晉之喪事敝邑之間寡君有所助執紼矣若其不間雖士大夫有不足也靈王之喪我先君簡公在楚印段實往王吏不討恤所無也今曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱從其省則吉在此矣晉不能詰十年正月遊速帥師滅許周儋翩率王子朝之徒將因我以作亂于周我為之伐馮滑胥靡負黍狐人闕外二月晉人使魯來討取匡十一年公及齊侯盟於鹹始叛晉十三年獻公卒子聲公勝立鄭益弱駟歂殺鄧析而用其竹刑君子罪之元年遊速會齊侯衛侯于安甫二年及魯平五年冬晉范氏中行氏既出奔復入我師助之晉人敗我于百泉六年宋平元之族自蕭來奔夏罕逹敗宋師于老丘八年齊人輸粟于范氏罕逹駟𢎞送之晉趙鞅伐我戰于鐡我師敗績十三年春宋師侵我宋鄭自此連嵗相侵爭邊邑至十九年以所爭邑為墟乃止二十六年晉荀瑶伐我取九邑三十三年荀瑶復伐我齊田恆來救晉師還三十七年聲公卒子哀公錫立八年鄭人弒公而立聲公之弟丑是為共公三十年共公卒子幽公已立元年韓伐我殺幽公鄭人立幽公之弟駘是為繻公年表云幽公子十五年韓來伐取雍邱城京十六年伐韓敗之於負黍二十年韓魏趙列為諸侯二十三年圍韓陽翟二十五年殺相子陽二十七年子陽之黨弒繻公而立幽公之弟乙是為鄭君二年負黍反復歸於韓十二年韓伐我取陽城二十一年韓哀侯滅鄭蘇子曰鄭之諸公桓武之後惟莊公為賢然其為人喜權而任數桓武之風衰焉叔段之亂諸大夫皆欲早為之所莊公之明足以制之然釋而不問俟其惡成而後加之以大戮此非不忍於弟蓋忍之至也孔子深探其心故書曰鄭伯克段于鄢而邱明謂之鄭志蓋謂此也周平王桓王二於虢公莊公既質王子取麥禾矣則又率齊而朝之伐宋而説之政不可得於是兵交中原射王中肩烏乎其忮心發於中卒不可蓋如此鄭自莊公始畏楚穆襄之後無嵗不被晉楚之兵子駟子展為政不知所出惟其來者與之鄭幾於亡及晉悼公三帥諸侯以弊楚師楚不能爭而子産受之以禮自固雖晉楚之暴不能加焉詩云誰能執熱逝不以濯又曰無競維人四方其訓之吳季札過鄭謂子産政將及子子為政必慎以禮不然鄭國將敗子産用之鄭以復安如季子可謂知務矣哉古史卷十八
