  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0005_WYG_004-1a, image: WYG0371/WYG0371-0220c.png}
body:
  text: 古史卷四宋蘇轍撰殷本紀殷契帝嚳之子母曰簡狄有娀氏之女也為帝嚳次妃見𤣥鳥墮其卵取吞之因孕生契契長而佐禹治水有功事堯舜為司徒舜命之曰百姓不親五品不孫汝作司徒敬敷五教在寛封於殷賜姓子氏契卒子昭明立昭明卒子相土立陶唐氏之火正閼伯居商丘以祀大火相土因之故商主大火相土卒子昌若立昌若卒子曹圉立曹圉卒子冥立冥為水官勤於水事而死於水子振立振卒子㣲立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子天乙立是為成湯自契至湯八遷湯始居亳從先王居得伊尹任以國政伊尹者有莘之逸民也耕於有莘之野而樂堯舜之道無求於諸侯湯以幣聘之三反而後従湯湯征諸侯葛伯不祀湯使人問之曰無以共犧牲也湯遺之牛羊葛伯食之又不以祀湯又使人問之曰無以共秶盛也湯使亳衆往為之耕老弱饋食葛伯率其民邀其有酒肉黍稻者奪之不受者殺之有童子以黍肉餉殺而奪之故湯征自葛載東面而征西夷怨南面而征北狄怨曰奚獨後予攸徂之民室家相慶曰傒予后后来其蘇是時夏桀為虐而諸侯韋氏顧氏昆吾氏皆為亂湯使伊尹適夏以觀桀之政可輔輔之不可輔伐之伊尹入夏知桀之不可為也復歸于亳湯遂與伊尹伐韋顧昆吾克之遂伐桀升自陑從桀於安邑戰于鳴條之野勝之将易置夏社而後丗莫及勾龍者乃止夏師大敗湯従之桀奔南巢而死湯自為繼虞夏之後而以兵取天下曰台恐来丗以台為口實盖有慚徳焉還自夏至大坰仲虺乃作誥言桀之不可不伐者釋之湯歸于亳復作湯誥以伐桀大義告天下改正朔服色以十二月為嵗首色尚白大事歛用日中戎事乘翰牲用白牡樂曰大濩其後大旱七年湯剪髪斷爪禱于桑林之社而雨作桑林之樂湯崩太子太丁未立而卒立其弟外丙是為帝外丙三年崩立其弟仲壬是為帝仲壬四年崩乃立太丁之子太甲是為帝太甲太甲元年十二月太甲之祀先王及歸于亳皆以十二月者殷之正月也孔安國以為湯崩逾月而太甲即位然則未逾年而即位可乎伊尹以冢宰奉太甲祀于先王侯甸羣后咸在百官總已以聼冢宰伊尹乃明言烈祖之成徳以訓于王太甲不能用伊尹乃即湯之墓營桐宫以放太甲使居憂焉太甲悔過自咎終䘮三年十二月朔伊尹以冕服奉嗣王歸于亳作太甲三篇以申戒之太甲不以為怨伊尹不以自疑乃尊伊尹曰保衡及其老作咸有一徳以歸太甲在位三十三年而崩是為太宗子帝沃丁立沃丁之丗伊尹卒𦵏之于亳咎單遂訓伊尹事作沃丁沃丁崩弟帝太庚立太􅏤崩子帝小甲立小甲崩弟帝雍已立殷道衰諸侯或不至雍已崩弟帝太戊立任伊陟臣扈伊陟者伊尹之子也亳有祥桑榖生于朝七日大拱伊陟賛于巫咸作咸乂四篇太戊懼而修徳賛于伊陟作伊陟原命桑穀死殷復興諸侯歸之享國七十五年而崩是為中宗子帝仲丁立仲丁遷于囂仲丁崩弟帝外壬立外壬崩弟帝河亶甲立河亶甲居相殷復衰河亶甲崩子帝祖乙立圯于相復遷于耿任巫賢殷復興巫賢者巫咸之子也祖乙崩子帝祖辛立祖辛崩弟帝沃甲立沃甲崩立沃甲兄祖辛之子祖丁是為帝祖丁祖丁崩立沃甲之子南庚是為帝南􅏤南􅏤崩立祖丁之子陽甲是為帝陽甲自仲丁以来廢適而更立諸弟子諸弟子或爭相代立比九丗亂於是諸侯莫朝陽甲崩弟帝盤庚立自成湯至盤􅏤凡五遷殷已居河北河數為敗盤􅏤乃南渡辟河復居于亳民始不恱乃作盤􅏤三篇告而遷之於是百姓復安殷復興盤􅏤崩弟帝小辛立殷復衰小辛崩弟帝小乙立小乙崩子帝武丁立武丁少學于甘盤已而遷于荒野入宅于河自河徂亳欲以習知民事之艱難及父没亮隂三年既免䘮猶弗言也羣臣疑而問焉武丁曰以台正四方台恐徳弗類兹故弗言恭默思道夢帝賚予良弼其代予言乃以其形求之于天下說為胥靡築于傅巖惟肖乃立為相號之曰傅說任以保衡之事殷復興武丁祭成湯祭之明日有飛雉升鼎耳而雊祖已訓諸王作髙宗肜日髙宗之訓武丁在位五十九年而崩是為髙宗子帝祖庚立祖庚崩弟帝甲立帝甲滛亂殷復襄帝甲崩子帝廪辛立廪辛崩弟帝庚丁立庚丁崩子帝武乙立復去亳徙河北武乙無道為偶人謂之天神與之博使人為行不勝而僇辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子帝太丁立太丁崩子帝乙立殷益衰帝乙崩子帝辛立是為紂紂帝乙之適子也帝乙之長庻曰微子啓啓賢以母賤不得立紂為人辯給㨗疾聞見甚敏紂力過人手格猛獸知足以拒諌言足以飾非矜人臣以能以為皆出已下好酒滛樂嬖於婦人伐有蘇氏有蘇以妲己女焉紂愛之惟妲己之言是從使師㳙作滛聲北里之舞靡靡之樂厚賦稅以實鹿臺之財積鉅橋之粟益收狗馬竒物充牣宫室廣沙丘苑臺多取野獸蜚鳥置其中以酒為池以肉為林使男女倮相逐其間為長夜之飲弗事上帝神祗廢宗廟之祀犧牲粢盛既于凶盗百姓怨望諸侯有畔者紂乃作重刑辟有炮烙之法以西伯昌九侯鄂侯為三公九侯有女入之紂女不喜滛紂怒殺之而醢九侯鄂侯爭之并脯鄂侯西伯昌聞之竊歎崇侯虎以告紂囚西伯羑里七年西伯之臣閎夭之徒求羙女竒物善馬以贖西伯西伯出而獻洛西之地請除炮烙之刑紂許之賜弓矢斧鉞得専征伐為西伯而用費仲為政費仲善諛好利殷人弗親又用惡来惡来善䜛毁諸侯諸侯益䟽西伯歸而修徳諸侯多畔紂往歸西伯西伯益大舉兵戡黎黎近於殷殷臣祖伊恐奔告于紂曰嗚呼天既訖我殷命今我民罔弗欲䘮曰天曷不降威大命不至今王其如台王曰我生不有命在天祖伊反曰乃罪多參在上安能責命于天乎是時殷之耆舊大臣皆棄不用㣲子啓箕子王子比干皆憂懼莫能救商容廢居於家紂之卿士大夫皆四方多罪逋逃之人也西伯既已受命稱王九年而没武王終三年之䘮以諸侯東伐至于孟津觀政于商欲以懼紂改過為善師還紂益長惡不悛㣲子與其父師箕子少師比干謀而歸周箕子佯狂紂囚以為奴比干諌而死紂剖其心觀之周之十三年武王遂帥諸侯伐紂一月戊午師渡孟津癸亥陳于商郊紂亦發兵距之牧野甲子昧爽紂兵敗走登鹿臺衣其寳衣赴火而死武王入誅妲己釋箕子囚封比干墓表商容閭㪚鹿臺鉅橋之積而封紂子武􅏤祿父以續殷後及武王崩武􅏤與管蔡作亂成王命周公誅之而立㣲子於宋殷人盖禘嚳郊冥祖契宗湯報上甲微而丗祀三宗自夏殷以来天子雜稱帝王至周去帝號獨稱王與夏殷為三王殷本子姓其後以國為氏有殷氏來氏宋氏空桐氏稚氏北殷氏目夷氏蘇子曰商之有天下者三十丗而周之丗三十有七商之既衰而復興者五王而周之既衰而復興者宣王一人而已葢商之多賢君冝若其丗之過於周周之賢君不如商之多而其久於商者乃數百歲其故何也周公之治天下務以文章繁縟之禮和柔馴擾剛強之民故其道本於尊尊而親親貴老而慈幼使民之父子相愛兄弟相恱以無犯上難制之氣行其至柔之道以揉天下之戻心而去其剛毅果敢之志故其享天下至久而諸侯内侵京師不振卒於廢為至弱之國何者優柔和易可以為久而不可以為強也若夫商人之所以爲天下者不可復見矣嘗試求之詩書詩之寛緩而和柔書之委曲而繁重者皆周也而商人之詩駿𤼵而嚴厲其書簡絜而明肅以為商人之風俗盖在乎此矣夫惟天下有剛強不屈之俗也故其後丗有以自振於衰㣲然至其敗也一散而不可復止盖物之強者易以折而柔忍者可以久存柔者可以久存而常困於不勝強者易以折而其末也可以有所立此商之所以不長而周之所以不振也嗚呼聖人之為天下亦有所就而已不能使之無弊也使之能久而不能強能以自振而不能以及逺此二者存乎其後丗之賢與不賢矣太公封於齊尊賢而上功周公曰後丗必有篡弑之臣周公治魯親親而尊尊太公曰後丗寖衰矣夫尊賢上功則近於強親親尊尊則近於弱終之齊有田氏之禍而魯人困於盟主之令葢商之政近於齊而周公之所以治周者其所以治魯也故齊強而魯弱魯未亡而齊亡也書稱伊尹去亳適夏既醜有夏復歸于亳葢伊尹耕於莘野既以處士從湯矣及其適夏非其私行也湯必與知之其君臣之心以為従湯伐桀以濟斯丗不若使伊尹事桀以止其亂雖使夏不亡商不興無憾也及其不可復輔於是捨而歸耳其後文王事紂亦身為之三公至将囚而殺之然後弃之而西盖湯之於桀文王之於紂其不欲遽奪之者如此此其所以為湯文王而後丗之所不及也古史卷四
