body:
  text: 古史卷十一宋蘇轍撰燕召公世家第四召公奭周之同姓食采於召文王起於岐周而化行於南方江漢之國召公實掌其諸侯之政故詩曰文武受命有如召公之臣日闢國百里召公之治諸侯甚得民和親聽男女之訟止於甘棠之下以决事及召公沒而民思之愛其甘棠不忍伐也故召南有甘棠行露之詩武王克啇封召公於北燕而留為周太保西旅獻獒召公作旅獒以戒武王武王崩管蔡以殷叛周公東伐召公與太公開成王明周公無罪成王乃逆周公於東及成王将宅洛邑使召公先相宅召公以庻殷攻位于洛汭位成而周公至召公作誥以戒成王周公亦作洛誥而歸政焉成王既涖政二公為左右相自陜以東周公主之自陜以西召公主之詩周南召南以二公為名周南稱后妃而召南稱夫人以此知周南為周人之詩召南為諸侯之詩周公治内而召公治外無疑也及成王之世分天下以為左右二伯領之故公羊言自陜以東周公主之自陜以西召公主之按書周公毖殷頑民遷于洛邑君陳畢公繼之而召公亦稱伯相康王之誥曰太保率西方諸侯入應門左畢公率東方諸侯入應門右然則二公在文王世分治内外在成王世分掌東西其事各異也召公不説恐成王未能君天下周公作書諭之名之曰君奭召公復為公劉泂酌卷阿之詩以戒成王周公沒召公與畢公終相成王立康王召公卒其長子在燕其次子留周為召公世世輔周與周公比其顕者召虎佐周宣王燕自召公以下九世至惠侯惠侯當周厲王奔彘共和之世惠侯卒子僖侯立是嵗周宣王即位僖侯三十六年卒子頃侯立頃侯二十四年卒子哀侯立哀侯二年卒子鄭侯立鄭侯三十六年卒子繆侯立繆侯七年而魯隐公之元年也十八年卒子宣侯立宣侯十三年卒子桓侯立桓侯七年卒子荘公立春秋魯荘公之十九年當燕荘公之十六年是嵗衛師燕師伐周立王子頽明年鄭伯執燕仲父諸儒皆言立子頽者南燕姞姓南燕近衛於事為信而太史公以為北燕姬姓按春秋書姫姓之燕皆曰北燕則獨書燕者謂南燕也二十七年山戎病燕齊桓公為燕伐山戎歸燕侵地使燕脩召公之法共貢天子荘公三十三年卒襄公立襄公四十年卒桓公立桓公十六年卒宣公立宣公十五年卒昭公立昭公十三年卒武公立武公十九年卒文公立文公六年卒懿公立懿公四年卒子簡公款立史記簡公作惠公簡公多嬖寵欲去諸大夫而立其寵六年冬諸大夫比以殺公之外嬖公懼奔齊燕人奉悼公以為國悼公雖立而未改元九年冬齊景公以兵納簡公晏嬰曰不入燕有君矣民不貳吾君賄左右謟䛕作大事不以信未嘗可也明年正月齊師次于虢燕人歸燕姫賂以瑶罋玉櫝斝耳盟于濡上不克納而還悼公於是改稱元年六年齊髙偃帥師納簡公于陽史記惠公在齊四年齊人納之惠公至燕而死燕立悼公盖失之矣以晏子之言考之則簡公之出也燕既立悼公矣悼公雖立而未敢改元及齊納簡公而不入知其决不得歸然後即位改元耳至悼公六年齊髙偃又以兵納簡公于陽豈有惠公九年至燕而死之説乎太史公之為人粗而不詳其於詩書春秋皆未嘗究觀本末又篤信戰國雜説意欲立異自成一家而輕失實之謬孔子序詩書皆因古文而略發明之豈求異哉悼公七年卒共公立共公五年卒平公立平公十九年卒簡公立簡公十二年卒獻公立獻公二十八年卒孝公立孝公十五年卒成公立成公十六年卒湣公立湣公三十一年卒釐公立時三晉始列為諸侯釐公三十年伐齊敗于林營釐公卒桓公立桓公十一年卒文公立文公二十八年蘇秦來説請與趙從親文公與之車馬金帛使至趙趙肅侯聽之因約六國為從長秦惠王以其女為燕太子婦二十九年文公卒太子立是為易王易王元年秦使犀首說齊魏共伐趙以敗從約蘇秦自趙入燕易王初立齊宣王因我喪伐取十城蘇秦為燕説齊復得十城十年燕君為王蘇秦通文公夫人懼誅乃説王使齊為反間欲以亂齊易王十二年卒子噲立齊人殺蘇秦蘇秦之在燕與其相子之為婚而蘇代與子之交及蘇秦死而齊宣王復用蘇代王噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問曰齊王奚如對曰必不伯燕王曰何故對曰不信其臣蘇代欲以激燕王尊子之於是燕王大信子之子之因遺蘇代百金而聽其所使鹿毛夀謂燕王不如以國讓子之堯以天下讓許由許由不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益於天而以啓人為吏及老傳天下於益啓與交黨攻益奪之天下謂禹名傳天下於益實令啓自取之今王言屬國於子之而吏無非太子之人者是名屬子之而實太子用事也王因収印自三百石吏以上而效之子之子之南面行王事而噲老不聼政顧為臣三年國大亂民恫恐将軍市被與太子平謀将攻子之儲子謂齊湣王曰因而赴之破燕必矣齊王因令人謂太子平曰寡人聞太子之義将廢私而立公飭君臣之義明父子之位弊邑雖小不足以為先後雖然唯太子所以令之太子因聚衆使将軍市被圍公宫攻子之不克市被及百姓反攻太子市被死構難數月死者数萬人百姓離心齊王因令章子将而伐燕士卒不戰城門不閉燕君噲死子之亡二年而燕人共立太子平是為昭王昭王即位収破燕卑身厚幣以招賢者謂郭隗曰齊因孤國之亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始隗且見事况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之樂毅自魏徃鄒衍自齊徃劇辛自趙徃士爭趨燕燕王弔死問孤與百姓同甘苦使蘇代事齊為間使樂毅交結諸侯二十八年燕國殷富士卒樂軼輕戰於是以樂毅為上将軍與秦楚三晉合謀以伐齊齊兵敗湣王出亡於外燕兵獨追北入臨菑盡取齊寳燒其宫室宗廟城之不下者獨莒即墨其餘皆屬燕三十三年昭王卒子惠王立惠王為太子時與樂毅有卻及即位疑毅使騎刼代将樂毅亡走趙齊田單以即墨敗燕騎劫死燕兵引歸齊悉復得其故城惠王七年卒武成王立史記趙惠文王二十八年書燕将成安君公孫操弑其王是年即燕武成王之元年而燕世家不言疑故録之於此韓魏楚共伐燕七年齊田單伐我㧞中陽十四年武成王卒子孝王立燕四十三君有二惠二僖二宣三桓二昭二文二簡二孝雖辟陋少文恐不至此盖譜系脱謬耳案左傳記簡公欵甚明而史記以為惠公則其餘失實者可知也孝王三年卒子王喜立四年王命相栗腹約歡趙以五百金為趙王酒還報曰趙壮者皆死長平其孤未壮可伐也王召昌國君樂間問之對曰趙四戰之國其民習兵不可伐王曰吾以五而伐一對曰不可燕王怒羣臣皆以為可卒起二軍車二千乗栗腹将而攻鄗卿秦攻代獨大夫将渠謂燕王曰與人通關約交以五百金飲人之王使者報而反攻之不祥兵無成功王不聼自将偏軍隨之将渠引王綬止之曰王必無徃徃無成功王蹵之以足将渠泣曰臣非自為乃為王也燕軍至宋子趙使廉頗将破栗腹於鄗使樂乗将破卿秦於代廉頗逐燕軍五百餘里圍其國樂間奔趙燕人請和趙人不許必令将渠處和燕相将渠以處和趙聽将渠解圍去六年秦滅東西周九年秦王政初即位十二年趙使李牧攻燕拔武遂方城劇辛故居趙與龐煖善已而亡走燕是時趙數困于秦而廉頗以讒去龐煖為将燕欲因趙弊攻之問劇辛辛曰龐煖易與耳遂使劇辛将擊趙趙使龐煖擊之取燕軍二萬殺劇辛二十三年太子丹質於秦亡歸燕二十五年秦滅韓二十七年秦滅趙趙公子嘉自立為代王燕見秦且滅六國秦兵臨易水禍且至燕太子丹隂養壮士二十人使荆軻獻督亢地圖於秦因襲刺秦王秦王覺殺軻使将軍王翦擊燕二十九年秦拔我薊燕王亡徙居遼東斬丹以獻秦三十年秦滅魏三十三年秦拔遼東虜王喜卒滅燕蘇子曰燕召公之後然國於蠻貊之間禮樂微矣春秋之際未嘗出與諸侯㑹盟至於戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱横之事説之自是兵交中國無復寧嵗六世而亡吴自大伯至夀夢十七世不通諸侯自巫臣入呉敎呉乗車戰射與晉楚力爭七世而亡燕呉雖南北絶逺而興亡之迹大略相似彼説客䇿士借人之國以自快於一時可矣而為國者因而狥之猖狂恣行以速滅亡何哉夫起於辟陋之中而奮於諸侯之上如商周先王以德服人則可不然皆禍也至太子丹不聽鞠武而用田光欲以一匕首斃秦雖使荆軻能害秦王亦何救秦之滅燕而況不能哉此又蘇秦之所不取也古史卷十一
