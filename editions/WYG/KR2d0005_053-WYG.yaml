body:
  text: 古史卷五十三宋蘇轍撰屈原列傳第三十屈原名平楚之同姓也為楚懐王左徒博聞强志明於治亂嫺於辭令入則與王圖議國事以出號令出則接遇賔客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懐王使原造為憲令原屬草藁未定上官大夫見而欲奪之原不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功以為非我莫能為也王怒而疏平其後秦欲伐齊齊與楚從親秦惠王患之乃令張儀佯去秦厚幣委質事楚曰秦甚憎齊齊與楚從親楚誠能絶齊秦願獻商於之地六百里懐王貪而信張儀遂絶齊使使如秦受地張儀詐之曰儀與王約六里不聞六百里楚使怒去歸告懐王懐王怒大興師伐秦秦發兵擊之大破楚師於丹陽斬首八萬虜楚將屈匄遂取楚之漢中地懐王乃悉發國中兵以深入擊秦戰於藍田魏聞之襲楚至鄧楚兵懼自秦歸而齊竟怒不救楚楚大困明年秦割漢中地與楚以和楚王曰不願得地願得張儀而甘心焉張儀聞乃曰以一儀而當漢中地臣請往至楚又因厚幣用事臣靳尚而設詭辯於懐王之寵姬鄭袖懐王竟聽鄭袖復釋去張儀是時平既疏不復在位使於齊顧反諫懐王曰何不殺張儀懐王悔追張儀不及其後諸侯共擊楚大破之殺其將唐昧時秦昭王與楚婚欲與懐王㑹懐王欲行平曰秦虎狼之國不可信不如無行懐王稚子子蘭勸王行奈何絶秦歡懐王卒行入武闗秦伏兵絶其後因留懐王以求割地懐王怒不聽亡走趙趙不内復之秦竟死於秦而歸葬長子頃襄王立以其弟子蘭為令尹楚人皆咎子蘭以勸懐王入秦而不反也平既嫉之憂愁幽思而作離騷離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣其稱文小而指極大舉類邇而見義逺雖廢不用而睠顧楚國繫心懐王一篇之中而三致志焉太史公言離騷之作自懐王之世屈原始見疏而作矣今案離騷之文斥刺子蘭宜在懐王末年頃襄王出故正之於此令尹子蘭聞之大怒卒使上官大夫短屈原於頃襄王頃襄王怒而遷之屈原至於江濵被髪行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故而至此屈原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎寧赴常流而葬乎江魚腹中耳又安能以皓皓之白而䝉世之温蠖乎乃作懐沙之賦其辭曰陶陶孟夏兮草木莽莽傷懐永哀兮汨徂南土眴兮窈窈孔靜幽墨寃結紆軫兮離愍之長鞠撫情効志兮俛詘以自抑刓方以為圜兮常度未替易初本由兮君子所鄙章畫職墨兮前度未改内直質重兮大人所盛巧匠不斵兮孰察其揆正𤣥文幽處兮矇謂之不章離婁微睇兮瞽以為無明變白而為黒兮倒上以為下鳳凰在笯兮雞雉翔舞同糅玉石兮一槩而相量夫黨人之鄙妬兮羗不知吾所臧任重載盛兮陷滯而不濟懐瑾握瑜兮窮不得余所示邑犬羣吠兮吠所怪也誹駿疑桀兮固庸態也文質疎内兮衆不知吾之異采材樸委積兮莫知余之所有重仁襲義兮謹厚以為豐重華不可啎兮孰知吾之從容古固有不並兮豈知其故也湯禹久逺兮邈不可慕也懲違改忿兮抑心而自彊離涽而不遷兮願志之有象進路北次兮日昧昧其將暮含憂虞哀兮限之以大故亂曰浩浩沅湘兮分流汨兮修路幽拂兮道逺忽兮曽唫恒悲兮永歎慨兮世既莫吾知兮人心不可謂兮懐情抱質兮獨無匹兮伯樂既沒驥將焉程兮人生有命兮各有所錯兮定心廣志余何畏懼兮曽傷爰哀永歎喟兮世溷不吾知心不可謂兮知死不可讓兮願勿愛兮明以告君子兮吾將以為類兮於是懐石自投汨羅以死屈原既死之後楚有宋玉唐勒景差之徒皆好辭而以賦見稱然皆祖屈原之從容辭令終莫敢直諫其後楚日以削數十年竟為秦所滅蘇子曰漢賈誼為長沙傅過汨羅為賦以弔屈原曰歴九州而相君何必懐此故都誼之言或一道也而非原志原楚同姓不忍棄其君而之四方而誼教之以孔子孟軻歴聘諸侯以求行道勢必不從矣柳下惠為士師三黜而不去曰直道而事人何往而不三黜枉道而事人何必去父母之邦惜乎屈原廉直而不知道殉節以死然後為快此所以未合於聖人耳使原如桞下惠用之則行舍之則藏終身於楚優游以卒歲庶乎其志也哉古史卷五十三
