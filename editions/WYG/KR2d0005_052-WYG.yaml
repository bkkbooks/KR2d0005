body:
  text: 古史卷五十二宋蘇轍撰田單列傳第二十九田單者齊諸田疏屬也涽王時單為臨菑市掾不見知及燕使樂毅伐破齊涽王出奔已而保莒城燕師長驅平齊而單走安平令其宗人盡斷其車軸末而傳鐵籠已而燕軍攻安平城壊齊人走爭塗以轊折車敗為燕所虜唯單宗人以鐵籠故得脱東保即墨燕既盡降齊城唯獨莒即墨不下燕軍聞齊王在莒并兵攻之淖齒既殺涽王於莒因堅守拒燕軍數年不下燕引兵東圍即墨即墨大夫出與戰敗死城中相與推單曰安平之戰單宗人以鐵籠得全習兵立以為將軍以即墨拒燕頃之燕昭王卒惠王立與樂毅有隙單聞之乃縱反間於燕言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎劫代樂毅樂毅因歸趙單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之單因宣言曰神來下教我乃令城中人曰當有神人為我師有一卒曰臣可以為師乎反走單乃起引還東鄉坐師事之卒曰臣欺君誠無能也單曰子勿言也因師之每出約束必稱神師乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守唯恐見得單又縱反間曰吾懼燕人掘吾城外冢墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見涕泣其欲出戰怒自十倍單知士卒之可用乃身操版揷與士卒分功妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城遣使約降於燕燕軍皆呼萬歲單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍由此益懈單乃收城中得千餘牛為絳繒衣畵以五綵龍文束兵刃於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人遂夷殺其將騎劫燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕歸于單兵日益多乘勝燕日敗亡卒至河上而七十餘城皆復為齊乃迎襄王於莒入臨菑而聽政襄王封單號曰安平君而以為齊相單嘗過菑水有老人渉菑而寒出不能行單解裘衣之襄王聞而惡之曰單厚施將以取吾國乎不早圖後之矣王左右有貫珠者王問之曰女以為何若對曰王不如因以為己善下令國中曰寡人憂民之飢田單收而食之寡人憂民之寒田單解裘衣之善單之善則亦王之善己王曰善賜單牛酒貫珠復勸王布令國中求飢寒者而收榖之於是國中皆曰田單之愛人王之教也王説單乃安齊之士有貂勃者嘗謗單單飲之酒而問之曰單何以得罪於先生先生之毁單也勃曰跖之狗可使吠堯使勃得為公狗顧將為公攫噬人矣尚何謗哉單任之於王王有所幸臣九人欲害單請於王使勃使楚勃至楚楚王觴之數日不反九人因謂王曰匹夫而能牽留萬乗豈不以據勢哉安平君之於王君臣無禮上下無别内收百姓外懐戎翟陰結諸侯之雄俊其志欲有為也王入之他日王顧左右曰召相單來單知王怒免冠徒跣肉袒而進退而請死罪五日王乃曰子無罪子為子之臣禮吾為吾之王禮而已貂勃從楚來王賜諸前酒酣王復曰召相單來勃避席稽首曰王安得此亡國之言乎昔文王得吕尚以為太公齊桓公得管仲以為仲父今王得安平君而獨曰單單安得此亡國之言乎燕之破齊王走之城陽之山安平君以惴惴之即墨三里之城七里之郭弊卒七千禽其司馬而反千里之齊當是之時闔城陽而王之天下莫能止也安平君為棧道木閣迎王與后於城陽山中王乃得反子臨百姓今國已定民已安王乃曰單單嬰兒之計不為此也王不亟殺此九子以謝安平君國危矣王以為然乃殺九子而逐其家益封單夜邑萬戸單將而攻翟魯仲連見之曰將軍不能下也單不謝而去攻翟三月不克乃問仲連曰先生何以知單之不能下翟也連曰將軍之在即墨也坐而織蕢立則杖揷為士卒倡曰可往矣宗廟亡矣當此之時將軍有死之心而士卒無生之氣聞若言莫不揮涕奮臂而欲戰此所以破燕也今將軍東有夜邑之奉西有菑上之虞黄金横帶而馳於淄澠之間有生之樂無死之心所以不勝也單曰單有心先生知之矣明日厲氣修城立於矢石之所援桴鼓之翟人乃下燕將攻趙趙王割濟東與齊求單為將擊燕有功因留相趙已而歸齊復事王建單攻聊城魯仲連稱栗腹以十萬衆敗於趙此王建之世也蘇子曰樂毅以全燕之兵兼强齊之衆棲田單於即墨諸侯之救不至使天胙燕昭王不死樂毅不亡田單雖智要之歲月兵殘食盡齊之亡可立而待也然單兵不滿萬人堅守二城以抗百倍之師相持五年而無可乘之隙遷延稽故以須天命之復可不謂智過人哉古史卷五十二
