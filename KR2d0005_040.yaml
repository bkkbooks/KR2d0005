body:
  text: 古史卷四十宋蘇轍撰蘇秦列傳第十七蘇秦者東周雒陽人也東事師於齊而習之於鬼谷先生出游數嵗大困而歸兄弟嫂妹妻妾竊皆笑之曰周人之俗治産業力工商逐什二以為務今子釋本而事口舌困不亦宜乎秦聞之而慙自傷乃閉室不出出其書遍觀之曰夫士業已屈首受書而不能以取尊榮雖多亦奚以為於是得周書陰符伏而讀之期年以出揣摩曰此可以說當世之君矣求說周顯王顯王左右素習知秦皆少之弗信乃西至秦秦孝公卒說惠王曰秦四塞之國被山帶渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王曰毛羽未成不可以高蜚文理未明不可以並兼方誅商鞅疾辨士弗用乃東之趙趙肅侯令其弟成為相號奉陽君奉陽君弗說之去游燕歲餘而後得見說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沱易水地方二千餘里帶甲數十萬車六百乘騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府者也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎夫燕之所以不犯寇被甲兵者以趙之為蔽其南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯寇也且夫秦攻燕也踰雲中九原過代上谷彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍於東垣矣渡呼沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重千里之外計無過於此者是故願大王與趙從親天下為一則燕國必無患矣文侯曰子言則可然吾國小西迫强趙南近齊齊趙强國也子必欲合從以安燕寡人請以國從於是資秦車馬金帛以至趙李兌為秦謂奉陽君曰齊燕離則趙重齊燕合則趙輕今君合燕於齊非趙之利也臣竊為君不取也奉陽君曰何吾合燕於齊對曰夫制燕者蘇子也而燕弱國也東不如齊西不如趙豈能東無齊而西無趙哉而君甚不善蘇秦蘇秦能抱弱燕而孤於天下哉是驅燕而使合於齊也故為君計善蘇秦則取之不善亦取之以疑燕齊燕齊疑則趙重矣奉陽君曰善乃使人與秦結交李兌之言見戰國策然戰國䇿載蘇秦說趙亦云今奉陽君捐館舍與史記同然奉陽君即公子成事武靈王惠文王肅侯之世實未亡也且蘇秦死張儀說趙趙王言先王之時奉陽君蔽欺先王明其未死也今故載李兌之言而削奉陽捐館之語秦因說趙肅侯曰為君計者莫若安民無事且無庸有事於民也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭斷絶人之交也願君慎勿出於口請别白黑所以異陰陽而已矣君誠能聽臣燕必致旃裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可以受封侯夫割地包利五伯之所以覆軍禽將而求也封侯貴戚湯武之所以放弒而爭也今君高拱而兩有之此臣之所以為君願也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則效宜陽宜陽效則上郡絶河外割則道不通楚弱則無援此三策者不可不熟計也夫秦下軹道則南陽危劫韓包周則趙氏自操兵據衛取淇卷則齊必入朝秦秦欲已得乎山東則必舉兵而嚮趙矣秦甲渡河踰漳據畨吾則兵必戰於邯鄲之下矣此臣之所以為君患也當今之時山東之建國莫强於趙趙地方二千餘里帶甲數十萬車千乘騎萬匹粟支數年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也秦之所害於天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍必中於趙矣此臣之所以為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故明主外料其敵之强弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胸中矣豈掩於衆人之言而以冥冥決事哉臣竊以天下之地圖案之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國為一並力西鄉而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人也臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以豫秦秦成則高臺榭美宫室聽竽瑟之音前有樓闕軒轅後有長姣美人國被秦患而不與其憂是故夫衡人日夜務以秦權恐愒諸侯以求割地故願大王熟計之也臣聞明主絶疑去讒屛流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙以從親以叛秦令天下之將相㑹於洹水之上通質刳白馬而盟要約曰秦攻楚齊魏各出鋭師以佐之韓絶其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師而佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞其道趙涉河博關燕出鋭師以佐之秦攻燕則趙守常山楚軍武關齊涉勃海韓魏皆出鋭師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉清河燕出鋭師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賔秦則秦甲必不敢出於函谷以害山東矣如此則霸王之業成矣趙王曰寡人年少立國日淺未嘗得聞社稷之長計也今上客有意存天下安諸侯寡人敬以國從乃飾車百乘黃金千鎰白璧百雙錦繡千純以約諸侯是時周天子致文武之胙於秦惠王惠王使犀首攻魏禽將龍賈取魏之雕陰且欲東兵蘇秦恐秦兵之至趙也乃激怒張儀入之于秦於是說韓宣惠王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬天下之强弓徑弩皆從韓出溪子少府時力距來者皆射六百步之外韓卒超足而射百發不暇止逺者括蔽洞胸近者鏑弇心韓卒之劒㦸皆出於冥山棠溪墨陽合􅉠鄧師宛馮龍淵太阿皆陸斷牛馬水截鵠鴈當敵則斬堅甲鐵幕革快㕹芮無不畢具以韓卒之勇被堅甲跖徑弩帶利劒一人當百不足言也夫以韓之徑與大王之賢乃西面事秦交臂而服羞社稷而為天下笑無大於此者矣是故願大王熟計之大王事秦秦必求宜陽成臯今茲效之明年又復求割地與則無地以給之不與則棄前功而受後禍且大王之地有盡而秦之求無已以有盡之地而逆無已之求此所謂市怨結禍者也不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今西面交臂而臣事秦何異於牛後乎夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之於是韓王勃然作色攘臂瞋目按劒仰天太息曰寡人雖不肖必不能事秦今主君詔以趙王之教敬奉社稷以從又說魏襄王曰大王之地南有鴻溝陳汝南許郾昆陽召陵舞陽新都新郪東有淮潁煮棗無胥西有長城之界北有河外卷衍酸棗地方千里地名雖小然而田舍廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚然衡人怵王以交强虎狼之秦以侵天下卒有秦患不顧其禍夫挾强秦之勢以內劫其主罪無過此者魏天下之强國也王天下之賢主也今乃有意西面而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王恥之臣聞越王句踐戰敝卒三千人禽夫差於干遂武王卒三千人革車三百乘制紂於牧野豈其士卒衆哉誠能奮其威也今竊聞大王之卒武士二十萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乘騎五千匹此其過越王句踐武王逺矣今乃聽於羣臣之說而欲臣事秦夫事秦必割地以效實故兵未用而國已虧矣凡羣臣之言事秦者姦人非忠臣也夫為人臣割其主之地以求外交偷取一時之功而不顧其後破公家而成私門外挾强秦之勢以內劫其主以求割地願大王熟察之周書曰綿綿不絶蔓蔓奈何毫釐不伐將用斧柯前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力一意則必無强秦之患故敝邑趙王使臣效愚計奉明約在大王之詔詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國從因東說齊宣王曰齊南有泰山東有琅邪西有清河北有勃海所謂四塞之國也齊地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉勃海也臨菑之中七萬户臣竊度之不下户三男子三七二十一萬不待發於逺縣而臨菑之卒固已二十一萬矣臨菑甚富而實其民無不吹竽鼓瑟彈琴擊筑鬬雞走狗六博踏鞠者臨菑之途車轂擊人肩摩連衽成帷舉袂成幕揮汗成雨家殷人足志髙氣揚夫以大王之賢與齊之强天下莫能當今乃西面而臣事秦臣竊為大王羞之且夫韓魏之所以重畏秦者為與秦接境壤界也兵出而相當不出十日而戰勝存亡之機决矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛陽晉之道徑乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故洞疑虛喝驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有强國之實臣是故願大王稍留意計之齊王曰寡人不敏僻逺守海窮道東境之國也未嘗得聞餘教今足下以趙王詔詔之敬以國從乃西南說楚威王曰楚天下之强國也王大下之賢主也西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也夫以楚之强與王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝於章臺之下矣秦之所害莫如楚楚强則秦弱秦强則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武關一軍下黔中則鄢郢動矣臣聞治之其未亂也為之其未有也患至而後憂之則無及矣故願大王早熟計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之大王誠能用臣之愚計則韓魏齊燕趙魏之妙音美人必充後宫燕代橐駝良馬必實外廄故從合則楚王衡成則秦帝今釋霸王之業而有事人之名臣竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讎者也夫為人臣割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾强秦之威以內劫其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩策者相去逺矣二者大王何居焉故敝邑趙王使臣效愚計奉明約在大王詔之楚王曰寡人之國西與秦接境秦有舉巴蜀並漢中之心秦虎狼之國不可親也而韓魏迫於秦患不可與深謀恐反人以入於秦故謀未發而國已危矣寡人自料以楚當秦不見勝也內與羣臣謀不足恃也寡人卧不安席食不甘味心搖搖然如懸旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從於是六國從合而並力焉秦為從約長並相六國北報趙王乃行過雒陽車騎輜重諸侯各發使送之甚衆擬於王者周顯王聞之恐懼除道使人郊勞秦之昆弟妻嫂側目不敢仰視俯伏侍取食秦笑謂其嫂曰何前倨而後恭也嫂委蛇蒲服以面掩地而謝曰見季子位高金多也秦喟然歎曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有洛陽負郭田二頃吾豈能佩六國相印乎於是散千金以賜宗族朋友初秦之燕貸百錢為資及得富貴以百金償之遍報諸所嘗見德者其從者有一人獨未得報乃前自言秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我困故望子深是以後子子今亦得矣秦既約六國從親歸趙趙肅侯封為武安君乃投從約書於秦秦兵不敢窺函谷關時趙肅侯之十六年也十七年秦使犀首說齊魏與共伐趙欲敗從約十八年齊魏遂伐趙趙王讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解然諸侯宗秦之策時相與合從或合或解秦人病之兵不敢大出者十五年秦既入燕秦惠王以其女為燕太子婦是嵗文侯卒太子立是為燕易王易王初立齊宣王因燕喪伐燕取十城易王謂秦曰往日先生至燕而先王資先生見趙遂約六國從今齊先伐趙次至燕以先生之故為天下笑先生能為燕得侵地乎秦大慙曰請為王取之秦見齊王再拜俯而慶仰而弔齊王曰是何慶弔相隨之速也秦曰臣聞飢人所以飢而不食烏喙者為其愈充腹而與餓死同患也今燕雖弱小即秦王之少壻也大王利其十城而長與强秦為仇今使弱燕為鴈行而强秦蔽其後以招天下之精兵是食烏喙之類也齊王愀然變色曰然則奈何秦曰臣聞古之善制事者轉禍為福因敗為功大王誠能聽臣計即歸燕之十城燕無故而得十城必喜秦王知以已之故而歸之十城亦必喜此所謂棄仇讎而得石交者也夫燕秦俱事齊則大王號令天下莫敢不聽是王以虛辭附秦以十城取天下此霸王之業也王曰善於是乃歸燕之十城人有毁秦者曰左右賣國反覆之臣也將作亂秦恐得罪歸而燕王不復官也秦見燕王曰臣東周之鄙人也無有分寸之功而王親拜之於廟而禮之於廷今臣為王却齊之兵而攻得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者臣之不信王之福也臣聞忠信者所以自為也進取者所以為人也且臣之說齊王曽非欺之也臣棄老母於東周固去自為而行進取也今有孝如曽參廉如伯夷信如尾生得此三人者以事大王何若王曰足矣秦曰孝如曽參義不離其親一宿於外王又安能使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下有亷如此王又安能使之步行千里而行進取於齊哉信如尾生與女子期於梁下女子不來水至不去抱柱而死有信如此王又安能使之步行千里却齊之强兵哉臣所謂以忠信得罪於上者也燕王曰若不忠信耳豈有以忠信而得罪者乎秦曰不然臣聞客有逺為吏而其妻私於人者其夫將來其私者憂之妻曰勿憂吾已作藥酒待之矣居三日其夫果至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言乎則恐其殺主父也於是乎佯僵而棄酒主父大怒笞之五十故妾一僵而覆酒上存主父下存主母然而不免於笞惡在乎忠信之無罪也夫臣之過不幸而類是乎燕王曰先生復就故官益厚遇之易王母文侯夫人也與秦私通燕王知之而事之加厚秦恐誅乃說燕王曰臣居燕不能使燕重而在齊則燕必重燕王曰唯先生之所為於是秦詳為得罪於燕而亡走齊齊宣王以為客卿齊宣王卒涽王即位說涽王厚葬以明孝高宫室大苑囿以明得意欲破弊齊而為燕燕易王卒燕噲立為王其後齊大夫多與秦爭寵者而使人刺秦不死殊而走齊王使人求賊不得秦且死乃謂齊王曰臣即死車裂臣以徇於市曰蘇秦為燕作亂於齊如此則殺臣之賊必得矣於是如其言而殺秦者果自出齊王因而誅之燕聞之曰甚矣齊之為蘇生報仇也秦既死其事大泄齊後聞之乃恨怒燕燕甚恐秦之弟曰代代弟厲見兄遂亦皆學及秦死代乃求見燕王欲襲故事說燕王曰臣聞明主務聞其過不欲聞其善臣請謁王之過齊趙者燕之仇讎也楚魏者燕之援國也今王奉仇讎以伐援國非所以利燕也王曰寡人之於齊趙非所欲伐也曰夫無謀人之心而令人疑之殆有謀人之心而令人知之拙謀未發而聞於外則危今臣聞王居處不安食飲不甘思念報齊身自削甲札日有大數妻自組甲絣日有大數有之乎王曰子聞之寡人不敢隱也我有深怨積怒於齊而欲報之二年矣直患國敝力不足也子能以燕伐齊則寡人舉國委子對曰凡天下戰國七燕處弱焉獨戰則不能有所附則無不重南附楚楚重西附秦秦重中附韓魏韓魏重且茍所附之國重此必使王重矣今夫齊長主而自用也南攻楚五年畜聚竭西困秦三年士卒罷敝北與燕人戰覆三軍得二將然而以其餘兵南面舉五千乘之大宋而包十二諸侯此其君欲得其民力竭惡足取乎且臣聞之數戰則民勞久師則兵敝矣燕王曰吾聞齊有清濟濁河可以為固長城巨防足以為塞誠有之乎對曰天時不與雖有清濟為河惡足以為固民力罷敝雖有長城巨防惡足以為塞且異日濟西不師所以備趙也河北不師所以備燕也今濟西河北盡已役矣封內敝矣夫驕君必好利而亡國之臣必貪於財王誠能無羞寵子母弟以為質寶珠玉帛以事左右彼將有德燕而輕亡宋則齊可亡已燕王曰吾終以子受命於天矣燕乃使一子質於齊而蘇厲因燕質子而求見齊王齊王怨蘇秦欲囚厲質子為謝已遂委質為齊臣燕相子之與代婚而欲得燕權乃使代侍質子於齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣於是燕王專任子之已而讓位燕大亂齊伐燕殺王噲子之燕立昭王而代厲遂不敢入燕皆終歸齊齊善待之代過魏魏為燕執代齊使人謂魏王曰齊請以宋地封涇陽君秦必不受秦非不利有齊而得宋地也不信齊王與蘇子也今齊魏不和如此其甚則齊不欺秦秦信齊齊秦合涇陽君有宋地非魏之利也故王不如東蘇子秦必疑齊而不信蘇子矣齊秦不合天下無變伐齊之形成矣於是出代代之宋宋善待之齊伐宋宋急代乃遺燕昭王書曰夫列在萬乘而寄質於齊名卑而權輕奉萬乘助齊伐宋民勞而實費夫破宋殘楚淮北肥大齊讎强而國害此三者皆國之大敗也然且王行之一者將以取信於齊也齊加不信於王而忌燕愈甚是王之計過矣夫以宋加之淮北强萬乘之國也而齊並之是益一齊也北夷方七百里加之以魯衛强萬乘之國也而齊并之是益二齊也夫一齊之强燕猶狼顧而不能支今以三齊臨燕其禍必大矣雖然智者舉事因禍為福轉敗為功齊紫敗素也而賈十倍越王句踐捷於㑹稽復殘强吳而霸天下此皆因禍為福轉敗為功者也今王若欲因禍為福轉敗為功則莫若挑霸齊而尊之使使盟於周室焚秦符曰其大上計破秦其次必長賔之秦挾賔以待破秦王必患之秦五世伐諸侯今為齊下秦王之志茍得窮齊不憚以國為功然則王何不使辨士以此言說秦王曰燕趙破宋肥齊尊之為之下者燕趙非利之也燕趙不利而勢為之者以不信秦王也然則王何不使可信者接收燕趙令涇陽君高陵君先於燕趙秦有變因以為質則燕趙信秦秦為西帝燕為北帝趙為中帝立三帝令於天下韓魏不聽則秦伐之齊不聽則燕趙伐之天下孰敢不聽天下服聽因驅韓魏以伐齊曰必反宋地歸楚淮北反宋地歸楚淮北燕趙之所利也並立三帝燕趙之所願也夫實得所利尊得所願燕趙棄齊如脫屣矣今不收燕趙齊霸必成諸侯贊齊而王不從是國伐也諸侯贊齊而王從之是名卑也今收燕趙國安而名尊不收燕趙國危而名卑夫去尊安而取危卑智者不為也秦王聞若說必若刺心然則王何不使辨士以此苦言說秦秦必取齊必伐矣夫取秦厚交也伐齊正利也尊厚交務正利聖王之事也燕昭王善其書曰先人嘗有德蘇氏子之之亂而蘇氏去燕燕欲報仇於齊非蘇氏莫可乃召代復善待之與謀伐齊代謂昭王曰臣聞善為事者先量其國之大小而揆其兵之强弱故功可成而名可立也今夫烏獲舉千鈞之重行年八十而求扶持齊雖强國也西勞於宋南罷於楚則齊軍可敗而河間可取矣昭王曰善吾請拜子為上卿奉子車百乘子以此為寡人游於齊代因與昭王謀離齊趙之交乃先入趙說奉陽君伐齊奉陽君不悅蘇秦初說趙肅侯而奉陽君相趙至此約五十年則年七十餘矣乃入齊惡趙令齊絶於趙齊趙已絶乃說涽王伐宋又自齊使使謂昭王曰齊趙已孤矣王何不出兵攻齊燕人伐齊涽王不知代謀使代將而拒燕代固辭不許再敗齊師及樂毅以五國兵破齊濟西王遂出走久之秦召燕王燕王欲往代約燕王曰楚得枳而國亡齊得宋而國亡齊楚不得以有枳宋而事秦者何也則有功者秦之深讎也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲乘船浮於汶乘夏水而下江五日而至郢漢中之甲乘船出於巴乘夏水而下漢四日而至五渚寡人積甲宛東下隨智者不及謀勇士不及怒寡人如射隼矣王乃欲待天下之攻函谷不亦逺乎楚王為是故十七年事秦秦正告韓曰我起乎少曲一日而斷太行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女㦸韓氏太原案索隱太原非魏地當作太行卷我下枳道案索隱霸陵有枳道亭非魏地河內有軹縣當言軹而已南陽封冀包兩周乘夏水浮輕舟强弩在前錟戈在後決榮口魏無大梁決白馬之口魏無外黃濟陽決宿胥之口魏無虛頓丘陸攻則擊河內水攻則滅大梁魏氏以為然故事秦秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以寫寡人射其面寡人地絶兵逺不能攻也王苟能破宋有之寡人如自行之已得安邑塞女㦸因以破宋為齊罪秦欲攻韓恐天下救之則以齊委於天下曰齊王四與寡人約四欺寡人必率天下以攻寡人者三有齊無秦有秦無齊必伐之亡之已得宜陽少曲致藺石因以破齊為天下罪秦欲攻魏重楚則以南陽委於楚曰寡人固與韓且絶矣殘均陵塞鄳厄茍利於楚寡人如自有之魏棄與國而合於秦因以塞鄳厄為楚罪兵困於林中重燕趙以膠東委於燕以濟西委於趙已得講於魏質公子延因犀首屬行而攻趙兵傷於離石遇敗於陽馬而重魏則以葉蔡委於魏已得講於趙則劫魏不為割困則使太后弟穰侯為和嬴則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳厄適齊者曰以宋此必令言如循環用兵如刺蜚母不能制舅不能約龍賈之戰岸門之戰封陵之戰高商之戰趙莊之戰秦之所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大也而燕趙之秦者皆爭以事秦說其主此臣之所大患燕昭王不行代復重於燕燕使約諸侯從親如蘇秦時或從或不而天下由此宗蘇氏之從約代厲皆以壽死名顯諸侯蘇子曰秦强而諸侯弱游談之士為橫者易為功而為從者難為力然而從成則諸侯利而秦病橫成則秦帝而諸侯虜要之二者皆出於權譎而從為愈歟蘇秦本說秦為橫不合而激於燕趙甘心於所難為之期年而㰱血於洹水之上可不謂能乎然口血未乾犀首一出而齊趙背盟從約皆破蓋諸侯異心譬如連雞不能俱飛勢固然矣而太史公以為約書入秦秦人為之閉函谷者十五年此說客之浮語而太史公信之過矣古史卷四十
