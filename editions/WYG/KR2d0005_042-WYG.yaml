body:
  text: 古史卷四十二宋蘇轍撰樗里子甘茂列傳第十九樗里子名疾秦恵王之弟也與恵王異母母韓女也滑稽多智秦人號曰智嚢恵王八年爵之右更使将而伐曲沃盡岀其人取其城地入秦二十五年復為将伐趙虜趙将軍荘豹㧞藺眀年助魏章攻椘敗楚将屈匄取漢中地秦封之號為嚴君張儀惡之重而使之楚因令楚王為之請相於秦儀因謂恵王曰重樗里疾而使之者将以為國交也今身在楚楚王為之請相於秦臣聞其言曰王欲窮張儀於秦乎臣請助王楚王以為然故為請相也今王聽之彼必以國事椘矣恵王大怒疾出走恵王卒武王立逐張儀魏章而以疾甘茂為左右丞相秦使甘茂攻韓㧞宜陽使疾以車百乗入周周以卒迎之意甚敬椘王怒譲周以其重秦客㳺騰為周説楚王曰智伯之伐仇猶遺之廣車因随之以兵仇猶遂亡何則無備故也齊桓公伐蔡號曰誅楚其實襲蔡今秦虎狼之國使樗里子以車百乗入周周以仇猶蔡觀焉故使長㦸居前強弩在後名曰衛疾而實囚之且夫周豈能無憂其社稷哉恐一旦亡國以憂大王楚王乃悦武王卒昭王立疾益重昭王元年使将伐蒲蒲守恐胡衍為蒲謂疾曰公之攻蒲為秦乎為魏乎為魏則善矣為秦則不為賴矣夫衛之所以為衛者以蒲也今伐蒲入於魏衛必折而從之魏亡西河之外而無以取者兵弱也今并衛於魏魏必強魏強之日西河之外必危秦王觀公之事害秦而利魏王必罪公疾曰奈何胡衍曰公釋蒲勿攻臣試為公入言之以徳衛君疾曰善胡衍入蒲謂其守曰樗里子知蒲之病矣其言曰必㧞蒲衍能令釋蒲勿攻蒲守恐因再拜曰願以請因効金三百斤曰秦兵茍退請必言子於衛君使子為南面於是疾觧蒲而去還撃皮氏或為魏謂楚王曰秦楚勝魏魏王恐亡必合於秦王何不背秦而與魏魏王喜必内太子秦恐失楚必効地於王王雖復與之攻魏可也楚王曰善乃背秦而與魏魏内太子於椘秦恐許楚地欲與之復攻魏疾怒欲與魏攻楚恐魏之以太子在楚不肯也使人謂楚王曰外臣疾使臣謁之曰敝邑之王欲効城池而為魏太子之在楚也是以不敢王出魏質臣請効之而復固秦楚之交以疾攻魏楚王曰諾乃出魏太子秦因合魏以攻楚昭王七年疾卒葬於渭南章䑓之東曰後百嵗是當有天子之宫夹我墓疾室在昭王廟西渭南隂鄊樗里故俗謂之樗里子漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙智則樗里甘茂者下蔡人也下蔡史舉先生學百家之説因張儀樗里子而求見秦恵王王見而説之使将而佐魏章略定漢中地張儀欲以漢中與楚謂秦王曰種樹非其處者人必害之家有不宜之財則傷漢中南邉椘此國之累也茂曰地大者固多憂乎天下有變王割漢中以為和楚必畔天下而與王王今以漢中與楚即天下有變王何以市楚王乃止恵王卒武王立張儀魏章去東之魏蜀侯煇相荘反秦本紀武王元年誅蜀相荘昭王六年蜀侯煇反今此言煇反荘反恐誤然而未知孰信也秦使茂定蜀還以茂為左丞相以樗里子為右丞相武王三年謂茂曰寡人欲容車通三川以窺周室而寡人死不朽矣茂曰請之魏約以伐韓而令向夀輔行茂至謂向夀曰子歸言之於王曰魏聽臣矣然願王勿伐事成盡以為子功向夀歸以告王王迎茂於息壌茂至王問其故對曰宜陽大縣也上黨南陽積之久矣名曰縣其實郡也今王倍數險行千里攻之難昔曾參之處費魯人有與曾參同姓名者殺人人告其母曰曾參殺人其母織自若也頃之一人又告之曰曾參殺人其母尚織自若也頃又一人告之曰曾參殺人其母投杼下機踰􅉹而走夫以曾參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曾參之母信曾參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而以賢先王魏文侯令樂羊将而攻中山三年而㧞之樂羊返而論功文侯示之謗書一箧樂羊再拜稽首曰此非臣之功也主君之力也今臣覉旅之臣也樗里子公孫奭二人者挟韓而議之王必聽之是王欺魏王而臣受公仲侈之怨也王曰寡人不聽也請與子盟卒使茂将兵伐宜陽五月而不㧞樗里子公孫奭果争之武王召茂欲罷兵茂曰息壌在彼王曰有之因大悉起兵使茂擊之斬首六萬遂㧞宜陽宜陽之未㧞也茂三鼓而卒不上茂謂其尉曰我覉旅而得相秦者我以宜陽餌王也今攻宜陽而不㧞公孫衍樗里疾挫我於内而公仲以韓窮我於外眀日鼓之而不可下因以宜陽之郭為吾墓矣於是益私金以為公賞眀日鼓之而宜陽㧞韓㐮王使公仲侈入謝與秦平武王竟至周而卒其弟立為昭王王母宣太后楚女也楚懐王怨前秦敗椘於丹陽而韓不救乃以兵圍韓雍氏韓使公仲侈告急於秦秦昭王新立太后楚人不肯救公仲因茂茂為言於昭王曰公仲方有得秦救故敢扞楚也今雍氏圍秦師不下殽公仲且仰首而不朝公叔且以國南合於楚楚韓為一魏氏不敢不聼然則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善乃下師於殽以救韓楚兵去秦使向夀平宜陽而使樗里子及茂伐魏皮氏向夀者宣太后外族也而與昭王少相長故任用向夀如楚楚聞秦之貴向夀而厚事向夀向夀爲秦守宜陽将以伐韓韓公仲使蘇伐謂向夀曰禽困覆車公破韓辱公仲公仲收國復事秦自以爲必可以封今公與楚觧口地封小令尹以杜陽秦楚合復攻韓韓必亡韓亡公仲且躬率其私徒以閼於秦願公熟慮之也向夀曰吾合秦楚非以當韓也子為夀謁之公仲曰秦韓之交可合也蘇代對曰願有謁於公人曰貴其所以貴者貴王之愛習公也不如公孫奭其智能公也不如甘茂今二人者皆不得親於秦事而公獨與王主斷於國者何必彼有以失之也公孫奭黨於韓而甘茂黨於魏故王不信也今秦楚爭強而公黨於楚是與公孫奭甘茂同道也公何以異之人皆言楚之善變也而公必之是自為責也公不如與王謀其變也善韓以備楚如此則無患矣韓氏必先以國從公孫奭而後委國於甘茂也韓公之讎也今公言善韓以備楚是外舉不辟讎也向夀曰然吾甚欲韓合對曰甘茂許公仲以武遂反宜陽之民今公徒收之甚難向夀曰然則柰何武遂終不可得也對曰公奚不以秦為韓求頴川於楚此韓之寄地也公求而得之是令行於楚而以其地徳韓也公求而不得是韓楚之怨不觧而交走秦也秦楚争強而公徐過楚以收韓此利於秦向夀曰奈何對曰此善事也甘茂欲以魏取齊公孫奭欲以韓取齊今公取宜陽以為功收楚韓以安之而誅齊魏之罪是公孫奭甘茂無事也茂竟言昭王以武遂復歸之韓向夀公孫奭爭之不能得向夀公孫奭由此怨䜛茂茂懼輟伐魏蒲阪亡去樗里子與魏講罷兵茂之亡秦奔齊逢蘓代代為齊使於秦茂曰臣得罪於秦懼而遯逃無所容跡臣聞貧人女與富人女會績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子眀而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之蘓代許諾遂致使於秦已因説秦王曰甘茂非常士也其居於秦累世重矣自殽塞及至鬼谷其地形險易皆眀知之彼以齊約韓魏反以圗秦非秦之利也秦王曰然則奈何蘓代曰王不若重其䞇厚其禄以迎之使彼来則置之鬼谷終身勿出秦王曰善即賜之上卿以相印迎之於齊茂不徃蘓代謂齊涽王曰夫甘茂賢人也今秦賜之上卿以相印迎之茂徳王之賜好為王臣故辭而不徃今王何以禮之齊王曰善即以上卿處之秦因復茂家以市於齊齊使茂於楚楚懐王新與秦合婚而歡秦聞茂在楚使人謂楚王曰願送甘茂於秦楚王問於范蜎曰寡人欲置相於秦孰可對曰臣不足以識之楚王曰寡人欲相甘茂可乎對曰不可夫史舉下蔡之監門也大不為事君小不為家室以茍賤不廉聞於世甘茂事之順焉故恵王之眀武王之察張儀之辯而甘茂事之取十官而無罪茂誠賢者也然不可相於秦夫秦之有賢相非楚國之利也且王前嘗用召滑於越而内行章義之難越國亂故楚南塞厲門而郡江東計王之功所以能如此者越國亂而楚治也今王知用諸越而㤀用諸秦臣以王為鉅過矣然則王若欲置相於秦則莫若向夀者可夫向夀之於秦王親也少與之同衣長與之同車以聽事王必相向夀於秦則楚國之利也於是使使請秦相向夀秦卒相向夀而茂竟不得復入秦卒於魏茂有孫曰羅羅年十二事秦相文信侯吕不韋秦始皇帝使剛成君蔡澤於燕三年而燕王喜使太子丹入質於秦秦使張唐徃相燕欲與燕共伐趙以廣河間之地張唐謂不韋曰臣嘗為秦昭王伐趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行不韋不快未有以強也羅曰君侯何不快之甚也不韋曰吾令蔡澤事燕三年燕太子丹已入質矣吾自請張卿相燕而不肯行羅曰臣請行之不韋叱曰去我身自請之而不肯汝焉能行之羅曰夫項槖生七年為孔子師今臣生十二嵗於兹矣君其試臣何遽叱乎於是羅見張卿曰卿之功孰與武安君卿曰武安君南挫強楚北威燕趙戰勝攻取破城堕邑不知其數臣之功不如也羅曰應侯之用於秦也孰與文信侯専張卿曰應侯不如文信侯専羅曰卿眀知其不如文信侯専與曰知之羅曰應侯欲攻趙武安君難之去咸陽七里而立死於杜郵今文信侯自請卿相燕而不肯行臣不知卿所死處矣唐曰請因􅐐子行令装治行行有日羅又謂不韋曰借臣車五乗請為張唐先報趙不韋乃入言之於始皇曰昔甘茂之孫甘羅年少耳然名家之子孫諸侯皆聞之今者張唐欲稱疾不肯行羅説而行之今願先報趙請許遣之始皇召見使羅於趙趙㐮王郊迎羅説趙王曰王聞燕太子丹入質秦歟曰聞之曰聞張唐相燕歟曰聞之燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺者伐趙危矣燕秦不相欺無異故欲攻趙而廣河間王不如齎臣五城以廣河間請歸燕太子與強趙攻弱燕趙王立自割五城以廣河間秦歸燕太子趙攻燕得上谷三十城令秦有十一羅還報秦乃封羅以為上卿復以茂田宅賜之蘓子曰蘓秦為諸侯弱秦而張儀為秦弱諸侯其説猶可言也如樗里疾公孫奭黨於韓甘茂黨於魏向壽黨於楚皆借秦之强以揺動諸侯而成其私民生其間其受害可勝言乎今世雖無戰國相傾之勢然士居其間其以喜怒成敗天下事者多矣人主誠得其情其罪可勝誅乎古史卷四十二
