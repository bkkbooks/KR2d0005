body:
  text: 古史卷四十一宋蘇轍撰張儀列傳第十八張儀者魏人也始嘗與蘇秦俱事鬼谷先生學術蘇秦自以不及儀儀已學而游説諸侯嘗從楚相飲楚相亡璧門下意儀曰儀貧無行必此盜相君之璧共執儀掠笞數百不服醳之其妻曰嘻子毋讀書游説安得此辱乎儀謂其妻曰視吾舌尚在否其妻笑曰舌在也儀曰足矣蘇秦已説趙王而得相約從親然恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人微感儀曰子始與蘇秦善今秦已當路子何不往游以求通子之願儀於是之趙上謁求見蘇秦秦乃誡門下人不為通又使不得去者數日及見坐之堂下賜僕妾之食因而數讓之曰以子之材能乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之儀之來也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舍人曰張儀天下賢士吾殆弗如也今吾幸先用而能用秦者獨張儀可耳然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我陰奉之乃言趙王發金幣車馬使人微隨儀與同宿舍稍近就之奉以車馬金錢所欲用為取給而弗告儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人乃辭去儀曰賴子得顯方且報徳何故去也舍人曰臣非知君知君乃蘇君蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣陰奉給君資盡蘇君之計謀今君已用請歸報儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言且蘇君在儀寧渠能乎儀既相秦為文檄告楚相曰始吾從若飲我不盜而璧若笞我若善守汝國我顧且盜而城苴蜀相攻擊各來告急於秦惠王欲發兵以伐蜀以為道險狹難至而韓又來侵惠王欲先伐韓後伐蜀恐不利欲先伐蜀恐韓襲秦之敝猶豫未能決司馬錯與儀爭論於惠王之前錯欲伐蜀儀曰不如伐韓王曰請聞其説儀曰親魏善楚下兵三川塞斜谷之口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周王之罪侵楚魏之地周自知不能救九鼎寶器必出據九鼎案圖籍挾天子以令於天下莫敢不聽此王業也今夫蜀西僻之國而戎翟之倫也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者於朝爭利者於市今三川周室天下之朝市也而王不爭焉顧爭於戎翟去王業逺矣錯曰不然臣聞之欲富國者務廣其地欲强兵者務富其民欲王者務博其徳三資者備而王隨之矣今王地小民貧故臣願先從事於易夫蜀西僻之國而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完惠王曰善卒起兵伐蜀十月取之遂定蜀以蜀封秦公子為侯而使陳莊相蜀蜀既屬秦秦以益强富厚輕諸侯楚威王攻魏儀謂秦王曰王不如助魏以勁之魏戰勝復聽秦必入西河之外不勝魏不能守王必取之王用儀言取魏皮氏以卒萬人車百乗助魏將犀首擊敗楚師魏兵罷弊恐畏秦果獻西河之外惠王十年使公子華與張儀圍蒲陽降之儀因言秦復與魏而使公子繇質於魏儀因説魏王曰秦王之遇魏甚厚魏不可以無禮魏因入上郡少梁謝秦惠王乃以儀為相更名少梁曰夏陽儀相秦四歲立惠王為王居一歲為秦將取陜築上郡塞其後二年使與齊楚之相㑹齧桑東還而免相相魏以為秦欲令魏先事秦而諸侯効之魏王不肯聽儀秦王怒伐取魏之曲沃平周復陰厚儀益甚儀慙無以歸報留魏四歲而魏襄王卒哀王立儀復説哀王哀王不聽於是儀陰令秦伐魏魏與秦戰敗明年齊又來敗魏於觀津秦復欲攻魏先敗韓申差軍斬首八萬諸侯震恐而儀復説魏王曰魏地方不至千里卒不過三十萬地四平諸侯四通輻湊無名山大川之限從鄭至梁二百餘里車馳人走不待力而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭鄣者不下十萬梁之地勢固戰塲也梁南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合於韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者將以安社稷尊主强兵顯名也今從者一天下約為昆弟刑白馬以盟洹水之上以相堅也而親昆弟同父母尚有爭錢財而欲恃詐偽反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷衍酸棗劫衛取陽晉則趙不南趙不南而梁不北梁不北則從道絶則大王之國欲無危不可得也秦折韓而攻梁韓劫於秦秦韓為一梁之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣且夫秦之所欲弱者莫如楚而能弱楚者莫如梁楚雖有富大之名而實空虛其卒雖多然而輕走易北不能堅戰悉梁之兵南面而伐楚勝之必矣割楚而益梁虧楚而適秦嫁禍安國此善事也大王不聽臣秦下甲士而東伐雖欲事秦不可得矣且夫從人多奮辭而少可信説一諸侯而成封侯是故天下之游談士莫不日夜搤腕瞋目切齒以言從之便以説人主人主賢其辯而牽其説豈得無眩哉臣聞之積羽沈舟羣輕折軸衆口鑠金積毁銷骨故願大王審定計議且賜骸骨辟魏哀王於是乃倍從約而因儀請成於秦儀歸復相秦三嵗而魏復倍秦為從秦攻魏取曲沃明年魏復事秦秦欲伐齊齊楚從親於是儀往相楚楚懷王聞儀來虛上舍而自舘之曰此僻陋之國子何以教之儀説楚王曰大王誠能聽臣閉闗絶約於齊臣請獻商於之地六百里使秦女得為大王箕箒之妾秦楚娶婦嫁女長為兄弟之國此北弱齊而西益秦也計無便此者楚王大悦而許之羣臣皆賀陳軫獨弔之楚王怒曰寡人不興師發兵得六百里地羣臣皆賀子獨弔何也陳軫對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣楚王曰有説乎陳軫對曰夫秦之所以重楚者以其有齊也今閉關絶約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是北絶齊交西生患於秦也而兩國之兵必俱至善為王計者不若陰合而陽絶於齊使人隨張儀茍與吾地絶齊未晚也不與吾地陰合謀計也楚王曰願陳子閉口毋復言以待寡人得地乃以相印授儀厚賂之於是遂閉闗絶約於齊使一將軍隨儀儀至秦詳失綏墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士至宋借宋之符北罵齊王齊王大怒折節而下秦秦齊之交合儀乃朝謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受令於王以商於之地六百里不聞六里還報楚王楚王大怒發兵而攻秦陳軫曰軫可發口言乎攻之不如割地反以賂秦與之并兵而攻齊是我出地於秦取償於齊也王國尚可存楚王不聽卒發兵而使將軍屈匄擊秦秦齊攻楚斬首八萬殺屈匄遂取丹陽漢中之地楚又復益發兵襲秦至藍田大戰楚大敗於是楚割兩城以與秦平秦要楚欲得黔中地欲以武闗外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心於子儀曰秦强楚弱臣善靳尚尚得事楚夫人鄭袖袖所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚楚懷王至則囚儀將殺之靳尚謂鄭袖曰子亦知子之賤於王乎鄭袖曰何也靳尚曰秦王甚愛張儀而必欲出之今將以上庸之地六縣賂楚以美人聘楚以宫中善歌謳者為媵楚王重地尊秦秦女必貴而夫人斥矣不若為言而出之於是鄭袖日夜言懐王曰人臣各為其主用今地未入秦秦使張儀來至重王王未有禮而殺張儀秦必大怒攻楚妾請子母俱遷江南毋為秦所魚肉也懐王後悔赦儀厚禮之如故儀既出未去聞蘇秦死乃説楚王曰秦地半天下兵敵四國被險帶河四塞以為固虎賁之士百餘萬車千乗騎萬匹積粟如丘山法令既明士卒安難樂死主明以嚴將智以武雖無出甲席卷常山之險必折天下之脊天下有後服者先亡且夫為從者無以異於驅羣羊而攻猛虎虎之與羊不格明矣今王不與猛虎而與羣羊臣竊以為大王之計過也凡天下强國非秦而楚非楚而秦兩國交爭其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下河東取成臯韓必入臣梁則從風而動秦攻楚之西韓梁攻其北社稷安得毋危且夫從者聚羣弱而攻至强不料敵而輕戰國貧而數舉兵危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久夫從人飾辯虛辭高主之節言其利不言其害卒有秦禍無及為已是故願大王之熟計之秦西有巴蜀大船積粟起於汶山浮江以下至楚三千餘里舫船載卒一舫載五十人與三月之食下水而浮一日行三百餘里里數雖多然而不費牛馬之力不至十日而距扞闗扞闗驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武闗南面而伐則北地絶秦兵之攻楚也危難在三月之内而楚待諸侯之救在半歲之外此其勢不相及也夫待弱國之救忘强秦之禍此臣所為大王患也大王嘗與呉人戰五戰而三勝陣卒盡矣偏守新城存民苦矣臣聞功大者易危而民敝者怨上夫守易危之功而逆强秦之心臣竊為大王危之且夫秦之所以不出兵函谷十五年以攻齊趙者陰謀有合天下之心楚嘗與秦構難戰於漢中楚人不勝列侯執珪死者七十餘人遂亡漢中楚王大怒興兵襲秦戰於藍田此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無危於此者矣願大王熟計之秦下甲攻衛陽晉必大闗天下之匈大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有也凡天下而以信約從親相堅者蘇秦封武安君相燕即陰與燕王謀伐破齊而分其地乃詳有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦於市夫以一詐偽之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請使秦太子入質於楚楚太子入質於秦請以秦女為大王箕箒之妾効萬室之都以為湯沐之邑長為昆弟之國終身無相攻伐臣以為計無便於此者於是楚王已得儀而重出黔中地與秦欲許之屈原曰前大王見欺於張儀儀至臣以為大王烹之今縱弗忍殺之又聽其邪説不可懷王曰許儀而得黔中美利也後而倍之不可故卒許儀與秦親儀去楚因遂之韓説韓王曰韓地險惡山居五榖所生非菽而麥民之食大抵飯菽霍羮一嵗不收民不饜糟糠地不過九百里無二歳之食料大王之卒悉之不過三十萬而厮徒負養在其中矣除守徼亭障塞見卒不過二十萬而已矣秦帶甲百餘萬車千乘騎萬匹虎賁之士跿跔科頭貫頤奮㦸者至不可勝計秦馬之良戎兵之衆探前趹後蹄間三尋騰者不可勝數山東之士被甲䝉胄以㑹戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜夫秦卒與山東之卒猶孟賁之與怯夫以重力相壓猶烏獲之與嬰兒夫戰孟賁烏獲之士以攻不服之弱國無異垂千鈞之重於鳥卵之上必無幸矣夫羣臣諸侯不料地之寡而聽從人之甘言好辭比周以相飾也皆奮曰聽吾計可以强霸天下夫不顧社稷之長利而聽須㬰之説詿誤人主無過此者大王不事秦秦下甲據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫桑林之苑非王之有也夫塞成臯絶上地則王之國分矣先事秦則安不事秦則危夫造禍而求其福報計淺而怨深逆秦而順楚雖欲毋亡不可得也故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能强於楚也其地勢然也今王西面而事秦以攻楚秦王必喜夫攻楚以利其地轉禍而説秦計無便於此者韓王聽儀計儀歸報秦惠王封儀五邑號曰武信君使儀東説齊涽王曰天下强國無過齊者大臣父兄殷衆富樂然而為大王計者皆為一時之説不顧百世之利從人説大王者必曰齊西有强趙南有韓與梁齊負海之國也地廣民衆兵强士勇雖有百秦將無奈齊何大王賢其説而不計其實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有亡國之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也秦趙戰於河漳之上再戰而趙再勝秦戰於畨吾之下再戰又勝秦四戰之後趙之亡卒數十萬邯鄲僅存雖有戰勝之名而國已破矣是何也秦强而趙弱今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁効河外趙入朝黽池割河間以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博闗臨菑即墨非大王之有也國一日見攻雖欲事秦不可得也是故願大王熟計之也齊王曰齊僻陋隱居東海之上未嘗聞社稷之長利也乃許儀儀去西説趙王曰敝邑秦王使使臣効愚計於大王大王收率天下以賔秦秦兵不敢出函谷關十五年大王之威行於山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之内愁居懾處不敢動揺唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻逺然而心忿含怒之日久矣今秦有敝甲凋兵軍於黽池願渡河踰漳據畨吾㑹邯鄲之下願以甲子合戰以正殷紂之事敬使使臣先聞左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反齊國而自令車裂於市夫天下之不可一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬬失其黨而孤居求欲毋危豈可得乎今秦𤼵三將軍其一軍塞午道告齊使興師渡清河軍於邯鄲之東一軍軍成臯驅韓梁軍於河外一軍軍於黽池約四國為一以攻趙趙服必四分其地是故不敢匿意隠情先以聞於左右臣竊為大王計莫如與秦王遇於黽池面相見而口相結請案兵無攻願大王之定計趙王曰先王之時奉陽君專權擅勢蔽欺先王獨擅綰事寡人居屬師傅不與國謀計先王棄羣臣寡人年㓜奉祭祀之日新心竊疑焉以為一從不事秦非國之長利也乃且願變心易慮割地謝前過以事秦方將約車趨行適聞使者之明詔趙王許儀儀乃去北之燕説燕昭王曰大王之所親莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇於句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲陰告厨人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂進熱啜厨人進斟因反斗以擊代王殺之王腦塗地其姊聞之因摩笄以自刺故至今有摩笄之山代王之亡天下莫不聞夫趙王之狼戾無親大王之所明見且以趙王為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝黽池効河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時趙之於秦猶郡縣也不敢妄舉師以攻伐今王事秦秦王必喜趙不敢妄動是西有强秦之援而南無齊趙之患是故願大王熟計之燕王曰寡人蠻夷僻處雖大男子裁如嬰兒言不足以采正計今上客幸教之請西面而事秦獻恒山之尾五城燕王聽儀儀歸報未至而秦惠王卒武王立武王自為太子時不説儀及即位羣臣多讒儀曰無信左右賣國以取容秦必復用之恐為天下笑諸侯聞儀有郤武王皆畔衡復合從秦武王元年羣臣日夜惡儀未已而齊讓又至儀懼誅因謂武王曰儀有愚計願効之王曰奈何對曰為秦社稷計者東方有大變然後王可以多割得地也今聞齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師而伐梁梁齊之兵連於城下而不能相去王以其間伐韓入三川出兵函谷而毋伐以臨周祭器必出挾天子案圖籍此王業也秦王以為然乃具革車三十乗入儀於梁齊果興師伐之梁哀王恐儀曰王勿患也請令罷齊兵乃使其舍人馮喜之楚借使之齊謂齊王曰王甚憎張儀雖然亦厚矣王之託儀於秦也齊王曰寡人憎儀儀之所在必興師伐之何以託儀對曰是乃王之託儀也夫儀之出也固與秦王約曰為王計者東方有大變然後可以多割得地今齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師伐之齊梁之兵連於城下而不能相去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍此王業也秦王以為然故具革車三十乗而入之梁也今儀入梁王果伐之是王内罷國而外伐與國廣鄰敵以内自臨而信儀於秦王也此臣之所謂託儀也齊王曰善乃使解兵儀相魏一歳卒於魏陳軫游説諸侯始與張儀俱事秦惠王皆貴重爭寵儀惡軫於秦王曰軫重幣輕使秦楚之間將為國交也今楚不加善於秦而善軫者軫自為厚而為王薄也且軫欲去秦之楚王胡不聽乎王謂軫曰吾聞子欲去秦之楚有之乎軫曰然王曰儀之言果然矣軫曰非獨儀之言也行道之人皆知之昔者子胥忠其君天下皆欲以為臣孝已愛其親天下皆欲以為子故賣僕妾不出里巷而取者良僕妾也出婦嫁於鄉里者善婦也臣不忠於王楚何以軫為忠尚見棄軫不之楚而何之乎王以為然遂善待之居秦期年惠王終相儀而軫奔楚未之重也使之使秦過梁欲見犀首犀首謝弗見軫曰吾為事來公不見軫軫將行不得待異日犀首見之軫曰公何好飲也犀首曰無事也曰吾請令公饜事可乎曰奈何曰田需約諸侯從親楚王疑之未信也公謂梁王曰臣與燕趙之王有故數使人來曰無事何不相見願謁行於王王雖許公公請毋多車以車三十乗可陳之於庭明言之燕趙燕趙客聞之馳車告其王使人近犀首楚王聞之大怒曰田需與寡人約而犀首之燕趙是欺我也怒而不聽其事齊聞犀首之北使人以事委焉犀首遂行三國相事皆斷於犀首軫遂至秦韓魏相攻朞年不解秦惠王欲救之問於左右左右或曰救之便或曰勿救便惠王未能决軫適至惠王曰子去寡人之楚亦思寡人否軫對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄事楚執珪有頃而病楚王曰舄故越之鄙細人也今事楚執珪富貴矣亦思越不或對曰凡人之思故在其病也彼思越聲不思越則楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉惠王曰善今韓魏相攻朞年不解或謂寡人救之便或曰勿救便寡人不能决願子為子主計之餘為寡人計之軫對曰亦嘗有以夫卞莊子刺虎聞於王者乎卞莊子欲刺虎館竪子止之曰兩虎方且食牛食甘必爭爭則必鬬鬬則大者傷小者死從傷而刺之一舉必有䨇虎之名卞莊子以為然立須之有頃兩虎果鬬大者傷小者死莊子從傷者而刺之一舉果有䨇虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶卞莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大尅之秦伐魏陳軫合三晉而東謂齊王曰古之王者之伐也欲以正天下而立功名以為後世也今齊楚燕趙韓梁六國之遞甚也不足以立功名適足以强秦而自弱也非山東之上計也能危山東者强秦也不憂强秦而遞相罷弱而兩歸其國於秦此臣之所以為山東之患天下為秦相割秦曽不出刀天下為秦相烹秦曽不出薪何秦之智而山東之愚邪願大王之察也古之五帝三王五伯之伐也伐不道今秦之伐天下不然必欲反之主必死辱民必死虜今韓梁之目未嘗乾而齊民獨不也非齊親而韓梁疏也齊逺秦而韓梁近今齊將近矣今秦欲攻梁絳安邑秦得絳安邑以東下河必表裏河而東攻齊舉齊屬之海南面而孤楚韓梁北向而孤燕趙齊無所出其計矣願王熟慮之今三晉已合矣復為兄弟約而出鋭師以戍梁絳安邑此萬世之計也齊非急以鋭師合三晉必有後憂三晉合秦必不敢攻梁必南攻楚楚秦構難三晉怒齊不與已也必東攻齊此臣之所謂齊必有大憂不如急以兵合於三晉齊王敬諾果以兵合於三晉犀首者魏之陰晉人也名衍姓公孫氏蘇秦之為六國合從以賔秦也秦惠王以衍為大良造説齊魏使背約攻趙而蘇秦從約遂解衍與張儀不善張儀相秦衍東游諸侯至魏魏田需亦惡之衍謂魏王曰臣盡力竭知欲以為王廣土而取尊名而田需從中敗之是臣終無成功也需亡臣將待需留臣請亡王曰需寡人股掌之臣也為子之不便也殺之亡之外毋謂天下何内毋若羣臣何今吾為子外之令無敢入子之事入子之事者吾為子殺之亡之衍許諾東見田嬰與之約結歸謂魏王曰魏之所患者齊也田嬰言行於齊王王欲得齊何不召文子而相之聽之乃使文子相魏而身相於韓田需滋不悦蘇代為田需説魏王曰臣請問文之為魏孰與為齊王曰不如衍之為魏孰與為韓王亦曰不如蘇代曰文將右齊而左魏衍將右韓而左魏王且無所聞之矣王不如舍需於側以稽二人者之所為二人畏需之斥其非必不敢有外心王曰善果厝需於側張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川魏王所以貴張子者欲得韓地也且韓之南陽已舉矣子何不少委焉以為衍功則秦魏之交可錯矣然則魏必圖秦而棄儀收韓而相衍公叔以為便因委之犀首以為功果相魏張儀去義渠君朝於魏犀首聞張儀復相秦害之犀首乃謂義渠君曰道逺不得復過請謁事情日中國無事秦得燒掇楚杅君之國有事秦將輕使重幣事君之國其後五國伐秦㑹陳軫謂秦王曰義渠君者蠻夷之賢君也不如賂之以撫其志秦王曰善乃以文繡千純婦女百人遺義渠君義渠君致羣臣而謀曰此公孫衍所謂邪乃起兵襲秦秦大敗秦人李伯之下秦惠王卒張儀去秦入魏衍乃歸秦秦王愛之與之言事因許之曰寡人且相子甘茂之吏過而聞之以告甘茂茂入見王曰王得賢相敢再拜賀王曰寡人委國於子焉自得賢相對曰王且相犀首王曰子焉聞之對曰犀首告臣王怒犀首之泄也逐之復之魏蘇子曰戰國之為從横者皆傾危反覆之士也然而汙賤無恥莫如張儀而其成功莫如儀之多儀之未信於楚也辭而之晉謂懐王曰王無求於晉國乎王曰黄金珠璣犀象楚産也吾何求於晉儀曰王獨不好色耳周鄭之女粉白墨黒立於衢閭不知而見者以為神也王獨不好色耳王説資之珠玉而遣之南后鄭袖聞而憂之奉之以千金儀將行謂王曰天下闗閉不通未知見日也願王觴臣中飲儀請王召所便習王召鄭袖儀見之跪請罪曰儀行天下未嘗見人如此其美也而儀言得美人是欺王也王與后大喜而儀言得行儀之所以求用者其術至此此所以言必信而功多也可不悲乎古史卷四十一
