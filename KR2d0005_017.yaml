body:
  text: 古史卷十七宋蘇轍撰楚世家第十楚之先出自帝顓頊髙陽髙陽生稱稱生卷章卷章生黎少昊之衰也九黎亂徳民神雜糅不可方物顓頊受之命少昊氏之子曰重為南正司天以屬神命黎為火正司地以屬民黎以火正事帝嚳髙辛能光融天下帝命之曰祝融使為重黎共工氏作亂帝使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吴回為重黎重出於少昊黎出於髙陽當髙陽之世重黎實二人也至帝嚳之世火正兼稱重黎蓋以黎兼重歟是以重黎既誅而獨以吴回為重黎然則楚之先實黎而非重也吴回生陸終陸終生子六人坼剖而産長曰樊為昆吾次曰惠連為參胡三曰籛為彭祖四曰求言為會人五曰安為曹姓六曰季連為芉姓楚其後也昆吾氏為夏伯湯滅之彭祖氏為殷伯殷衰而彭祖氏滅季連生附沮附沮生穴熊其後中微或在中國或在蠻夷弗能紀其世其裔孫曰鬻熊事周文王早卒其子曰熊麗熊麗生熊狂熊狂生熊繹周成王舉文武勤勞之後以子男之田封熊繹於荆蠻居丹陽成王㑹諸侯於歧陽荆蠻不得與盟置茒蕝設望表與鮮卑守燎熊繹生熊艾熊艾生熊䵣熊䵣生熊勝熊勝以弟熊楊為後熊楊生熊渠熊渠生子三人當周夷王時王室微諸侯或不朝相侵伐熊渠甚得江漢間民和乃興兵伐庸楊粤至于鄂熊渠曰我蠻夷也不與中國之號謚乃立其長子康為句亶王中子紅為鄂王少子執疵為越章王皆在江上及周厲王暴虐熊渠畏之去王號熊渠卒長子康蚤死子熊摰紅立摰紅卒其弟熊延弑而代立熊延生熊勇熊勇六年周厲王奔彘熊勇十年卒弟熊嚴為後熊嚴有子四人長子伯霜中子仲雪次子叔堪少子季徇熊嚴十年卒伯霜立是為熊霜熊霜元年周宣王初立熊霜六年卒三弟爭立仲雪死叔堪逃於濮而季徇立是為熊徇熊徇聰明和恊蓋其先君薳氏將起叔堪而立之不克十六年鄭桓公始封二十二年熊徇卒子熊咢立熊咢九年卒子熊儀立是為若敖若敖二十二年周幽王為犬戎所殺周東徙二十七年若敖卒子熊坎立是為宵敖宵敖六年卒子熊眴是為蚡冒若敖蚡冒篳路籃縷以啓山林於是始為成國十七年蚡冒卒其弟熊通殺其世子而自立是為武王熊通之十九年而魯隱公之元年也熊通始大稍侵陵中國諸侯畏之三十一年蔡侯鄭伯㑹于鄧以謀我三十五年侵隨使薳章求成隨侯使少師來鬭伯比曰漢東之國隨為大隨張必棄小國少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰少師得其君終必從之乃毁軍而納少師少師歸請追我師季梁止之曰天方授楚楚之羸其誘我也君盍脩政而親兄弟之國以待之乎隨侯從之師還三十七年夏㑹諸侯于沈鹿黄隨不㑹使薳章讓黄而身自伐隨戰于速杞隨師敗績獲其戎車與其戎右少師隨人請成不許鬭伯比曰天去其疾矣未可克也乃及隨盟熊通歸而自立為王始開濮地而有之三十八年使鬭廉伐鄧敗之四十年屈瑕鬭廉敗鄖師於蒲騷四十一年屈瑕伐絞敗之四十二年屈瑕伐羅易之不設備大敗縊而死五十一年始以㦸為軍王帥之以伐隨卒于師鬬祁屈重祕不𤼵喪以兵臨隨及隨侯盟而還子文王熊貲立文王始都郢二年伐申過鄧鄧祁侯止而享之鄧騅甥聃甥養甥請殺王鄧侯弗許三甥曰亡鄧國者必此人也夫六年伐蔡虜蔡哀侯以歸初蔡侯息侯皆取於陳息媯過蔡蔡侯不為禮息侯怒故啓我伐蔡蔡侯怨之譽息媯於王王如息以食入享遂滅息以息媯歸生堵敖及成王不言王問之曰吾一婦人而事二夫縱不能死其又奚言十年王為之伐蔡以說十二年伐鄧滅之秋伐鄭十四年冬巴人伐我十五年春王禦之大敗於津還鬻拳弗納遂伐黄敗黄師于踖陵還及湫有疾六月文王卒鬻拳𦵏諸夕室亦自殺而𦵏於絰皇文王方事中國而齊桓公始伯諸侯附焉故不能成大功子熊囏立是為堵敖堵敖三年欲殺弟熊惲惲奔隨與隨人襲弑堵敖而自立是為成王史記文王十三年卒子熊囏立能囏五年為弟熊惲所殺按左傳魯莊公四年楚武王卒則文王元年在魯莊公五年至魯莊公十九年文王卒則文王在位十五年而熊囏在位三年史記失之矣熊囏熊惲皆息媯之子至是皆十餘年耳弑立之事必有大臣専之者而左傳史記皆不言其後十餘年無征伐㑹盟明成王幼未能治國矣元年始修聘諸侯春秋書荆人來聘貢獻於王王錫之命曰鎮尔南方夷越之亂無侵中國於是楚地千里成王幼委政大臣令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備今令尹不尋諸仇讎而於未亡人之側不亦異乎子元耻之六年秋子元以車六百乗伐鄭諸侯救鄭我師夜遁子元歸遂處於王宫鬬射師諌執而梏之八年秋申公鬬班殺子元鬭榖於莵為令尹自毁其家以紓楚國之難始周成王封熊繹於荆雜居蠻夷之間故孔子作春秋謂之荆而不人及鬭榖於莵為政始以禮治國改號曰楚十三年伐鄭春秋書曰楚人伐鄭然猶未得與諸侯齒也十四年伐鄭囚鄭聃伯十五年秋諸侯㑹于陽榖以謀我冬復伐鄭十六年齊桓公以諸侯來伐責王貢之不入齊師次于陘使屈完如師齊桓為之退舍召陵陳諸侯之師與屈完乗而觀之桓公曰豈不榖是為先君之好是繼與不榖同好如何對曰君若辱收寡君寡君之願也桓公曰以此衆戰誰能禦之以此攻城何城不克對曰君若以徳綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之乃盟而還十七年滅弦十八年秋圍許諸侯救許師還冬蔡侯以許男見於武城許男面縛銜璧王禮而釋之二十二年伐黄二十四年滅黄二十七年春伐徐齊人以諸侯救徐冬敗徐于婁林二十九年齊桓公卒三十年鄭伯來朝王賜之金既而悔之與之盟曰母以鑄兵三十二年伐隨三十三年宋襄公將合諸侯使來告我許之秋㑹于盂執宋公以伐宋冬諸侯盟于薄釋宋公春秋書之始曰楚子而先陳蔡三十四年鄭伯來朝宋公伐之王伐宋以救鄭大敗宋師于泓還過鄭鄭伯享之取鄭二姬以歸君子以此知成王之不能終也三十五年秋成得臣伐陳取焦夷城頓鬭榖於莵以令尹授之薳吕臣曰子若國何對曰吾以靖國也有大功而無貴仕其人能靖者有幾時晉公子重耳自齊來王厚遇之送之於秦三十六年宋成公來朝三十七年秦人克商密鬭克屈禦㓂戍焉秦人囚之以歸成得臣追秦師不及遂圍陳納頓子于頓三十八年夏魯人來乞師以伐齊秋滅䕫宋人叛我即晉冬成得臣伐宋圍緍師及魯人伐齊取榖使申公叔侯戍之三十九年將復伐宋使鬭榖於莵治兵於睽終朝而畢不戮一人成得臣復治兵於蒍終日而畢鞭七人貫三人耳國老賀子文子文飲之酒蒍賈後至不賀問之對曰子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉剛而無禮不可以治民過三百乗其不能以入矣冬王以諸侯圍宋四十年晉侯伐曹衛以救宋王入居于申使申叔去榖使得臣去宋得臣不可使鬬椒請戰曰非敢必有功也願以間執讒慝之口王怒少與之師遂與晉師遇晉侯避之三舍楚衆欲止得臣不可戰于城濮我師敗績王使謂得臣曰大夫若入其若申息之老何得臣自殺蒍吕臣為令尹晉侯聞之喜曰莫余毒也已四十四年使鬬章聘于晉晉使陽處父來報於是晉楚復通四十五年令尹子上侵陳蔡成遂伐鄭晉陽處父侵蔡子上救之晉楚夾泜而軍約退舍以紓晉晉將渉水而陣既退處父宣言曰楚師遁矣皆歸太子商臣譛之曰納賂以避晉楚之耻也王殺子上初王將以商臣為太子子上曰君之齒未也而又多愛黜乃亂也楚國之舉常在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職商臣知之四十六年十月以宫甲圍王王請食熊膰而死弗聽縊而卒謚之曰靈不瞑曰成乃瞑商臣立是為穆王穆王二年秋圍江三年秋滅江四年夏滅六秋滅蓼六年晉靈公初立范山言於王曰晉君少不在諸侯北方可圖也八年春師于狼淵以伐鄭鄭人請成夏侵陳克壺丘秋復侵陳陳人獲我公子茷懼而請成冬使越椒聘于魯春秋書曰楚子使椒來聘始與諸侯比九年鬭冝申及仲歸謀弑王王殺之秋王㑹陳侯鄭伯蔡侯伐宋宋人道之以田孟諸宋公為右盂鄭伯為左盂十二年穆王卒子莊王旅立元年成嘉潘崇將襲羣舒使公子爕及鬬克守二子作亂城郢而使賊殺嘉不克八月二子以王出將如商宻廬戢黎及叔麇誘而殺之莊王即位三年不出號令日夜為樂令國中有敢諌者死伍舉入諌王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隠有鳥在於阜三年不蜚不鳴是何鳥也王曰三年不蜚蜚將沖天三年不鳴鳴將驚人舉退矣吾知之矣居數月滛益甚大夫蘇從入諌王曰若不聞令乎對曰殺身以明君臣之願也於是罷滛樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大說是嵗大饑戎伐我西南至于阜山又伐我東南至于陽丘庸人帥羣蠻以叛我麇人帥百濮聚於選將伐我於是申息之北門不啓謀徙於阪髙以避冦蒍賈曰我能徃㓂亦能往不如伐庸彼謂我饑不能師故伐我若我出師必懼而歸從之師興而百濮罷使廬戢黎侵庸庸人囚子楊窓三宿而逸曰庸師衆羣蠻聚焉不如益大兵以伐之師叔曰不可姑又與之遇以驕之彼驕我怒而後可克也從之七遇皆北王乃乗馹㑹師于臨品秦人巴人皆至羣蠻懼請盟遂伐庸滅之六年鄭叛晉從我陳叛我從晉秋王侵陳遂侵宋七年晉趙盾以諸侯之師侵鄭鬭椒救之次于鄭以待晉趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去八年春伐陸渾之戎觀兵于周郊天子使王孫滿勞王王問鼎之大小輕重滿曰在徳不在鼎成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也九年司馬鬬椒工正薳賈讒令尹鬬般殺之椒為令尹賈為司馬椒又殺賈將遂攻王王以三王之子為質弗受戰于臯滸椒再射王中車師懼退王使廵師曰先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏鬬椒者令尹子文之弟子良之子也生而子文惡之欲殺之子良不可故及於亂子文之孫箴尹克黄使於齊還而聞亂其人欲亡克黄曰君命不可棄也歸而自拘於司敗王思子文之治楚國曰是不可以無後使復其所師連嵗伐陳鄭滅舒蓼十五年陳夏徴舒弑其君平國孔寧儀行父來奔十六年伐陳殺夏徴舒因縣陳羣臣皆賀申叔時使齊來獨不賀王問之曰牽牛以蹊人田田主奪之牛蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其冨也以討召諸侯而以貪終之無乃不可乎王曰善哉吾未之聞也乃復封陳鄉取一人以歸謂之夏州而納公孫寧儀行父于陳十七年春王圍鄭三月克之鄭伯肉袒牽羊以逆曰孤不天不能事君使君懐怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福於厲宣桓武使改事君夷於九縣君之惠也孤之願也左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質六月晉師救鄭及河聞鄭既及楚平荀林父欲還其佐先縠不可以中軍佐濟晉師從之王欲還嬖人伍參勸戰從之戰於邲大敗晉師次于衡雍潘黨請築武軍而收晉尸以為京觀王曰非爾所知也夫文止戈為武禁暴戢兵保大定功安民和衆豐財所以為武也武有七徳我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲滛慝今罪無所而民皆盡忠以死君命又可以為京乎祀于河作先君宫告成事而還冬伐蕭宋人蔡人救蕭蕭人囚熊相冝僚及公子丙王曰勿殺吾退蕭人殺之王怒圍蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊十九年王使申舟聘於齊曰無假道于宋使公子馮聘于晉曰無假道於鄭孟諸之役舟為司馬宋公違令舟戮其僕以是惡宋辭曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人執之王聞之投袂而起屨及於窒皇劒及於寝門之外車及於蒲胥之市九月圍宋晉救不至而宋人不服二十年師將歸申犀稽首於馬前曰無畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登司馬側之牀以病告側懼與之盟而告王退三十里而與之平二十三年莊王卒子共王審立莊王之季年魯人乞師以伐齊莊王卒我師不出共王二年魯人以晉師伐齊令尹公子嬰齊將救齊大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右侵衛及魯魯人以賂請盟十一月及諸侯之大夫盟于蜀晉人畏其衆不敢爭是役也使巫臣聘於齊且告師期巫臣與公子側爭夏姬遂以夏姬亡奔晉晉人以為邢大夫側請以重幣錮之王不許曰彼為先君謀所蓋多矣若能利晉國雖重幣何益四年晉師伐鄭側救鄭鄭伯與許男訟不能決五年許鄭来訟鄭伯不勝歸而請成于晉六年嬰齊伐鄭欒書救鄭遇於繞角我師還七年嬰齊復伐鄭諸侯救鄭盟于馬陵鄭人囚我鄖公鍾儀巫臣之出也嬰齊及側盡滅其族而分其室巫臣自晉遺二子書曰爾以讒慝貪惏事君而多殺不辜余必使爾罷於奔命以死遂請於晉侯而使於吴教呉乗車戰射道之叛楚吴於是始伐楚伐巢伐徐嬰齊奔命馬陵之㑹吴入州来嬰齊自鄭奔命二子於是一嵗七奔命蠻夷屬於楚者吴盡取之大為楚患八年晉欒書侵我獲申驪九年以賂求鄭伯鄭伯㑹我公子成于鄧秋晉人伐之嬰齊伐陳以救鄭自陳伐莒取渠丘及鄆晉人歸鍾儀以求成十二月使公子成報焉十年晉使糴茷來聘十一年宋華元來㑹晉楚之成十二年五月晉士爕㑹我公子罷許偃盟于宋西門之外晉郤至来聘王享之子側相為地室而縣賓登金奏作於下驚而走出復入而辭曰如天之福兩君相見何以易此側曰兩君相見亦唯一矢以相遺焉用樂郤至譏焉晉人以此知成之不能久也冬公子罷如晉涖盟十五年夏王將北師公子貞曰新與晉盟奈何背之側曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免遂侵鄭及衛許人畏偪於鄭請遷於我十一月使公子申遷許於葉十六年使公子成以汝隂之田求成于鄭鄭人叛晉夏晉侯伐鄭王救之側將中軍嬰齊將左壬夫將右過申側見申叔而問焉曰師其如何對曰子内棄其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞將何以戰吾殆不見子矣戰于鄢陵吕錡射王中目我師敗績既夕側命軍吏察夷傷補卒乗繕甲兵展車馬將復攻晉晉人患之苗賁皇徇曰蒐乗補卒秣馬厲兵脩陳固列蓐食申禱明日復戰乃逸楚囚王聞之召側醉不能見王曰天敗楚也夫遂夜遁去賜側死十七年夏諸侯伐鄭嬰齊救之諸侯還冬諸侯復伐鄭壬夫救之諸侯還公子橐師襲舒庸滅之十八年夏王伐宋納魚石于彭城以三百乘戍之而還宋人伐彭城冬嬰齊救彭城晉悼公救宋遇扵靡角我師還十九年諸侯伐鄭壬夫救鄭侵宋吕留右司馬申多受小國之賂以偪令尹司馬二十年殺申二十一年春嬰齊伐吴克鳩兹至于衡山使鄧廖侵吴吴人敗之獲鄧廖歸飲至三日吴人取駕國人咎焉嬰齊遂以憂死六月晉侯㑹諸侯于雞澤壬夫為令尹侵欲扵小國陳叛我使袁僑如㑹秋使公子何忌侵陳二十二年陳成公卒將伐陳聞其喪而止陳不聼命夏彭名侵陳二十三年討陳叛故殺壬夫以公子貞為令尹以伐陳二十五年貞復圍陳諸侯㑹于鄬以救陳我師執陳公子黄陳侯逃歸二十六年春鄭人為晉侵蔡冬貞伐鄭鄭人請成二十七年秦伯使來乞師將以伐晉王許之貞曰不可當今吾不能與晉爭晉君類能而使之君明臣忠上讓下競當是時也晉不可敵事之而後可王曰吾既許之矣遂師于武城以為秦援冬十月諸侯伐鄭鄭人請成王伐鄭鄭人亦成莊夫人卒王未能定鄭而還二十八年夏貞及鄭師伐宋秋諸侯伐鄭鄭及晉平貞救鄭鄭人宵渉潁以盟我晉師歸我師亦歸二十九年四月諸侯復伐鄭盟于亳城北王及秦師伐鄭鄭伯來逆與我伐宋九月諸侯復伐鄭鄭及晉盟使良宵來告絶時晉悼公復伯諸侯畏之鄭固與晉我不敢復爭三十年貞及秦師伐宋王逆女于秦三十一年王疾病召大夫而告之以鄢之辱請謚靈若厲九月共王卒大夫將以王命謚貞曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請謚之共大夫從之子康王昭立吴侵我公子午及養由基禦之大敗吴師扵庸浦元年貞師于棠以伐吴師還不戒吴人敗我師于臯舟之隘冬貞卒將死謂公子午必城郢二年午為令尹舉楚國之賢者寘之列位於是楚治三年晉荀偃伐我公子格禦之戰于湛阪我師敗績五年晉人圍齊鄭公子嘉欲去諸大夫將叛晉而起楚師以告令尹午午以諸侯之睦於晉也不許王強之午伐鄭無功而還七年陳公子黄來奔八年令尹午卒使薳子馮為令尹訪扵申叔豫豫曰國多寵而王弱不可為也遂辭以疾以公子追舒為令尹觀起有寵扵追舒無禄而多馬楚人患之九年殺追舒復以薳子馮為令尹十年陳侯來朝公子黄愬焉慶虎慶寅以陳叛屈建從陳侯園陳殺二慶而納黄十一年王為舟師以伐吴不為軍政無功而還齊莊公伐晉懼而求好於我使薳唘彊聘于齊齊使陳無宇來報秋諸侯㑹于夷儀以伐齊王伐鄭以救齊吴召舒鳩人舒鳩人叛我王師于荒浦使讓焉舒鳩子告不叛且請受盟王不許薳子馮曰彼告無罪若何伐之姑歸息民彼若不二吾無求矣若猶叛我無詞有庸師還十二年舒鳩卒叛屈建為令尹伐舒鳩滅之以薳掩為司馬書土田賦車籍馬及兵車徒卒甲楯之數既成以授屈建王將賞舒鳩之功屈建辭曰先大夫薳子之功也乃以與薳掩十三年許靈公來朝詩伐鄭卒于楚王曰不伐鄭何以求諸侯十月伐鄭時宋向戍將合晉楚之成鄭公孫僑曰晉楚將平不如使逞而歸遂不禦我獲九人而還十四年夏屈建㑹晉趙武及諸侯之大夫盟于宋楚人衷甲且請先歃晉人不較諸侯是以惡我秋晉荀盈來盟薳罷如晉涖盟十五年以宋盟故鄭㳺吉來聘及漢辭之以致鄭伯冬宋公魯侯陳侯鄭伯許男皆來十二月乙未康王卒宋公未至而反諸侯皆至子熊麇立是為郟敖元年四月葬康王諸侯皆送葬王子圍為令尹王弱而令尹強諸侯知圍之不臣也二年圍殺司馬薳掩而取其室四年圍㑹晉趙武及諸侯之大夫于虢因聘于鄭且娶于公孫段氏將遂襲鄭鄭人知之不克冬圍將復聘于鄭未出境聞王有疾而還入問王疾縊而弑之及其二子幕與平夏右尹王子比奔晉宫廐尹王子黒肱奔鄭殺太宰伯州犁圍自立是為靈王靈王者共王之子而康王之弟也二年冬鄭伯來朝三年春許男來朝王皆止之以田江南使椒舉如晉求諸侯二君待之王問鄭公孫僑曰晉其許我乎對曰晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一何故不許王曰諸侯其來乎對曰從宋之盟承君之懽不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛偪於齊而親於晉唯是不來其餘君之所及也王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟椒舉至晉晉侯許之六月合諸侯于申惟魯衛曹邾不至椒舉言於王曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣伯之濟否在此㑹也宋向戌鄭公孫僑在諸侯之良也王其訪焉王使問禮於二子向戌獻公合諸侯之禮六僑獻伯子男㑹公之禮六徐子吴出也王以為貳於吴執之宋太子佐後至王田扵武城弗見於是王以侈驕諸侯椒舉諌曰夏桀為仍之㑹有緍叛之商紂為黎之蒐東夷叛之周幽王為太室之盟夷狄叛之皆汰故也今君以汰無乃不濟乎弗聽子産見向戌曰吾不患楚矣汰而愎諌不過十年戌曰然不十年侈其惡不逺逺惡而後棄善亦如之徳逺而後興七月王以諸侯伐吴圍朱方執齊慶封殺之盡滅其族將戮慶封負之斧鉞以徇於諸侯使言曰無或如齊慶封殺其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅頼遷頼於鄢使鬬圍龜公子去疾城頼將以遷許申無宇曰楚旤之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也冬吴伐我入棘櫟麻四年王以屈申為貳於吴殺之使令尹薳罷如晉逆女晉使韓起羊舌肹送之既至王將以起為閽以肹為司宫以辱晉訪諸大夫大夫莫對薳唘彊爭之乃止十月王以諸侯伐吴吴敗我師于鵲岸吴子使其弟蹶由犒師執之以歸五年夏使公子棄疾聘于晉秋薳罷伐吴吴敗我師于房鍾六年成章華之臺將與諸侯落之使薳唘彊召魯侯夏魯侯來朝王享之於章華七年陳哀公卒哀公之弟招殺其太子偃師而立公子留九月王使棄疾帥師奉孫吴以伐陳十一月滅陳放陳公子招殺陳孔奐而使穿封戍為陳公八年王㑹諸侯之大夫于陳遷許于城父十年三月王召蔡靈公于申伏甲而享之醉而執之四月殺之刑其士七十人使棄疾帥師圍蔡滅之用隠太子友于岡山使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇臣莫若君鄭莊公城櫟而寘子元使昭公不立齊桓公城穀而寘管仲至于今頼之臣聞五大不在邉五細不在庭親不在外羈不在内今棄疾在外鄭丹在内君其少戒且末大必折尾大不掉君所知也十一年夏殺成熊以為若敖氏之餘也而誅之冬伐徐以懼吴王次于乾谿以為之援鄭丹見王與之言欲求鼎於周求許於鄭王心汰侈無厭丹不敢逆左史倚相趍過王謂丹曰是良史也子善視之丹因言曰是安得為良史昔周穆王將肆其心周行天下將皆必有車轍馬迹祭公謀父作祈招之詩以止王心王是以獲沒於祗宫臣問其詩而不知也王曰然則子知之乎丹為王誦之曰祈招之愔愔式昭徳音思我王度式如玉式如金刑名之力而無醉飽之心王感其言揖而入饋不食寢不寐數日不能自克以及於難十二年春王之舊怨薳掩之族及薳居許圍蔡洧蔓成然越大夫常夀過因王在外帥羣喪職之徒以作亂圍固城克息舟城而居之蔡之遺臣朝吴觀從因之以蔡公棄疾之命召公子比公子黒肱既至命蔡人奉棄疾以盟二子帥陳蔡不羮許葉之師因息舟之隙以入楚殺王太子禄及公子罷敵比為王黒肱為令尹棄疾為司馬使觀從從師于乾谿令曰先歸復所後者劓師及訾梁而潰王聞太子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚矣小人老而無子知擠于溝壑矣王曰吾殺人子多矣能無及此乎鄭丹言於王請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祗取辱焉丹棄王而歸王㳂夏將入鄢王甞有徳於申無宇無宇之子亥求王遇於棘圍以歸五月王縊于申亥氏國人不知每夜駭曰王入矣棄疾因以作亂使人夜走而呼曰王至矣國人大驚使蔓成然告比黒肱曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱又有呼而至者曰至矣二子皆自殺棄疾即位名曰熊居是為平王葬子干于訾謂之訾敖殺囚衣之王服而流諸漢取而葬之以靖國人使蔓成然為令尹觀從為卜尹楚師還自徐吴人敗諸豫章獲其五帥王於是封陳蔡復遷邑致羣賂施舍寛民宥罪舉職楚人安焉初共王有子五人無適立乃大有事於羣望而埋璧於庭曰當璧而拜者神所立也使五人齊而長入拜康王跨之靈王肘加焉子干子晢皆逺之平王幼抱而入再拜皆壓紐鬬圍龜知之故使其子成然事焉康王既以長立至子不終靈王暴虐不得其死子干子晢皆以無援不立而平王出君陳蔡國人附焉卒有楚國如神之命十月吴滅州來蔓成然請伐吴王曰吾未撫民人未事鬼神未脩守偹未定國家而用民力敗不可悔州來在吴猶在楚也子姑待之元年夏使然丹簡上國之兵於宗丘使屈罷簡東國之兵於召陵且撫其民令曰息民五年而後用師國遂以安令尹成然恃其勞也與養氏比而求無度王患之九月殺成然而滅養氏之族使成然之子辛居鄖以續鬬氏之後二年王之嬖人費無極害蔡朝吴讒而逐之三年春使然丹誘戎蠻子嘉殺之而立其子四年冬吴伐我戰于長岸大敗吴師獲其乗舟餘皇吴人宵敗我師取餘皇以歸五年冬使王子勝遷許于白羽以避鄭六年春使工尹赤遷隂于下隂使令尹陽匄城郟魯叔孫婼聞之曰楚不在諸侯矣王之在蔡也生太子建及即位使伍奢為之師費無極為少師無極無寵於太子太子娶于秦無極勸王取之因言於王請大城城父而寘太子以通北方王說而從之楚於是始亂冬城州來沈尹戍曰楚必敗矣昔吴滅州來子旗請伐之王以撫民辭焉今未嘗撫民而城州來以挑吴能無敗乎七年費無極言於王曰建與伍奢將以方城之外叛王以問奢奢曰君一過多矣何信於讒王怒執奢使城父司馬奮揚殺太子未至而遣之太子奔宋無極曰奢之子才若在吴必憂楚國王使召之其長子尚至少子貟奔吴王并殺奢與尚貟至吴言伐楚之利卒為楚禍八年宋華氏為亂不克使華登來乞師王使薳越帥師助之太宰犯諌曰釋君而助臣可乎王悔之蔡侯朱既立費無極取貨於東國使蔡人出朱而立東國朱來愬王將為之討蔡無極言焉乃止九年宋華亥向寧華定來奔十年秋吴伐州來薳越帥諸侯之師救之遇於鍾離吴人敗頓胡沈蔡之師我師大奔冬十月吴入鄓取太子建之母及其寳器以歸薳越追之弗及縊於薳澨囊瓦為令尹城郢沈尹戍曰子常必亡郢古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境慎其四境結其四援民狎其野三務成功民無内憂而又無外懼國焉用城今吴是懼而城於郢守已卑矣卑之不獲能無亡乎十一年秋王為舟師以略吴疆沈尹戍曰此行也楚必亡邑不撫民而勞之吴不動而速之吴踵楚而疆埸無備邑能無亡乎王及圉陽而還吴人踵楚而邉人不備遂滅巢及鍾離沈尹戍曰亡郢之始於此在矣十二年冬使薳射城州屈以復茄人城丘皇以遷訾人使熊相禖築巢使季然築卷民益不安十三年九月平王卒囊瓦將立王子申曰太子壬弱其母非適也建實聘之申怒曰王有適嗣而廢之必殺令尹瓦懼乃立太子是為昭王申平王長庶子也元年春吴子使掩餘燭庸伐我我師禦之吴師不能退吴公子光因以弑吴子掩餘奔徐燭庸奔鍾吾我師還左尹郤宛直而和國人說之費無極與鄢將師惡之讒之囊瓦而殺之及陽令終晉陳皆滅其族伯州犂之孫嚭出奔吴國人謗之沈尹戍告瓦曰吴新有君疆埸日駭子邇於讒人而殺三不辜以興大謗國有大事子其危矣瓦懼殺無極將師以說於國四年吴掩餘燭庸來奔王封之於養將以害吴公子申諌曰吴光新得國而親其民視民如子辛苦同之將用之也若好吾邉疆使柔服焉猶懼其至今又強其讎以怒之無乃不可乎王弗聽吴子怒執鍾吾子而伐徐滅之徐子來奔沈尹戍救徐不及吴始用伍貟為三軍以肄楚楚於是始病五年吴再侵我八年夏桐叛我秋囊瓦伐吴敗於豫章蔡昭侯來朝為兩佩兩裘以其一獻王而服其一以朝囊瓦欲之弗與三年止之唐成公來朝有兩驌驦馬囊瓦欲之弗與亦三年止之九年唐人竊馬以獻乃歸唐侯蔡人聞之固請獻佩亦歸蔡侯蔡侯歸及漢沈玉而誓曰余所有濟漢而南者有若大川遂如晉請伐我十年三月晉為蔡合諸侯於召陵求賄不得而止蔡侯因伍貟伯噽以告於吴冬蔡侯唐侯以吴子伐我舎舟于淮汭自豫章與楚夾漢左司馬戍謂囊瓦曰子夾漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥軛子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂瓦曰吴用木也我用革也不如速戰史皇曰楚人惡子而好司馬若司馬毁吴舟于淮塞城口而還是獨克吴也必速戰不然不免乃濟漢而陳自小别至于大别三戰瓦知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說闔廬之弟夫槩王先擊囊瓦之卒瓦先奔我師亂遂大敗瓦亡奔宋吴師從我五戰及郢王出奔吴入郢伍貟𤼵平王之墓鞭之左司馬戍及息而還敗吴師于雍澨三戰皆傷遂死之王入於雲中盜以戈擊王王孫由于以背受之中肩王奔鄖鄖公辛之弟懐將弑王曰平王殺吾父我殺其子不亦可乎辛止之與其弟巢以王奔随吴求王於随公子結似王將逃王而已為王随人不與王割結心以與随人盟申包胥以王命而乞師于秦曰吴為封豕長蛇荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮吴之未定也君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯曰寡人聞命矣子姑就館將圗而告子對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出十一年夏秦子蒲子虎帥車五百乗以救我與我師敗夫槩王于沂公子結亦敗吴師於軍祥七月滅唐九月夫槩王歸自立秦楚交敗吴師吴王乃歸十月王入于郢王之奔随也將渉於成臼藍尹亹渉其孥不與王舟王定將殺之公子申曰子常惟思舊怨以敗君何効焉王曰善使復其所吾以志前惡王賞鬬辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懐申請舍懐王曰大徳滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸遂逃賞十二年四月吴敗我舟師獲大夫九人又敗我陵師國人大惕懼亡令尹申喜曰乃今可為矣於是遷郢於鄀而改紀其政以定楚國二十年二月結及陳師滅頓五月越敗吴于檇李闔閭傷而死吴由此怨越不暇伐楚二十一年滅胡二十二年春王及諸侯圍蔡以報柏舉里而栽廣丈髙倍九日而畢如令尹之素蔡人男女以辨使疆于江汝之間而還蔡於是請遷于吴秋吴王夫差伐陳楚大夫聞之皆懼曰闔閭惟能用其民是以敗我今聞其嗣又甚將若之何申曰二三子恤不相睦無患吴矣昔闔閭身自約也而恤其民民不罷勞而爭為之死吾先大夫子常易之所以敗我也今夫差次有臺榭陂池宿有妃嬙嬪御一日之行玩好必從珎異是聚視民如讎而用之日新夫先自敗也已安能敗我二十五年克戎蠻氏蠻子赤奔晉晉人為我執之以歸二十七年春吴伐陳王為之出師于城父七月將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死死一也其死讎乎命申為王不可則命結亦不可則命啓五辭而後許將戰王有疾方攻大冥卒于城父啓曰君王捨其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也與申結謀潜師閉塗逆越女之子章而立之是為惠王是嵗也有雲如衆赤鳥夾日以飛三日王問之周太史史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其天諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也亦弗祭孔子曰楚昭王知天道矣其不失國也宜哉惠王三年伐陳四年結復伐陳七年申復伐陳九年申結伐吴初太子建居鄭鄭人殺之建子勝在吴申召之以為白公請伐鄭以復父讎申許之而未行晉人伐鄭楚救之與之盟而還勝怒曰鄭人在此讎不逺矣十年吴伐慎勝敗之請以戰備獻許之遂作亂七月殺申結于朝以兵劫啓將立之啓曰王孫若安靖楚國匡正王室而後畀焉啓之願也敢不聽從若將專利以傾王室不頋楚國有死不能遂殺之劫王以如髙府圉公陽穴宫負王以如昭夫人之宫葉諸梁在蔡以方城之外伐之勝敗奔山而縊王復位諸梁兼令尹司馬陳人因亂伐我十一年七月公孫朝帥師滅陳以申之子國為令尹結之子寛為司馬而諸梁歸老於葉十六年越滅吴越人不能正江淮之北楚東侵廣地至泗上四十二年滅蔡四十四年滅杞與秦平五十七年惠王卒子簡王中立簡王元年北伐滅莒二十四年簡王卒子聲王當立聲王五年韓魏趙始列為諸侯史記簡王八年韓魏趙始為諸侯今考之三晉世家及年表當在此年也六年盜殺聲王子悼王熊疑立悼王二年三晉來伐至乗丘而還三年歸榆闗于鄭四年伐周圍鄭九年伐韓取負黍十一年三晉來伐敗我大梁榆闗我厚賂秦與之平王之季年吴起自魏來王任以為相明法責實楚國以治而大臣宗室害之二十一年悼王卒貴戚作亂攻殺吴起子肅王臧立肅王四年蜀伐我取兹方於是為扞關以距之十年魏取我魯陽十一年肅王卒無子立王弟熊良夫是為宣王宣王六年周天子賀秦獻公秦始復強而三晉亦益大十六年魏惠王圍趙邯鄲昭奚䘏謂宣王曰王不如無救趙以強魏魏強其割趙必深趙不聽必堅守是兩弊也景舎曰不然夫魏之攻趙也恐楚之攻其後今不救趙趙有亡形而魏無楚憂是楚魏共趙也害必深矣何謂兩弊乎且魏以兵深割趙趙見亡形而楚不救已必與魏合而以謀楚故王不如少出兵以為趙援趙恃楚勁必與魏戰魏怒於趙之勁而見楚救之不足畏也必不釋趙趙魏相弊而齊秦應楚則魏可破也楚因使景舎起兵救趙邯鄲㧞楚取睢濊之間齊敗魏桂陵三十年秦孝公封衛鞅於商南侵我是年宣王卒子威王熊商立威王六年齊魏始稱王越王無疆伐齊齊宣王使人說越王勸之伐楚越王從之釋齊伐我我興師伐之大敗越人殺王無疆盡取故吴地至浙江北因此怨齊田嬰七年伐齊敗之於徐州令齊必逐田嬰張丑為嬰說王曰王知所以戰勝於徐州者乎田盼子者齊之名將也嬰子不善而用申紀申紀者大臣不附百姓不為用故王勝之今逐嬰子則盼子必用非楚利也王止不逐嬰子十一年威王卒子懐王熊槐立魏聞我喪伐我取陘山懐王五年秦初稱王六年使柱國昭陽將而攻魏破之於襄陵得入邑又移兵攻齊齊王患之陳􅎮適為秦使齊齊王曰為之奈何陳􅎮曰王勿憂請令罷之即徃見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰官為上柱國爵執珪􅎮曰其有貴於此者乎昭陽曰令尹陳􅎮曰今君已為令尹矣此國冠之上也臣請得譬之人有遺其舎人一巵酒者舎人相謂曰數人飲此不足請畫地為蛇蛇先成者獨飲之一人先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也今君相楚而攻魏破軍殺將功莫大焉冠之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪此為蛇為足之說也不若引兵而去以徳齊此持滿術也昭陽曰善引兵而歸燕韓君初稱王秦使張儀與齊楚魏相㑹盟齧桑十一年山東六國約共攻秦楚為從長至函谷闗秦出兵擊六國六國兵皆引而歸齊獨後史記於此言蘇秦約山東六國共攻秦而戰國䇿言是嵗五國攻秦趙李兊之計也案蘇秦始約從諸侯當趙肅侯十六年楚威王六年明年秦使犀首說齊魏共伐趙以敗從約蘇秦自此去趙而從約遂解至楚懐王十一年凡十四年是時蘇秦自燕入齊為齊人所殺矣然則函谷之兵非蘇秦明矣魏將求和於秦使惠施之楚楚將入之秦杜赫謂昭陽曰凢為伐秦者楚也今施以魏來而入秦是明楚之伐而信魏之和也公不如無聼惠施而隂使人以請秦昭陽曰善因謂惠施曰凡為攻秦者魏也今子從楚為和楚得其利魏受其怨子歸吾將使人因魏而和惠子反魏王不恱杜赫又謂昭陽曰魏為子先戰折兵之半謁病不得請和不聽魏折而入齊秦子何以救之東有越累北無晉而交未定於齊秦是楚孤也不如速和昭陽曰善因令人謁和於魏十二年齊涽王伐敗趙魏軍秦亦伐敗韓與齊爭長十六年秦欲伐齊而楚與齊從親秦惠王患之乃宣言張儀免相使儀南入楚謂王曰敝邑之王所甚說者無先大王雖儀之所甚願為門䦨之厮者亦無先大王敝邑之王所甚憎者無先齊王雖儀之所甚憎者亦無先齊王而大王和之是以敝邑之王不得事王而令儀亦不得為門䦨之厮也王為儀閉闗而絶齊今使使者從儀西取故秦所分楚商於之地方六百里如是則齊弱矣是北弱齊西得秦私商於以為富此一計而三利俱至也王大說置相印於張儀日與置酒宣言吾復得商於之地羣臣皆賀陳􅎮獨吊王曰何故􅎮曰秦之所為重王者以王有齊也今地未可得而齊交先絶是楚孤也夫秦又何重孤國哉必輕楚矣且先出地而後絶齊則秦計不為先絶齊而後責地則見欺於張儀見欺於張儀王必怨之是西起秦患北絶齊交如此而兩國之兵至矣臣故吊王弗聽因使一將軍從張儀西受地張儀至秦佯醉墜車稱病不出三月地不可得王曰儀以吾絶齊為尚薄耶乃使勇士宋遺北辱齊王齊王大怒折楚符而合於秦秦齊交合張儀乃起朝謂楚將軍曰子何不受地從某至某廣袤六里楚將軍曰受命六百里不聞六里即以歸報王大怒興師伐秦陳􅎮又曰伐秦非計也不如因賂之一名都與之伐齊是我亡於秦取償於齊也吾國尚可存今王已絶於齊而責欺於秦是吾合齊秦之交而來天下之兵也國必大傷矣王不聽遂發兵西攻秦十七年與秦戰丹陽秦大敗我軍斬甲士八萬虜我大將屈匄禆將逢侯丑等七十餘人遂取漢中郡王大怒乃悉國兵復襲秦戰于藍田兵復大敗韓魏聞之南襲我至鄧楚聞乃引兵歸十八年秦使使約復與楚親分漢中之半以和楚王曰願得張儀不願得地張儀聞之請之楚秦王曰楚且甘心於子奈何張儀曰臣善其左右靳尚靳尚又能得事於楚王幸姬鄭袖袖所言無不從者且儀以前使負楚今秦楚大戰有惡臣非面自謝楚不解且大王在楚宜不敢取儀誠殺儀以便國臣之願也儀遂使楚王不見囚欲殺之儀私於靳尚靳尚為請曰拘張儀秦王必怒天下見楚無秦必輕王矣又謂鄭袖曰秦王甚愛張儀而王欲殺之今將以上庸之地六縣賂楚以羙人聘王以宫中善歌者為之媵王重地秦女必貴而夫人必斥矣夫人不若言而出之鄭袖卒言張儀於王而出之儀出王因善遇儀儀因說王叛從約與秦合親約昏姻張儀已出屈原使從齊來諌王曰何不誅張儀王悔使人追之不及靳尚因謂王曰臣請随之儀事王不善臣請殺之楚小臣靳尚之仇也或謂魏張旄曰以張儀之智而有秦楚之用君必窮矣君不如使人微要靳尚而刺之楚王必曰儀也彼儀窮則子重矣楚秦相難則魏無患矣旄果令人要靳尚刺之楚王大怒是嵗秦惠王卒二十二年秦攻冝陽周君謂趙累曰子以為如何對曰冝陽必㧞也周君曰冝陽城方八里材士十萬粟支十年公中之軍二十萬景翠以楚之衆臨山而救之秦必無功對曰甘茂覊旅也攻冝陽而有功則周公旦也無功則削迹於秦秦王不聽羣臣父兄之議而攻冝陽冝陽不㧞秦王耻之臣故曰㧞周君曰子為寡人謀柰何對曰君謂景翠曰公爵為執珪官為柱國戰而勝則無加焉不勝則死不如背秦援冝陽公進兵秦恐公之乗其敝也必以寳事公公仲慕公之為已乗秦也亦必盡其寳秦㧞冝陽景翠果進兵秦懼遽效煑棗韓氏果亦效重寳是時齊涽王欲為從長惡楚之與秦合乃使遺王書曰寡人患楚之不察於尊名也今秦王已死張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善韓公孫衍善魏楚必事秦則韓魏恐必因二人求合於秦則燕趙亦冝事秦四國爭事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以案兵息民令於天下則王名成矣王率諸侯並伐破秦必矣王取武闗蜀漢之地私呉越之冨而擅江海之利韓魏割上黨西薄函谷則楚之強百萬也且王欺於張儀亡地漢中兵挫藍田天下莫不代王懐怒今乃欲先事秦願王熟計之王業已欲和於秦得齊王書猶豫未決下其議羣臣羣臣或言和秦或言聽齊昭雎曰王雖東取地於越不足以刷耻於諸侯必且取地於秦而後足以刷耻於諸侯王不如深善齊韓以重樗里疾如是則王得齊韓之重以求地矣秦破韓冝陽而韓猶復事秦者以先王墳墓在平陽而秦之武遂去之七十里以故尤畏秦不然秦攻三川趙攻上黨楚攻河外韓必亡楚之救韓不能使韓不亡然存韓者楚也韓已得武遂於秦以山河為塞所報徳莫如楚厚臣以為其事王必疾齊之所信於韓者以韓公子昧為齊相也韓已得武遂於秦王甚善之使之以齊韓重樗里疾疾得齊韓之重其主弗敢棄疾也今又益之以楚之重樗里子必言秦復與楚之侵地矣於是王許之竟不合秦而合齊以善韓史記此事在二十年今案年表懐王二十二年秦㧞冝陽取武遂二十三年秦復歸韓武遂故此事當在懐王二十二年也二十四年背齊而合秦秦昭王初立乃厚賂楚楚往迎婦二十五年王入秦與昭王約盟於黄棘秦復與楚上庸二十六年齊韓魏以我叛約而合秦三國共伐我我使太子入秦而請救秦遣客卿通將兵來救三國引兵去二十七年秦大夫有私與楚太子鬭者太子殺之亡歸二十八年秦乃與齊韓魏共攻我殺將軍唐昧取我重丘而去二十九年秦復來攻大破我軍死者二萬殺將軍景缺王恐使太子為質於齊以求平三十年秦復伐我取八城秦昭王遺王書曰始寡人與王約為兄弟盟於黄棘太子為質至懽也太子陵殺寡人之重臣不謝而去寡人誠不勝怒使兵侵君之邉今聞君王乃令太子質於齊以求平寡人與君接境壤界故為昏姻所從相親久矣而今秦楚不懽則無以令諸侯寡人願與君王㑹武闗面相約結盟而去寡人之願也王見書患之欲往恐見欺欲無往恐秦怒昭雎曰王無行而發兵自守耳秦虎狼不可信有并諸侯之心屈原亦止王母西王子子蘭勸王曰奈何絶秦之懽心於是往㑹秦詐令一將軍伏兵武闗號為秦王王至則閉武闗遂與西至咸陽朝章臺如蕃臣不與亢禮王大怒悔不用昭子言秦因留王要以割巫黔中郡王欲盟秦欲先得地王怒曰秦詐我而又強要我以地不復許秦秦因留王楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子横為質於齊齊秦合謀則楚無國矣乃欲立懐王子在國者昭睢曰王與太子俱困於諸侯今又背王命而立其庶子不義乃請太子於齊齊涽王欲留太子以求楚之淮北齊相田文曰不可郢中立王是吾抱空質而行不義於天下也或曰不然郢中立王因與新王為市曰與我下東國吾為王殺太子不然將與三國共立之然則東國必可得矣齊王卒用其相計歸太子然亦謂太子與我東地五百里不然不得歸太子曰臣有傅請問之傅慎子曰獻之愛地而不送死父不義也太子從之齊乃歸太子太子至立為王是為頃襄王乃告秦曰賴社稷神靈國有王矣秦昭王怒齊使車五十乗來取東地王告慎子曰齊來求地為之奈何慎子曰王朝羣臣而問之可也上柱國子良入見王曰寡人之得反國也以東地五百里許齊齊今求之奈何子良曰王親出玉聲而許強萬乗之齊不與則不信不可以約結諸侯請與之而攻之子良出昭常入見王復問之昭常曰不可與也去東地五百里是去國之半也臣故曰勿與臣請守之昭常出景鯉入見王復問之景鯉曰不可與也然楚不能獨守臣請西索救於秦景鯉出王召慎子告之以三大夫之計曰將孰用而可慎子對曰王皆用之王怫然作色曰何謂也慎子曰王使子良以車五十乗北獻地於齊𤼵子良之明日以昭常為司馬使守東土遣昭常之明日使景鯉以車五十乗西索救於秦王曰善從之子良至齊齊使人以甲受地昭常應齊使曰我主東土且與之生死悉五尺至六十三十餘萬弊甲銑兵待於下塵齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命於寡君是常矯也王攻之齊王起兵以伐昭常未渉疆秦畏齊之有東土也使芈戎告楚曰毋與齊東國吾與子出兵遂以五十萬臨齊右壤曰隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可不然則戰齊王恐乃請子良南道楚西使秦以解齊患士卒不戰東地復全頃襄王元年秦出兵武闗攻我大敗我軍斬首五萬取析十五城而去二年懐王亡歸秦覺之遮楚道懐王從間道走趙以求歸趙主父在代其子惠文王初立行王事不敢納懐王欲走魏秦追至遂與秦使復之秦懐王遂發病三年懐王卒于秦秦歸其喪楚人皆憐之如悲親戚諸侯由是不直秦秦楚絶六年秦使白起伐韓於伊闕斬首二十四萬秦乃遺王書曰楚背秦秦且率諸侯伐楚爭一旦之命願王飭士卒得一樂戰王患之乃謀復與秦平七年楚迎婦於秦秦楚復平十一年齊秦各自稱帝月餘復歸帝為王十四年王與秦昭王好㑹于宛十五年王與秦三晉燕共伐齊取淮北十六年與秦昭王好㑹於鄢其秋復與秦昭王㑹穰十八年楚人有好以弱弓微繳加歸鴈之上者王聞召而問之其人因射獵以言伐國之事王復召與語遂言曰先王為秦所欺而客死於外怨莫大焉匹夫有怨尚有報萬乗白公子胥是也今楚地方五千里帶甲百萬猶足以踴躍中野而坐受困臣竊為大王弗取也王感其言遣使於諸侯復為從欲以伐秦秦聞之發兵來伐楚欲與齊韓連和伐秦因欲圍周周王赧使武公謂楚相昭子曰西周之地絶長補短不過百里而名為天下共主裂其地不足以肥國得其衆不足以勁兵雖無攻之名為弑君然好事之君喜攻之臣發號用兵未甞不以周為終始是何也見祭器在焉欲器之至而忘弑君之亂臣恐天下以器讎楚也臣請譬之虎肉臊其兵利身人猶攻之澤中之麋蒙虎之皮人之攻之必萬於虎裂楚之地足以肥國屈楚之名足以尊主是故器南則兵至矣於是楚計輟不行十九年秦伐我我軍敗割上庸漢北地與秦二十年秦將白起㧞我西陵二十一年白起遂㧞我郢燒先王墓夷陵我兵散不復戰東北保陳二十二年秦復拔我巫黔中郡初屈原有寵於懐王王與之圖議國事應對諸侯甚尊任之上官大夫忌之讒之懐王王疑之不用原既勸懐王誅張儀又勸王無入秦王不聽而聽少子蘭入秦而不反故楚人皆賢屈原而咎子蘭及頃襄王即位以蘭為令尹蘭因與上官大夫比而毁原王怒逐之原憤怨赴湘水死楚人傷之由是忠臣不為用秦之未取郢也莊辛謂王曰王左州侯右夏侯從鄢陵君與夀陵君專滛佚侈靡不顧國政郢都必危王曰先生老悖乎將以為楚國祅祥乎莊辛曰臣非敢為祅祥也臣誠見其必然也王卒幸四子不衰楚國必亡臣請避於趙淹留以觀之莊辛去之趙五月而秦舉鄢郢王乃使人徴莊辛於趙謝之曰寡人不能用先生之言今事至此為之奈何莊辛曰鄙諺曰見莬而顧犬未為晚也亡羊而補牢未為遲也湯武以百里昌桀紂以天下亡楚國雖小絶長續短猶數千里豈特百里哉王方憂懼乃受之執珪封陽陵君二十三年復收東地得兵十餘萬西取秦所㧞我江旁十五邑以為郡距秦二十七年使三萬人助三晉伐燕復與秦平太子為質於秦使左徒黃歇侍太子三十六年王病太子亡歸秋頃襄王卒太子熊元伐立是為考烈王王以黄歇為令尹封於吴號春申君考烈王元年納州於秦以平是時楚益弱六年秦圍邯鄲趙使平原君來告急遣春申君將兵救趙七年至新中秦兵去史記楚世家楚遣景陽救趙今按年表及平原君春申君傳皆言春申君將而救趙故以春申為信十二年秦昭王卒使春申君吊祠于秦十四年滅魯十六年秦王政立二十二年與諸侯共伐秦不利而去東徙都夀春命曰郢二十五年考烈王卒子幽王悍立王舅李園殺春申君幽王三年秦滅韓十年幽王卒同母弟猶代立是為哀王哀王立二月餘哀王庶兄負芻之徒襲殺哀王而立負芻為王是嵗秦虜趙王遷王負芻二年秦伐我大破我軍亡十餘城三年秦滅魏四年秦將王翦破我軍於蘄殺將軍項燕五年王翦蒙武遂破楚國虜王負芻滅楚為楚郡年表及王剪傳記楚亡事與楚世家同惟秦始皇本紀二十三年王剪擊荆虜荆王項燕立昌平君為荆王反秦於淮南二十四年王剪復破荆軍昌平君死項燕自殺始皇二十三年則負芻之四年二十四年則負芻之五年負芻既死項燕立昌平君昌平君死而後項燕自殺與楚世家不同昌平君者楚人為始皇相國攻嫪毒者也始皇二十一年將攻荆徙昌平君於郢然無以考騐其實故兩存之也蘇子曰楚靈王因陳公子招之亂而滅陳追討蔡侯般之弑君而滅蔡假大義以濟私欲晉政已亂莫之能救沛然自以為得計矣不十年而有乾谿之禍秦惠王使張儀說楚懐王欺而賣之如劫嬰兒昭王又誘而執之咸陽加之以兵遂分楚之半此其惡甚於楚靈王然傳子孫累世其禍乃應夫國於天地有與立矣一日為惡禍未即報也本弱者速斃根深者徐拔彼方以得為幸而不知天網之不失也是故楚雖已滅而楚之父老知秦之旤曰楚雖三戸亡秦必楚卒之滅秦者皆楚人也楚莊王討陳夏徴舒圍鄭及宋力皆足以取之棄而不有夫豈不欲畏天故也莊王既伯諸侯而楚遂以興天命之不僣如此而可誣也哉古史卷十七
