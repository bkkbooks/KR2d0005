body:
  text: 古史卷二十三宋蘇轍撰田敬仲世家第十六田敬仲完者陳厲公躍之子也厲公之弟二人長曰桓公林次曰宣公杵臼厲公之後再立弟故厲公子不得立宣公二十一年殺其太子禦寇敬仲善於禦寇懼而奔齊實齊桓公之十四年也桓公以敬仲為賢將以為卿敬仲曰羈旅之臣幸若獲宥而免於罪戾君之惠也敢辱髙位以速官謗桓公以為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢敬仲之少也厲公使周史筮之遇觀之否史曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身必在其子孫若在異國必薑姓也及懿氏將妻敬仲卜之曰吉是謂鳯皇于飛和鳴鏘鏘有媯之後將育于薑五世其昌並于正卿八世之後莫之與京敬仲入齊能讓而有禮君子亦知其將有後矣敬仲居齊始為田氏生田稚孟夷夷生田湣孟莊莊生文子須無事齊靈公莊公文子賢二君不能用立於崔杼慶封之間文子亦知其必敗也文子之子曰桓子無宇文子在而桓子出使於諸侯矣莊公伐晉而懼欲見楚子楚使薳啓強來請會期齊聞有晉師使桓子辭且乞師崔杼弒莊公文子有馬十乘棄而違之孔子稱其清景公三年文子與欒髙鮑氏共誅慶舍而逐慶封景公淫侈政事廢墮厚於賦斂而急於刑戮桓子隂收齊衆制其家量與公量四而加一以家量貸而以公量取山木如市弗加於山魚鹽蜃蛤弗加於海故齊人皆疾景公而德陳氏九年晏子聘於晉與叔丐言及齊故知齊之將為陳氏也十四年公孫蠆卒其子強幼欒施欲治其家髙氏之老曰孺子長矣而相吾室欲兼我也桓子善於髙氏乃皆授甲將攻欒氏施見桓子曰子胡然吾將以厚髙氏耳子姑止之桓子稽首曰頃靈福子吾猶有望遂和之如初十六年或告桓子曰欒氏髙氏將攻陳鮑桓子甲以見鮑國則亦授甲矣使視欒髙則皆將飲酒遂伐之欒施髙強皆敗出奔魯桓子與鮑氏分其室晏子謂桓子必致諸公桓子從之既而請老于莒景公之母穆孟姬為之請髙唐陳氏由此始大凡齊之公族逐於欒髙者桓子皆召而反其邑且私具幄幕器用從者之衣屨而與之凡公族之無祿者私分之邑國之貧約孤寡者私與之粟晏子言於景公以陳氏為虞勸公力行仁政以懷撫齊民而以禮止陳氏私施公雖善之而溺於淫樂竟不能用故陳氏遂大桓子卒子僖子乞嗣史記范中行氏反晉田乞欲為亂樹黨於諸侯乃説景公曰范中行數有德於齊不可不救乃使乞往救而輸之粟按左傳景公與衛叛晉久矣前此已屢伐晉其救范中行非田氏樹黨而後請之也景公嬖少子荼使國夏髙張傅而立之置羣公子於萊公卒僖子構髙國於諸大夫共伐之二子戰敗出奔僖子立悼公遷荼於駘而弒之僖子卒子成子恆嗣悼公立四年齊人弒之而立簡公壬簡公嬖闞止使為政成子畏之簡公四年成子與諸陳攻殺闞止因弒簡公而立公弟平公驁史記成子既弒簡公懼諸侯誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使案左傳成子歸成於魯以子貢之言不得已而與之本非成子所以自完之計也又自是齊晉更相侵伐未已亦不見成子約三晉之實又是時吳滅已久而言通吳越之使亦非確論也故皆不録成子言於平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田氏成子於是盡誅鮑晏及公族之強者而割齊自安平以東至琅邪為封邑封邑大於平公所食平公十三年晉伐鄭成子救之師將興屬孤子三日朝設乘車兩馬繫五邑以命顔涿聚之子晉曰而父死於隰以國之多難未女恤也今君命女以是邑也服車而朝無廢前勞乃救鄭及留舒違榖七里榖人不知及濮雨不涉鄭人曰大國在敝邑之宇下今師不行恐無及也成子衣製杖戈立於阪上馬不出者助之鞭之知伯聞之曰我卜伐鄭不卜敵齊乃還成子侍妾數十有子百餘人史記成子選齊國女子長七尺以上為後宫後宫以百數賔客舍人出入者不禁故成子之子七十餘人譙周以謂田恆之為人雖大負弒君之名至於行事實亦修整必不為此失行也周説有理今故不取史記成子卒子襄子盤嗣襄子相齊宣公宣公三年三晉滅知伯分其地襄子使其兄弟宗人盡為齊都邑大夫與三晉通使襄子卒子莊子白嗣宣公四十三年伐晉毁黃城圍陽狐明年伐魯葛及安陵明年取魯之一城莊子卒子太公和立自襄子至太公三世相齊宣公宣公五十一年卒子康公貸立康公立十四年淫於酒色不聽政太公遷之海上食一城以奉其先祀十五年魯敗齊平陸十八年太公與魏文侯會濁澤求為諸侯魏文侯乃使使言周天子及諸侯請立和為諸侯周天子許之康公之十九年太公立為齊侯列於周室二年而卒子桓公午立桓公五年韓魏趙伐我至桑丘史記三國世家及年表皆書此事止此而已獨於此書秦魏攻韓韓求救於齊桓公召大臣而謀曰蚤救之孰與晚救之騶忌曰不若勿救假干朋曰不救則韓且折而入於魏不若救之田臣思曰過矣君之謀也秦魏攻韓楚趙必救之是天以燕與齊也桓公曰善乃隂告韓使者而遣之韓自以為得齊之救因與秦魏戰楚趙聞之果起兵救之齊因起兵襲燕國取桑丘案騶忌相威王後此二十餘年既可疑又據戰國䇿田臣思伐燕之謀乃湣王十年伐燕噲子之之事也然太史公湣王十年全不載伐燕事今削之桓公五年而載之湣王十年乃得其實六年救衛桓公卒子威王因齊立是歲故齊康公卒絶無後奉邑皆入田氏威王元年三晉因齊喪伐我靈丘六年魯伐我入陽關晉伐我至博陵七年衛伐我取薛陵九年趙伐我取甄威王即位以來不治委政卿大夫九年之間諸侯並伐國人不治於是威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語之曰自子之守阿譽言日聞然使使視阿田野不闢民貧苦昔日趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫與左右嘗譽阿者遂起兵西擊趙魏衛魏獻觀以和趙人歸我長城史記於此言敗魏濁澤圍魏惠王案三晉世家是年韓趙圍魏惠王其事甚詳齊初不與也是時威王初親政伐魏以自解則可必未暇與韓趙圍惠王也於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊二十餘年騶忌以鼓琴見威王威王説而舍之右室因言鼓琴以及政事王善之見三月而受相印居期年封以下邳號曰成侯二十三年與趙王會平陸二十四年與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人小國也尚有徑寸之珠照車前後各十二乘者十數奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有盼子者使守髙唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁王慚不懌而去二十六年魏惠王圍邯鄲趙求救於齊威王召大臣而謀曰救趙孰與勿救騶忌曰不如勿救段干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計時騶忌與田忌不善公孫閲謂騶忌曰公何不言於王使田忌將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣於是騶忌言於王使田忌南攻襄陵十月邯鄲拔齊兵擊魏大敗之桂陵三十三年殺大夫牟辛徐廣曰大夫一作夫人索隱亦曰年表作夫人然今年表作大夫矣三十五年公孫閲又與騶忌謀令人操卜金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎不吉乎卜者出因令人捕為之卜者驗其辭於王所田忌聞之遂率其徒襲臨淄求騶忌不勝而奔三十六年威王卒子宣王辟疆立宣王元年秦孝公用商鞅周致伯於秦二年王知田忌為騶忌所賣乃召而復其位魏伐趙趙與韓共繫魏戰不利韓氏請救於齊宣王召大臣而謀曰蚤救孰與晚救騶忌曰不如勿救田忌曰弗救則韓且折而入於魏不如早救之孫臏曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而訴於齊矣吾因深結韓之親而晚承魏之弊則可重利而得尊名也宣王曰善乃隂告韓使者而遣之韓因恃齊五戰不勝而東委國於齊齊乃起兵使田忌田嬰將孫子為師救韓趙以擊魏大敗之馬陵殺其將龎涓虜魏太子申其後三晉之王皆因田嬰朝齊王於博望盟而去七年與魏王會平阿南八年復會甄九年與魏襄王會徐州以相王十年楚圍我徐州十一年與魏伐趙趙決河水灌齊魏兵罷十八年秦惠王稱王宣王喜文學遊説之士自騶衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫孟軻最賢以為卿皆不治而議論是以齊稷下學士復盛且數百千人十九年宣王卒子涽王地立涽王元年秦相張儀與諸侯執政會齧桑犀首立五王齊謂趙魏曰寡人羞與中山並為王願與大國伐之以廢其王中山聞之大恐召張登而告之曰寡人且王齊謂趙魏曰羞與寡人並為王而欲伐寡人奈何對曰君為臣多車重幣臣請見田嬰中山君遣之登見嬰子曰臣聞君欲廢中山之王將與趙魏伐之過矣以中山之小而三國伐之雖廢王猶且聽也然中山恐必為趙魏廢王而務附焉是君為趙魏驅羊也非齊之利也豈若中山廢其王而事齊哉田嬰曰奈何張登曰今君召中山與之遇而許之王中山必喜而絶趙魏趙魏怒而攻中山中山急而君難其王中山恐亡其國必廢王事齊賢於為趙魏驅羊矣田嬰許諾張丑曰不可臣聞同欲者相憎同憂者相親今五國相王而負海不與焉此其欲皆在為王而憂在負海致中山而塞四國四國寒心必先與之王而故親之是君臨中山而失四國也且張登之為人也多智微計薦中山之君久矣難信以為利田嬰不聽果召中山君而許之張登因謂趙魏曰齊欲伐河東何以知之齊羞與中山之為王甚矣今召中山與之遇而許之王是欲用其兵也豈若大國先與之王以止其遇哉趙魏許諾遂與中山王而親之中山果絶齊而從趙魏中山與燕趙為王齊閉關不通中山之使曰我萬乘之國也中山百乘之國也何侔名於我欲割平邑以賂燕趙出兵以攻中山藍諸君患之張登謂藍諸君曰公何患於齊藍諸君曰齊強萬乘之國耻與中山侔名不憚割地以賂燕趙出兵以攻中山燕趙好背而貪地吾恐其不吾據也大者危國次者廢王奈何吾弗患也張登曰請令燕趙固輔中山而成其王公欲之乎藍諸君曰此所欲也曰請以公為齊王而登試説公可乃行之藍諸君曰願聞其説登曰王之所以不憚割地以賂燕趙出兵以攻中山者其實欲廢中山之王也王曰然然則王之為費且危夫割地以賂燕趙強敵也出兵以攻中山首難也王行二者所求中山未必得王如用臣之道地不虧兵不用而中山可廢也王必曰子之道奈何登曰王發重使告中山君曰寡人所以閉關不通使者為中山之獨與燕趙為王而寡人不與聞焉耳君茍舉趾以見寡人請亦佐君中山恐燕趙之不已據也今齊之辭云中山必遁燕趙與王相見燕趙聞之必怒絶之王亦絶之是中山孤孤何得無廢以此説齊王齊王聽乎藍諸君曰是則必聽矣此所以廢之何在其存之也張登曰此正所以存之者也齊以是辭來因以告燕趙而無往以積厚於燕趙燕趙必曰齊之欲割平邑以賂我者非欲廢中山之王也徒欲離我於中山而已親之也雖百平邑燕趙必不受也藍諸君曰善遣張登往果以是辭來中山因告燕趙而不往燕趙果俱輔中山中山王事遂定三年封田嬰於薛四年迎婦於秦七年與宋攻魏敗之觀澤八年燕君噲以國讓其相子之燕大亂十年燕太子平與其將市被欲攻子之儲子謂涽王曰因而乘之破燕必矣是時秦魏伐韓韓求救於齊涽王謀救韓田臣思曰王之謀過矣子噲與子之國百姓不戴諸侯弗與秦伐韓楚趙必救之是天以燕賜我也王曰善乃許韓使者而遣之韓自以得交於齊遂與秦戰楚趙果起兵救韓涽王因令章子將王都之兵因北地之衆以伐燕破之燕君子之皆死齊遂虜燕衆毁其宗廟遷其重器將遂滅燕燕人不服諸侯皆謀救燕乃止十二年攻魏楚圍雍氏秦敗屈丏蘇代謂田軫曰臣願有謁於公其為事甚完使楚利公成為福不成亦為福今者臣立於門客有言曰魏王謂韓馮張儀曰煮棗將拔齊兵又進子來救寡人則可矣不救寡人寡人弗能拔此特轉辭也秦韓之兵無東旬餘則魏氏轉韓從秦秦逐張儀交臂而事齊楚此公之事成也田軫曰奈何使無東對曰韓馮之救魏之辭必不謂韓王曰馮以為魏必曰馮將以秦韓之兵東郤齊宋馮因搏三國之兵乘屈丏之弊南割於楚故地必盡得之矣張儀救魏之辭必不謂秦王曰儀以為魏必曰儀且以秦韓之兵東距齊宋儀將搏三國之兵乘屈丏之弊南割於楚名存亡國實伐三川而歸此王業也公令楚王與韓氏地使秦制和謂秦王曰請與韓地而王以施三川韓氏之兵不用而得地於楚韓馮之東兵之辭且謂秦何曰秦兵不用而得三川伐楚韓以窘魏魏氏不敢東是孤齊也張儀之東兵之辭且謂何曰秦韓欲地而兵有案聲威發於魏魏氏之欲不失齊楚者有資矣魏氏轉秦韓爭事齊楚楚王欲而無與地公令秦韓之兵不用而得地有一大德也秦韓之王劫於韓馮張儀而東兵以徇服魏公常執左劵以責於秦韓此其善於公而惡張子多資矣二十三年與秦擊敗楚於重丘二十四年秦使涇陽君質於齊二十五年歸涇陽君於秦孟嘗君薛文入秦秦以為相是歲楚懷王入秦秦因留之二十六年文以計得脫歸復相齊因約韓魏共攻秦求出楚懷王二十八年三國攻秦至函谷軍焉秦與韓魏河外以和兵罷楚懷王死於秦楚太子橫先質於齊涽王與相薛文謀歸橫立為頃襄王二十九年齊佐趙滅中山三十四年田甲劫涽王王疑相薛文使之文懼亡去已而知文無謀召之文遂老居薛三十六年王為東帝秦昭王為西帝蘇代自燕入齊見於章華東門王曰嘻善子來秦使魏冉致帝子以為何如對曰王之問臣也卒而患之所從來微今不聽是恨秦也聽之是恨天下也願王受之而勿庸稱也秦稱之天下安之王乃稱之無後也秦稱之天下惡之王因勿稱以收天下此大資也且天下立兩帝王以天下為尊齊乎尊秦乎王曰尊秦曰釋帝天下愛齊乎愛秦乎王曰愛齊而憎秦曰兩帝立約伐趙孰與伐桀宋之利王曰伐桀宋利對曰夫與秦為帝則天下獨尊秦而輕齊釋帝則天下愛齊而憎秦伐趙不如伐桀宋之利故願王明釋帝以收天下而以其間舉宋夫有宋衛之陽地危有濟西趙之阿東國為有淮北楚之東國危有陶平陸梁門不開釋帝以伐桀宋國重而名尊天下莫敢不聽此湯武之舉也以敬秦為名而使天下憎之此所謂以卑為尊者也願王熟慮之於是齊去帝復為王秦亦去帝位代之在燕固與燕昭王謀勸齊伐宋以弊齊因謂湣王曰齊南破楚西屈秦用韓魏之兵舉燕趙之衆猶鞭策也臣聞王者必誅暴正亂舉無道攻不義今宋王射天笞地鑄諸侯之象使侍屏匽展其臂彈其鼻此天下之無道不義而王不伐名終不成且夫宋中國膏腴之地鄰民之所處也與其得百里於燕不如得十里於宋伐之名則義實則利王何弗為湣王曰善三十八年使韓聶將而伐宋秦昭王聞之怒曰吾愛宋與愛新城陽晉同韓聶與吾友也而攻吾所愛何也蘇代為齊謂秦王曰韓聶之攻所以為王也齊強輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也此韓聶之所禱於王也秦王曰吾患齊之難知一從一衡其説何也對曰天下國令齊可知乎齊以攻宋其知事秦矣以萬乘之國自輔不西事秦則宋治不安中國白頭遊敖之士皆積智欲離齊秦之交伏式結鞅西馳者未有一人言善齊者也伏式結鞅東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晉楚合必議齊秦齊秦合必圖晉楚請以此決事秦王曰諾於是齊遂伐宋三覆宋兵宋王出亡死於溫齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼湣王驕甚欲去孟嘗君孟嘗君出奔魏三十九年秦來伐拔我列城九四十年燕秦楚三晉合謀各出鋭師以伐我敗我濟西王解而郤燕將樂毅遂入臨淄盡取齊之寶藏器初齊負郭之民有狐咺者正議湣王斫之檀衢故百姓不輔齊宗室子陳舉直言殺之東閭故宗族離心司馬穰苴為政者也亦殺之故大臣不親及燕兵至使向子將而應之軍破向子以一乘亡達子收餘卒復振與燕戰求所以賞者湣王不與軍遂破走王出亡之衛衛君辟宫舍之稱臣而共具湣王不孫衛人侵之湣王去走鄒魯有驕色鄒魯弗內遂走莒楚使淖齒救齊因相湣王淖齒數湣王曰昔千乘博昌之間方數百里雨血沾衣王知之乎王曰不知嬴博之間地坼至泉王知之乎王曰不知人有當闕而哭者求之則不得去之則聞其聲王知之乎王曰不知淖齒曰天雨血沾衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆以告矣而王不知戒焉何得無誅乎於是殺湣王於鼓里而與燕共分齊之侵地鹵器齊人有王孫賈者年十五事湣王王出走失王處其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭而望汝今事王王出走汝不知其處尚何歸賈乃入市呼曰淖齒亂齊國殺湣王欲與我誅之者袒右市人從者四百人與之刺淖齒殺之畫邑有賢者王蠋屢諌王王不聽退而耕於野燕人知之令軍中無入畫邑三十里使人謂蠋曰齊人多髙子之義吾以子為將封萬家蠋固謝燕人曰子不聽吾且屠畫邑蠋曰忠臣不事二君貞女不更二夫國既破六吾不能存今又劫之以兵為君將是助桀為暴也與其生而無義固不如烹遂自經絶脰死齊亡大夫聞之曰王蠋布衣也義不北面於燕况在位食祿者乎乃相聚如莒求諸子欲立之湣王之死也王子法章易衣服變姓名為莒太史噭家灌園太史噭女竒其狀貌以為非常人憐而竊衣食之因與私通焉淖齒既死莒中人推求湣王子得法章立之是為襄王以保莒布告齊國中曰王已立在莒矣時燕已下齊七十餘城惟莒即墨未下田單堅守即墨襄王在莒五年田單以即墨攻破燕軍迎襄王於莒入臨淄盡復齊故地封田單為安平君十四年秦擊我剛壽十九年襄王卒子建立初襄王之立也即以太史氏女為后是為君王后建之母也太史噭曰女不媒而嫁汙吾世終身不覩君王后君王后賢亦不失人子之禮王建六年秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聽周子曰不如聽之以退秦兵不聽則秦兵不卻是秦之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釜也夫救趙髙義也卻秦兵顯名也義救亡國威卻強秦不務為此而務愛粟為國計者過矣齊王弗聽秦破趙長平四十餘萬遂圍邯鄲國子曰秦破馬服圍邯鄲齊魏亦佐秦伐邯鄲何也安邑者魏之柱國也晉陽者趙之柱國也鄢郢者楚之柱國也秦固已取安邑晉陽鄢郢三國與秦壤界矣今又劫趙魏疏中國封衛之東野兼魏之河內絶趙之東陽則趙魏危矣趙危則非齊之利也夫韓魏楚趙之志恐秦兼天下而臣其君故專兵一志以逆秦三國與秦壤界而患急齊不與秦壤界而禍緩是以天下之勢不得不事齊也故秦得齊則權重於中國趙魏楚得齊則足以敵秦秦趙魏得齊者重失齊者輕齊有此勢不能以重於天下者何也其用者過也齊以淖齒之亂惡楚秦欲取齊故使蘇涓之楚使任固之齊齊明謂楚王曰秦王欲楚不若欲齊之甚也其使涓來以示秦之有楚以資固於齊也齊見秦之有楚則必受固是王之聽涓也適為固驅以合齊秦也齊秦合非楚之利也且夫涓來之辭必非固之所以之齊之辭也王不如使人以涓來之辭漫固於齊齊秦必不合則王重矣王欲收齊以攻秦漢中可得也王欲以秦攻齊淮泗之間亦可得也十六年秦滅周君王后卒二十三年秦置東郡二十八年王入朝秦秦王政置酒咸陽三十五年秦滅韓三十七年秦滅趙三十八年燕使荆軻刺秦王秦王覺殺軻明年秦破燕燕王亡走遼東明年秦滅魏秦兵次於歷下四十二年秦滅楚明年虜代王嘉滅燕王喜四十四年秦兵擊齊齊王聽相后勝計不戰以兵降秦王建將入秦雍門司馬前曰所為立王者為社稷邪為王邪王曰為社稷司馬曰為社稷立王王何以去社稷而入秦王還車而反雍門司馬與即墨大夫即入見曰齊地方數千里帶甲數百万夫三晉大夫皆不便秦而在阿甄之間者百數王收而與之百万之衆使收三晉之故地即臨晉之關可入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百万之衆使收楚故地即武關可入矣如此則齊威可立秦國可亡夫舍南面稱制乃西面事秦為大王不取也秦使陳馳誘齊王約與五百里地齊王不聽即墨大夫而聽陳馳遂入秦秦虜王建遷之共遂滅齊為郡天下一并於秦始君王后賢事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救於秦以故王建立四十餘年不受兵秦始皇嘗使使遺君王后連環曰齊多知能解此連環否君王后以示羣臣羣臣不知解君王后引椎椎破連環謝秦使曰謹已解矣及君王后病且卒戒建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受言君王后曰老婦已忘之矣君王后死后勝相齊多受齊間金使賔客入秦秦又多與金客皆為反間勸王朝秦不修攻戰之偹不助五國攻秦秦以故得滅五國五國既亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不早與諸侯合從攻秦聽姦臣賔客以亡其國歌之曰松邪柏邪住建共者客邪疾建用客之不詳也蘇子曰蘇秦欲連諸侯以拒秦此一時良算也公孫衍一説齊魏而蘇秦之約不能期年以壞衆志之不一其勢固難成哉然天方相秦人謀雖善將有不能支者彼韓魏趙楚與秦壤地相接雖欲勉強抗秦而干戈日至勢不可矣如燕齊負海前有四國之限燕弱不足言如齊之強使與四國合從推其有餘以補不足時出而拯其亟雖秦之暴亦安能遂滅諸侯乎然威宣方以其力攻伐諸侯諸侯不親湣王取宋破燕求逞其欲不暇及逺而王建偷安自守僥幸秦之見容與五國相隨而亡豈非天哉然吾觀六國之亡其君無一人可以守國者楚考烈王死李園專國負芻與王猶爭立僅能自定而秦兵至趙三遷信讒以誅李牧魏景湣王用秦間以廢信陵韓王安制於韓玘燕丹私怨始皇欲以刺客斃秦雖使秦寇不作其勢亦不能久安矣而况秦乘其弊乎古史卷二十三
