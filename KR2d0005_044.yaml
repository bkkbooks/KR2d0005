body:
  text: 古史卷四十四宋蘇轍撰白起王翦列傳第二十一白起者郿人也善用兵事秦昭王昭王十三年起為左庶長将而撃韓之新城是嵗穰侯相秦舉任鄙以為漢中守其眀年起為左更攻韓魏於伊闕斬首二十四萬又虜其将公孫喜㧞五城起遷為國尉渉河取韓安邑以東到乾河眀年起為大良造攻魏取城大小六十一眀年起與客卿錯攻垣城㧞之後五年起攻趙㧞光狼城後七年起攻椘㧞鄢鄧五城其眀年攻椘㧞郢燒夷陵遂東至竟陵椘王亾去郢東徙陳秦以郢為南郡起遷為武安君復取椘巫黔中郡三十四年起攻魏㧞華陽走芒夘而虜三晉将斬首十三萬與趙将賈偃戰沉其卒二萬人於河中四十三年起攻韓陘城㧞五城斬首五萬四十四年起攻南陽太行道絶之四十五年伐韓之野王野王降秦上黨道絶其守馮亭與民謀曰鄭道已絶韓必不得為民秦兵日進韓不能應不如以上黨歸趙趙若受我秦怒必攻趙趙被兵必親韓韓趙為一則可以當秦因使人報趙趙孝成王與平陽君平原君計之平陽君曰不如勿受受之禍大於所得平原君曰無故得一郡受之便趙受之因封馮亭為華陽君四十六年秦攻韓緱氏藺㧞之四十七年秦使左庶長王齕攻韓取上黨上黨民走趙趙軍長平以按據上黨民四月齕因攻趙趙使廉頗将趙軍士卒犯秦厈兵秦厈兵斬趙禆将茄六月䧟趙軍取二障四尉七月趙軍築壘壁而守之秦又攻其壘取二尉敗其陣奪西壘壁廉頗堅壁以待秦秦數挑戰趙兵不出趙王數以為讓而秦又使人行千金於趙為反閒曰秦之所惡獨畏馬服子趙括将耳廉頗易與且降矣趙王既怒廉頗軍數敗又反堅壁不敢戰而又聞秦反間之言因使趙括代廉頗将以擊秦秦聞馬服子将乃隂使起為上将軍而王齕為尉禆将令軍中有敢泄武安君将者斬趙括至則出兵擊秦軍秦軍佯敗而走張二竒兵以刼之趙軍逐勝追造秦壁壁堅拒不得入而秦竒兵二萬五千人絶趙軍後又一軍五千騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶自之河内賜民爵各一級𤼵年十五以上悉詣長平遮絶趙救及糧食至九月趙卒不得食四十六日皆内隂相殺食来攻秦壘欲出為四隊四五復之不能出趙括出鋭卒自摶戰秦軍射殺括括軍敗卒四十萬人降起計曰前秦已㧞上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挟詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震四十八年十月秦復定上黨郡秦分軍為二王齕攻皮牢㧞之司馬梗定太原韓趙恐使蘓代厚幣説秦相范雎曰武安君擒馬服子乎曰然又曰即圍邯鄲乎曰然趙亾則秦王王矣武安君為三公武安君所為秦戰勝攻取者七十餘城南定鄢郢漢中北擒趙括之軍雖周召吕望之功不益於此矣今趙亾秦王王則武安君必為三公君能為之下乎雖無欲為之下固不得已矣秦甞攻韓圍邢丘困上黨上黨之民皆反為趙天下不樂為秦民之日久矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民亾㡬何人故不如因而割之無以為武安君功也於是雎言於秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之割韓垣雍趙六城以和正月皆罷兵起由是與應侯有隙昭王既息民繕兵復欲伐趙起曰不可王曰前年國虛民飢君不量百姓之力求益軍糧以滅趙今寡人息民以養士蓄積糧食三軍之俸有倍於前而曰不可其説何也起曰長平之事秦軍大尅趙軍大破秦人歡喜趙人畏懼秦民之死者厚𦵏傷者厚養勞者相饗飲食餔餽以靡其財趙人之死者不得收傷者不得療涕泣相哀勠力同憂耕田疾作以生其財今王𤼵軍雖倍其前臣料趙國守備亦以十倍矣趙自長平以来君臣憂懼早朝晏退卑辭重幣四面出嫁結親燕魏連好齊楚積慮并心備秦為務其國内實其交外成當今之時趙未可伐也王曰寡人既以興師矣九月乃使五大夫王陵將而伐趙是時起亦以病不任行四十九年正月陵攻邯郸少利秦益𤼵兵佐陵陵兵亡五校起病愈昭王欲使代陵将起曰邯郸實未易攻也且諸侯救日至彼諸侯怨秦之日久矣今秦雖破長平軍而秦卒死者過半國内空逺絶河山而爭人國都趙應其内諸侯攻其外破秦軍必矣固稱疾不行王乃使范雎徃見責之曰椘地方五千里持㦸百萬君前率數萬之衆入楚㧞鄢郢焚其廟東至竟陵椘人震恐東徙而不敢西向韓魏相率興兵甚衆君所将不能半之戰於伊闕大破二國之軍流血漂鹵斬首二十四萬韓魏以故至今稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八其國虛弱秦今大發軍人數倍於趙國之衆願使君将必欲滅之矣君甞以寡擊衆取勝如神况以強擊弱以衆擊寡乎起曰昔椘王恃其國大不恤其政而羣臣相妬以功諂諛用事良臣斥疎百姓心離城池不修既無良臣又無守備故起得引兵深入多倍城邑發梁焚舟以専民心掠於郊野以足軍食當此之時秦之士卒以軍中為家将帥為父母不約而親不謀而信一心同力死不旋踵椘人自戰其地咸顧其家各有𣪚心莫有闘志是以能有功也伊闕之戰韓孤顧魏不欲先用其衆魏恃韓之鋭欲推以為鋒二軍爭便之力不同是以臣得設疑兵以待韓陣専軍并鋭觸魏之不意魏軍既敗韓軍自潰乘勝逐北以是之故故能立功皆計利形勢自然之理何神之有哉今秦破趙軍於長平不遂以時乗其振懼而滅之畏而釋之使得耕稼以益畜積養孤長㓜以益其衆繕治兵甲以益其強增城浚地以益其固主折節以下其臣臣推體以下死士至於平原君之屬皆令妻妾補縫於行伍之間臣人一心上下同力猶句踐困於會稽之時也以今伐之趙必固守挑其軍戰必不肯出圍其國都必不可尅攻其列城必未可㧞掠其郊野必無所得兵出無功諸侯生心外救必至臣覩其害未見其利又病未能行應侯慙而退以言於王王曰微白起吾不能滅趙乎復益發軍更使王齕代王陵伐趙圍邯郸八九月死傷者衆而弗下趙王出輕鋭以㓂其後秦數不利起曰不聽臣計今果如何王聞之怒見起強起之曰君雖病強為寡人卧而将之有功無功寡人之願将加重於君如君不行寡人恨君起頓首曰臣之行雖無功得免於罪不行雖無罪不免於誅然惟願大王覽臣愚計釋趙養民以觀諸侯之變撫其恐懼伐其憍慢誅滅無道以令諸侯天下可定何必以趙為先乎此所謂為一臣屈而勝天下也大王若不察臣愚計必欲快心於趙以致臣罪此亦所謂勝一臣而為天下屈者也臣聞眀主愛其國忠臣愛其名破國不可復完死卒不可復生臣寜伏受重誅而死不忍為辱軍之将願大王察之王不答而去於是免起為士伍遷之隂宻起病未能行居三月諸侯攻秦軍急秦軍數却使者日至秦王乃使人遣起不得留咸陽中起既行出咸陽西門十里至杜郵昭王與范雎羣臣議曰白起之遷其意尚怏怏不服有餘言乃使使者賜之劒自裁起引劒将自剄曰我何罪于天而至此哉良久曰我固當死長平之戰趙卒降者數十萬人我詐而盡坑之是足以死遂自殺起之死也以昭王五十年十一月死而非其罪秦人憐之鄊邑皆祭祀焉蘇子曰予讀太史公白起傳秦之再攻邯郸也起與范雎有怨稱病不行以亡其軀慨然歎曰起以武夫無所屈信而困於㳺談之士使起勉強一行兵未必敗而免於死矣及覽戰國䇿觀起自陳成敗之蹟乃知邯郸法不可再攻而起非特以怨不行葢為之流涕也趙充國征西羗守便冝不肯奉詔出兵辛武賢雖兵出有功充國竟為漢宣眀其非是武賢怨之至骨雖不能害充國而卒陷其子卭嗚呼循道而不阿自古而難之歟王翦者頻陽東鄊人也少而好兵事秦始皇十一年翦将攻趙閼與破之㧞九城十八年翦将攻趙嵗餘遂㧞趙趙王降盡定趙地為郡眀年燕使荆軻為賊於秦秦王使翦攻燕燕王喜走遼東翦遂定燕薊而還秦使翦子賁擊荆荆兵敗還擊魏魏王降遂定魏地始皇既滅三晉走燕王而數破荆師秦将李信者年少壮勇甞以兵數千逐燕太子丹至於衍水中卒破得丹始皇以為賢勇於是始皇問信吾欲攻取荆於将軍度用㡬何人而足信曰不過用二十萬人始皇問王翦翦曰非六十萬人不可始皇曰王将軍老矣何怯也李将軍果勢壮勇其言是也遂使信及䝉恬将二十萬南伐荆翦言不用因謝病歸老於頻陽信攻平輿䝉恬攻寝大破荆軍信又攻鄢郢破之於是引兵而西與䝉恬會城父荆人因随之三日三夜不頓舎大破信軍入兩壁殺七都尉秦軍走始皇聞之大怒自馳如頻陽見謝翦曰寡人以不用将軍李信果辱秦軍今聞荆軍日進而西将軍雖病獨忍弃寡人乎翦謝曰老臣罷病悖亂惟大王更擇賢将始皇謝曰已矣将軍勿復言翦曰大王必不得已用臣非六十萬人不可始皇曰為聽将軍計耳於是翦将兵六十萬人始皇自送至㶚上翦行請美田宅園池甚衆始皇曰将軍行矣何憂貧乎翦曰為大王将有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑翦既至闗使使還請善田者五輩或曰将軍之乞貸亦已甚矣翦曰不然夫秦王怛而不信人今空秦國甲士而専委於我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣荆聞翦益軍而来乃悉國中兵以拒秦翦至堅壁而守之不肯戰荆兵數出挑戰終不出翦日休士洗沐而善飲食撫循之親與士卒同食久之使人問軍中戯乎對曰方投石超距於是翦曰士卒可用矣荆數挑戰而秦不出乃引而東翦因舉兵追之令壮士擊大破荆軍至蘄南殺其将軍項燕荆兵遂敗走秦因乗勝略定荆地城邑嵗餘虜荆王負芻竟平荆地為郡縣因南征百越之君而翦子賁與李信破定燕齊地始皇二十六年盡并天下王氏䝉氏功為多名施於後世二世之時翦及其子賁皆已死而又滅䝉氏陳勝之反秦秦使翦孫離擊趙圍趙王及張耳鉅鹿城或曰王離秦之名将也今将強秦之兵攻新造之趙舉之必矣客曰不然夫為将三世者必敗必敗者何也以其所殺伐多矣其後受其不祥今王離已三世将矣居無何項羽救趙擊秦軍果虜離離軍遂降諸侯行蘓子曰王翦與始皇議滅椘非六十萬不行予始疑其過及觀田單與趙奢論兵乃知老将之言不妄也趙以齊田單為相單語趙奢曰吾非不説将軍之兵法所不服者将軍之用衆也帝王之兵不過三萬而天下服矣今将軍必負十萬二十萬而後用之使民不得耕作糧食輓賃不可給也奢曰君非徒不達兵又不明時勢矣夫吴干之劒肉試則斷牛馬金試則截盤匜薄之柱上而擊之則絶為三質之石上而擊之則碎為百今以三萬之衆而應強國之兵是薄柱擊石之類也且夫劒之為用無脊之厚則鋒不入無脾之薄則刃不斷無釣䍐鐔䝉湏之便操其刃而刺則未入而手斷今君無十萬二十萬之衆以為釣䍐鐔䝉湏之便焉能以三萬行於天下乎古者四海萬國城大不過三百丈人雖多無過三千家則以三萬距之足矣今取古萬國分為戰國七兵能具數十萬食能支數嵗千丈之城萬家之邑相望也君奈何以三萬衆攻之田單喟然嘆息曰單未至也由此觀之攻千里之國毁百年之業不乗大隙非大衆不可彼决機兩陳之間為一日成敗之計乃可以少擊衆耳古史卷四十四
