body:
  text: 古史卷三十三宋蘇轍撰老子列傳第十老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽謚曰聃周守藏室之史也孔子適周問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬累而行吾聞之良賈深藏若虛君子盛徳容貌若愚去子之驕氣與多慾態色與滛志是皆無益於子之身吾所以告子者若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為㒺游者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍耶老子修道徳其學以自隠無名為務居周久之見周之衰乃去至闗闗令尹喜曰子将隠矣強為我著書於是老子乃著書上下篇言道徳之意五千餘言而去莫知所終或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時盖老子百六十有餘嵗或言二百餘嵗以其修道而飬夀也自孔子死後百一十九年而史記周太史儋見秦獻公曰始周與秦國合而别别五百嵗而復合合十七嵗而伯王者出焉或曰儋即老子或曰非也世莫知其然否老子之子名宗宗為魏将封於段干宗子注注子宫宫𤣥孫假仕漢孝文帝而假之子解為膠西王卭太𫝊因家于齊蘇子曰孔子以仁義教人而以禮樂治天下仁義禮樂之變無窮而其稱曰吾道一以貫之茍無以貫之則因變而行義必有支離而不合者矣易曰形而上者謂之道形而下者謂之器語曰君子上達小人下達而孔子自謂下學而上達者洒埽應對詩書禮樂皆所從學也而君子由是以達其道小人由是以得其器達其道故萬變而致一得其器故有守而不蕩此孔子之所以兩得之也盖孔子之為人也周故示人以器而晦其道使達者有見而未達者不眩也老子之自為也深故示人以道而略其器使達者易入而不恤其未達也要之其實皆志於道而所從施之有先後耳三代之後釋氏與孔老並行於世其所以異者體道愈逺而立於世之表指天下之所不見以示人而不憂其不悟曰要将有悟者其説又老氏之𦕈也老子八十一章予甞為之解其説如此列子者鄭人也名禦㓂與鄭繻公同時其學以黄帝老子為宗自言師壺丘子林而友伯昏無人列子窮居有饑色客有言之鄭子陽者曰列禦㓂盖有道之士也居君之國而窮君無乃為不好士乎鄭子陽即令官遺之粟列子出見使再拜而辭使者去列子入其妻望之拊心曰妾聞為有道者之妻子皆得佚樂今有饑色君過而遺先生食先生不受豈非命哉列子笑曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽列子書舊二十篇西漢劉向去重複存者八篇列子盖先荘子及荘子著書多取其言二子之道一也蘇子曰劉向論列子書穆王湯問迂誕恢詭非君子之言今觀穆王與化人㳺若清都紫微鈞天廣樂帝之所居而夏革所言四海之外天地之表無極無盡此固後世僊佛之常言理之當然而漢之儒者未聞焉耳孟子稱楊氏為我其害至於無君楊朱之説不見於世而列子時取之盖其所以為為我者必有聞於大道而失於偏故列子荘子時取其合者載焉若楊朱之篇以愛身故至於遺禮義毁名節無所復顧此則孟子所謂無君者矣雖列子亦無取焉耳列子之徒不知其師之詳以為朱之言不可棄而并録之過矣荘子蒙人也名周甞為蒙漆園吏與梁惠王齊宣王同時其學無所不闚然其要歸於老子著書十萬餘言大抵率寓言也畏累虛亢桑子之徒皆空語無事實楚威王聞其賢使使厚幣迎之許以為相荘周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎飬食之數嵗衣之以文繡以入大廟當是時雖欲為孤豚豈可得乎子亟去無汚我我寜㳺戯汙瀆之中自快無為有國者所覊終身不仕以快吾志焉蘇子曰吾聞之子闕兄子瞻曰太史公言荘子作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知荘子之粗者予以為荘子盖助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故荘子之言皆文予而實不予陽擠而隂助之其正言也盖無㡬至於詆訾孔子未甞不微見其意其論天下道術自墨翟禽滑氂彭蒙慎到田駢闗尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣予甞疑漁父盜跖則真若詆孔子者至於讓王説劔皆淺陋不入於道反復觀之得其寓言之終曰陽子居西㳺於秦遇老子老子曰而睢睢盱盱而誰與居大白若辱盛徳若不足陽子居蹙然變容其往也舍者将迎其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣去其讓王説劒漁父盜跖四篇以合於列禦㓂之篇曰列禦㓂之齊中道而反曰吾驚焉吾食於十漿而五漿先饋然後悟而笑曰是固一章也荘子之言未終而昧者勦之以入其説耳凡分章名篇皆出於世俗非荘子本意也申不害荆人也故鄭之賤臣學術以干韓昭侯昭侯用為相内修政教外應諸侯十五年終申子之身國治兵強無侵韓者申子之學主刑名而縁飾以黄老著書二篇號曰申子韓非者韓之諸公子也喜刑名法術之學而借老子以為説非為人口吃不能道説而善著書與李斯俱事孫卿斯自以為不如非非見韓之削弱數以書諫韓王韓王不能用於是韓非疾治國不務修明其法制執契以御其臣下富國強兵而以求人任賢反舉浮滛之蠧而加之功利之上以為儒者用文亂法而俠者以武犯禁寛則寵名譽之人急則用介胄之士所飬非所用所用非所飬悲亷直不容於邪枉之臣觀往者得失之變作孤憤五蠧内外儲説林説難十餘萬言然韓非知説之難為説難書甚具終死於秦不能自脱説難曰凡説之難非吾知之有以説之難也又非吾辯之難能明吾意之難也又非吾横失能盡之難也凡説之難在知所説之心可以吾説當之所説出於為名髙者也而説之以厚利則見下節而遇卑賤必棄逺矣所説出於厚利者也而説之以名髙則見無心而逺事情必不收矣所説實為厚利而顯為名髙者也而説之以名髙則陽收其身而實䟽之若説之以厚利則隂用其言而顯棄其身此之不可不知也夫事以密成而語以泄敗未必其身泄之也而語及其所匿之事如是者身危貴人有過端而説者明言善議以推其惡者則身危周澤未渥也而語極知説行而有功則徳亡説不行而有敗則見疑如是者身危夫貴人得計而欲自以為功説者與知焉則身危彼顯有所出事廼自以為也故説者知焉則身危強之以其所必不為止之以其所不能已者身危故曰與之論大人則以為間己與之論細人則以為鬻權論其所變則以為借資論其所憎則以為甞己徑省其辭則不知而屈之汎濫博文則多而久之順事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此説之難不可不知也凡説之務在知飾所説之所敬而滅其所醜彼自知其計則無以其失窮之自勇其斷則無以其敵怒之自多其力則無以其難概之規異事與同計譽異人與同行者則以飾之無傷也有與同失者則明飾其無失也大忠無所拂辭悟言無所擊排廼後申其辯知焉此所以親近不疑知盡之難也得曠日彌久而周澤既渥深計而不疑交爭而不罪廼明計利害以致其功直指是非以飾其身以此相持此説之成也伊尹為庖百里奚為虜皆所由干其上也故此二子者皆聖人也猶不能無役身而渉世如此其汙也則非能仕之所設也宋有富人天雨墻壞其子曰不築且有盜其鄰人之父亦云暮而果大亡其財其家甚知其子而疑鄰人之父昔者鄭武公欲伐胡廼以其子妻之因問羣臣曰吾欲用兵誰可伐者闗其思曰胡可伐廼戮闗其思曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已而不備鄭鄭人襲胡取之此二説者其知皆當矣然而甚者為戮薄者見疑非知之難也處知則難矣昔者彌子瑕見愛於衛君衛國之法竊駕君車者罪至刖既而彌子之母病人聞往夜告之彌子矯駕君車而出君聞之而賢之曰孝哉為母之故而犯刖罪與君逰果園彌子食桃而甘不盡而奉君君曰愛我哉忘其口而念我及彌子色衰而愛弛得罪於君君曰是甞矯駕吾車又甞食我以其餘桃故彌子之行未變於初也前見賢而後獲罪愛憎之變至也故有愛於主則知當而加親見憎於主則罪當而加䟽故諫説之士不可不察愛憎之主而後説之矣夫龍之為蟲也可擾狎而騎也然其喉下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗説之者能無嬰人主之逆鱗則㡬矣人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之㳺死不恨矣李斯曰此韓非所著書也秦因急攻韓韓王始不用非及急乃遣非使秦非上書秦王勸秦釋韓攻趙秦王下其書李斯斯言其不便因自請使韓割地以事秦是時燕趙楚越為一将以攻秦秦王使姚賈以車百乘金千斤㳺於四國以絶其謀賈還報秦王封賈千户以為上卿非見秦王言四國之交未必合也而珍珠重寳盡於内且賈梁監門子甞盜於梁逐於趙今與之同知社稷之計非所以厲羣臣也故李斯姚賈害之毁之曰非韓之諸公子今王欲并諸侯非終為韓不為秦此人之情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使自殺非欲自陳不見秦王後悔使人赦之非已死蘇子曰商鞅以法治秦而申不害以術治韓憲令著於官府刑罰必於民心賞存乎慎法罰加乎奸令所謂法也因任而授官循名而責實操生殺之柄課羣臣之能所謂術也法者臣之所師而術者君之所執也及韓非之學並取申商而兼用法術法之所止雖有聖智不用也術之所操雖有父子不信也使人君據法術之自然而無所復為此申韓所謂老子之道而實非也彼申商各行其説耳然秦韓之治行於一時而其害見於久逺使非不幸獲用於世其害将有不可勝言者矣太史公悲韓非知説之難而卒以説死故載其説難於篇然古之君子循理而言言之利害不存乎心故言出而必合雖有不合要已無愧於中矣豈復立法而求其必售耶今非先立法而後説人既已不知説矣而況非之所以説秦盖求禍之道乎太史公以李陵之事不合於漢武終身廢辱是以深悲之歟古史卷三十三
