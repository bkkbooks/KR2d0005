body:
  text: 古史卷四十三宋蘇轍撰穣侯列傳第二十穰侯魏冉者秦昭王母宣太后弟也其先楚人秦武王卒無子立其弟為昭王武王母號恵文后先武王死昭王母故號芉八子及昭王即位號為宣太后宣太后二弟其異父長弟魏冉同父弟曰芈戎為華陽君而昭王同母弟曰髙陵君涇陽君而冉最賢自恵王時任職用事武王卒諸弟爭立唯冉力為能立昭王昭王即位以冉為将軍衛咸陽誅季君之亂而逐武王后出之魏昭王諸兄弟不善者皆滅之威振秦國昭王少宣太后自治任冉為政昭王七年樗里子死而使涇陽君質於齊趙人樓緩来相秦趙不利乃使仇液之秦請以冉為秦相仇液将行其客宋公謂液曰秦不聼公樓緩必怨公公不若謂樓緩曰請為公毋急秦秦王見趙請相魏冉之不急且不聼公公言而事不成以徳樓子事成魏冉固徳公矣於是仇液從之而秦果免樓緩而冉相秦欲誅吕禮禮出奔齊昭王十四年冉舉白起使代向夀将而攻韓魏敗之伊闕斬首二十四萬虜魏将公孫喜眀年又取楚之宛葉冉謝病免相以客卿夀燭為相其眀年燭免復相冉乃封冉於穣復益封陶號曰穰侯封四嵗為秦将攻魏魏献河東方四百里㧞魏之河内取城大小六十餘昭王十九年秦稱西帝齊稱東帝月餘吕禮来而齊秦各復歸帝為王冉復相秦六嵗而免免二嵗復相秦四嵗而使白起㧞楚之郢置南郡乃封起為武安君起冉之所任舉也相善於是穣侯之富富於王室三十二年冉為相國将兵攻魏走芒夘入北宅遂圍大梁梁大夫湏賈説冉曰臣聞魏之長吏謂魏王曰昔梁恵王伐趙戰勝三梁㧞邯郸趙氏不割而邯郸復歸齊人攻衛㧞故國殺子良衛人不割而故地復反衛趙之所以國全兵勁而地不并於諸侯者以其能忍難而重出地也宋中山數伐割地而國随以亡臣以為衛趙可法而宋中山可為戒也秦貪戾之國也而母親蠶食魏氏又盡晉國戰勝暴子割八縣地未畢入兵復出矣夫秦何厭之有哉今又走芒夘入北宅此非敢攻梁也且刦王以求多割地王必勿聼也今王背楚趙而講秦楚趙怒而去王與王爭事秦秦必受之秦挟楚趙之兵以復攻梁則國求無亡不可得也願王之必無講也王若欲講少割而有質不然必見欺此臣之所聞於魏也願君之以是慮事也周書曰惟命不于常此言幸之不可數也夫戰勝暴子割八縣此非兵力之精也又非計之工也天幸為多矣今又走芒夘入北宅以攻大梁是以天幸自為常也智者不然臣聞魏氏悉其百縣勝甲以上戍大梁臣以為不下三十萬以三十萬之衆守梁七仞之城臣以為湯武復生不易攻也夫輕背楚趙之兵陵七仞之城戰三十萬之衆而志必舉之臣以為自天地始分以至於今未嘗有者也攻而不㧞秦兵必罷陶邑必亡則前功必棄矣今魏氏方疑可以少割收也願君逮楚趙之兵未至於梁亟以少割收魏魏方疑而得以少割為利必欲之則君得所欲矣楚趙怒於魏之先己也必争事秦徔以此𣪚而君後擇焉且君之得地豈必以兵哉割晉國秦兵不攻而魏必効絳安邑又為陶闗兩道㡬盡故宋衛必効單父秦兵可全而君制之何索而不得何為而不成願君熟慮之而無行危冉曰善乃罷梁圍眀年魏背秦與齊從親秦使冉伐魏斬首四萬走魏將暴鳶得魏三縣冉益封客卿竈謂冉曰竈一本作造秦封君以陶藉君天下數年矣攻齊之事成陶為萬乗長小國率以朝天子天下必聼五伯之事也攻齊不成陶為隣恤而莫之據也故攻齊之於陶也存亡之機也君欲成之何不使人謂燕相國曰聖人不能為時時至而弗失舜雖賢不遇堯也不得為天子湯武雖賢不當桀紂不王故以舜湯武之賢不遭時不得帝王今攻齊此君之大時也已因天下之力伐讎國之齊報恵王之恥成昭王之功除萬世之害此燕之長利而君之大名也詩云樹徳莫如滋除害莫如盡吳不亡越越故亾吳齊不亡燕燕故亾齊齊亡於燕吴亾於越此除疾不盡也非以此時成君之功除君之害秦卒有他事而從齊齊趙合其讎君必深矣挟君之讎以誅於燕後雖悔之不可得也已君悉燕兵而疾僣之天下之從君也若報父子之仇誠能亡齊封君於河南為萬乗達途於中國南與陶為隣世世無患願君之専志於攻齊而無他慮也眀年冉與白起客卿胡陽復攻趙韓魏破芒夘於華陽下斬首十萬取魏之卷蔡陽長社趙氏觀津且與趙觀津益趙以兵伐齊齊㐮王懼使蘇代為齊隂遺冉書曰臣聞徃来者言曰秦将益趙甲四萬以伐齊臣竊必之弊邑之王曰秦王眀而熟於計穣侯智而習於事必不益趙甲四萬以伐齊是何也夫三晉之相與也秦之深讎也百相背也百相欺也不為不信不為無行今破齊以肥趙趙秦之深讎不利於秦此一也秦之謀者必曰破齊弊晉楚而後制晉楚之勝夫齊罷國也以天下攻齊如以千鈞之弩决潰癕也必死安能弊晉楚此二也秦少出兵則晉楚不信也多出兵則晉楚為制於秦齊恐不走秦必走晉楚此三也秦割齊以啖晉楚晉楚案之以兵秦反受敵此四也是晉楚以秦謀齊以齊謀秦也何晉楚之智而秦齊之愚此五也故得安邑以善事之亦必無患矣秦有安邑韓氏必無上黨矣取天下之腸胃與出兵而懼其不反也孰利臣故曰秦王眀而熟於計穣侯智而習於事必不益趙甲四萬以伐齊矣冉於是引兵而歸三十六年冉言客卿竈欲伐齊取剛夀以廣其陶邑於是魏人范雎自謂張祿先生譏冉之伐齊乃越三晉以攻齊也以此奸説昭王昭王納之雎因言宣太后専制穣侯擅權於諸侯涇陽君髙陵君之屬汰侈富於王室於是昭王悟乃免冉相令涇陽之屬皆出闗就封邑冉出闗輜車千乗有餘已而卒於陶因葬焉秦復收陶為郡蘓子曰秦誅商君逐穣侯君臣皆失之矣彼二子者知得而不知喪雖智能伯秦而不能免其身葢無足言者而恵王以怨誅鞅至誣以畔逆昭王以偪遷冉至出老母逐弱弟而不顧甚矣其少恩也彼公子䖍方欲報怨固不暇為國慮矣而范雎将毁人以自成而至於是可畏也哉古史卷四十三
