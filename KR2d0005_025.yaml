body:
  text: 古史卷二十五宋蘇轍撰管晏列傳第二管夷吾仲者潁上人也少時嘗與鮑叔牙遊鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為齊侯公子糾死管仲囚鮑叔遂進管仲管仲既用任政於齊桓公以霸九合諸侯一匡天下管仲之謀也管仲曰始吾困時嘗與鮑叔賈分財利多自豫鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無耻知我不羞小節而耻功名不顯於天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世嘗為名大夫天下不多管仲之賢而多鮑叔能知人也管仲以區區之齊在海濵通貨積財冨國强兵故其稱曰倉廩實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令如流水之源俗之所欲因而豫之俗之所否因而去之令順民心故論卑而易行刑賞必當不以其私故奪伯氏駢邑三百飯蔬食沒齒無怨言其於諸侯抑强暴扶寡弱來之以禮服之以義不以力勝不求茍得是以諸侯順服無與爭者狄滅邢衛言於桓公與諸侯救而封之寧母之會復言於公修禮於諸侯諸侯官受方物鄭子華將以鄭為內臣却而不受於是鄭伯從之乞盟此其所以霸也管仲封於小榖魯莊公德之為築其城嘗聘於周王以上卿之禮饗之管仲辭曰有天子之二守國高在若節春秋來承王事何辱命焉卒受下卿之禮而還然管仲家冨侈擬於公室塞門反坫三歸官事不攝而桓公亦上僣王室內嬖如夫人者六人終以此敗故孔子譏其不知禮管仲既沒齊國因其遺業常强於諸侯至戰國之際諸子著書因管子之說而益增之其廢情任法逺於仁義者多申韓之言非管子之正也至其甚者言治國則以智欺其民言治外則以術傾鄰國於是有不訾之寶石璧菁茅之謀使管仲而信然則天下亦將以欺奪報之尚何以霸哉管仲之後於齊無聞有管修者事楚為賢大夫白公之亂死焉史記稱管仲善因禍為福轉敗為功桓公實怒少姬南襲蔡管仲因而伐楚責包茅之不入桓公實比伐山戎管仲因而令燕修召公之政於柯之會桓公欲背曹沫之盟管仲因而信之諸侯由是歸齊今考之此二說皆非也桓公二十九年會諸候于陽榖為鄭謀楚是嵗有蕩舟之事故明年伐楚因遂侵蔡蔡在楚之北故春秋先書侵蔡其實本為伐楚動也山戎病燕故桓公為燕伐之非不義也亦何待令燕修召公之政而後可哉如曹沫之事蓋出於戰國之雜說公羊不推本末而信之太史公又以為然今㓨客傳論之備矣皆不可信故不取也蘇子曰孔子稱管仲相桓公九合諸侯不以兵車民到于今受其賜以仁許之至於子路稱其果而已曰仁則吾不知也然孟子以為子路曽子之所畏而管仲曽西之所不為何哉夫管仲之所以為其國者至矣然其所以不若三代者蓋求而後得之非其有餘而自及之也孟子有言居下位不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗恱弗信於友矣恱親有道反身不誠弗恱於親矣故人必先自信自信之餘而後親信之親信之餘而後友信之友信之餘而後君信之君信之餘而後能治民皆以其有餘及之未有不能誠身而能治民者也雖或能之民之報之也必粗夫子路自其誠身而為之矣而其功未足以及民管仲其功足以及民矣而其身未嘗自信也故三歸反坫子路之所不為而九合諸侯子路之所不能也由子路之道惟其不成成則堯舜是也由管仲之道止於是而已矣此孔子之所以取之而孟子之所以不豫也晏平仲嬰者齊之世家也父曰晏桓子桓子卒嬰粗衰斬草絰帶杖菅屨食粥居倚廬寢苫枕草其老非之曰此非大夫之禮也嬰曰惟卿為大夫不自直也晏子蓋事齊靈公莊公景公三世以節儉力行重於齊食不重肉妾不衣帛祀其先人豚肩不掩豆世以為陋而晏子行之自若莊公之納欒盈晏子諌不從莊公卒以是死方其難作崔杼閉門齊人莫敢至者晏子獨立於其門其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死焉歸君民者豈以陵民社稷是主臣君者豈以其口食社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭三踊而出人謂崔杼必殺之杼不敢曰此民之望也於是崔杼慶封盟國人於太宫曰所不豫崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷是豫有如上帝乃歃崔慶既滅欒髙方執齊柄以邶殿之邑六十豫晏子晏子辭弗受吳季札聘於齊見晏子說之告之曰齊國之政將有所歸未獲所歸難未歇也子速納邑與政乃免於難是時陳氏隂收齊民季子與晏子知之晏子嘗以事適晉晉叔向問齊故晏子曰此季世也齊其為陳氏矣其後陳桓子卒滅欒髙專齊之政子孫代有齊國晏子雖以行義顯齊然不得任其國政蓋從容風議時有所匡救焉晏子之宅近市景公欲為更之晏子曰先臣容焉臣不足以嗣之於臣侈矣抑小人近市朝夕得所求焉公曰子近市識貴賤乎對曰識之公曰何貴何賤於是景公繁於刑有鬻踊者對曰踊貴屨賤景公愀然為之省刑及其適晉公遂更其室還使宅人反之曰匪宅是卜惟鄰是卜二三子先擇鄰矣其可違乎公不得已從之公有疾梁丘據言於公請誅祝史公以問晏子晏子曰日宋之盟屈建問范會之德於趙武武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧建以語康王王曰神人無怨冝夫子之光輔五君以為諸侯主也公曰子稱是語何故對曰有德之君上下無怨動無違事其祝史薦信而無愧心鬼神用享國受其福祝史與焉其所以蕃祉老壽者為信君使也其適遇淫君外內頗邪上下怨疾神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虗以求媚是以鬼神不享國受其禍祝史與焉其所以夭昏孤疾者為暴君使也今山林之木虞衡守之澤之􅍉蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫强易其賄布常無蓻徴斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君欲誅於祝史修德而後可公說使有司寬政薄斂而疾有間遂田于沛晏子侍于遄臺梁丘據在焉公曰惟據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰和如和羮水火醯醢鹽梅以亨魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心詩曰亦有和羮既戒既平鬷假無言時靡有爭先王之齊五味和五聲以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁大小短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聼之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逄伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也其後復從容為公言陳氏將代齊公信之而不能用其言之不回類如此越石父賢在縲紲之中晏子出遭之解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然謝之曰嬰雖不仁免子於厄何子求絶之速也石父曰吾聞君子屈於不知己而信於知己方吾在縲紲中彼不知我也夫子既已感寤而贖我是知己知己而無禮固不如在縲紲之中於是晏子延入為上客晏子出其御之妻窺之其夫擁大蓋䇿駟馬意氣揚揚甚自得也既歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去也它日夫自抑損晏子怪而問之御以實對晏子薦以為大夫晏子死陳乞逐髙國晏子之子圉奔魯蘇子曰管子以桓公伯然其家淫侈不能身蹈禮義晏子之為人勇於義篤於禮管子蓋有愧焉然晏子事靈莊景公皆庸君功業不足道使晏子而得君如管仲之於桓公其所成就當與鄭子産比耳至於糾合諸侯攘却戎狄未必能若管子也唐姚元崇宋璟皆中興賢相然元崇好權利事武后立於羣枉之中未嘗有一言犯之及事明皇帝時亦有所縱弛太廟棟毁巡遊東都以為無害至於宋璟介潔特立於武后世排斥權幸身危者數矣其於明皇帝亦未嘗有取容之言故世嘗以元崇比管仲璟比晏子或庶幾焉古史卷二十五
