body:
  text: 古史卷三十宋蘇轍撰鄭子産列傳第七鄭子産名僑鄭穆公之孫公子發之子也發之字曰子國故曰國僑子國亦鄭之良大夫也與子駟子展同事成公僖公為三卿晋楚之兵無嵗不至於鄭鄭人不知所從簡公元年子産尚少子國子耳侵蔡獲蔡公子爕國人皆喜惟子産不順曰小國無文德而有武功禍莫大焉晋楚争鄭必自是始不四五年不能安也三年尉止怨子駟聚羣不逞攻而殺之并及子國子耳子西聞盜不儆而出尸而攻盜盜入扵北宫臣妾多逃器用多䘮子産聞盜為門者庀羣司閉府庫完守備成列而後出兵車十七乗尸而攻盜國人助之盜衆盡死旣而子孔當國為載書使諸司聼命扵己衆弗順將誅之子産止之請為之焚書子孔曰爲書以定國衆怒而焚之是衆為政也子産曰衆怒難犯專欲難成子必從之不然必亂乃焚書扵倉門之外衆乃定盖子産一出而國人知其賢矣簡公十二年子孔得罪死子産為卿大夫良霄侈而愎公孫黒富而陵上有争而未決大夫相與盟之矣國人憂之其賢者禆諶鬷蔑相與言曰雖盟禍未歇也必三年而後紓蔑曰政將焉徃諶曰善之代不善天命也其焉避子産天禍鄭乆矣其必使子産息之眀年黒攻良霄殺之大夫皆不安其上卿子皮以政授子産子産辭曰國小而偪族大寵多不可為也子皮曰虎帥以聽誰敢犯子國無小小能事大國乃寛子産許之是時簡公之十八年也子産為鄭内恊和大臣外敬事諸侯選賢以任事立法以齊衆行之二十二年定公八年而卒鄭人安之諸侯敬之復以政授子太叔鄭以無患者乆之盖子産之爲政慮逺而事詳凡其所施鮮不適理故無後害其稱曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔使國人都鄙有章上下有服田有封洫廬井有伍行之一年而民謗之三年而民誦之子皮如晋葬平公將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行㡬千人而國不亡子皮不從旣葬將以幣見新君晋人辭之盡幣而歸乃歎曰欲敗度縱敗禮夫子知度與禮矣我實縱欲而不能克也平丘之會子産與子太叔從君子産以幄幕九張行子太叔以四十旣而悔之每舎損焉先會一日子産命外僕速張扵除太叔止之請待明日徃則無所張矣堵女父爲亂死堵狗娶於晋范氏懼其挾范氏以報也奪狗之妻而歸之晋晋以州田賜公孫段子産如晋為其子施歸田韓宣子辭子産曰縱子為政而可後之人若屬有封疆之言弊邑獲戾而豐氏受其大討敢固以請晋人受之凡政無大小其慮之必預而處之必審類如此矣然鄭之賢者無一不用馮簡子能斷大事子太叔美秀而文公孫揮能知四國之爲而辯於其大夫之族姓班位貴賤能否又善為辭令禆諶能謀謀於野則獲扵邑則否鄭國將有諸侯之事子産乃問四國之爲扵子羽且使多為辭令與禆諶乗以適野使謀可否而告馮簡子使斷之事成乃授子太叔行之以應對賔客是以鮮有敗事其要皆主扵禮而加之以敬凡鄭伯將適楚必以告扵晋適晋必以告扵楚旣朝而反又使大夫聘焉以謝不敏其應接諸侯亦無所不盡禮衛北宫文子相衛侯以如楚過鄭印段勞于棐林如聘禮而以勞辭文子入聘子羽爲行人馮簡子與子太叔逆客文子言扵衛侯曰鄭有禮數世之福也然義之所在雖大國有不懼者矣鄭伯適晋晋以魯喪未之見也子産壊其館之垣以納車馬晋人來譲子産對曰諸侯舎扵𨽻人門不容車若不壊是無所容幣以重罪也請修垣而行趙文子愧焉乃築諸侯之館楚公子圍將娶于公孫段氏國人畏其詐而襲鄭也子産使行人揮辭焉乃館于外旣而將以衆逆復使揮言其情楚人知其有備乃請垂櫜而入平丘之盟子産争承曰鄭男也而公侯之貢懼弗給也自日中而争至昏晋人許之韓宣子來聘求賈人之玉子太叔子羽皆欲予之子産曰大國之求無禮以斥之吾且為鄙邑矣卒不予鄭大火子産授兵登陴子太叔曰晋將以為討子産曰小國忘守則危況有災乎晉人來譲子産辭焉亦止駟偃卒其子絲晋大夫之甥也以弱故弗立父兄立瑕晋人來問其故大夫憂之子産弗謀而對曰天實剥亂駟氏其孤幼弱父兄私謀而立長親寡君弗敢知其誰實知之若鄭之二三臣而晋大夫專制其位是晋縣鄙也何國之爲晋人舎之故雖晋楚之强不敢加之至扵父兄率常厚之以恩使無怨焉以興亂子晳攻伯有逐之子産與之盟而撫之伯有死子産枕其股而哭之歛其死者而殯之駟氏將攻之子皮怒曰殺有禮必有禍乃止公孫段貪而無耻子産有事賂以其邑子太叔曰若四國何子産曰非相違也而相從也四國何爲鄭書曰安定國家必大焉先姑先安定以待其所歸可也旣伯石懼而歸邑子晳與子南争室子晳櫜甲而見子南子南擊之傷大夫謀之子産曰直鈞幼賤有罪遂行子南然亦時其有罪而致討焉豐卷將祭請田勿許曰惟君用鮮衆給而已卷怒退而徴役子産奔晉子皮止之歸而逐卷公孫黒將作亂傷疾作而不果子産在鄙乗傳而歸數其三罪而戮之尸諸周氏之衢故諸大夫畏而愛之子産旣治鄭名髙於諸侯其爲人博識而有辭凡其所言諸侯紀之晋范宣子爲政諸侯之幣重子産以書責之宣子爲之輕幣鄭入陳子産獻㨗扵晋戎服將命晋人詰之不屈趙文子曰其辭順犯順不祥乃受之晋平公有疾卜之曰實沉臺駘爲崇史不能知又夢黄能入扵寢門亦莫知也問之子産子産推言其實晋人貴之子産善因事而行義寛猛無常曲直無固惟義所在鄭人游扵鄉校以論執政然明謂子産盍毁鄉校子産曰其所善者吾行之其所惡者吾改之是吾師也若之何毁之其扵聽言如恐不及也然孔張失位晋客笑之富子諌曰國無禮何以求榮孔張之陋吾子之耻也子産怒曰邢辟之人而皆及執政是先王無刑罰也子寧以它規我有星孛于大辰其占在鄭禆竈曰若我用瓘斝玉瓉鄭將不火子産不子旣火又曰不用吾言鄭又將火鄭人請用之子太叔曰若有火國幾亡子何愛焉子産曰天道逺人道邇竈焉知天道卒不予亦不復火鄭大水龍鬬于時門之外國人請禜之子産曰我鬬龍不我覿也龍闘我獨何覿焉禳之則彼其宫也吾無求於龍龍亦無求扵我乃止子産之不惑扵禨祥至矣然或夢伯有介而行言將殺帶與段旣而皆信則爲之立良止以撫之而并立公孫洩以為說君子之為政本之以人情盡之以物理人情物理之所及雖鬼神幽冥之際無不爲也子産扵此盖得之矣實沉臺駘晋星也晋之所當祀也黄能鯀也鯀爲夏郊三代祀之晋為盟主亦所當祀也至於伯有鄭之世大夫也死而爲孽爲之立後而止固其理也若夫星孛于大辰而欲用瓘斝玊瓉龍鬬於時門從而禜之此巫祝之事未見理之當然者固君子之所不許也凡子産所爲無不曲當者惟作丘甲渾罕譏之而鄭卒先衛亡鑄刑書叔向譏之而子産之後鄭細日甚簡公之三十五年晋趙武死公如晋吊趙氏辭焉及雍而復魯季友如陳葬原仲大夫越國而送𦵏春秋譏之鄭以人君而吊隣國之大夫此非知禮者之所爲使晋以為口實而責其餘鄭必有不能堪者而子産行之何哉蘇子曰子産爲鄭不以禮法假人凛乎其不可犯之將死戒子太叔曰我死子必爲政惟有德者能以寛服人其次莫如猛火烈人望而畏之則鮮死水弱人狎而翫之則多死故寛難子太叔爲政不忍猛鄭國多盗然後悔之由此言之子産豈徒寛惠者哉然孔子之稱子産曰惠人又以爲古之遺愛儒者由此意之故孟子言子産以乗輿濟人於溱洧以爲惠而不知爲政甚者又曰子産猶衆人之母能食之而不能教也此皆非子産之實盖惠而愛人無禮法以將之則有所不行若子産則以禮法行惠者也孔子之說云爾古史卷三十
