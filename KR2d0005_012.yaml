body:
  text: 古史卷十二宋蘇轍撰蔡叔曹叔世家第五蔡叔度者周武王之弟也武王同母兄弟十人武王既克殷紂平天下封昆弟而伯邑考前卒無後於是封叔鮮於管封叔度於蔡二人相紂子武庚祿父治殷遺民封叔旦於魯相周為周公封叔振鐸於曹封叔武於成封叔處於霍康叔封冉季載皆少未得封武王崩成王少周公位冡宰正百工羣叔流言疑周公不利成王管叔蔡叔挾武庚以作亂周公伐誅武庚殺管叔放蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒而以殷故地封康叔為衛君封季載于冉康叔冉李皆有馴行故周公以康叔為周司冦冉季為周司空以佐成王皆有令名於天下蔡叔度既遷死其子胡率德改行周公以為己卿士言於成王復封之蔡以奉蔡叔之祀是為蔡仲蔡仲卒子蔡伯荒立蔡伯荒卒子宫侯立宫侯卒子厲侯立厲侯卒子武侯立武侯之出周厲王失國奔彘諸侯多叛周武侯卒子夷侯立夷侯十一年周宣王立二十八年夷侯卒子釐侯所事立釐侯三十九年周室東徙四十八年釐侯卒子共侯興立二年共侯卒子戴侯立十年戴侯卒子宣侯考父立宣侯二十八年魯隱公初立三十五年宣侯卒子桓侯封人立五年公會鄭伯于鄧以謀楚楚於是始大八年師及衛人從王伐鄭鄭敗我及衛射王中肩九年殺陳他而立陳厲公二十年桓侯卒國人召桓侯之弟獻舞于陳而立之是為哀侯哀侯與息侯皆娶于陳息媯過蔡哀侯不為禮息侯怒謂楚子伐我我求救於蔡而伐之楚子從之十一年楚敗我師于莘以哀侯歸哀侯怨息侯繩息媯以語楚子楚子滅息而納息媯生堵敖及成王不言十五年楚子為息媯故伐我以説哀侯留楚九年二十年卒蔡人立其子肹是為穆侯穆侯女弟為齊桓夫人十八年齊侯與蔡姬乘舟于囿蕩公公懼禁之不止怒而歸之蔡人嫁之十九年齊侯以諸侯侵蔡蔡潰遂伐楚二十一年諸侯伐鄭楚子圍許以救鄭冬公以許僖公見楚子於武城許男面縛銜璧大夫衰絰士輿櫬楚子禮而復之二十九年穆侯卒子莊侯甲午立三十三年晉趙盾合諸侯于新城公不會三十四年晉卻缺帥師伐我為城下之盟而還莊侯卒子文侯申立二十年文侯卒子景侯固立三年楚公子嬰齊以諸侯之師侵魯及衛彭名御戎景公為左許靈公為右二公弱皆強冠之盟于蜀蔡許乘楚車故不列於會七年晉欒書侵我楚公子申以申息之師來救晉不戰而還九年晉欒書復侵我初文侯欲事晉曰先君與於踐土之盟畏楚不能行而卒楚人使蔡無常三十九年公子燮求從先君以利蔡國人殺之其弟履奔楚四十六年公孫歸生會晉趙武楚屈建及諸侯之大夫盟于宋四十七年以宋之盟故公朝于晉過鄭不敬鄭子産曰蔡君必不免初太子般娶于楚公通焉四十九年般弒景公而自立是為靈侯二年楚公子圍弒其君郟敖而自立十二年四月楚子誘靈侯殺之于申使公子棄疾帥師圍我十一月滅蔡執世子有以歸用之于岡山使棄疾為蔡公蔡滅之二年蔡之遺臣朝吳與觀從矯棄疾之命召楚亡公子比公子黑肱而納之楚靈王死棄疾殺比黑肱而自立復封陳蔡立隱太子有之子廬是為平侯十月葬靈公朝吳有寵於楚君費無極害之三年讒之蔡大夫大夫逐之奔鄭八年平侯卒子朱立侯朱元年三月葬平侯朱失位在卑魯叔孫婼聞之曰必不終平侯之弟曰東國費無極取貨焉謂蔡人曰朱不用命君王將立東國蔡人懼出朱而立東國是為悼侯朱訴于楚不克悼侯二年朝于楚六月卒于楚弟昭侯申立十年朝于楚為兩佩兩裘以其一獻昭王而已服其一楚令尹囊瓦欲之弗與止之三年獻之乃得歸及漢沉玉而誓曰余所有濟漢而南者有若大川遂如晉以子元與大夫之子為質而請伐楚十三年晉為我合諸侯於召陵以謀楚晉荀寅求貨弗得而止沈子不會晉命我伐之遂滅沈楚以沈故圍我昭侯以子乾與大夫之子為質於吳吳為我伐楚入郢二十五年春楚子以諸侯之師圍我蔡人男女辨以聽命使疆于江汝之間而還於是請遷于吳既而悔之二十六年吳泄庸來聘而稍納師師畢入殺公子駟以説乃遷于州來二十八年公將如吳諸大夫恐其復遷也公孫翩逐而射之入於家人而卒國人殺翩及公孫姓公孫霍而逐公孫辰子成侯朔立十三年楚滅陳十九年成侯卒子聲侯産立十五年聲侯卒子元侯立六年元侯卒子侯齊立四年楚惠王滅蔡蔡遂絶祀蘇子曰世俗之説曰舜囚堯不得其死禹逐舜終於蒼梧之野周公將篡成王二叔譏之乃免於亂彼以小人之情度君子之心亦何所不至哉今夫聖人雖與世同處而其中浩然與天地同量彼其食粟衣帛蓋有不得已耳而況與人爭利哉諸葛孔明受托昭烈以相孺子雖使取而代之蜀人安焉然君臣之義沒身不替孔明尚然而況於聖人乎彼小人何足以知之曹叔振鐸與成叔武霍叔處皆就封不得為王官叔振鐸卒子太伯脾立太伯卒子仲君平立仲君卒子宫伯侯立宫伯卒子孝伯雲立孝伯卒子夷伯喜立夷伯二十三年周厲王奔彘三十年夷伯卒弟幽伯強立幽伯九年弟蘇弒幽伯代立是為戴伯戴伯元年周宣王立三嵗矣三十年戴伯卒子惠伯兕立惠伯二十年周幽王為犬戎所殺三十六年惠伯卒子石甫立其弟武弒之代立是為繆公繆公三十年卒子桓公終生立桓公三十五年魯隱公立五十四年桓公有疾使世子射姑朝魯五十五年桓公卒子莊公射姑立三十一年莊公卒世子羈不能自立奔陳國人立赤是為僖公九年僖公卒子昭公班立九年昭公卒子共公襄立十六年晉公子重耳自齊來公不禮焉薄而觀其駢脅僖負羈之妻謂其夫曰吾觀晉公子其從者皆賢若反國必得志於諸侯得志必誅無禮子盍蚤自二乃具盤飱置璧以饋重耳受飱反璧十七年重耳自秦入晉二十一年晉侯來討執公以畀宋人令軍無入僖負羈之宫而免其族以報冬晉侯有疾共公之竪侯獳貨筮史使以曹為解曰齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也晉侯説歸共公三十五年共公卒子文公夀立二年公朝于魯六年夏復朝于魯冬齊侯伐我入郛討朝魯故十年宋武穆之族來奔請師以伐宋秋宋師圍我二十三年文公卒子宣公盧立十七年公會諸侯伐秦卒于師曹人使公子負芻守使公子欣時逆公之喪負芻殺其世子而自立是為成公冬葬宣公欣時將亡國人皆將從之負芻懼告罪且請焉欣時反而置其邑三年晉侯以諸侯來討執公歸于京師將見欣時而立之欣時逃奔宋曹人告于晉請歸公而反欣時晉侯許之欣時反成公歸二十二年衛石買孫蒯伐我取重丘訴之于晉二十三年夏晉人為我執石買孫蒯冬公會諸侯圍齊卒于師子武公滕立二十七年武公卒子平公須立四年平公卒子悼公午立九年公朝于宋宋人囚之國人立其弟野是為聲公年表作襄公悼公死于宋歸葬聲公五年平公弟通弒聲公代立是為隱公四年聲公弟靈弒隱公代立是為靖公四年靖公卒子伯陽立初國人有夢衆君子立於社宫謀亡曹曹叔振鐸請待公孫強許之旦求之曹無之戒其子曰我死爾聞公孫強為政必去之及伯陽即位好田弋曹鄙人公孫強獲白鴈獻之且言田弋之説因訪政事説之使為司城以聽政夢者之子乃行強言霸説於曹伯曹伯從之乃背晉而姦宋十四年宋人伐我築五邑於郊曰黍丘揖丘大城鐘邘晉人不救十五年宋公復伐我將還禇師子肥殿曹人詬之不行師待之宋公怒命反之執曹伯及司城強以歸殺之遂滅曹春秋之際其君子猶習於周之故其言大王之昭有大伯虞仲王季之穆有虢仲虢叔文王之昭有管蔡郕霍魯衛毛𣆀郜雍曹滕畢原鄷郇武王之穆有邘晉應韓周公之胤有凡蔣邢茅胙祭惟管叔以罪大無後大伯之後為吳叔度之後為蔡叔旦之後為魯叔封之後為衛叔振鐸之後為曹叔虞之後為晉今皆有世家虞仲五世為周章周章之弟亦曰虞仲武王封之夏虛其後為晉獻公所滅虢仲虢叔為文王卿士虢仲為西虢晉獻公所滅虢叔為東虢鄭所滅鄭莊公曰制巖邑也虢叔死焉則東虢國於虎牢也郕魯莊公八年降齊為附庸魯文公十二年郕伯奔魯霍為晉獻公所滅毛公事成王為三公在周有毛伯衛毛伯過毛得滕常與諸侯會朝後春秋七世齊所滅畢公髙事成王為三公其後畢萬入晉為魏原在周有原莊公原襄公原伯絞公子􅀈尋原伯魯原夀過韓宣王之世為諸侯伯詩人為作韓奕凡在周事厲王者作板之詩事幽王者作瞻卬召旻之詩邢嘗為狄所伐齊桓公帥諸侯城夷儀而遷之後為衛文公所滅祭在周有祭公謀父事穆王最賢惟聃季載為周司空郇侯為諸侯伯詩曰四國有王郇伯勞之與郜雍酆邘應蔣茅胙其後皆不見蘇子曰孟子有言王不待大而伯必有大國王者以德伯者以力以德服人凡有知者莫與之較以力服人力之所不勝則殆故湯以七十里文王以百里齊桓晉文皆因大國之資而後有成齊襄公楚靈王奮齊楚之力無德而求諸侯國未可亡而身死之曹伯陽宋王偃國小德劣而圖伯者之事身死而國隨以滅夫惟樂天者可以保天下畏天者可以保其國未能畏天而求樂天之功難哉古史卷十二
