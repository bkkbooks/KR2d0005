body:
  text: 古史卷六宋蘇轍撰秦本紀第六秦之先帝顓頊之裔孫曰女脩女脩織𤣥鳥隕卵女脩吞之生子大業大業取少典氏之子曰女華女華生大費佐禹平水土帝錫禹𤣥圭禹受曰非予能成亦大費為輔帝曰咨爾費賛禹功其錫爾皁游司馬貞曰游音旒謂皁色旌斾之旒也爾後嗣将大出乃妻之姚姓之玉女大費拜受佐舜調馴鳥獸是為栢翳賜姓嬴氏大費生二子一曰大亷實鳥俗氏二曰若木實費氏若木𤣥孫費昌去夏歸商為湯御以敗桀於鳴條子孫或在中國或在夷狄大亷𤣥孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂以為御而妻之中衍之後世以有功故嬴姓多顯遂為諸侯其𤣥孫曰中潏在商戎保西垂生蜚㢘蜚亷生惡来惡來多力蜚廉善走父子俱以材力事紂周武王之伐紂并殺惡来是時蜚廉為紂石棺北方還無所報死遂葬於霍太山蜚㢘復有子曰季勝其後有造父幸於周穆王封於趙城趙衰其後也惡来有子曰女防女防生旁臯旁臯生大几大几生大駱大駱生非子以造父之寵皆䝉趙城姓趙氏非子居犬丘好馬及畜善養息之犬丘人言之周孝王孝王召使主馬汧渭之間馬大蕃息欲以為大駱適嗣申侯之女為大駱妻生子成申侯言於孝王曰昔我先酈山之女為戎胥軒妻生子中潏以親故歸周保西垂西垂以其故和睦今我復予大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之孝王曰昔栢翳為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏祀號曰秦嬴亦不廢申女之子為駱適者以和西戎秦嬴生秦侯秦侯立十年卒子公伯立公伯三年卒子秦仲立秦仲三年周厲王無道諸侯多叛之西戎為亂㓕犬丘大駱之族秦仲好賢賢者歸之始有車馬侍御禮樂之好秦人所為賦車鄰也周宣王即位以秦仲為大夫誅西戎秦仲立二十三年為西戎所殺有子五人長曰莊公宣王乃召荘公昆弟與兵七千人使伐西戎破之立以為秦仲後并與其先大駱地犬丘為西垂大夫荘公居犬邱生三子長曰世父丗父曰戎殺我大父我非殺戎王則不敢入邑遂将擊戎譲其弟為太子是為㐮公荘公立四十四年卒子㐮公立襄公元年以女弟繆嬴為豐王妻二年戎圍世父犬丘虜之嵗餘復歸丗父七年周幽王以褒姒故廢太子宜臼而立伯服數欺諸侯諸侯叛之西戎犬戎與申侯攻幽王殺之驪山下襄公将兵救周戰甚力有功周以戎難故東徙雒邑襄公以兵送周平王平王封㐮公為諸侯賜之歧以西之地㐮公於是始國乃用騮駒黃牛羝羊各一祠白帝西畤十二年伐戎至歧卒子文公立文公元年居西垂官三年以兵七百人東獵四年至汧渭之會曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之吉即營邑之十年文公夢黃虵自天下屬地其口止於鄜衍以問史敦敦曰此上帝之徴君其祠之遂作鄜畤用三牲祭白帝十三年初有史以紀事民多化者十六年伐戎戎敗走遂收周餘民有之地至歧歧以東獻之周十九年得陳寳二十年初設三族之刑二十七年伐南山大梓豐大特四十八年太子卒賜謚竫公以其子為太子五十年文公卒葬西山竫公子立是為寧公寜公二年徙居平陽遣兵伐蕩社三年與亳戰亳王奔戎遂滅蕩社八年侵芮芮敗我芮伯先出在魏遂與周師圍魏執芮伯萬以歸将納之十二年伐蕩氏取之寜公生十年立立十二年卒葬西山生子三人魯姫生太子武公及徳公庶子出子寜公卒大庶長弗忌威壘三父廢太子而立出子出子生五嵗矣二年納芮伯萬於芮六年三父等殺出子而立故太子武公武公元年伐彭戲氏至華山下居平陽封宫三年討出子之亂誅三父等夷三族十年伐邽冀戎初縣之十一年初縣社鄭滅小虢十九年齊桓公始伯二十年武公卒葬雍平陽初以人從死死者六十六人有一子曰白不立封之平陽立弟徳公徳公元年初居雍城大鄭宫以三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯来朝二年初伏磔狗邑四門以禦蠱徳公生三十三嵗而立二年卒生子三人長子宣公中子成公少子穆公宣公立四年作宻畤祭青帝與晉戰河陽勝之十二年宣公卒子九人莫立立其弟成公成公元年梁伯芮伯来朝成公立四年卒子七人莫立立其弟穆公穆公任好元年自将伐茅津勝之四年取於晉晉獻公之女而太子申生之姊也五年晉獻公㓕虞執虞公與其大夫百里奚以媵穆姫百里奚亡秦走宛楚鄙人執之穆公聞其賢欲重贖之恐楚人不予乃以五羖羊皮贖之百里奚已七十餘矣穆公釋其囚與語國事謝曰亡國之臣何足以言政穆公曰虞君不用子故亡非子罪也固問語三日穆公大說授之國政號曰五羖大夫百里奚譲曰臣不及臣友蹇叔蹇叔賢而丗莫知臣嘗㳺困於齊乞食䬹人蹇叔收臣臣因欲事齊君無知蹇叔止臣臣得脱齊難遂之周王子頺好牛臣以養牛干之頺欲用臣蹇叔止臣臣復去得不誅臣事虞君蹇叔亦止臣臣知虞君不用臣而私利禄爵且留再用其言得脱一不用及虞君難以是知其賢於是穆公使人厚幣迎蹇叔以為上大夫晉獻公旣殺太子申生六年晉公子重耳奔狄夷吾奔梁梁近秦欲因穆姫以求入九年晉獻公卒驪姫子奚齊為後晉大夫里克殺之荀息立卓子克又殺之夷吾重賂秦以求入穆公許之以兵會齊師納夷吾於晉十年晉侯殺里克背内外之賂使丕鄭来聘且謝緩賂丕鄭里克之黨也言於穆公曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣穆公使泠至報問且召三子冀芮疑之遂殺丕鄭鄭子豹奔秦謂穆公曰晉侯背大主而忌小怨民弗與也伐之必出穆公曰失衆安能殺違罪誰能出君不許十三年晉饑乞糴於秦穆公問於公孫枝枝曰重施而報君将何求重施而不報其民必擕擕而討焉無衆必敗問於百里奚百里奚曰天災流行國家代有救災䘏鄰道也行道有福丕豹請伐之穆公曰其君是惡其民何罪乃輸粟於晉自雍及綘謂之汎舟之役十四年秦饑乞糴於晉晉人弗予十五年伐晉戰於韓原晉戎馬還濘而止穆公從之晉韓簡輅穆公将止之晉大夫慶鄭屢諫晉侯晉侯不聽慶鄭怒乃以救晉侯誤韓簡遂失穆公秦反獲晉侯以歸初穆公亡善馬岐下野人得而食之者三百人吏将法之公曰豈以畜産害人乎飲之酒而赦之及戰三百人者皆從以死救公故克穆姫聞晉侯将至以太子罃𢎞與女簡璧登臺而履薪使以免服衰絰逆且告曰若晉君朝以入則婢子夕以死夕以入則朝以死穆公與大夫謀舎諸靈䑓晉吕甥来盟改舘晉侯饋之七牢十一月歸晉侯而征河東十七年晉太子圉来質歸河東而以女妻之梁伯好土功旣城而弗處命曰新里秦人取之梁人相驚曰秦将襲我乃溝公宫民懼而潰秦遂取梁二十二年晉太子圉亡歸二十三年晉惠公卒太子圉立晉公子重耳自楚入秦穆公納女五人圉之妻與焉二十四年以兵納重耳於晉晉師軍於廬栁穆公使公子縶諭之乃退重耳入於晉殺子圉於髙梁秋周㐮王弟帶以狄伐王王出居鄭二十五年王使来告難穆公以兵助晉文公入㐮王殺王弟帶二十八年使小子憗以兵從晉文公敗楚於城濮三十年秦晉圍鄭鄭使燭之武言於穆公曰君何用亡鄭以陪鄰鄰之厚君之薄也穆公說與鄭人盟使把子逢孫楊孫戍鄭而歸晉師亦歸三十二年晉文公卒把子自鄭来告曰鄭人使我掌其北門潜師而来鄭可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師知所為鄭必知之公辭焉召孟明西乞白乙使出師蹇叔哭之曰孟子吾見師之出不見其入也公曰爾何知爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽必死是間吾收爾骨焉秦師過周北門左右免胄而下超乗者三百乗王孫滿觀之曰秦師輕而無禮必敗及滑鄭商人弦髙以乗韋先牛十二以君命犒師且使遽告於鄭鄭人使皇武子辭焉孟明曰鄭有備矣㓕滑而還滑晉之邉邑也晉先軫言於㐮公𤼵兵及姜戎敗秦師於殽獲其三帥文嬴請於晉侯而歸之穆公素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也乃作秦誓曰番番良士旅力旣愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易詞我皇多有之昧昧我思之蓋悔不用蹇叔也於是復任孟明以政三十五年孟明復伐晉敗於彭衙歸而穆公用之不替孟明增修國政重施於民晉趙衰言於諸大夫曰秦師又至必将辟之懼而增徳不可當也戎使由余於秦由余晉人亡入戎聞穆公賢故来觀之穆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣穆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治由余笑曰此乃中國所以亂也自上古皇帝作為禮樂法度身以先之僅乃小治及其後丗阻法度之威以督責於下下罷極則以仁義怨望於上上下交爭至於篡弑㓕宗皆以此類也夫戎狄不然上含淳徳以遇其下下懐忠信以事其上一國之政猶一身之治此真聖人之治也穆公退而問内史廖曰鄰國有聖人敵國之憂也今由余賢寡人患之廖曰戎君處辟匿未聞中國之聲也君試遺女樂以奪其志留由余莫遣以失其期戎君怪之必疑君臣有間乃可虜也穆公曰善因與由余曲席而坐傳噐而食問其地形兵勢盡察且令廖以女樂二八遺戎君戎君受而説之於是秦乃歸由余由余數諫不聽穆公因使人間要之由余遂去降秦穆公以客禮禮之問伐戎之形三十六年穆公復伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還三十七年穆公以由余計伐戎益國十二開地千里遂伯西戎是嵗楚穆王㓕江穆公為之降服出次不舉過數大夫諫公曰同盟㓕雖不能救敢不矜乎吾自懼也三十九年穆公卒葬雍從死者百七十七人子車氏之三子奄息仲行鍼虎皆在秦之良也秦人哀之為賦黃鳥之詩穆公子四十人太子罃代立是為康公晉㐮公之弟雍在秦㐮公卒太子少趙盾使先蔑士會逆雍於秦将立之康公元年以兵送雍至令狐趙盾畏逼更立太子而背秦反擊秦師秦師敗先蔑士㑹来奔二年伐晉取武城四年晉伐我取少梁我伐晉取北徴六年使西乞術聘魯始通東諸侯冬伐晉取覊馬晉趙盾帥師從我於河曲其将臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰問於士會士會知駢之謀曰趙有側室曰穿好勇而狂若以輕者肆焉其可秦軍掩晉上軍穿果追之趙盾不得已乃皆出戰交綏秦師夜遁㬰駢請追之穿又不可乃止晉人患我之用士會也七年使魏夀餘偽叛以誘士㑹康公為之出兵秦兵在河西魏人在河東使士會與魏人言魏人得士㑹譟而歸康公立十二年卒子共公稻立元年晉人将求成使趙穿侵崇曰秦急崇必救之可以求成秦不許二年伐晉圍焦四年共公卒子桓公立四年晉人白狄伐我二十三年與白狄伐晉二十五年秦晉為成㑹於令狐晉厲公先至桓公不肯渉河使史顆盟晉侯於河東晉使郤犫盟桓公于河西歸而背之召狄與楚欲道以伐晉二十七年晉侯以諸侯之師伐我我師敗績晉師濟涇至侯麗而還二十八年桓公卒子景公立景公五年晉悼公立晉復伯十三年景公使士雃乞師於楚将以伐晉楚令尹子囊畏晉不敢楚共王強為我出師秦師侵晉晉饑不能報十五年晉悼公伐鄭楚子囊乞師以救鄭鄭畏晉卒從晉盟秦庶長鮑庶長武伐晉敗晉師於櫟十六年庶長無地㑹楚子囊伐宋秦嬴歸於楚十八年晉荀偃及諸侯之大夫伐我濟涇至於棫林荀偃欲戰其将欒黶不順以下軍先歸晋師遂歸黶之弟鍼與士鞅馳秦師死之黶怒欲殺鞅鞅来奔二十八年秦晋為成使伯車如晉涖盟晋使韓起来盟三十年公弟鍼如晉修成以兵㑹楚侵呉及鄭鍼有寵於桓公有車千乗三十六年鍼懼選出奔晋景公立四十年卒子哀公立鍼歸自晋十四年楚平王為太子建取於秦至國費無極勸王取之使令尹子瑕来拜夫人三十年吴王闔閭伐楚入郢楚昭王亡奔隨其大夫申包胥来告急立於庭下而哭七日不絶聲勺飲不入口哀公哀之使子蒲子虎帥車五百乗以救楚大敗呉師呉師歸楚昭王復入郢哀公立三十六年卒太子蚤死謚為夷公立其子是為惠公惠公立十年卒子悼公立十四年卒子厲共公立厲共公二年蜀人来賂十六年塹河旁一作阿旁以兵二萬伐大荔取其王城二十一年初縣頻陽晋取武城二十四年晋亂殺知伯分其地與韓魏趙二十五年智開與邑人来奔三十三年伐義渠虜其王厲共公立三十四年卒子躁公立二年南鄭反十三年義渠伐我至渭南十四年躁公卒立其弟懷公懷公四年庶長鼂與大臣圍懷公懷公自殺懷公太子曰昭子蚤死大臣立昭子之子是為靈公靈公四年晋城少梁秦擊之十年城藉姑靈公卒子獻公不得立立靈公季父悼子是為簡公簡公昭子之弟而懷公子也簡公六年令吏初帶劒壍洛城重泉十五年卒子惠公立惠公十一年子出子生十三年代蜀取南鄭惠公卒出子立出子二年庶長改迎靈公之子獻公于河西而立之殺出子及其母沉之淵秦自懷公以来數易君君臣乖亂晋奪秦河西地獻公元年止從死二年城櫟陽四年正月庚寅子孝公生十六年桃冬花十八年雨金櫟陽二十一年與晋戰於石門斬首六萬天子賀以黼黻二十三年與魏晉戰少梁虜其将公孫痤二十四年獻公卒孝公立生二十一年矣是時河山以東強國六與齊威楚宣魏惠燕悼韓哀趙成侯並淮泗之間小國十餘楚魏與齊接界魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中周室微諸侯力爭相併秦辟在雍州不與中國諸侯㑹盟夷翟遇之孝公於是布惠振孤寡招戰士明功賞元年下令國中曰昔我穆公自岐雍之間修徳行武東平晉亂以河為界西伯戎翟廣地千里天子致伯諸侯畢賀為後世開業甚美㑹往者厲躁簡公出子之不寜國家内亂未遑外事三晋攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地脩穆公之政令寡人思念先君之意常痛於心賔客羣臣有能出竒計強秦者吾且尊官與之分土於是出兵東圍陜城西斬戎獂王衛鞅聞是令下西入秦因景監見二年天子致胙三年衛鞅説孝公變法脩刑内務耕稼外勵戰死之賞罰孝公善之甘龍杜摯等相與争之卒用鞅法百姓苦之居三年百姓便之乃拜鞅為左庶長七年與魏惠王㑹社平八年與魏戰元里有功十年衛鞅為太良造将兵圍魏安邑十二年作為咸陽築冀闕徙都之并諸小鄉聚集為大縣縣一令凡四十一縣為田開阡陌東地度洛十四年初為賦十九年天子致伯二十年諸侯畢賀使公子少官帥師㑹諸侯逢澤朝天子二十二年衛鞅擊魏虜魏公子卭封鞅為列侯號商君二十四年與晋戰岸門史記本紀作鴈門年表作岸門秦與韓魏戰非鴈門也虜其将魏錯孝公卒子惠文君立誅衛鞅鞅之初為秦施法法不行太子犯禁鞅曰法之不行自於貴戚君必欲行法先於太子太子不可黥黥其師傅於是法大用秦人治及孝公卒太子立宗室多怨鞅鞅亡因以為反卒車裂以狥元年楚韓趙蜀人来朝二年天子賀三年王冠四年天子致文武胙齊魏為王蘇秦自燕入趙説諸侯約從以拒秦五年以隂晉人公孫衍為大良造東説齊魏與共攻趙以敗從約史記秦本紀及六國丗家皆不言蘇秦約從事秦本紀止言犀首為大良造趙丗家止言决河水灌齊魏然皆不言其故今採蘇泰傳載之秦趙事中以為此大事不可不録也六年魏納隂晋隂晉更名寜秦七年公子卭與魏戰虜其将龍賈斬首八萬八年魏納河西地九年渡河取汾隂皮氏與魏王會應圍焦降之楚魏戰於陘山魏許秦以上洛以絶秦於楚魏敗楚於南陽秦責賂於魏魏不與管淺謂秦王曰何不謂楚王曰魏許寡人以地今戰勝而背之王何不與寡人魏畏秦楚之合必與秦地矣是魏勝楚而亡地於秦也是王以魏地徳寡人也魏若不出地則王攻其南寡人絶其西魏必危秦王曰善以是告楚楚王揚言與秦遇十年魏納上郡十五縣張儀相秦十一年縣義渠歸魏焦曲沃義渠君為臣更名少梁曰夏陽十二年初臘十三年韓君為王使張儀伐取陕出其人與魏十四年君始稱王更為元年二年張儀與齊楚大臣㑹齧桑三年韓魏太子来朝張儀相魏五年王㳺至北河七年樂池相秦韓魏趙燕齊楚帥匈奴共攻秦秦使庶長疾與戰脩魚虜其将申差敗趙公子渇韓太子奐斬首八萬二千八年張儀復相秦九年司馬錯伐蜀㓕之伐取趙中都西陽十年韓太子蒼来質伐取韓石章伐敗趙将泥伐取義渠二十五城十一年樗里疾攻魏焦降之敗韓岸門斬首萬走其将犀首公子通封於蜀陳荘為蜀相陳荘相蜀據張儀傳及華陽國志云十二年王與梁王會臨晉庶長疾攻趙虜趙将荘張儀相楚十三年庶長章擊楚於丹陽虜其将屈匄斬首八萬又攻楚漢中取六百里置漢中郡楚圍雍氏秦使庶長疾助韓攻楚到滿助魏攻燕十四年伐楚取趙陵丹犂蜀相荘殺蜀侯来降所殺必公子通也案後蜀侯名煇知通已死惠王卒子武王立韓魏齊楚趙皆賔從武王元年與魏哀王會臨晋誅蜀相荘張儀魏章皆東出之魏伐義渠丹犂二年初置丞相樗里疾甘茂為左右丞相張儀死於魏三年與韓㐮王㑹臨晋外南公揭卒樗里疾相韓武王謂甘茂曰寡人欲容車通三川窺周室死不恨矣茂於是請攻宜陽秋使甘茂庶長封伐冝陽四年㧞冝陽斬首六萬渉河城武遂魏太子来朝武王有力好戲力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏八月武王卒族孟說武王取魏女為后無子立異母弟稷是為昭㐮王昭㐮王名見趙丗家昭襄母楚人姓芊氏號宣太后武王之卒也昭襄王為質於燕燕人送歸得立昭襄王元年嚴君疾為相甘茂出之魏二年彗星見庶長壯與大臣諸公子為逆皆誅死惠文后亦不得其死案穣侯傳武王母號惠文后先武王死然則惠文后昭王之嫡母也秦猛暴雖殺嫡母亦不足怪然與穣侯傳異出悼武王后歸之於魏三年王冠與楚王㑹黃棘與楚上庸四年取蒲坂慧星見五年魏王来朝應亭復與魏蒲坂六年蜀侯煇反史記不記煇之封蜀披華陽國志煇為蜀侯祭而歸胙后母疾之加毒以進王怒誅之盖非反也未知孰信司馬錯定蜀庶長奐伐楚斬首二萬涇陽君質於齊日食晝晦七年㧞新城樗里疾卒八年使将軍芈戎攻楚取新市楚懐王来朝因留之九年齊孟嘗君薛文来相秦奐攻楚取八城殺其将景快十年楚懐王亡走趙趙不受復入秦薛文免樓緩為丞相十一年齊韓魏共攻秦軍於函谷求出楚懐王秦王謂樓緩曰三國之兵深矣寡人欲割河東而講對曰割河東大費也免於國患大利也此父兄之任也王何不召公子池而問焉王召公子池而問之對曰講亦悔不講亦悔王曰何也對曰王割河東而講三國雖王必曰惜矣三國且去吾特以三城從之此講之悔也王不講三國入函谷咸陽必危王又曰惜矣吾愛三城而不講此又不講之悔也王曰鈞吾悔也寕亡三城而悔無危咸陽而悔也寡人决講矣卒使公子池與魏封陵與韓武遂以和史記於此言齊韓魏趙宋中山共攻秦至塩氏而還秦與韓魏河北及封陵以和是年魏哀王二十三年韓㐮王十六年齊涽王二十八年也案孟嘗君傳涽王二十五年孟嘗君相秦是年秦留楚懐王明年孟嘗君得脱歸相齊而怨秦約韓魏共攻秦求出楚懐王涽王二十八年三國攻秦至函谷求出懷王而不得而史記於此言攻秦者六國又於齊韓魏世家年表魏哀王二十一年韓㐮王十四年齊涽王二十六年皆言三國攻秦是時孟嘗君初自秦逃歸則未有糾合三國同起兵者而韓㐮二十六年年表復言與魏齊擊秦秦與我武遂以和三年之間三國不應再擊秦且戰國策亦止言三國今以秦本紀之年及孟嘗君傳事為定并改定三國世家慧星見楚懐王死於秦歸葬十二年樓緩免魏冉為相予楚粟五萬石十三年向夀伐韓取武始左更白起攻新城五大夫禮亡奔魏任鄙為漢中守十四年白起攻韓魏於伊闕斬首二十四萬虜公孫喜㧞五城十五年大良造白起攻魏取垣復予之攻楚取宛十六年左更錯取軹及鄧魏冉免相封公子市宛公子悝鄧魏冉陶為諸侯十七年東周君来朝以垣易蒲坂皮氏王之冝陽十八年錯攻垣河雍決橋取之十九年王為西帝齊為東帝已復去之吕禮来自歸齊㓕宋任鄙卒王之漢中又之上郡北河二十一年錯攻魏河内魏献安邑秦出其人募徙河東賜爵赦罪人遷之涇陽君封宛二十二年䝉武伐齊取河東為九縣與楚王㑹宛與趙王㑹中陽二十三年尉斯離與三晉燕伐齊破之濟西齊涽王走莒王與魏王會冝陽與韓王㑹新城二十四年與楚王㑹鄢又㑹穣秦取魏安城至大梁燕趙救之秦兵去二十五年拔趙二城與韓王㑹新城與魏王㑹新明邑二十六年穣侯冉復相二十七年錯攻楚赦罪人遷之南陽白起攻趙取代光狼城又使司馬錯𤼵隴西因蜀攻楚黔中㧞之二十八年白起攻楚取鄢鄧赦罪人遷之二十九年白起攻楚取郢為南郡楚王走周王来王與楚王㑹襄陵白起為武安君三十年蜀守若伐取巫郡及江南為黔中郡三十一年白起伐魏取兩城楚人反我江南三十二年相穣侯攻魏至大梁破暴鳶斬首四萬鳶走魏入三縣請和三十三年客卿胡傷攻魏卷蔡陽長社取之三十四年白起擊芒夘華陽破之斬首十五萬魏入南陽以和秦與魏韓上庸地為一郡南陽免臣遷居之三十五年佐韓魏楚伐燕初置南陽郡三十六年客卿竈攻齊取剛夀與穣侯魏人范雎入秦上書見王言穣侯越韓魏而攻齊剛夀不便於國王拜范雎為客卿三十八年中更胡傷攻趙閼與不能取四十年悼太子死魏歸葬芷陽四十一年夏攻魏取邢邱懐范雎復言於王曰太后穣侯用事髙陵君華陽君華陽一作葉陽涇陽君佐之自有秩以上至諸大吏及王左右無非相國人者恐萬世後有秦國者非王之子孫也王恐廢太后逐穣侯髙陵華陽涇陽君於關外而拜范雎為丞相封應侯四十二年安國君為太子十月宣太后薨葬芷陽酈山九月穣侯出之陶昭王謂左右曰今時韓魏與始孰強對曰不如始強王曰今時如耳魏齊與孟嘗芒夘孰賢對曰不如王曰以孟嘗芒夘之賢率強韓魏以攻秦猶無柰寡人何也今以無能之如耳魏齊而率弱韓魏以伐秦其無柰寡人何亦眀矣左右皆曰然中旗對曰中一作申王之料天下過矣當晉六卿之時知氏最強㓕范中行又率韓魏之兵以圍趙㐮子於晋陽決晉水以灌晉陽之城不湛者三板知伯行水魏桓子御韓康子參乗知伯曰吾始不知水之可以亡人之國也乃今知之汾水可以灌安邑綘水可以灌平陽魏桓子肘韓康子韓康子履魏桓子肘足接於車上而知氏地分身死國亡為天下笑今秦兵雖強不能過知氏韓魏雖弱尚賢其在晋陽之下也此方其用肘足之時也願王之必勿易也昭王聞之而懼四十三年白起攻韓㧞九城斬首五萬四十四年攻韓南陽取之四十五年五大夫賁攻韓取十城華陽君悝出之國未至而死四十七年秦攻韓上黨上黨降趙趙發兵擊秦相距秦使白起擊大破趙於長平四十餘萬盡殺之四十八年十月韓獻垣雍秦軍分為三軍白起歸王齕将伐趙武安皮牢拔之司馬梗北定太原盡有韓上黨正月兵罷復守上黨十月五大夫陵攻趙邯鄲四十九年正月益𤼵卒佐陵陵戰不善免王齕代将十月将軍張唐攻魏為蔡尉捐弗守還斬之五十年武安君白起得罪為士伍遷隂宻張唐攻鄭㧞之十二月益𤼵卒軍汾城旁白起未至隂宻賜死齕攻邯鄲不㧞去奔汾軍二月餘攻晋軍斬首六千晉軍走流死河二萬人汾軍從唐㧞寕新中寜新中更名安陽初作河橋五十一年将軍摎攻韓取陽城負黍斬首四萬攻趙取二十餘縣首虜九萬西周君背秦與諸侯約從将天下銳兵出伊闕攻秦令秦毋得通陽城於是秦使将軍摎攻西周西周君自歸於秦頓首受罪盡獻其邑三十六口三萬秦王受之歸其君於周五十二年周民東亡其噐九鼎入秦周初亡五十三年天下来賔魏後至秦使摎伐魏取呉城韓王入朝魏委國聽令五十四年王郊見上帝於雍五十六年秋昭㐮王卒子孝文王立尊唐八子為唐太后而合其葬於先王韓王衰絰入弔祠諸侯皆使其将相来弔祠視丧事孝文王元年十月己亥即位赦罪人修先王功臣褒厚親戚弛苑囿三日辛丑卒子荘㐮王楚立莊㐮王本名異人養母華陽太后楚人也故更名楚大赦罪人修先王功臣施徳厚骨肉布惠於民東周君與諸侯謀秦使相國吕不韋誅之盡入其國封其君陽人以奉其祭祀使蒙驁伐韓韓獻成臯鞏秦界至大梁初置三川郡元年使蒙驁攻趙定太原二年䝉驁攻魏髙都汲拔之攻趙榆次新城狼孟取三十七城四月日食三年王齕攻上黨初置太原郡魏将無忌帥五國兵擊秦秦却於河外蒙驁敗解而去五月丙午莊㐮王卒史記秦紀多以先王之末年為後王之元年今皆以年表為定子政立是為秦始皇帝秦王政二十六年初并天下為三十六郡號始皇帝立五十一年而崩子胡亥立是為二世皇帝三年諸侯並起畔秦趙髙殺二世立子嬰子嬰立月餘諸侯誅之遂滅秦秦本嬴姓其後以國為姓有徐氏郯氏莒氏終黎氏運奄氏莵裘氏将梁氏黃氏江氏脩魚氏白冥氏飛亷氏秦氏然秦以造父封趙城為趙氏蘇子曰三代聖人以道御天下動容貎出詞氣逡廵廟堂之上而諸侯承徳四夷向風何其盛哉至其後世稍衰桓文迭興而維持之要之以盟㑹齊之以征伐旣已卑矣然春秋之後吴越放恣繼之以田常三晋之亂天下遂為戰國君臣之間非詐不言非力不用相與為盗跖之行猶恐不勝雖桓文之事且不試矣而況於文武成康之舊歟秦起於西垂與戎翟雜居本以強兵冨國為上其先㐮公最賢詩人稱之然其所以為國者亦猶是耳詩曰蒹葭蒼蒼白露為霜所謂伊人在水一方夫蒹葭之方盛也蒼蒼其強勁而不適於用至於白露凝戾為霜然後堅成可施於人今夫㐮公以耕戰自力而不知以禮義終成之豈不蒼然盛哉然而君子以為未成故其後世忸於為利而不知義至於商君厲之以法風俗日惡鄙詐猛暴甚於六國卒以此勝天下秦之君臣以為非是無足以服人矣當是時諸侯大者連地數千里帶甲數十萬雖使齊桓晉文假仁義挾天子以令之其勢将不能行惟得至誠之君子自修而不爭如商周之先君庶幾可以服之孟子㳺於齊梁以此干其君皆不能信以為詐謀竒計之所不能下長㦸勁弩之所不能克區區之仁義何足以致此然魏文侯當時之弱國也君王后齊之一婦人也魏文侯行仁義禮下賢者用卜子夏田子方叚干木而秦人不敢加兵君王后用齊四十餘年事秦謹與諸侯信而齊亦未嘗受兵而况於力行仁義中心惨怛終身不懈而有不能勝者哉夫衣冠佩玉可以化強暴深居簡出可以却猛獸定心寡欲可以懐鬼神孟子曰仁不可為衆誠因秦之地用秦之民按兵自守修徳以来天下彼将襁負其子而至而誰與共守惜乎其眀不足以知之竭力以勝敵敵勝之後二世而亡其數有以取之矣古史卷六
