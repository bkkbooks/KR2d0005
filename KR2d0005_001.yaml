body:
  text: 古史卷一宋蘇轍撰三皇本紀太昊伏犧氏風姓始觀天地之象鳥獸之文近取諸身逺取諸物以畫八卦教民嫁娶儷皮以為禮作結繩為罔罟以佃以漁豢養犧牲服牛乘馬故曰伏犧亦曰包犧氏伏犧以木德王天下故為三皇首河出圗故為龍師而龍名居於宛丘後丗所謂太昊之虛也伏犧氏既衰而共工氏伯九州自謂水德天王行之叙其後神農氏興而伏犧之子孫不可復紀至周衰有任宿須句顓臾皆風姓邑於濟上奉伏犧之祀炎帝神農氏姜姓以火德繼木為火師而火名故曰炎帝斫木為耜揉木為耒教民稼穡故曰神農始為市以通有無嘗草木百藥以救疾苦其子柱能殖百穀百蔬五帝之丗祀以為稷子孫傳丗為黃帝所滅黃帝亦神農之後以其德異故異號異姓而炎帝之後事堯者有四嶽事周者齊許申甫皆列於諸侯焉黃帝軒轅氏姬姓亦曰有熊氏神農之後而少典之子也少典取有蟜氏生黃帝炎帝丗衰諸侯相侵伐暴虐百姓炎帝弗能征於是軒轅乃習用干戈以征不享諸侯咸來賓從而蚩尤最為暴莫能伐炎帝欲侵陵諸侯諸侯咸歸軒轅軒轅乃修德振兵教熊羆貔貅貙虎以與炎帝戰於阪泉之野三戰然後得志蚩尤作亂不用帝命於是徵師諸侯戰於涿鹿之野遂禽殺蚩尤諸侯咸尊軒轅代神農氏為黃帝天下有不順者從而征之平者去之披山通道未嘗寧居以師兵為營衛為雲師而雲名舉風后力牧常先大鴻以治正名百物書契律歷衣服棟宇舟車弧矢之利皆本於黃帝黃帝作雲門大卷之樂其師岐伯明於方丗之為醫者宗焉然黃帝之書戰國之間猶存其言與老子相出入以無為宗黃帝之書與老子同者多見於列子其設於丗者與時俯仰皆其見於外者也黃帝居軒轅之丘而取於西陵之女是為嫘祖嫘祖為黃帝正妃生二子後皆有天下其一𤣥囂是為青陽其二昌意黃帝蓋四妃二十五子其得姓者十四人為十二姓曰姬西祁已滕針任荀僖佶儇依黃帝崩葬於橋山子青陽立是為帝少昊至虞夏之丗皆禘黃帝蘇子曰孔子刪詩及書起於堯舜稷契之際以為自是以上其事不可詳矣至司馬遷紀五帝首黃帝遺犧農而黜少昊以為帝王皆出於黃帝蓋紀其丗非紀其事也故余因之然黃帝本神農之後少典之子神農豈非五帝丗耶蓋黃帝髙陽髙辛子孫代有天下而少昊之後不傳周禮六樂無少昊之樂易叙古帝王亦不道也遷由是黜而不紀後世多以遷為非者於是作三皇本紀復紀少昊於五帝首古史卷一
