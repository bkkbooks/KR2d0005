body:
  text: 古史卷三十二宋蘇轍撰孔子弟子列傳第九孔子以布衣養士著籍三千人而高弟七十七人孔子曰德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏其賢者凡十人而已顔回字子淵魯人也父曰顔路少孔子三十嵗王肅曰據此則顔回死時孔子年五十九嵗然伯魚五十先孔子卒卒時孔子且七十矣此謂顔回先伯魚死而論語云顔回死顔路請子之車以為之槨子曰鯉也死有棺而無槨吾不徒行以為之槨故或以此為誤孔子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂與之言終日不違如愚退而省其私亦足以發回也不愚故曰回也非助我者也於吾言無所不悅蓋孔子嘗察之矣其心三月不違仁其餘則日月至焉而已矣故告之曰用之則行舍之則藏惟我與爾有是夫孔子之稱回常以為不可得而回之嘆夫子亦以為不可及也故曰仰之彌高鑚之彌堅瞻之在前忽然在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已故孔子曰語之而不惰者其回也歟又曰惜乎吾見其進也未見其止也顔淵問仁孔子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲遠佞人嘗使言志回曰願無伐善無施勞孔子稱之曰自吾有回門人益親顔子年二十九而髪白蚤死孔子哭之曰天喪予從者曰子慟矣子曰有慟乎非夫人之為慟而誰為門人欲厚葬顔子孔子曰回也視予猶父也予不得視猶子也非我也夫二三子也其後季康子問弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也孔子賛易至豫六二介于石不終日貞吉曰君子見幾而作不竢終日顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行此所謂不貳過也蘇子曰孔子於諸弟子獨稱顔子之好學弟子之賢者衆矣而孔子不以好學許之豈妄言哉吾嘗論之弟子之知孔子者獨顔子耳孔子之道如天然在人賢者識其大者不賢者識其小者顔子識其大者也故仰之而知其有高者存焉鑚之而知其有堅者存焉故曰語之而不惰者其回也歟此孔子所以獨稱其好學也人誠有見於此譬如為山雖覆一簣未有能止之者也茍誠無見矣雖既九仞不復能進也此顔子與衆弟子之辨也閔損字子騫魯人也少孔子十五嵗孔子曰孝哉閔子騫人不間於其父母昆弟之言魯人為長府閔子曰仍舊貫如之何何必改作子曰夫人不言言必有中季氏欲使為費宰閔子曰善為我辭焉如有復我者則吾必在汶上矣冉耕字伯牛魯人也有惡疾孔子往問之自牖執其手曰亡之命矣夫斯人也而有斯疾也冉雍字仲弓伯牛之族也孔子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨曰雍雖不敏請事斯語矣仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸仲弓父不賢人或疑之子曰犂牛之子觪且角雖欲勿用山川其舍諸蘇子曰古者七介以相見三辭三讓而後至無所不致其文所謂敬也不敬則確確則易易則民慢故古之君子其躬無所不敬其於人也則不然平易近民而後民安之太公之所以治齊則居敬而行簡者也伯禽之所以治魯則居敬而行敬者也雖周公亦憂魯之不競則仲弓之言周孔之所許也宰予字子我魯人也嘗問於孔子曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也宰予晝寢子曰朽木不可雕也糞土之墻不可圬也於予與何誅始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予與改是宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊榖既没新榖既升鑚燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出曰予之不仁也子生三年然後免於父母之懷故三年之喪天下之通喪也予也有三年之愛於其父母乎蘇子曰太史公言宰我為臨菑大夫與田恒作亂夷其族孔子恥之余以為宰我之賢列於四科其師友淵源所從來逺矣雖為不善不至於從畔逆弑君父也宰我不幸平居有晝寢短喪之過儒者因遂信之蓋田恒之亂本與闞止爭政闞止亦子我也田恒既殺闞止而宰我䝉其惡名豈不哀哉且使宰我信與田恒之亂恒既殺闞止弑簡公則尚誰族宰我者事蓋必不然矣夫使宰我䧟於逆亂猶不足惜也而使孔子門人之髙弟至於如此豈不為孔氏惜哉李斯言田恒隂取齊國殺宰予於庭因弑簡公又劉向别錄田成子與宰我爭宰我夜伏卒將以攻田成子令於卒中曰不見旌節母起鵄夷子皮聞之告田成子成子因為旌節以起宰我之卒以攻之遂殘宰我信如此說則宰我乃田恒之仇為齊攻田恒者非與恒作亂矣要之由闞止亦曰子我故戰國諸子誤以為宰予皆不足信也端木賜字子貢衛人也少孔子三十一歲賜嘗從孔子求為己目子曰汝器也曰何器也曰瑚璉也孔子亦問汝與回也孰愈曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與汝弗如也子貢問曰貧而無謟富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂歟子曰賜也始可與言詩已矣告諸往而知來者衛莊公出公爭國弟子欲仕於衛冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨出曰夫子不為也衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢識其小者莫不有文武之道焉夫子焉不學而亦何常師之有子禽問夫子至於是邦也必聞其政求之歟抑與之歟子貢曰夫子温良恭儉讓以得之夫子之求之也其諸異乎人之求之歟蓋子貢通達而辯聞其言者皆知其賢故叔孫武叔語大夫於朝曰子貢賢於仲尼子貢聞之曰譬之宮墻賜之墻也及肩闚見室家之好夫子之墻數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎陳子禽亦謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不愼也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也世之貴子貢者如此惟孔子知其未足而屢黜之曰回也其庶乎屢空賜不受命而貨殖焉億則屢中及孔子自衛反魯子貢從之故其言見於魯之君臣為多邾隱公來朝子貢觀焉邾子執玉高其容仰定公受玉卑其容俯子貢曰以禮觀之二君者皆將死亡正月相朝而皆不度心已亡矣高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎是嵗定公卒七年而邾子失國吴太宰嚭召季康子康子使子貢辭焉嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也寡君既共命矣其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉有由然也鄖之㑹吴以衛人殺其行人且姚故藩衛侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主致餼以相辭也今吴不行禮於衛而藩其君子盍見大宰乃請束錦以行語及衛故太宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來也必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也不欲者子之讎也若執衛君是墮黨而崇讎也且合諸侯而執衛君誰敢不懼太宰嚭說乃舍衛侯子服景伯如齊子貢為介見成宰公孫成曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎子周公之孫也多饗大利猶思不義利不可得而喪宗國將焉用之成曰善哉吾不早聞命及孔子卒哀公誄之曰旻天不吊不憖遺一老俾屏余一人以在位惸惸余在疚烏乎哀哉尼父無自律子貢曰君其不没於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱予一人非名也君再失之哀公卒死於越衛出公自城鉏使以弓問子貢且曰吾其入乎子貢稽首受弓對曰臣不識也私於使者曰昔成公孫於陳寗武子孫莊子為宛濮之盟而君入獻公孫於齊子鮮子展為夷儀之盟而君入今君再在孫矣内不聞獻之親外不聞成之卿則睗不識所由入也詩曰無競維人四方其順之若得其人四方以為主而國於何有出公亦終死於越越子使后庸聘於魯且言邾田封於駘上將盟于平陽季康子病之曰子貢在此吾不及此夫孟武伯曰然何不召曰固將召之叔孫文子曰它日請念然亦不能用子貢終老於齊子貢好廢舉與時轉貲家累千金喜揚人之美不能匿人之過此其病也蘇子曰太史公稱子貢一出存魯亂齊破吴强晉伯越予觀春秋左氏傳齊之伐魯本於悼公之怒季姬而非陳恒吴之伐齊本怒悼公之反覆而非子貢吴齊之戰陳乞猶在而恒未任事凡太史公所記皆非也蓋戰國說客設為子貢之辭以自託於孔氏而太史公信之耳孔子有言誦詩三百授之以政不達使於四方不能專對雖多亦奚以為孔子之門所謂言語者初止於此至於子貢加之以巧辯可以解紛結救患難如今所載而已若如公孫衍張儀騁其詭辯傾覆諸侯以快意一時此則孔氏所諱也冉求字子有仲弓之族也少孔子二十九嵗子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華疑而問焉孔子曰求也退故進之由也兼人故退之求曰非不說子之道力不足也子曰力不力者中道而廢今女畫孔子在陳冉求歸魯為季氏家臣齊師伐魯及清季康子謂求曰若之何求曰一子守二子從公禦諸竟康子自度不能求曰然則居封疆之間康子告二子二子亦不可求曰君無出一子帥師背城而戰魯之羣室衆於齊之兵車一室敵車優矣二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰大不列於諸侯矣康子使從於朝叔孫武叔呼而問戰焉對曰君子有遠慮小人何知孟懿子强問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而蒐乘孟孺子帥右冉求帥左季氏之甲七千求以武城人三百為已徒卒次於雩門之外五日右師乃從逆齊師于郊求用矛以帥衆遂入齊師獲甲首八十齊人宵遁求既有功於魯季氏乃使人以幣召孔子而復之然求之於季氏亦終不能大有所正也故孔子曰季氏富於周公而求也為之聚歛而附益之非吾徒也小子鳴鼓而攻之可也季子然問仲由冉求可謂大臣歟子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者歟曰弑父與君亦不從也季氏將有事於顓㬰冉有季路以告孔子曰求無乃爾是過歟夫顓㬰先王以為東蒙主且在邦域之中矣是社禝之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣虎兕出於柙龜玉毁於櫝中是誰之過歟冉有曰今夫顓㬰固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故遠人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓㬰而在蕭墻之内也仲由字子路卞人也少孔子九嵗性鄙而好勇志伉直冠雄雞佩猳豚以陵暴孔子孔子設禮誘之後乃儒服委質因門人請為弟子然其為人厚於孝友篤於信義嘗嘆曰傷哉貧也生無以養死無以葬孔子誨之曰啜菽飲水盡其歡斯之謂孝歛手足形還葬稱其財斯之謂禮子路有姊之喪可以除矣而弗除曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也然後除之小邾射以句繹奔魯謂魯人曰使季路要我吾無盟矣子路不許季孫使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由不能故孔子曰片言可以折獄者其由也歟言人之信之也子路有聞未之能行惟恐有聞其於人也無宿諾孔子稱之曰衣敝緼袍與衣狐貉者立而不恥者其由也歟嘗使言志曰願車馬衣輕裘與朋友共敝之而無憾孔子之為魯司冦也由為季氏宰將墮三都叔孫氏墮郈季氏墮費孟氏之宰公歛陽獨不肯墮成圍之弗克既而孔子去魯子路從之周旋陳蔡之間與孔子皆歸魯復與冉有為季氏家臣季氏之伐顓㬰亦莫能止也然魯人甚賢之孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也季氏祭其廟逮闇而祭莫而不成禮它日祭子路與使室事交乎户堂事交乎階質明而始行事日幾中而禮成故孔子稱其知禮子路之未學也鄉黨之勇夫也及其既學則賢於人者逺矣然而闇於大道卒以此死於難孔氏之門人顔子最賢其得於師也深與之言不違如愚雖門人亦莫能盡知也子貢之辯子路之勇皆卓然有立於衆衆所謂賢於顔子者也然子貢之明自以為不如至子路則嘗不服矣子謂顔子曰用之則行舍之則藏惟我與爾有是夫子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也然子路亦未必信也子疾病子路請禱子曰丘之禱久矣又欲使門人為臣病間曰久矣哉由之行詐也無臣而為有臣予將欺天乎子在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子路鼓瑟為北鄙之聲子曰由之瑟奚為於丘之門其仕季氏也使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者故誨之以六言六蔽曰好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂蓋孔子之所以戒之者至矣山梁雌雉子路拱之孔子嘆之曰時哉時哉三嗅而作以為好鬬而死自取之也而豈其時哉然子路終不悟也孔子之在衛也出公輙方與父莊公爭國子路謂孔子曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣蓋孔子所謂正名者未有子而不父其父云爾而子路不喻以蹈其難出公之十三年子路為孔悝家臣莊公因孔姬以入于孔氏廹孔悝强盟之遂劫以登臺欒寧將飲酒炙未孰聞亂使告子路召獲駕乘車行爵食炙奉出公以奔魯子路將入遇子羔將出曰門已閉矣子路曰吾姑至焉子羔曰弗及不踐其難子路曰食焉不避其難子羔遂出子路入及門公孫敢門焉曰無入為也子路曰是公孫也求利焉而逃其難由不然利其祿必救其患有使者出乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之下石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣哭之中庭進使者而問故曰醢之矣遂命覆醢蘇子曰冉有季路皆以政事稱於孔氏冉有才有餘而志不足其於季氏委曲從之不能有所立也至於季路志厲而識闇事衛出公雖父子爭國而不知其危也方其攻莊公於臺上使幸而莊公舍孔悝季路與悝皆出猶可言也莊公方質孔悝以取衛其不釋悝明矣孔悝不出遂攻而勝之則為臣弑君季路雖生將安所容身乎烏乎學於孔子而其慮害曽不若召獲悲夫言偃字子游吴人也少孔子四十五嵗其學於禮為詳為武城宰孔子問曰汝得人矣乎對曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也它日孔子過之聞弦歌之聲夫子笑曰割雞焉用牛刀子游曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳衛司寇惠子之喪其子虎不得立子游為之麻衰牡麻絰將軍文子辭曰子辱與彌牟之弟游又辱為之服敢辭子游曰禮也文子退反哭子游趨而就諸臣之位文子又辭曰子辱與彌牟之弟游又辱為之服又辱臨其喪敢辭子游曰固以請文子退扶適子南面而立曰子辱與彌牟之弟游又辱為之服又辱臨其喪虎也敢不復位子游趨而就客位卜商字子夏衛人也少孔子四十四嵗習詩能通其義或曰今毛詩叙子夏之遺說也子夏問巧笑倩兮美目盻兮素以為絢兮何謂也子曰繪事後素曰禮後乎曰起予者商也始可與言詩已矣或曰子夏受易春秋於孔子公羊高榖梁赤皆從之學春秋者也子夏曰博學而篤志切問而近思仁在其中矣又曰百工居肆以成其事君子學以致其道又曰大德不踰閑小德出入可也子游曰子夏之門人小子當洒埽應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成子謂子夏曰汝為君子儒毋為小人儒子貢問師與商也孰賢子曰師也過商也不及然則師愈歟曰過猶不及孔子行遇雨無蓋弟子欲假蓋於子夏氏孔子曰商之為人也甚短於財與人交即其所長辟其所短乃止孔子没子夏教授於西河魏文侯師之文侯以此名聞諸侯子夏喪子而失明曽子吊之子夏曰予何罪曽子譏之蘇子曰善乎子夏之教人也始於洒埽應對進退而不急於道使其來者自盡於學日引月長而道自至故曰百工居肆以成其事君子學以致其道譬如農夫之殖草木既為之區溉種而時耨之風雨既至小大甘苦莫不咸得其性而農夫無所用巧也孔子曰君子上達小人下達達之有上下出乎其人而非教者之力也異哉今世之教者聞道不明而急於夸世非性命道德不出於口雖禮樂政刑有所不言矣而况於洒掃應對進退也哉教者未必知而學未必信務為大言以相欺天下之偽自是而起此子貢所謂誣也顓孫師字子張陳人也少孔子四十八嵗子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行子張書諸紳子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞者色取仁而行違居之不疑在邦必聞在家必聞子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也子張之為人外矜莊而寡誠信故子游曰吾友張也為難能也然而未仁曽子曰堂堂乎張也難與並為仁矣曽參字子輿南武城人也少孔子四十六嵗事親孝故孔子為之作孝經其養曾晳必有酒肉將徹必問所與問有餘必曰有曽晳嗜羊棗參終身不食羊棗鉏𤓰而傷其根父撻之幾死而不怨然孔子非其不避也齊人聘之將以為卿參曰食人之祿則憂人之事吾不忍逺親而為人役辭之嘗稱曰吾聞諸夫子人未有自致者也必也親喪乎故其執親之喪水漿不入口者七日曽子為行甚篤立志甚厲其言曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦遠乎又曰可以託六尺之孤可以寄百里之命臨大節而不可奪者君子人歟君子人也謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寛博吾不惴焉自反而縮雖千萬人吾往矣嘗與客立於門側其徒趨而出曾子曰爾將何之曰吾父死將出哭於巷曰反哭於爾次曽子北面而吊之季孫之母死哀公吊焉曽子與子貢亦吊閽弗内也二子入其廐而修容子貢先入閽曰嚮者已告矣曽子後閽辟之渉内霤卿大夫皆辟位公降一等而揖之曽子有疾孟敬子問之曽子曰鳥之將死其鳴也哀人之將死其言也善君子所貴於道者三動容貌斯遠暴慢矣正顔色斯近信矣出辭氣斯遠鄙倍矣籩豆之事則有司存其既病也童子執燭而侍曰華而睆大夫之簀歟樂正子春曰止曽子聞之矍然曰呼曰華而睆大夫之簀歟曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而没曾子之妻以藜烝不熟而出人或非之曽子曰藜烝小物也而不用命况大事乎蓋以微罪出不欲斥言之也既而終身不娶謂元曰高宗之殺孝已尹吉甫之放伯竒皆後妻故也吾不及古人知得免於非乎孔子之孫子思學於曽子而孟子學於子思二子之立志行義大放曾子數稱其言云蘇子曰道有不可以名言者古之聖人命之曰一寄之曰中舜之禪禹曰人心惟危道心惟微惟精惟一允執厥中聖人之欲以道相詔者至於一與中盡矣昔者孔子與諸弟子言無所不至然而未嘗及此也蓋嘗與子貢言之矣曰賜也汝以予為多學而識之者歟曰然非歟曰非也予一以貫之雖與子貢言之而孔子之言之也難而子貢之受之也未信至於曾子不然孔子曰參乎吾道一以貫之曾子曰唯曾子出門人問曾子曰夫子之道忠恕而已矣蓋孔子之告之也不疑而曾子之受之也不惑則與子貢異矣然曾子以一為忠恕則知門人之不足告也夫及孔子既没曾子傳之子思子思因其說而廣之曰喜怒哀樂之未發謂之中發而皆中節謂之和中者天下之大本也和者天下之達道也致中和天地位焉萬物育焉子思之說既出而天下始知一與中之在是矣然子思以授孟子孟子又推之以為性善之論性善之論出而一與中始枝矣烏乎孔子之所以不告諸弟子者蓋為是歟澹臺滅明字子羽武城人也少孔子三十九嵗子游為武城宰稱之於孔子然子羽狀皃甚惡孔子以為材薄既受業南游至江從弟子三百人設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽家語子羽有君子之容而行不勝其貌宰我有文雅之詞而智不充其辯孔子曰里語云相馬以輿相士以居弗可廢矣其言與史記異考之論語以史記為信宓不齊字子賤魯人也少孔子四十九嵗子賤為單父宰孔子之兄子蔑與子賤皆仕孔子過蔑而問焉曰自汝之仕何得何亡對曰未有所得而所亡者三王事若襲學焉得習是學不得明也俸祿少饘粥不及親戚是骨肉益疏也公事多急不得吊死問疾是朋友道闕也孔子不悅往過子賤問如蔑也對曰無所亡而有得者三始誦之今得行之是學益明也俸祿所供被及親戚是骨肉益親也雖有公事而兼以吊死問疾是朋友益篤也孔子嘆曰君子哉若人魯無君子者斯焉取斯原憲字子思魯人也憲問耻子曰邦有道榖邦無道榖耻也克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也孔子卒憲隱於衛居草澤中子貢結駟連騎排藜藿入窮閻過謝憲憲攝敝衣冠迎子貢子貢耻之曰夫子豈病乎憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慙不懌而去終身耻其言之過也公冶長字子長齊人也孔子謂長可妻雖在縲紲之中非其罪也以其子妻之南宮适字子容魯孟僖子之仲子也三復白圭孔子以其兄之子妻之曰邦有道不廢邦無道免於刑戮适嘗問曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天下夫子不答适出子曰君子哉若人上德哉若人公晳哀字季次齊人也天下多仕於大夫為家臣季次鄙之未嘗屈節於人孔子嘆之曾㸃字晳與子參皆事孔子嘗與季路冉有公西華侍坐於孔子孔子曰以吾一日長乎爾無吾以也居則曰不吾知也如或知爾則何以哉子路率爾對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉㸃爾何如鼓瑟希鏗爾舍瑟而作曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與㸃也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大晳之為人狂而直季武子死晳倚其門而歌故孟子曰琴張曾晳牧皮孔子之所謂狂者也蘇子曰四子之言皆其志也夫子之哂由也以其不讓而其與㸃也以其自知之明與如曾晳之狂其必有不可施於世者矣茍不自知而强從事焉禍必隨之其欲從弟子風乎舞雩樂以㤀老則其處己也審矣不然孔子豈以不仕為貴者哉顔無繇字路少孔子六嵗與其子回各異時事孔子回死貧無以葬路請子之車以為之槨子曰才不才亦各言其子也鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可以徒行也商瞿字子木魯人也少孔子二十九嵗孔子傳易於瞿瞿傳楚人馯臂子弓弓傳江東人矯子庸疵疵傳燕人周子家竪竪傳淳于人光子乘羽羽傳齊人田子莊何何傳東武人王子中同同傳菑川人楊何何漢元朔中以治易為中大夫高柴字子羔衛人也少孔子三十嵗子羔執親之喪泣血三年未嘗見齒君子以為難子路為季氏宰以子羔為費宰及子路仕衛子羔亦為衛士師出公之難子羔出子路止死子羔之為士師也有刖者為衛守門及其出也追者至門者匿之其室子羔曰此子報怨之日也而反逃我何也曰斷足吾自取之獄將決而君愀然不樂君非私我也君子固然此臣之所以悅君也子羔復仕魯為成宰成人有其兄死而不為衰者聞子羔至遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子羔為之衰子羔葬其妻犯人之禾申祥以告請庚之子羔曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也子羔寢疾慶遺入請曰子之病革矣如至乎大病則如之何子羔曰吾聞之生有益於人死不害於人吾縱生無益於人可以死害於人乎哉我死葬我不毛之地可也漆雕開字子開魯人也少孔子十一嵗孔子使之仕對曰吾斯之未能信子說公伯僚字子周魯人也周愬子路於季孫子服景伯以告孔子曰夫子固有惑志於公伯僚吾力猶能肆諸市朝子曰道之將行也歟命也道之將廢也歟命也公伯僚其如命何司馬耕字子牛本宋桓氏其兄魋得罪於宋出奔衛牛致其邑與珪而適齊魋自衛入齊陳成子使為次卿牛又致其邑而適吴吴人惡之而反趙簡子陳成子皆召之卒於魯郭門之外葬諸丘輿牛多言而躁問仁於孔子子曰仁者其言也訒曰其言也訒斯謂之仁已乎曰為之難言之得無訒乎問君子子曰君子不憂不懼曰不憂不懼斯謂之君子已乎曰内省不疚夫何憂何懼牛嘆曰人皆有兄弟我獨無子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也樊須字子遲齊人也少孔子三十六嵗問仁子曰愛人問知子曰知人未達曰舉直措諸枉能使枉者直樊遲退見子夏而問之子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者遠矣湯有天下選於衆舉伊尹不仁者遠矣樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是四方之民襁負其子而至矣焉用稼蘇子曰樊遲之學為農圃蓋將與民並耕而食歟此孟子所謂許行之學也孟子曰有大人之事有小人之事堯以不得舜為己憂舜以不得臯陶為己憂以百畝之不易為己憂者農夫也此孔子所謂樊遲小人也有若魯人也少孔子四十三嵗其言曰信近於義言可復也恭近於禮遠耻辱也因不失其親亦可宗也哀公問曰年饑用不足如之何有若對曰盍徹乎公曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足孔子既没曾子道孔子之言曰喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也與子游聞之夫子有子曰然則夫子有為言之也曾子以告子游子游曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬為石槨三年不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宮敬叔反必載寳而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以告有子有子曰然吾固曰非夫子之言也曾子曰子何以知之有子曰夫子制於中都四寸之棺五寸之槨以此知不欲速朽也夫子失魯司冦將之荆先之以子夏申之以冉有以此知不欲速貧也它日子夏子張子游以有子似聖人欲以所事孔子事之强曾子曾子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已然有子既祥而絲屨組纓君子譏之蘇子曰茍至於君子未有無耻者也孟子稱禹崩益辟禹之子於箕山之隂朝覲獄訟者皆不之益而之啓然後益不敢踐天子位太史公稱孔子既没弟子以有若貌類孔子師之如孔子時及問而不能答乃斥去之夫以益有若之賢而其無耻至此極歟且月宿於畢而雨不應商瞿四十而生五子此卜祝之事而鄙儒所以謂孔子聖人者戰國雜說類此者多矣孟子猶不能擇而况太史公乎公西赤字子華魯人也少孔子四十二嵗子華習於禮容應對孔子屢稱之嘗使於齊冉有為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之君子周急不繼富巫馬施字子旗魯人也少孔子三十嵗陳司敗問昭公知禮乎孔子曰知禮孔子退揖施而進之曰吾聞君子不黨君子亦黨乎君娶於吴為同姓謂之吴孟子君而知禮孰不知禮施以告孔子曰丘也幸茍有過人必知之梁鱣字叔魚齊人也少孔子二十九嵗年三十未有子欲出其妻商瞿謂曰子未也吾年三十八無子吾母為吾更取室夫子使吾之齊母請留夫子曰無憂也瞿過四十當有五丈夫子今果然吾恐子自晩生耳未必妻之過也居二年而有子顔幸字子柳魯人也少孔子四十六嵗冉孺字子魯魯人也少孔子五十歲曹䘏字子循少孔子五十嵗伯䖍字子折少孔子五十嵗公孫龍字子石楚人也少孔子五十三嵗公良孺字子正陳人也賢而有勇以其私車五乘從孔子將適衛蒲人止之孺喟然曰昔吾從夫子遇難於匡今又困於此命也挺劒合衆將與之戰蒲人懼乃盟而去秦商字丕兹魯人也父堇父與孔子父叔梁紇俱以力聞少孔子四嵗顔刻字子驕魯人也孔子將適陳過匡刻為僕以其䇿指曰昔吾入此由彼缺也匡人以為陽虎遂止孔子琴牢字子開一字張衛人孟子所謂狂者也牢曰子云吾不試故藝衛宗魯由齊豹事公孟縶齊豹將殺公孟宗魯知而弗告及難作死之琴張將往弔之孔子曰齊豹之盗而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮陳亢字子禽陳人也少孔子四十嵗亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎曰未也不學禮無以立鯉退而學禮亢喜曰問一得三聞詩聞禮又聞君子之遠其子也叔仲㑹字子期魯人也少孔子五十嵗與孔琁年相比二人迭侍孔子執筆記事孟武伯見孔子而問曰此二孺子之幼也於學豈識於壯哉孔子曰然少成若天性習慣若自然也孔弗字子蔑孔子兄之子與宓子賤皆仕者也孔子弟子七十七人史記公孫龍以上三十三人有年聞見於書傳家語増以叔仲㑹以上四人又孔弗一人事見宓不齊傳凡四十人其餘無年及不見書傳者凡三十七人見于左冉季字子産魯人公祖句茲字子之秦祖字子南秦人漆雕哆字歛魯人漆雕徒父壤駟赤字子徒秦人商澤字子季石作蜀字子明任不齊字選楚人后處字子里齊人秦冉字開公夏首字乘魯人奚容蒧字晳公肩定字子中魯人或曰晉人顔祖字襄鄡單字子家句井疆衛人罕父黒字子索申黨字周顔之僕字叔魯人榮祈字子祺縣成字子祺魯人左人郢字行魯人燕伋字思鄭邦字子徒家語作薛邦秦非字子之魯人施之常字子恒顔噲字子聲歩叔乘字子車齊人原亢字籍樂欬字子聲亷絜字庸齊人顔何字冉魯人狄黒字晳邽巽字子歛魯人邽或作邦索隱曰文翁圖作國蓋避漢祖諱也公西輿字子上公西葴字子尚魯人蘇子曰孔子弟子高弟七十七人余以太史公書及孔子家語考之皆同秦冉顔何不載於家語而琴牢陳亢不錄於史記二書既不可偏廢而琴張陳亢又見於論語故并錄之凡七十九人古史卷三十二
