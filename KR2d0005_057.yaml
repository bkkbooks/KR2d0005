body:
  text: 古史卷五十七宋蘇轍撰蒙恬列傳第三十四蒙恬者其先齊人也恬大父驁自齊事秦昭王官至上卿莊襄王元年驁為將伐韓取成臯滎陽置三川郡二年驁攻趙三十七城始皇三年驁攻韓取十三城五年驁攻魏取二十城置東郡七年驁卒驁子曰武二十三年武為秦禆將軍與王翦攻楚大破之殺項燕二十四年虜楚王武子恬毅恬嘗書獄典文學二十六年恬因家世得為將攻齊大破之拜為内史秦已并天下乃使恬將三十萬衆北逐戎狄收河南築長城因地形制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶虵而北暴師於外十餘年居上郡是時恬威振匃奴始皇甚尊寵蒙氏信任賢之而親近毅位至上卿出則參乗入則御前恬任外事而毅常為内謀名為忠信故雖諸將相莫敢與之爭趙髙者諸趙䟽逺属也昆弟數人皆生隐宮其母被刑僇世世卑賤始皇聞髙强力通於獄法舉以為中車府令髙即私事公子胡亥喻之决獄髙有大罪始皇令毅治之毅不敢阿法當髙罪死除其宦籍帝以髙之敦於事也赦之復其官爵始皇欲游天下道九原直抵甘泉乃使恬通道自九原抵甘泉壍山堙谷千八百里道未就三十七年冬行出游㑹稽並海上北走琅邪道病使毅還禱山川未反始皇至沙丘崩祕之羣臣莫知是時丞相李斯少子胡亥中車府令趙高常從髙雅得幸於胡亥欲立之又怨毅法治之而不為己也因有賊心乃與李斯胡亥隂謀立胡亥為太子太子已立遣使者以罪賜公子扶蘓及恬死扶蘓已死恬疑而復請之使者以恬属吏更置胡亥以李斯舍人為䕶軍使者還報胡亥已聞扶蘓死即欲釋恬趙髙恐蒙氏復貴而用事怨之毅還至髙因為胡亥忠計欲以滅蒙氏乃言曰臣聞先帝欲舉賢立太子久矣而毅諌曰不可若知賢而愈不立則是不忠而惑主也以臣愚意不若誅之胡亥聼而繫毅於代前已囚恬於陽周䘮至咸陽已葬太子立為二世皇帝而趙髙親近日夜毁惡蒙氏求其罪過舉劾之子嬰進諌曰臣聞故趙王遷殺其良臣李牧而用顔聚燕王喜隂用荆軻之謀而倍秦之約齊王建殺其故世忠臣而用后勝之議此三君者皆以變古者失其國而殃及其身今蒙氏秦之大臣謀士也而主欲一旦棄去之臣竊以為不可臣聞輕慮者不可以治國獨智者不可以存君誅殺忠臣而立無節行之人是内使羣臣不相信而外使闘士之意離也臣竊以為不可胡亥不聼而遣御史曲宫乗傳之代令毅曰先主欲立太子而卿難之今丞相以卿為不忠罪及其宗朕不忍乃賜卿死亦甚幸矣卿其圗之毅對曰以臣不能得先主之意則臣少宦順幸没世可謂知意矣以臣不知太子之能則太子獨從周旋天下去諸公子絶逺臣無疑矣夫先主之舉用太子數年之積也臣乃何言之敢諌何慮之敢謀非敢餙辭以避死也為羞累先主之名願大夫為慮焉使臣得死情實且夫順成全者道之所貴也刑殺者道之所卒也昔者秦繆公殺三良而死罪百里奚而非其罪也故立號曰繆昭襄王殺武安君白起楚平王殺伍奢呉王夫差殺伍子胥此四君者皆為大失而天下非之以其君為不眀以是籍於諸侯故曰用道治者不殺無罪而罰不加於無辜唯大夫留心使者知胡亥之意不聼毅言遂殺之二世又遣使者之陽周令恬曰君之過多矣而卿弟毅有大罪法及内史恬曰自吾先人及至子孫積功信於秦三世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之敎以不忘先主也昔周成王初立未離襁褓周公旦負王以朝卒定天下及成王有病甚殆公旦自揃其爪以沈於河曰王未有識是旦執事有罪殃旦受其不祥乃書而藏之記府可謂信矣及王能治國有賊臣言周公旦欲為亂久矣王若不備必有大事王乃大怒周公旦走而奔於楚成王觀於記府得周公旦沈書乃流涕曰孰謂周公旦欲為亂乎殺言之者而反周公旦故周書曰必參而伍之恬之宗世無二心而事卒如此是必孽臣逆亂内陵之道也夫成王失而復振則卒昌桀殺關龍逢紂殺王子比干而不悔身死則國亡臣故曰過可振而覺也察於參伍上聖之法也凡臣之言非以求免於咎也將以諌而死願陛下為萬民思從道也使者曰臣受詔行法於將軍不敢以將軍言聞於上也恬喟然太息曰我何罪於天無過而死乎良久徐曰恬罪固當死矣起臨洮属之遼東城壍萬餘里此其中不能無絶地脉哉此乃恬之罪也乃吞藥自殺蘓子曰蒙氏為秦吞滅諸侯其所殘暴多矣子孫以無罪戮死此天意也恬以長城之役竭民力斷地脉自知當死而毅以忠信事上自許無罪死而不厭夫媮合取容咎亞李斯此其所以不免者哉然始皇病於琅邪使毅還禱山川至沙丘而崩使毅尚從則趙髙李斯廢適之謀殆不能發嗚呼天之所廢人謀固無所復施耶古史卷五十七
